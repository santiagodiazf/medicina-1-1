    <script>
        // 1. Base de datos de preguntas
        const rawQuestions = [
            {
                text: "1. El principio fundamental de la Teoría Celular, propuesto por Rudolf Virchow, 'Omnis cellula e cellula', se establece como la 'Unidad de Origen celular'. Este postulado médico-científico implica directamente:",
                options: [
                    { text: "Que la célula es la unidad más pequeña capaz de obtener energía del entorno.", correct: false },
                    { text: "Que todas las células comparten una química similar con un ancestro común.", correct: false },
                    { text: "Que la información hereditaria (ADN) es la base para la proliferación y transmisión de la vida celular.", correct: false },
                    { text: "Que todas las células provienen de células preexistentes, justificando la continuidad de los tejidos y la propagación de patologías celulares.", correct: true }
                ]
            },
            {
                text: "2. ¿Cuál de los siguientes criterios define de forma molecular y ultraestructural la célula como 'Unidad Funcional' de la vida?",
                options: [
                    { text: "Poseer ADN como material genético hereditario para la transmisión intergeneracional.", correct: false },
                    { text: "Estar altamente organizada en comparación con objetos inanimados naturales.", correct: false },
                    { text: "Estar envuelta por una membrana que la separa del medio externo.", correct: false },
                    { text: "Ser la unidad mínima capaz de realizar todas las funciones vitales, incluyendo la homeostasis, la obtención y transformación de energía, y la respuesta a estímulos.", correct: true }
                ]
            },
            {
                text: "3. En la comparación de los genomas, el ser humano presenta aproximadamente 19000 genes codificantes de proteínas. Según los datos evolutivos y comparativos, ¿cuántas veces más genes codificantes tiene el ser humano que la bacteria E. coli?",
                options: [
                    { text: "50000 veces más.", correct: false },
                    { text: "50 veces más.", correct: false },
                    { text: "5 veces más.", correct: true },
                    { text: "19000 veces más.", correct: false }
                ]
            },
            {
                text: "4. La célula eucariota es descrita por presentar un núcleo y otros orgánulos limitados por membrana. ¿Cuál es la implicación molecular de la presencia de ADN en la célula, independientemente de su tipo (procariota o eucariota)?",
                options: [
                    { text: "La capacidad de adaptación al entorno.", correct: false },
                    { text: "La función exclusiva de la oxidación de nutrientes.", correct: false },
                    { text: "Contiene la información necesaria para sintetizar los ARN y proteínas que la célula requiere.", correct: true },
                    { text: "Define el proceso autocatalítico de la vida.", correct: false }
                ]
            },
            {
                text: "5. ¿Qué investigador, con formación médica, contribuyó a la Teoría Celular como el postulador de que la célula es la unidad básica y que todos los organismos están formados por células?",
                options: [
                    { text: "Matthias Schleiden (botánico).", correct: false },
                    { text: "Robert Hooke (descubridor del término cellula).", correct: false },
                    { text: "René Dutrochet (biólogo, fisiólogo y médico).", correct: true },
                    { text: "Theodoro Schwann (zoólogo).", correct: false }
                ]
            },
            {
                text: "6. Una de las características definitorias de los seres vivos es la homeostasis. ¿Cuál es el papel ultraestructural crucial de la membrana celular en el mantenimiento de este ambiente interno relativamente constante?",
                options: [
                    { text: "Servir de esqueleto proteico interno para la forma celular.", correct: false },
                    { text: "Almacenar el material genético.", correct: false },
                    { text: "Permitir la digestión de grandes moléculas.", correct: false },
                    { text: "Actuar como límite que separa el contenido celular del medio externo.", correct: true }
                ]
            },
            {
                text: "7. La gran diversidad funcional entre células de un mismo organismo (ej. un miocito vs. una célula de la piel) es posible porque:",
                options: [
                    { text: "Cada tipo celular posee un genoma completamente distinto.", correct: false },
                    { text: "Los distintos tipos celulares heredaron diferentes ancestros (LUCA o LECA).", correct: false },
                    { text: "Contienen el mismo ADN, pero expresan diferentes sets de genes en respuesta al desarrollo y factores ambientales.", correct: true },
                    { text: "Solo las células animales tienen orgánulos.", correct: false }
                ]
            },
            {
                text: "8. En el citosol se produce una gran parte de los procesos bioquímicos esenciales. Molecularmente, ¿qué representa el citosol en la célula eucariota?",
                options: [
                    { text: "El conjunto de filamentos proteicos que conforman el citoesqueleto.", correct: false },
                    { text: "El material genético (ADN y ARN).", correct: false },
                    { text: "Los orgánulos limitados por membrana.", correct: false },
                    { text: "Un medio acuoso con una gran mezcla de moléculas grandes y pequeñas.", correct: true }
                ]
            },
            {
                text: "9. La diferencia clave entre una célula procariota (como E. coli) y una célula eucariota radica en que la procariota, aunque contiene ADN:",
                options: [
                    { text: "Es mucho más grande (5-20 μm).", correct: false },
                    { text: "No posee membrana celular.", correct: false },
                    { text: "Carece de la capacidad de transformar energía.", correct: false },
                    { text: "Carece de núcleo y de la mayoría de los orgánulos limitados por membranas.", correct: true }
                ]
            },
            {
                text: "10. El origen de los cloroplastos en células fotosintéticas y de las mitocondrias en células animales y vegetales se explica por la teoría de la Endosimbiosis. Este proceso evolutivo supuso la adquisición de orgánulos con funciones específicas de:",
                options: [
                    { text: "Endosimbiosis de un protozoo cazador.", correct: false },
                    { text: "Adquisición de ADN nuclear.", correct: false },
                    { text: "Endosimbiosis con una bacteria aeróbica (mitocondria) y con una bacteria fotosintética (cloroplasto).", correct: true },
                    { text: "Fusión con el Last Universal Common Ancestor (LUCA).", correct: false }
                ]
            },
            {
                text: "11. ¿Cuál de los siguientes términos representa al ancestro común más reciente del linaje eucariota?",
                options: [
                    { text: "LUCA (Last Universal Common Ancestor).", correct: false },
                    { text: "E. coli.", correct: false },
                    { text: "LECA (Last Eukaryotic Common Ancestor).", correct: true },
                    { text: "La protocélula.", correct: false }
                ]
            },
            {
                text: "12. Desde el punto de vista molecular y ultraestructural, el Citoesqueleto está formado por:",
                options: [
                    { text: "Orgánulos limitados por membrana.", correct: false },
                    { text: "La información hereditaria (ADN).", correct: false },
                    { text: "Filamentos proteicos que se extienden por todo el citoplasma.", correct: true },
                    { text: "Lisosomas y aparato de Golgi.", correct: false }
                ]
            },
            {
                text: "13. Las células eucariotas unicelulares son complejas y pueden realizar funciones especializadas para la supervivencia en su medio. Un ejemplo de estas capacidades es:",
                options: [
                    { text: "La oxidación final de nutrientes para obtener ATP, que es exclusiva de los organismos multicelulares.", correct: false },
                    { text: "Cazar, nadar y el apareamiento mediante fusión celular.", correct: true },
                    { text: "Sintetizar glucógeno en el retículo endoplásmico rugoso.", correct: false },
                    { text: "Almacenar ADN fuera del núcleo.", correct: false }
                ]
            },
            {
                text: "14. En el contexto de la evolución de la vida, el concepto de que 'La respuesta [al origen de la vida] viene de la energía y los límites que impone, y no de los genes' implica una prioridad para el desarrollo de:",
                options: [
                    { text: "El sistema de reparación del ADN.", correct: false },
                    { text: "El potencial eléctrico de membrana para impulsar el crecimiento.", correct: true },
                    { text: "La alta especialización en organismos multicelulares.", correct: false },
                    { text: "La síntesis compleja de moléculas para su exportación.", correct: false }
                ]
            },
            {
                text: "15. Los organismos multicelulares, incluyendo animales y el ser humano, se caracterizan ultraestructuralmente por:",
                options: [
                    { text: "Ser morfológicamente idénticos a LUCA.", correct: false },
                    { text: "Estar compuestos exclusivamente por células procariotas.", correct: false },
                    { text: "Consistir en distintos tipos celulares, todos derivados de una única célula huevo fertilizada, cooperando entre sí.", correct: true },
                    { text: "No poseer mitocondrias, ya que la energía se obtiene del exterior.", correct: false }
                ]
            },
            {
                text: "16. Si una célula requiere una alta demanda energética para funciones de transporte activo (ej. neurona), la alta densidad de este orgánulo es crucial, ya que es el sitio donde se lleva a cabo la oxidación final de nutrientes para la obtención de ATP:",
                options: [
                    { text: "Lisosomas.", correct: false },
                    { text: "Aparato de Golgi.", correct: false },
                    { text: "Cloroplastos.", correct: false },
                    { text: "Mitocondria.", correct: true }
                ]
            },
            {
                text: "17. El retículo endoplásmico y el aparato de Golgi trabajan de manera coordinada. Específicamente, ¿cuál es su función principal en la ultraestructura de la célula eucariota?",
                options: [
                    { text: "Sintetizar moléculas complejas para su exportación o inserción en la membrana celular.", correct: true },
                    { text: "Digerir grandes moléculas mediante hidrolasas.", correct: false },
                    { text: "Mantener la forma celular y el movimiento.", correct: false },
                    { text: "Realizar la fotosíntesis.", correct: false }
                ]
            },
            {
                text: "18. En una célula eucariota, si una molécula de gran tamaño destinada a la secreción falla en su modificación y clasificación final, ¿qué orgánulo delimitado por membrana está funcionando incorrectamente?",
                options: [
                    { text: "Retículo Endoplásmico.", correct: false },
                    { text: "Lisosoma.", correct: false },
                    { text: "Aparato de Golgi.", correct: true },
                    { text: "Mitocondria.", correct: false }
                ]
            },
            {
                text: "19. La función molecular de los lisosomas es crucial para el recambio celular y la defensa. Esta función se define como:",
                options: [
                    { text: "Almacenamiento de ADN.", correct: false },
                    { text: "Síntesis de proteínas.", correct: false },
                    { text: "Digestión de grandes moléculas.", correct: true },
                    { text: "Transporte de orgánulos.", correct: false }
                ]
            },
            {
                text: "20. ¿Qué estructura ultraestructural se extiende por todo el citoplasma y es esencial para el transporte de orgánulos y macromoléculas entre distintas localizaciones internas de la célula?",
                options: [
                    { text: "La membrana celular.", correct: false },
                    { text: "El núcleo.", correct: false },
                    { text: "El citoesqueleto.", correct: true },
                    { text: "El citosol.", correct: false }
                ]
            },
            {
                text: "21. ¿Qué contiene el Núcleo que lo define como el orgánulo central de la célula eucariota?",
                options: [
                    { text: "La mayor parte de los orgánulos limitados por membrana.", correct: false },
                    { text: "El citosol, donde ocurren los procesos bioquímicos esenciales.", correct: false },
                    { text: "La principal información genética almacenada en forma de ADN.", correct: true },
                    { text: "Filamentos proteicos para el movimiento celular.", correct: false }
                ]
            },
            {
                text: "22. Si un microscopista observa una muestra de tejido animal con el microscopio óptico y logra distinguir sus componentes internos, se refiere a estos componentes como:",
                options: [
                    { text: "Moléculas pequeñas.", correct: false },
                    { text: "Ribosomas.", correct: false },
                    { text: "Orgánulos.", correct: true },
                    { text: "Citosol puro.", correct: false }
                ]
            },
            {
                text: "23. El Citoplasma en la célula eucariota incluye:",
                options: [
                    { text: "Únicamente el núcleo y el citoesqueleto.", correct: false },
                    { text: "Solamente el citosol y el núcleo.", correct: false },
                    { text: "Todo el contenido fuera del núcleo, que abarca el citosol y la variedad de orgánulos limitados por membranas.", correct: true },

                ]
            },
            {
                text: "24. La microscopía electrónica permite la observación de los orgánulos más pequeños. Esta técnica es superior al microscopio óptico debido a su mayor resolución, pero requiere necesariamente:",
                options: [
                    { text: "La observación in vivo de células funcionales.", correct: false },
                    { text: "El uso de tinciones con fluorescencia.", correct: false },
                    { text: "Una preparación de muestras compleja.", correct: true },
                    { text: "Que las muestras tengan un diámetro de 5-20 μm.", correct: false }

            },
            {
                text: "25. La Microscopía de Fluorescencia es crucial para la investigación molecular porque permite al científico:",

                    { text: "Ver células de 5-20 μm sin preparación alguna.", correct: false },
                    { text: "Realizar la oxidación final de nutrientes en tiempo real.", correct: false },
                    { text: "Visualizar y localizar con precisión distintos componentes celulares, como proteínas o estructuras, mediante la emisión de luz.", correct: true },
                    { text: "Identificar el ancestro común (LUCA).", correct: false }
                ]
            },
            {
                text: "26. ¿Cuál de los siguientes orgánulos se considera que probablemente existía en la célula ancestral procariota debido a su ausencia de núcleo y de la mayoría de orgánulos limitados por membrana?",
                options: [
                    { text: "Lisosoma.", correct: false },
                    { text: "Mitocondria (adquirida por endosimbiosis).", correct: false },

                    { text: "Probablemente, ninguna de las anteriores, ya que la célula procariota ancestral carece de la mayoría de orgánulos.", correct: true }
                ]
            },
            {
                text: "27. La levadura S. cerevisae se utiliza como organismo modelo. ¿Qué tipo de célula representa este organismo en la clasificación fundamental?",

                    { text: "Bacteria procariota.", correct: false },
                    { text: "Procariota ancestral (Archaea).", correct: false },
                    { text: "Eucariota unicelular.", correct: true },
                    { text: "Organismo multicelular (Hongo).", correct: false }
                ]
            },
            {
                text: "28. En células vegetales, los cloroplastos tienen una función ultraestructuralmente análoga a la de la mitocondria en cuanto a la producción de energía, pero mediante un proceso distinto, que es:",

                    { text: "La oxidación final de nutrientes.", correct: false },
                    { text: "La digestión de macromoléculas.", correct: false },
                    { text: "La fotosíntesis.", correct: true },
                    { text: "La síntesis de ADN nuclear.", correct: false }
                ]
            },
            {
                text: "29. ¿Qué factor molecular determina que la célula nerviosa (neurona) sea tan funcional y morfológicamente diferente de un macrófago, si ambas contienen el mismo ADN?",

                    { text: "El número de mitocondrias.", correct: false },
                    { text: "Los diferentes sets de genes que expresan.", correct: true },
                    { text: "La presencia o ausencia de lisosomas.", correct: false },
                    { text: "El tipo de microscopía utilizada para observarlas.", correct: false }

            {
                text: "30. Si el citoesqueleto sufre un fallo, ¿cuál de las siguientes funciones se vería comprometida simultáneamente?",

                    { text: "La síntesis de proteínas para exportación.", correct: false },
                    { text: "La oxidación de glucosa.", correct: false },
                    { text: "La digestión de partículas.", correct: false },
                    { text: "El mantenimiento de la forma celular y el movimiento coordinado de orgánulos.", correct: true }

            },
            {
                text: "31. ¿Qué característica de la célula, en su nivel de organización, facilita la homeostasis al crear una barrera y permitir la compartimentalización controlada?",

                    { text: "La capacidad de reproducirse.", correct: false },

            {
                text: "32. En 1670, Anton Van Leeuwenhoek, considerado el padre de la microbiología, llamó 'animálculos' a los microorganismos que observó. ¿Qué científico, siete años después, también contribuyó a este descubrimiento?",

                text: "33. Un organismo modelo frecuentemente utilizado en ciencia que pertenece al grupo de los nematodos (gusanos) y que permite estudiar el desarrollo celular y funciones biológicas es:",

                text: "35. La vida es un proceso autocatalítico. Esto significa, en términos genéticos, que el ADN:",

                options: [

            {

                options: [

                    { text: "El origen común de todas las células a partir de una única célula huevo y su diferenciación controlada.", correct: true },
                    { text: "La ausencia de citoesqueleto.", correct: false }
                ]
            },
            {
                text: "41. ¿Cuál de los siguientes es un ejemplo de un fenómeno de respuesta a estímulos fundamental para la supervivencia?",
                options: [

            {

            },
            {

            },
            {

            },
            {
                text: "48. La 'vida es un proceso autocatalítico'. En términos moleculares, esto implica que las células son capaces de:",
                options: [
                    { text: "Crecer a partir de inicios simples sin necesidad de energía.", correct: false },
                    { text: "Reproducirse, utilizando su información genética (ADN) para crear nuevos componentes y propagarse.", correct: true },
                    { text: "Estar siempre en equilibrio constante (homeostasis).", correct: false },
                    { text: "Observarse únicamente con microscopía electrónica.", correct: false }
                ]
            },
            {
                text: "49. El organismo modelo Drosophila melanogaster (mosca) es útil para estudiar funciones biológicas, pero tiene la limitación de presentar una complejidad genética significativamente menor que el ser humano. ¿Aproximadamente cuántos genes codificantes tiene el ser humano comparado con la mosca, según las fuentes?",
                options: [
                    { text: "5 veces más que E. coli.", correct: false },
                    { text: "50000 veces más (según la proporción citada).", correct: true },
                    { text: "Un número idéntico.", correct: false },
                    { text: "La mitad de los genes de E. coli.", correct: false }
                ]
            },
            {
                text: "50. Si un agente patógeno inhibe la capacidad de la célula para obtener energía y transformarla, ¿qué proceso fundamental de la célula eucariota se ve directamente afectado a nivel ultraestructural?",
                options: [
                    { text: "La capacidad de crecer.", correct: false },
                    { text: "La oxidación final de nutrientes llevada a cabo por la mitocondria.", correct: true },
                    { text: "La localización de componentes mediante fluorescencia.", correct: false },
                    { text: "La capacidad de autodigestión de grandes moléculas por el lisosoma", correct: false }
                ]
            }
        ];

        // 2. Estado del Quiz
        // Añadimos propiedades extra a las preguntas para seguir su estado
        let questions = rawQuestions.map((q, index) => ({
            ...q,
            id: index,
            userState: null, // 'correct', 'incorrect' o null
            isMarked: false
        }));

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 3. Renderizado
        function renderQuiz(subsetOfQuestions = questions) {
            const quizContainer = document.getElementById('quiz');
            quizContainer.innerHTML = '';
            
            // Si no hay preguntas que mostrar (ej. 0 falladas)
            if (subsetOfQuestions.length === 0) {
                quizContainer.innerHTML = '<p style="text-align:center; padding:20px;">No hay preguntas en esta categoría.</p>';
                return;
            }

            subsetOfQuestions.forEach(q => {
                const questionBlock = document.createElement('div');
                questionBlock.className = 'question-block';

                // --- BOTÓN DE MARCAR (ESTRELLA) ---
                const markBtn = document.createElement('div');
                markBtn.className = `mark-question ${q.isMarked ? 'active' : ''}`;
                markBtn.innerHTML = '<span class="mark-label">Marcar</span>★';
                markBtn.onclick = () => {
                    q.isMarked = !q.isMarked;
                    markBtn.classList.toggle('active');
                };
                questionBlock.appendChild(markBtn);
                // ----------------------------------

                const title = document.createElement('div');
                title.className = 'question-title';
                title.innerText = q.text;
                questionBlock.appendChild(title);

                // Clonar opciones y barajar
                let currentOptions = [...q.options];
                shuffleArray(currentOptions);

                const optionsList = document.createElement('ul');
                optionsList.className = 'options-list';

                currentOptions.forEach(opt => {
                    const li = document.createElement('li');
                    li.className = 'option-item';
                    
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    
                    // Comprobar si ya fue respondida en esta sesión de renderizado
                    // (Si quisieras mantener el color al filtrar, podrías usar q.userState aquí)
                    
                    btn.onclick = function() {
                        // Deshabilitar botones de esta pregunta
                        const allBtns = optionsList.querySelectorAll('.option-btn');
                        allBtns.forEach(b => b.classList.add('disabled'));

                        if (opt.correct) {
                            btn.classList.add('correct');
                            q.userState = 'correct'; // Guardar estado
                        } else {
                            btn.classList.add('incorrect');
                            q.userState = 'incorrect'; // Guardar estado
                            
                            // Mostrar la correcta
                            allBtns.forEach(b => {
                                const originalOpt = q.options.find(o => o.correct);
                                if (b.innerText === originalOpt.text) {
                                    b.classList.add('correct');
                                }
                            });
                        }
                    };

                    li.appendChild(btn);
                    optionsList.appendChild(li);
                });

                questionBlock.appendChild(optionsList);
                quizContainer.appendChild(questionBlock);
            });
        }

        // Renderizado inicial (todas las preguntas)
        renderQuiz(questions);

        // 4. Lógica de Finalización y Resultados
        const urlParams = new URLSearchParams(window.location.search);
        const testID = urlParams.get('id');

        document.getElementById('btn-finish').onclick = function() {
            // Calcular resultados sobre el TOTAL de preguntas originales
            let total = questions.length;
            let correctas = questions.filter(q => q.userState === 'correct').length;
            let incorrectas = questions.filter(q => q.userState === 'incorrect').length;
            let marcadas = questions.filter(q => q.isMarked).length;
            
            // Calculo de nota
            const notaFinal = Math.round((correctas / total) * 100);

            // Ocultar quiz y botón finalizar, mostrar área de resultados
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('finish-container').style.display = 'none';
            const resultsArea = document.getElementById('results-area');
            resultsArea.style.display = 'block';

            // Textos
            document.getElementById('score-text').innerText = `Nota: ${notaFinal}% (${correctas}/${total})`;
            document.getElementById('feedback-text').innerHTML = `
                Acertadas: <b>${correctas}</b> <br>
                Falladas: <b>${incorrectas}</b> <br>
                Marcadas para repaso: <b>${marcadas}</b>
            `;

            // Habilitar/Deshabilitar botones según disponibilidad
            document.getElementById('btn-retry-failed').disabled = (incorrectas === 0);
            document.getElementById('btn-retry-marked').disabled = (marcadas === 0);
            document.getElementById('btn-retry-both').disabled = (incorrectas === 0 && marcadas === 0);

            // Guardar progreso si hay ID
            if (testID) {
                let intentos = parseInt(localStorage.getItem(`intentos_${testID}`) || 0);
                localStorage.setItem(`intentos_${testID}`, intentos + 1);
                let notaAnterior = localStorage.getItem(`nota_${testID}`);
                if (!notaAnterior || notaFinal > parseInt(notaAnterior)) {
                    localStorage.setItem(`nota_${testID}`, notaFinal);
                }
            } else {
               // alert("Nota: Para guardar el progreso, abre este test desde el índice principal.");
            }
        };

        // 5. Funciones de Reinicio / Repetición
        function restartQuiz(mode) {
            // Ocultar resultados, mostrar quiz y botón finish
            document.getElementById('results-area').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('finish-container').style.display = 'block';

            let subset = [];

            if (mode === 'all') {
                // Resetear estados visuales
                questions.forEach(q => q.userState = null); 
                subset = questions;
            } else if (mode === 'failed') {
                subset = questions.filter(q => q.userState === 'incorrect');
                // Al reintentar falladas, reseteamos su estado 'incorrect' para poder responderlas de nuevo
                subset.forEach(q => q.userState = null);
            } else if (mode === 'marked') {
                subset = questions.filter(q => q.isMarked);
                // Reseteamos estado para responder de nuevo
                subset.forEach(q => q.userState = null);
            } else if (mode === 'failed_marked') {
                subset = questions.filter(q => q.userState === 'incorrect' || q.isMarked);
                subset.forEach(q => q.userState = null);
            }

            renderQuiz(subset);
            
            // Scroll arriba
            window.scrollTo(0, 0);
        }

        function goToIndex() {
            if(confirm("¿Volver al menú principal?")) {
                window.location.href = 'index.html';
            }
        }

    </script>

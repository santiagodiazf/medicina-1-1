<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario: Anatomía y Embriología</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --correct: #16a34a;
            --incorrect: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --marked: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantallas */
        #setup-screen, #results-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            z-index: 10;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen-content {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1, h2 { color: var(--text); margin-bottom: 1.5rem; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn:hover { background-color: var(--primary-hover); }

        /* Contenedor principal del Quiz */
        #quiz-layout {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sidebar izquierdo */
        #sidebar {
            width: 80px;
            min-width: 80px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 5;
        }

        .nav-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            color: #475569;
            position: relative;
            transition: transform 0.1s;
        }
        .nav-dot:hover { transform: scale(1.1); }
        .nav-dot.correct { background-color: var(--correct); color: white; }
        .nav-dot.incorrect { background-color: var(--incorrect); color: white; }
        
        .mark-indicator {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background-color: var(--marked);
            border-radius: 50%;
            display: none;
            border: 2px solid white;
        }
        .nav-dot.is-marked .mark-indicator { display: block; }

        /* Área de preguntas */
        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            scroll-behavior: smooth;
        }

        .question-card {
            background-color: var(--card-bg);
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            scroll-margin-top: 2rem;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0;
            flex-grow: 1;
            padding-right: 1rem;
        }

        .mark-btn {
            background: none;
            border: 2px solid var(--border);
            color: #64748b;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .mark-btn:hover { background-color: #f1f5f9; }
        .mark-btn.marked {
            border-color: var(--marked);
            color: var(--marked);
            background-color: #fffbeb;
        }

        .options-grid {
            display: grid;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .option-btn {
            text-align: left;
            padding: 1rem;
            border: 2px solid var(--border);
            background-color: white;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option-btn:disabled { cursor: default; }
        .option-btn.correct { background-color: #dcfce7; border-color: var(--correct); }
        .option-btn.incorrect { background-color: #fee2e2; border-color: var(--incorrect); }
        .option-btn.missed-correct { background-color: #dcfce7; border-color: var(--correct); border-style: dashed; }

        .feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background-color: #f1f5f9;
            display: none;
            font-size: 0.95rem;
            border-left: 4px solid var(--primary);
        }

        #finish-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar {
                width: 100%;
                height: 60px;
                min-height: 60px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 0 1rem;
                align-items: center;
            }
            .nav-dot { margin-bottom: 0; margin-right: 0.5rem; flex-shrink: 0; }
            #main-content { padding: 1rem; }
            #finish-btn { bottom: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="screen-content">
            <h1>Embriología y Desarrollo</h1>
            <p>Configura tu sesión de estudio:</p>
            <div style="margin-top: 2rem;">
                <button class="btn" onclick="startQuiz('original')">Iniciar (Orden Original)</button>
                <button class="btn" onclick="startQuiz('random')">Iniciar (Orden Aleatorio)</button>
            </div>
        </div>
    </div>

    <div id="quiz-layout">
        <div id="sidebar"></div>
        <div id="main-content">
            <div id="questions-container"></div>
            <button id="finish-btn" class="btn" onclick="finishQuiz()" style="background-color: #334155;">Finalizar Cuestionario</button>
        </div>
    </div>

    <div id="results-screen" style="display: none;">
        <div class="screen-content">
            <h2>Resultados</h2>
            <p id="results-summary" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 2rem;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button class="btn" onclick="retakeQuiz('all')">Repetir Completo</button>
                <button class="btn" id="btn-retake-failed" onclick="retakeQuiz('failed')">Repetir Solo Falladas</button>
                <button class="btn" id="btn-retake-marked" onclick="retakeQuiz('marked')">Repetir Solo Marcadas</button>
                <button class="btn" id="btn-retake-both" onclick="retakeQuiz('failed_marked')">Repetir Falladas + Marcadas</button>
            </div>
        </div>
    </div>

<script>
// Base de datos de 50 preguntas
const db = [
    { q: `1. Según la "Ley de la Re-segmentación" explicada en clase, el cuerpo de una vértebra definitiva se forma a partir de:`, opts: [`Un único esclerotoma primitivo.`, `La osificación directa de la notocorda.`, `La fusión de la mitad caudal de un esclerotoma con la mitad craneal del siguiente.`, `La fusión de dos miotomas completos.`], c: 2 },
    { q: `2. ¿Cuál es la consecuencia anatómica y clínica directa de esta re-segmentación de los esclerotomas?`, opts: [`Que el disco intervertebral sea de hueso.`, `Que el nervio espinal salga justo por el espacio entre dos vértebras (agujero de conjunción) y no perforando el hueso.`, `Que existan 8 vértebras cervicales.`, `Que las costillas se fusionen con el esternón.`], c: 1 },
    { q: `3. La notocorda es el eje primitivo alrededor del cual se organiza el embrión. En el adulto, ¿qué vestigio principal nos queda de ella?`, opts: [`La médula espinal.`, `El ligamento longitudinal anterior.`, `El núcleo pulposo del disco intervertebral (y pequeñas muescas o "fóveas" en los cuerpos vertebrales).`, `El anillo epifisario.`], c: 2 },
    { q: `4. La patología conocida como "Espina Bífida" se produce embriológicamente por:`, opts: [`La falta de fusión de los procesos ventrales del esclerotoma.`, `La falta de osificación y unión en la línea media dorsal de las dos mitades del esclerotoma dorsal (láminas/apófisis espinosa).`, `La rotura del pedículo.`, `Un defecto en la notocorda.`], c: 1 },
    { q: `5. El proceso de osificación y cierre definitivo de las vértebras, que permite alcanzar la altura máxima y soportar altas presiones, finaliza normalmente hacia los:`, opts: [`3 años de edad.`, `12 años de edad.`, `25 a 30 años de edad.`, `50 años de edad.`], c: 2 },
    { q: `6. Ontogenéticamente, las curvaturas de la columna aparecen de forma secuencial. ¿Cuándo aparece y se desarrolla la lordosis cervical?`, opts: [`En el periodo fetal.`, `A los 3-5 meses, cuando el niño empieza a soportar el peso de la cabeza.`, `Al año de vida, con la marcha.`, `En la pubertad.`], c: 1 },
    { q: `7. Las curvaturas primarias (presentes desde el estadio fetal con convexidad dorsal) corresponden a las regiones:`, opts: [`Cervical y lumbar.`, `Torácica y sacra.`, `Exclusivamente a la cervical.`, `Lumbar y sacra.`], c: 1 },
    { q: `8. En la clínica, la pérdida de la lordosis fisiológica del cuello por posturas forzadas se denomina "rectificación cervical". Según el profesor, ¿qué síntoma clásico produce por compromiso vascular?`, opts: [`Parálisis de las piernas.`, `Acúfenos (zumbidos) y vértigos por disminución del flujo sanguíneo al encéfalo.`, `Dolor en el pecho.`, `Ceguera temporal.`], c: 1 },
    { q: `9. La escoliosis idiopática no solo implica una desviación de la columna en el plano frontal, sino que agrava la deformidad porque suele ir acompañada de:`, opts: [`Fusión de las costillas.`, `Rotación de los cuerpos vertebrales.`, `Rotura del ligamento amarillo.`, `Desaparición del disco intervertebral.`], c: 1 },
    { q: `10. En radiología, para medir la gravedad de la desviación en una escoliosis, se utiliza:`, opts: [`El ángulo de Louis.`, `El ángulo de Cobb (trazando perpendiculares a los planos de las vértebras desviadas).`, `El índice de masa corporal.`, `La resonancia magnética exclusivamente.`], c: 1 },
    { q: `11. Biomecánicamente, la vértebra se divide en dos grandes porciones. El brazo ejecutor de la movilidad (las palancas) corresponde a:`, opts: [`El cuerpo vertebral.`, `El arco posterior (apófisis transversas y espinosas).`, `El núcleo pulposo.`, `El promontorio.`], c: 1 },
    { q: `12. El punto anatómico donde la lámina se une a la cara posterior del cuerpo vertebral se denomina:`, opts: [`Apófisis articular.`, `Pedículo.`, `Istmo.`, `Apófisis transversa.`], c: 1 },
    { q: `13. Clínicamente, ¿por qué es tan importante el pedículo vertebral?`, opts: [`Porque es el punto más fuerte del hueso.`, `Porque es el punto más débil y lugar frecuente de fracturas por traumatismos posteriores, además de ser la vía de entrada quirúrgica al canal.`, `Porque alberga la médula espinal directamente.`, `Porque se articula con la costilla.`], c: 1 },
    { q: `14. El procedimiento quirúrgico para acceder al canal medular estrecho cortando la parte posterior del arco vertebral se denomina:`, opts: [`Pediculectomía.`, `Laminectomía.`, `Artrodesis.`, `Toracocentesis.`], c: 1 },
    { q: `15. ¿Cuál es la única estructura de la vértebra que, gracias a la "anatomía episcópica", podemos palpar o percutir en la línea media del dorso para evaluar la indemnidad del hueso?`, opts: [`La lámina.`, `La apófisis espinosa.`, `El pedículo.`, `El cuerpo vertebral.`], c: 1 },
    { q: `16. ¿Qué estructuras anatómicas delimitan el agujero de conjunción (foramen intervertebral) por donde sale el nervio?`, opts: [`Exclusivamente las apófisis espinosas.`, `Los pedículos de las vértebras adyacentes (arriba y abajo), la cara posterior de los cuerpos/disco (delante) y las apófisis articulares (detrás).`, `Las costillas y el esternón.`, `Las láminas y el ligamento nucal.`], c: 1 },
    { q: `17. El agujero de conjunción NO es de uso exclusivo del nervio espinal (raíz aferente/eferente). ¿Qué otras estructuras vitales pasan por él?`, opts: [`La médula espinal completa.`, `Vasos sanguíneos (arterias medulares que entran y venas que salen) para la irrigación de la médula y columna.`, `El líquido cefalorraquídeo.`, `La cadena simpática principal.`], c: 1 },
    { q: `18. En la cara superior de los cuerpos vertebrales cervicales típicos (C3-C6) destacan unas pequeñas espículas laterales llamadas:`, opts: [`Apófisis mamilares.`, `Procesos unciformes (en forma de uña).`, `Carillas costales.`, `Promontorio.`], c: 1 },
    { q: `19. Las apófisis espinosas de las vértebras cervicales medias suelen ser:`, opts: [`Muy largas y apuntando hacia abajo.`, `Cortas y bífidas (bituberculadas).`, `Cuadrangulares y robustas.`, `Inexistentes.`], c: 1 },
    { q: `20. Si intentamos palpar las apófisis espinosas cervicales superiores, chocaremos con un tabique fibroso en la línea media que separa la musculatura. ¿Cómo se llama?`, opts: [`Ligamento longitudinal anterior.`, `Ligamento amarillo.`, `Ligamento nucal.`, `Fascia toracolumbar.`], c: 2 },
    { q: `21. ¿Qué estructura crítica transcurre por el túnel que forman los agujeros transversos de las vértebras cervicales?`, opts: [`La vena yugular.`, `La arteria carótida interna.`, `La arteria vertebral (responsable del 50% del flujo encefálico).`, `El nervio vago.`], c: 2 },
    { q: `22. Excepción anatómica importante: La arteria vertebral, rama de la subclavia, inicia su ascenso por los forámenes transversos entrando típicamente a nivel de:`, opts: [`C7.`, `C6 (saltándose la séptima vértebra cervical).`, `C1.`, `T1.`], c: 1 },
    { q: `23. La vértebra C7 se denomina "prominente" porque nos sirve de coordenada topográfica gracias a que su apófisis espinosa es:`, opts: [`Bífida y muy corta.`, `Inexistente.`, `Larga, robusta, no bífida y fácilmente palpable en la base del cuello.`, `Articulada con la primera costilla.`], c: 2 },
    { q: `24. Las apófisis articulares de la región torácica se encuentran muy "verticalizadas" en el plano frontal. ¿Qué función biomecánica persigue esto?`, opts: [`Permitir la máxima flexión posible.`, `Facilitar la rotación extrema.`, `Impedir los movimientos de lateralidad para no colapsar el espacio intercostal y proteger la ventilación pulmonar.`, `Soportar más peso.`], c: 2 },
    { q: `25. Las apófisis espinosas de las vértebras torácicas son largas y están muy inclinadas hacia abajo (imbricadas). Esto limita mecánicamente el movimiento de:`, opts: [`Extensión de la columna torácica.`, `Flexión de la columna cervical.`, `Rotación lumbar.`, `Circunducción.`], c: 0 },
    { q: `26. La costilla típica (ej. la 5ª costilla) tiene una cabeza en forma de flecha que se articula en el cuerpo vertebral con:`, opts: [`Una sola carilla completa en la vértebra T5.`, `Dos hemicarillas: la hemicarilla inferior de T4 y la hemicarilla superior de T5, coincidiendo con el disco.`, `Las apófisis espinosas.`, `El esternón exclusivamente.`], c: 1 },
    { q: `27. Además del cuerpo vertebral, ¿en qué otra estructura de la vértebra torácica se apoya la costilla (específicamente su tubérculo)?`, opts: [`En la lámina.`, `En la apófisis transversa de la vértebra correspondiente.`, `En el pedículo.`, `En la apófisis espinosa.`], c: 1 },
    { q: `28. Nomenclatura anatómica: La primera costilla es una excepción porque se articula exclusivamente con:`, opts: [`C7.`, `T2.`, `El borde lateral de T1 mediante una carilla completa.`, `T1 y T2 simultáneamente.`], c: 2 },
    { q: `29. La región de T6 a T12 es considerada "hipomóvil" (vértebras cardíacas) porque además de la respiración, su función es:`, opts: [`Soportar el peso del cráneo.`, `Proteger y servir de asiento estable al corazón dentro del saco pericárdico.`, `Articularse con el bazo.`, `Permitir el salto.`], c: 1 },
    { q: `30. La "Sacralización de L5" es una variante anatómica que consiste en:`, opts: [`La desaparición del sacro.`, `La fractura del cóccix.`, `Que la vértebra L5 se integre y osifique parcialmente con el hueso sacro, pareciendo una expansión de este.`, `El desarrollo de costillas lumbares.`], c: 2 },
    { q: `31. La regla de numeración de los nervios espinales tiene una trampa en la región cervical. Sabiendo que hay 7 vértebras cervicales, ¿cuántos pares de nervios espinales cervicales existen?`, opts: [`7 pares.`, `8 pares (el C1 sale por encima del Atlas, y el C8 sale entre C7 y T1).`, `12 pares.`, `5 pares.`], c: 1 },
    { q: `32. El nervio espinal torácico T1 emerge por el agujero de conjunción situado:`, opts: [`Entre C7 y T1.`, `Entre T1 y T2.`, `Entre T12 y L1.`, `Por delante del esternón.`], c: 1 },
    { q: `33. El sistema nervioso que controla funciones no conscientes (como el calibre de un vaso sanguíneo, la sudoración o el ritmo cardíaco) se denomina:`, opts: [`Sistema nervioso somático.`, `Sistema nervioso vegetativo (simpático y parasimpático).`, `Pares craneales motores.`, `Haz espinotalámico.`], c: 1 },
    { q: `34. En una hernia discal a nivel L4-L5 con salida posterolateral del núcleo pulposo, la raíz nerviosa que habitualmente resulta comprimida es:`, opts: [`La raíz L4 (saliente).`, `La raíz L5 (transeúnte, que baja para salir por el agujero inferior).`, `La raíz C8.`, `La raíz S1.`], c: 1 },
    { q: `35. La estructura que inerva sensitivamente la parte externa del disco intervertebral, el ligamento longitudinal posterior y la duramadre, siendo el culpable del dolor discogénico profundo es:`, opts: [`El nervio ciático.`, `El nervio frénico.`, `El nervio sinuvertebral (de Luschka) o recurrente meníngeo.`, `El nervio vago.`], c: 2 },
    { q: `36. La irrigación arterial de la médula espinal toracolumbar (los 2/3 inferiores) depende críticamente de un gran vaso que entra por un agujero de conjunción bajo. Se trata de:`, opts: [`La arteria carótida interna.`, `La arteria de Adamkiewicz (Gran radicular magna).`, `La arteria vertebral.`, `La arteria torácica interna.`], c: 1 },
    { q: `37. El sistema de drenaje venoso de la columna vertebral (Plexos de Batson) tiene una característica anatómica CRÍTICA que explica su fisiopatología:`, opts: [`Tienen válvulas muy fuertes y unidireccionales.`, `Son venas exclusivamente superficiales.`, `Son redes avalvulares (sin válvulas), lo que permite que el flujo de sangre sea bidireccional dependiendo de las presiones corporales.`, `Desembocan todas en el hígado.`], c: 2 },
    { q: `38. La consecuencia clínica directa de que el plexo venoso vertebral no tenga válvulas es que permite:`, opts: [`Que no nos desmayemos al ponernos de pie.`, `Que metástasis de tumores pélvicos (ej. próstata, útero) asciendan directamente a la columna o al cerebro sin pasar por el filtro pulmonar.`, `Una mejor oxigenación del disco.`, `El drenaje linfático exclusivo.`], c: 1 },
    { q: `39. Según el profesor, un paciente con un tumor primario desconocido que debuta clínicamente con lesiones osteolíticas (destrucción) en un cuerpo vertebral y dolor de espalda intenso, muy probablemente sufra de:`, opts: [`Una hernia discal simple.`, `Una fractura del pedículo.`, `Metástasis ósea por diseminación a través del plexo venoso vertebral.`, `Escoliosis idiopática.`], c: 2 },
    { q: `40. El componente del disco intervertebral que está formado por anillos de colágeno concéntricos con orientación cruzada para resistir las fuerzas de torsión se denomina:`, opts: [`Núcleo pulposo.`, `Anillo fibroso.`, `Cartílago hialino.`, `Membrana tectoria.`], c: 1 },
    { q: `41. Durante la bipedestación a lo largo del día, el disco intervertebral adulto:`, opts: [`Gana altura por hidratación.`, `Se deshidrata y pierde agua por el soporte de la carga, haciendo que perdamos milímetros de altura al final del día.`, `Se osifica temporalmente.`, `No sufre ningún cambio fisiológico.`], c: 1 },
    { q: `42. El ligamento que tapiza la cara anterior de los cuerpos vertebrales desde el cráneo hasta el sacro, y cuya función principal es frenar la extensión de la columna, es:`, opts: [`Ligamento longitudinal posterior.`, `Ligamento longitudinal anterior.`, `Ligamento amarillo.`, `Ligamento interespinoso.`], c: 1 },
    { q: `43. A diferencia del anterior, el ligamento longitudinal posterior (LLP) se sitúa:`, opts: [`Por delante de la tráquea.`, `Por dentro del conducto vertebral (tapizando la cara posterior de los cuerpos) y frena la flexión.`, `Uniendo las apófisis transversas.`, `En la región nucal exclusivamente.`], c: 1 },
    { q: `44. El ligamento que cierra el conducto vertebral por su parte posterior, uniendo las láminas de vértebras adyacentes, y que se caracteriza por su alto contenido en elastina (color característico) es:`, opts: [`El ligamento nucal.`, `El ligamento cruciforme.`, `El ligamento amarillo (flavum).`, `El ligamento supraespinoso.`], c: 2 },
    { q: `45. La articulación atlanto-axoidea media (Diente del Axis con Arco anterior del Atlas) clasifica biomecánicamente como:`, opts: [`Silla de montar (encaje recíproco).`, `Condílea.`, `Trocoide (pivote) permitiendo el movimiento de rotación (decir "NO").`, `Sinartrosis.`], c: 2 },
    { q: `46. El ligamento vital para la supervivencia que mantiene el Diente del Axis (Odontoides) fijado al arco anterior del Atlas, evitando que se desplace hacia atrás y seccione la médula espinal es:`, opts: [`El ligamento alar.`, `El ligamento transverso del atlas (parte del cruciforme).`, `El ligamento nucal.`, `El ligamento apical.`], c: 1 },
    { q: `47. En la radiografía oblicua de la columna lumbar, observamos una figura conocida como "El Perrito de Lachapelle". El hocico del perro corresponde a:`, opts: [`La apófisis espinosa.`, `La apófisis transversa.`, `El cuerpo vertebral.`, `El pedículo.`], c: 1 },
    { q: `48. Si en ese mismo "Perrito de Lachapelle" observamos que el perro tiene un "collar" (una línea de fractura radiolúcida en su cuello), el diagnóstico radiológico indica la rotura del istmo. Esto se denomina:`, opts: [`Espondilolistesis.`, `Hernia extruida.`, `Espondilolisis.`, `Luxación facetaria.`], c: 2 },
    { q: `49. El deslizamiento completo de una vértebra lumbar sobre otra (generalmente L5 sobre S1) perdiendo su alineación, se denomina:`, opts: [`Espondilolistesis.`, `Sacralización.`, `Espina bífida oculta.`, `Escoliosis.`], c: 0 },
    { q: `50. En una radiografía Anteroposterior (AP) de la columna cervical, las estructuras conocidas como "procesos unciformes" (que a los anatómicos les recuerda a las orejas en la imagen de la "cara de gato") se visualizan en:`, opts: [`Los bordes laterales de la cara superior de los cuerpos vertebrales.`, `La punta de la apófisis espinosa.`, `El agujero magno.`, `En las apófisis articulares lumbares.`], c: 0 }
];

// Estado de la aplicación
let activeQuestions = [];
let answers = {};
let marked = {};
let currentOrderMode = 'original';

// Utilidad para mezclar arrays
function shuffleArray(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

// Inicia el quiz por primera vez o decide el modo de orden
function startQuiz(orderMode) {
    currentOrderMode = orderMode;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('quiz-layout').style.display = 'flex';
    
    activeQuestions = db.map((item, index) => ({
        ...item,
        originalId: index + 1
    }));

    if (orderMode === 'random') {
        activeQuestions = shuffleArray(activeQuestions);
    }

    resetState();
    buildInterface();
}

// Lógica de repetición con filtros
function retakeQuiz(mode) {
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('quiz-layout').style.display = 'flex';

    let toKeep = [];
    if (mode === 'all') {
        toKeep = db.map((_, i) => i + 1);
    } else if (mode === 'failed') {
        toKeep = activeQuestions.filter(q => answers[q.originalId] === false).map(q => q.originalId);
    } else if (mode === 'marked') {
        toKeep = activeQuestions.filter(q => marked[q.originalId]).map(q => q.originalId);
    } else if (mode === 'failed_marked') {
        toKeep = activeQuestions.filter(q => answers[q.originalId] === false || marked[q.originalId]).map(q => q.originalId);
    }

    if (toKeep.length === 0) {
        alert("No hay preguntas en esta categoría.");
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('quiz-layout').style.display = 'none';
        return;
    }

    activeQuestions = db.filter((_, i) => toKeep.includes(i + 1)).map(item => ({
        ...item,
        originalId: db.indexOf(item) + 1
    }));

    if (currentOrderMode === 'random') {
        activeQuestions = shuffleArray(activeQuestions);
    }

    resetState();
    buildInterface();
}

function resetState() {
    answers = {};
    // No reseteamos las marcadas, el usuario decide quitarlas si quiere
}

// Construcción del DOM (Preguntas y Sidebar)
function buildInterface() {
    const sidebar = document.getElementById('sidebar');
    const container = document.getElementById('questions-container');
    
    sidebar.innerHTML = '';
    container.innerHTML = '';

    activeQuestions.forEach((q, index) => {
        // Dot del sidebar
        const dot = document.createElement('div');
        dot.className = `nav-dot ${marked[q.originalId] ? 'is-marked' : ''}`;
        dot.id = `nav-${q.originalId}`;
        dot.innerHTML = `${index + 1}<div class="mark-indicator"></div>`;
        dot.onclick = () => {
            document.getElementById(`q-${q.originalId}`).scrollIntoView({behavior: 'smooth'});
        };
        sidebar.appendChild(dot);

        // Tarjeta de la pregunta
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${q.originalId}`;

        // Mezclar las opciones (guardando el índice de la correcta original)
        let optionsWithIndex = q.opts.map((text, i) => ({ text, isCorrect: i === q.c }));
        optionsWithIndex = shuffleArray(optionsWithIndex);

        let optionsHTML = '';
        optionsWithIndex.forEach((opt, optIndex) => {
            optionsHTML += `<button class="option-btn" id="opt-${q.originalId}-${optIndex}" 
                onclick="selectAnswer(${q.originalId}, ${opt.isCorrect}, ${optIndex}, '${opt.text.replace(/'/g, "\\'")}')">
                ${opt.text}
            </button>`;
        });

        const isMarked = marked[q.originalId] ? 'marked' : '';
        const markText = marked[q.originalId] ? '★ Marcada' : '☆ Marcar';

        card.innerHTML = `
            <div class="question-header">
                <h3 class="question-text">${index + 1}. ${q.q.replace(/^\d+\.\s*/, '')}</h3>
                <button class="mark-btn ${isMarked}" id="mark-${q.originalId}" onclick="toggleMark(${q.originalId})">${markText}</button>
            </div>
            <div class="options-grid" id="grid-${q.originalId}">
                ${optionsHTML}
            </div>
            <div class="feedback" id="feedback-${q.originalId}"></div>
        `;

        container.appendChild(card);
    });
    
    // Scrollear al inicio
    document.getElementById('main-content').scrollTop = 0;
}

// Lógica al seleccionar una respuesta
function selectAnswer(qId, isCorrect, optIndex, optText) {
    if (answers[qId] !== undefined) return; // Ya respondida

    answers[qId] = isCorrect;
    
    const grid = document.getElementById(`grid-${qId}`);
    const buttons = grid.getElementsByClassName('option-btn');
    const feedback = document.getElementById(`feedback-${qId}`);
    const navDot = document.getElementById(`nav-${qId}`);

    // Deshabilitar todas y colorear
    for (let i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        // Encontrar el botón correcto y el clickeado
        if (buttons[i].id === `opt-${qId}-${optIndex}`) {
            buttons[i].classList.add(isCorrect ? 'correct' : 'incorrect');
        } else if (buttons[i].getAttribute('onclick').includes('true')) {
            // Mostrar cuál era la correcta si falló
            buttons[i].classList.add('missed-correct');
        }
    }

    // Actualizar sidebar
    navDot.classList.add(isCorrect ? 'correct' : 'incorrect');

    // Mostrar explicación
    feedback.style.display = 'block';
    
    // Obtener la opción correcta desde la base de datos original
    const correctOriginalOptionText = db.find(x => x.id === qId || x.q.startsWith(qId + ".")).opts[db.find(x => x.id === qId || x.q.startsWith(qId + ".")).c];

    if (isCorrect) {
        feedback.innerHTML = `<strong>¡Correcto!</strong> La respuesta es: ${correctOriginalOptionText}`;
        feedback.style.borderLeftColor = 'var(--correct)';
    } else {
        feedback.innerHTML = `<strong>Incorrecto.</strong> La respuesta correcta era: ${correctOriginalOptionText}`;
        feedback.style.borderLeftColor = 'var(--incorrect)';
    }
}

// Toggle para marcar/desmarcar preguntas
function toggleMark(qId) {
    marked[qId] = !marked[qId];
    
    const btn = document.getElementById(`mark-${qId}`);
    const dot = document.getElementById(`nav-${qId}`);

    if (marked[qId]) {
        btn.classList.add('marked');
        btn.innerHTML = '★ Marcada';
        dot.classList.add('is-marked');
    } else {
        btn.classList.remove('marked');
        btn.innerHTML = '☆ Marcar';
        dot.classList.remove('is-marked');
    }
}

// Finalizar Cuestionario
function finishQuiz() {
    let correctCount = 0;
    let incorrectCount = 0;
    let unattemptedCount = 0;

    activeQuestions.forEach(q => {
        if (answers[q.originalId] === true) correctCount++;
        else if (answers[q.originalId] === false) incorrectCount++;
        else unattemptedCount++;
    });

    document.getElementById('quiz-layout').style.display = 'none';
    document.getElementById('results-screen').style.display = 'flex';

    document.getElementById('results-summary').innerHTML = `
        Aciertos: <span style="color: var(--correct)">${correctCount}</span> | 
        Fallos: <span style="color: var(--incorrect)">${incorrectCount}</span> | 
        Sin responder: ${unattemptedCount}
    `;

    // Actualizar estado de los botones de repetición
    const totalFailed = activeQuestions.filter(q => answers[q.originalId] === false).length;
    const totalMarked = Object.values(marked).filter(v => v).length;
    
    document.getElementById('btn-retake-failed').disabled = totalFailed === 0;
    document.getElementById('btn-retake-marked').disabled = totalMarked === 0;
    document.getElementById('btn-retake-both').disabled = (totalFailed === 0 && totalMarked === 0);
}

</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL GENERAL - MEDICINA</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-color: #2c3e50;
            
            /* Colores identificativos por Curso */
            --curso1-color: #34495e; 
            --curso2-color: #d35400; 
            --curso3-color: #8e44ad; 
            --curso4-color: #27ae60; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- PANTALLA DE CONTRASEÑA --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-box h2 { margin-top: 0; color: var(--text-color); }

        .login-box input {
            width: 100%; padding: 12px; margin: 20px 0;
            border: 2px solid #ddd; border-radius: 6px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        
        .login-box input:focus { border-color: var(--curso1-color); }

        .login-box button {
            background-color: var(--curso1-color); color: white;
            border: none; padding: 12px 24px; font-size: 16px;
            border-radius: 6px; cursor: pointer; width: 100%;
            transition: background 0.3s; font-weight: bold;
        }

        .login-box button:hover { background-color: #2c3e50; }

        .error-msg {
            color: #e74c3c; margin-top: 10px; font-size: 0.9rem; display: none;
        }

        /* --- CLASES DEL CONTENIDO PRINCIPAL --- */
        #main-content {
            width: 100%; max-width: 1000px; padding: 40px 20px;
            box-sizing: border-box; display: flex;
            flex-direction: column; align-items: center;
        }

        h1 {
            font-size: 3rem; margin-bottom: 10px; text-transform: uppercase;
            letter-spacing: 3px; text-align: center; color: #2c3e50;
            border-bottom: 5px solid #2c3e50; padding-bottom: 15px; width: 100%;
        }

        .author-text {
            font-size: 1.4rem; color: #2c3e50; font-weight: 600;
            margin-top: 10px; margin-bottom: 40px; background-color: #e8eaf6;
            padding: 8px 24px; border-radius: 50px; text-align: center;
        }

        .course-section { width: 100%; margin-bottom: 60px; }

        .course-title {
            font-size: 1.8rem; color: var(--text-color); margin-bottom: 20px;
            padding-left: 15px; border-left: 5px solid; text-transform: uppercase; font-weight: 700;
        }

        .semester-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px;
        }

        .semester-card {
            background-color: #ffffff; border-radius: 15px; padding: 30px;
            text-align: center; text-decoration: none; color: var(--text-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .semester-card:hover {
            transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .icon { font-size: 3rem; margin-bottom: 15px; }

        .semester-card h3 { margin: 0; font-size: 1.4rem; font-weight: 600; }

        .semester-card span { font-size: 0.9rem; color: #95a5a6; margin-top: 8px; }

        .disabled { opacity: 0.6; cursor: not-allowed; background-color: #f9f9f9; }
        .disabled:hover { transform: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Acceso Restringido</h2>
            <p>Introduce la contraseña para acceder al portal.</p>
            <input type="password" id="password-input" placeholder="Contraseña" onkeypress="handleKeyPress(event)">
            <button onclick="checkPassword()">Acceder</button>
            <div class="error-msg" id="error-msg">Contraseña incorrecta. Inténtalo de nuevo.</div>
        </div>
    </div>

    <script>
        // Nuevas contraseñas ofuscadas en formato hexadecimal
        const _k = [
            "\x39\x31\x31\x34\x33",                             // 91143
            "\x6d\x61\x72\x69\x61\x70\x65\x72\x65\x7a",         // mariaperez
            "\x6d\x61\x72\x74\x61\x6a\x69\x6d\x65\x6e\x65\x7a", // martajimenez
            "\x6d\x61\x72\x74\x61\x6c\x6f\x70\x65\x7a",         // martalopez
            "\x61\x6c\x62\x61\x6c\x61\x69\x6e\x65\x7a"          // albalainez
        ];

        // Contenido HTML fraccionado para ocultar los enlaces del código fuente
        const _c = [
            '<div id="main-content">',
            '<h', '1>G', 'rado e', 'n Me', 'dicin', 'a</h', '1>',
            '<d', 'iv cl', 'ass="auth', 'or-text">R', 'ecursos de e', 'studio de S', 'anti Dí', 'az</d', 'iv>',
            '<div cl', 'ass="course-sec', 'tion">',
            '<div cl', 'ass="course-ti', 'tle" sty', 'le="border-co', 'lor: var(--curso1-color); color: var(--curso1-color);">',
            'Pri', 'mero</div>',
            '<div cl', 'ass="seme', 'ster-grid" id="grid-primero">',
            '<a hre', 'f="index p', 'rimero primer c', 'uatrimestre.ht', 'ml" cla', 'ss="semester-ca', 'rd">',
            '<div cl', 'ass="ic', 'on">&#128218;</div>',
            '<h3 sty', 'le="color: var(--curso1-color)">1er C', 'uatrimestre</h3>',
            '<s', 'pan>Ana', 'tomía I, Bio', 'logía, Fís', 'ica...</span></a>',
            '<a hr', 'ef="indice se', 'gundo cuatri de preimero.ht', 'ml" clas', 's="semester-ca', 'rd">',
            '<div cla', 'ss="ico', 'n">&#128128;</div>',
            '<h3 sty', 'le="color: var(--curso1-color)">2do C', 'uatrimestre</h3>',
            '<sp', 'an>Ana', 'tomía II, His', 'tología...</span></a>',
            '</div></div>',
            '<div cla', 'ss="course-se', 'ction">',
            '<div cla', 'ss="course-t', 'itle" sty', 'le="border-col', 'or: var(--curso2-color); color: var(--curso2-color);">',
            'Seg', 'undo</div>',
            '<div cla', 'ss="seme', 'ster-grid">',
            '<a hre', 'f="#" cla', 'ss="semester-ca', 'rd disa', 'bled">',
            '<div cla', 'ss="ic', 'on">&#128274;</div>',
            '<h3 st', 'yle="color: var(--curso2-color)">1er Cuat', 'rimestre</h3>',
            '<spa', 'n>No dispo', 'nible a', 'ún</span></a>',
            '<a hre', 'f="#" cla', 'ss="semester-car', 'd disab', 'led">',
            '<div cla', 'ss="ico', 'n">&#128274;</div>',
            '<h3 st', 'yle="color: var(--curso2-color)">2do Cua', 'trimestre</h3>',
            '<spa', 'n>No disp', 'onible a', 'ún</span></a>',
            '</div></div></div>'
        ];

        function checkPassword() {
            const input = document.getElementById("password-input").value;
            const errorMsg = document.getElementById("error-msg");

            // Verifica si el input coincide con alguna de las contraseñas del Array
            if (_k.includes(input)) {
                sessionStorage.setItem("_auth_tkn_882", "1");
                sessionStorage.setItem("_auth_pass", input); // Guardamos la contraseña usada para validaciones posteriores
                unlockContent();
            } else {
                errorMsg.style.display = "block";
                document.getElementById("password-input").value = "";
                document.getElementById("password-input").focus();
            }
        }

        function unlockContent() {
            document.getElementById("login-screen").style.display = "none";
            // Si el contenido aún no se ha creado, lo unimos y lo inyectamos
            if (!document.getElementById("main-content")) {
                const payload = _c.join('');
                document.body.insertAdjacentHTML('beforeend', payload);
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        }

        // Comprobar si ya estaba autenticado
        window.onload = function() {
            if (sessionStorage.getItem("_auth_tkn_882") === "1") {
                unlockContent();
            }
        };
    </script>

</body>
</html>

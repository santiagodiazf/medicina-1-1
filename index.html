        // Exponemos la función al ámbito global porque al usar type="module" queda aislada
        window.checkUser = function() {
            const input = document.getElementById("username-input").value;
            const errorMsg = document.getElementById("error-msg");

            if (_u.includes(input)) {
                sessionStorage.setItem("_auth_tkn_882", "1");
                sessionStorage.setItem("_auth_user", input); 
                unlockContent();
            } else {
                errorMsg.style.display = "block";
                document.getElementById("username-input").value = "";
                document.getElementById("username-input").focus();
            }
        };

        window.handleKeyPress = function(event) {
            if (event.key === "Enter") {
                checkUser();
            }
        };

        async function unlockContent() {
            document.getElementById("login-screen").style.display = "none";
            
            if (!document.getElementById("main-content")) {
                const payload = _c.join('');
                document.body.insertAdjacentHTML('beforeend', payload);
                
                const mainContent = document.getElementById("main-content");
                const currentUser = sessionStorage.getItem("_auth_user");
                
                // --- LÓGICA DE FIREBASE PARA CONTAR VISITAS ---
                if (!sessionStorage.getItem('session_counted_for_' + currentUser)) {
                    // Sumamos 1 directamente en la nube usando increment()
                    const userRef = ref(db, 'visitas/' + currentUser);
                    update(userRef, { total: increment(1) });
                    sessionStorage.setItem('session_counted_for_' + currentUser, "true");
                }

                // --- LÓGICA DEL ADMIN (91143) ---
                if (currentUser === "91143") {
                    // Descargamos todas las visitas desde la nube
                    const snapshot = await get(ref(db, 'visitas'));
                    const datosVisitas = snapshot.exists() ? snapshot.val() : {};

                    let listaContadores = '';
                    _u.forEach(usuario => {
                        // Si el usuario tiene registro en Firebase lo mostramos, si no, es 0
                        let visitas = datosVisitas[usuario] ? datosVisitas[usuario].total : 0;
                        listaContadores += `<li><strong>${usuario}</strong> <span>${visitas} visitas</span></li>`;
                    });

                    const privateHTML = `
                    <div class="course-section">
                        <div class="course-title" style="border-color: var(--privado-color); color: var(--privado-color);">
                            Zona Privada (Admin)

                            <div class="admin-note">
                                *Nota: Estas estadísticas se actualizan desde Firebase y son globales para todos los dispositivos.
                            </div>
                        </div>
                    </div>`;
                    
                    mainContent.insertAdjacentHTML('beforeend', privateHTML);
                }
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem("_auth_tkn_882") === "1") {

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Médico Pirata | Comunidad</title>
  <style>
    :root{
      --bg:#f6f0e5;
      --card:#ffffffee;
      --ink:#173140;
      --muted:#5c6f78;
      --line:rgba(23,49,64,.12);
      --navy:#14364a;
      --navy2:#244e66;
      --gold:#d4a85d;
      --gold2:#f0c987;
      --danger:#b43e36;
      --ok:#2d7b57;
      --shadow:0 12px 30px rgba(0,0,0,.09);
      --shadow-2:0 18px 40px rgba(0,0,0,.16);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;min-height:100%;
      font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(212,168,93,.14), transparent 24%),
        linear-gradient(180deg,#fbf7ef 0%,#f4ede0 100%);
    }

    body{overflow-x:hidden}
    button,input,textarea,select{font:inherit}
    a{color:inherit}
    .hidden{display:none !important}

    .auth-screen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background: linear-gradient(rgba(8,28,39,.78), rgba(8,28,39,.84));
    }

    .auth-card{
      width:min(620px,100%);
      background:rgba(255,255,255,.98);
      border-radius:28px;
      box-shadow:var(--shadow-2);
      padding:30px;
      border:1px solid rgba(255,255,255,.65);
    }

    .kicker{
      display:inline-flex;
      padding:8px 14px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:2px;
      background:#f7ead3;
      color:#8e6230;
      margin-bottom:14px;
    }

    h1,h2,h3,h4{margin:0 0 10px}
    p{margin:0 0 14px;color:var(--muted);line-height:1.5}

    .field-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .field-full{grid-column:1/-1}

    input,textarea,select{
      width:100%;
      padding:13px 14px;
      border:2px solid #d9dfdf;
      border-radius:12px;
      background:#fffdf9;
      outline:none;
      transition:.2s ease;
      margin:0;
    }

    input:focus,textarea:focus,select:focus{
      border-color:var(--navy2);
      box-shadow:0 0 0 4px rgba(36,78,102,.08);
    }

    textarea{min-height:100px;resize:vertical}

    .btn{
      border:none;
      border-radius:14px;
      padding:13px 18px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn-primary{color:#143140;background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 10px 20px rgba(201,153,82,.26)}
    .btn-dark{color:#fff;background:linear-gradient(135deg,var(--navy2),var(--navy));box-shadow:0 10px 20px rgba(20,77,99,.24)}
    .btn-soft{color:#fff;background:linear-gradient(135deg,#6b7b84,#52626c)}
    .btn-danger{color:#fff;background:linear-gradient(135deg,#b43e36,#8b2f2a)}
    .btn-ok{color:#fff;background:linear-gradient(135deg,#37956c,#2d7b57)}

    .auth-actions,.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

    .msg{
      display:none;
      margin-top:10px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:700;
    }
    .msg.error{background:#fff1ef;color:var(--danger);border:1px solid #f4c8c2}
    .msg.ok{background:#edf8f1;color:var(--ok);border:1px solid #cbe9d6}

    .app-shell{display:none;min-height:100vh}

    .hero{
      position:relative;
      min-height:190px;
      background: linear-gradient(rgba(7,25,35,.7), rgba(7,25,35,.7));
      box-shadow:0 8px 24px rgba(0,0,0,.14);
    }

    .hero-inner{
      width:min(1380px,calc(100% - 24px));
      margin:0 auto;
      color:#fff;
      padding:24px 0 26px;
    }

    .hero-title{
      font-size:clamp(2rem,4vw,3.5rem);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:2px;
      margin-top:10px;
    }

    .topbar{
      position:sticky;top:0;z-index:1000;
      background:rgba(12,38,52,.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .topbar-inner{
      width:min(1380px,calc(100% - 24px));
      margin:0 auto;
      display:flex;
      gap:14px;
      justify-content:space-between;
      align-items:center;
      padding:10px 0;
    }

    .user-badge{display:flex;align-items:center;gap:12px;color:#fff;min-width:0;}
    .avatar,.mini-avatar,.profile-big{
      border-radius:50%;
      overflow:hidden;
      background:linear-gradient(135deg,#f1c17a,#c99952);
      display:grid;
      place-items:center;
      font-weight:900;
      color:#143140;
      flex:0 0 auto;
    }

    .avatar{width:48px;height:48px}
    .mini-avatar{width:56px;height:56px}
    .profile-big{width:90px;height:90px;font-size:2rem}

    .app{
      width:min(1380px,calc(100% - 24px));
      margin:18px auto 30px;
      display:grid;
      grid-template-columns:300px 1fr;
      gap:18px;
    }

    .side,.panel{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(0,0,0,.05);
      border-radius:24px;
      box-shadow:var(--shadow);
    }

    .side{padding:16px;position:sticky;top:76px;align-self:start;}
    .nav-list{display:grid;gap:10px}
    .nav-btn{
      width:100%; border:none; border-radius:16px; padding:14px 16px;
      text-align:left; font-weight:800; cursor:pointer; color:var(--ink);
      background:#fff; border:1px solid #e8edef; transition:.2s ease;
    }
    .nav-btn.active{
      color:#143140; background:linear-gradient(135deg,var(--gold2),var(--gold)); border-color:transparent;
    }

    .panel-header{padding:22px 24px 18px; border-bottom:1px solid var(--line);}
    .panel-body{padding:22px 24px 24px}

    .modal-backdrop{
      display:none; position:fixed; inset:0; z-index:3000;
      background:rgba(0,0,0,.55); backdrop-filter:blur(3px);
      justify-content:center; align-items:center; padding:20px;
    }

    .modal{ width:min(820px,100%); max-height:90vh; overflow:auto; background:#fff; border-radius:26px; padding:24px;}

    @media (max-width:980px){
      .app{grid-template-columns:1fr}
      .side{position:static}
    }
  </style>
</head>
<body>

  <section id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="kicker">⚓ Acceso a la comunidad</div>
      <h2>Médico Pirata</h2>
      <p id="auth-subtitle">Inicia sesión con tu correo y contraseña.</p>

      <div class="row" style="margin-bottom:16px;">
        <button class="btn btn-primary" onclick="showAuthMode('login')">Entrar</button>
        <button class="btn btn-dark" onclick="showAuthMode('register')">Crear cuenta</button>
      </div>

      <div id="login-form">
        <input id="login-email" type="email" placeholder="Correo electrónico" style="margin-bottom:10px" />
        <input id="login-password" type="password" placeholder="Contraseña" style="margin-bottom:10px" />
        <div class="auth-actions">
          <button class="btn btn-primary" onclick="login()">Entrar ahora</button>
          <button class="btn btn-soft" onclick="sendReset()">Olvidé mi contraseña</button>
        </div>
      </div>

      <div id="register-form" class="hidden">
        <div class="field-grid">
          <input id="reg-username" placeholder="Usuario (ej: pirata91)" />
          <input id="reg-curso" placeholder="Curso/Año" />
          <input id="reg-nombre" placeholder="Nombre" />
          <input id="reg-apellidos" placeholder="Apellidos" />
          <input id="reg-email" class="field-full" type="email" placeholder="Correo electrónico" />
          <input id="reg-telefono" placeholder="Teléfono" />
          <input id="reg-password" type="password" placeholder="Contraseña (mín. 6 caracteres)" />
          <textarea id="reg-bio" class="field-full" placeholder="Sobre ti..."></textarea>
        </div>
        <div class="auth-actions" style="margin-top:15px">
          <button class="btn btn-primary" onclick="register()">Registrarme</button>
        </div>
      </div>

      <div id="auth-error" class="msg error"></div>
      <div id="auth-ok" class="msg ok"></div>
    </div>
  </section>

  <div id="app-shell" class="app-shell">
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-title">Médico Pirata</div>
        <p>Panel de control de la tripulación.</p>
      </div>
    </header>

    <div class="topbar">
      <div class="topbar-inner">
        <div class="user-badge">
          <div class="avatar" id="top-avatar">U</div>
          <div class="user-meta">
            <strong id="top-name">Cargando...</strong>
            <span id="top-line">Sesión iniciada</span>
          </div>
        </div>
        <div class="top-actions">
          <button class="btn btn-soft" onclick="signOutUser()">Cerrar sesión</button>
        </div>
      </div>
    </div>

    <div class="app">
      <aside class="side">
        <div class="nav-list">
          <button class="nav-btn active" data-view="home" onclick="openView('home')">🏠 Inicio</button>
          <button class="nav-btn" data-view="profile" onclick="openView('profile')">👤 Mi perfil</button>
          <button class="nav-btn" id="nav-profiles" data-view="profiles" onclick="openView('profiles')">🌍 Perfiles</button>
          <button class="nav-btn" id="nav-common" data-view="common" onclick="openView('common')">💬 Sala común</button>
          <button class="nav-btn hidden" id="admin-nav-btn" data-view="admin" onclick="openView('admin')">🛡️ Admin</button>
        </div>
      </aside>

      <section class="panel">
        <div id="view-blank" class="hidden"></div>

        <div id="view-home">
          <div class="panel-header"><h3>Panel de Inicio</h3></div>
          <div class="panel-body"><p>Bienvenido de nuevo a la plataforma.</p></div>
        </div>

        <div id="view-admin" class="hidden">
          <div class="panel-header"><h3>🛡️ Administración</h3></div>
          <div class="panel-body"><div id="admin-users-list"></div></div>
        </div>
        
        </section>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, createUserWithEmailAndPassword,
      signInWithEmailAndPassword, signOut, sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import {
      getDatabase, ref as dbRef, get, set, update, push, remove
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAKughV5w2XAKRm3rWuUmhVldwU2bjj0zY",
      authDomain: "portal-estudio-medicina.firebaseapp.com",
      databaseURL: "https://portal-estudio-medicina-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "portal-estudio-medicina",
      storageBucket: "portal-estudio-medicina.firebasestorage.app",
      messagingSenderId: "536326985694",
      appId: "1:536326985694:web:ee2428d39421653be26f4f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // CONFIGURACIÓN DE ADMINS
    const ADMIN_EMAILS = ["santiagodiazf@gmail.com"];

    let currentUser = null;
    let currentProfile = null;
    let justRegistered = false;

    // --- FUNCIONES AUXILIARES ---
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDateTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleString();
    }

    function getConversationId(uid1, uid2) {
      return uid1 < uid2 ? `${uid1}__${uid2}` : `${uid2}__${uid1}`;
    }

    function slugifyUsername(str) {
      return String(str || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    // --- LÓGICA DE INTERFAZ ---
    function showAuthMode(mode) {
      document.getElementById("login-form").classList.toggle("hidden", mode !== "login");
      document.getElementById("register-form").classList.toggle("hidden", mode !== "register");
      clearAuthMsgs();
    }
    window.showAuthMode = showAuthMode;

    function setAuthError(msg) {
      const el = document.getElementById("auth-error");
      el.style.display = "block";
      el.textContent = msg;
    }

    function clearAuthMsgs() {
      document.getElementById("auth-error").style.display = "none";
      document.getElementById("auth-ok").style.display = "none";
    }

    // --- ACCIONES ---
    async function login() {
      const email = document.getElementById("login-email").value.trim();
      const pass = document.getElementById("login-password").value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) { setAuthError("Error: Credenciales incorrectas."); }
    }
    window.login = login;

    async function register() {
      const username = document.getElementById("reg-username").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const pass = document.getElementById("reg-password").value;
      const slug = slugifyUsername(username);

      if(!username || !email || pass.length < 6) {
        setAuthError("Datos incompletos o contraseña muy corta.");
        return;
      }

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const isAdmin = ADMIN_EMAILS.includes(email);
        
        const profile = {
          uid: cred.user.uid,
          username,
          usernameSlug: slug,
          email,
          approved: isAdmin,
          role: isAdmin ? "admin" : "user",
          createdAt: new Date().toISOString()
        };

        await set(dbRef(db, "profiles/" + cred.user.uid), profile);
        justRegistered = true; // Marcamos que acaba de registrarse
      } catch (e) { setAuthError("Error en el registro: " + e.message); }
    }
    window.register = register;

    async function signOutUser() {
      await signOut(auth);
      location.reload();
    }
    window.signOutUser = signOutUser;

    function openView(name) {
      const views = ["home", "profile", "profiles", "common", "admin", "blank"];
      views.forEach(v => {
        const el = document.getElementById("view-" + v);
        if(el) el.classList.add("hidden");
      });
      document.getElementById("view-" + name).classList.remove("hidden");
    }
    window.openView = openView;

    // --- OBSERVADOR DE ESTADO ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await get(dbRef(db, "profiles/" + user.uid));
        currentProfile = snap.val();

        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-shell").style.display = "block";
        document.getElementById("top-name").textContent = currentProfile.username;
        
        if (currentProfile.role === "admin") {
          document.getElementById("admin-nav-btn").classList.remove("hidden");
        }

        if (justRegistered) {
          openView("blank"); // Si acaba de registrarse, mostramos la página vacía
        } else {
          openView("home");
        }
      } else {
        document.getElementById("auth-screen").classList.remove("hidden");
        document.getElementById("app-shell").style.display = "none";
      }
    });
  </script>
</body>
</html>

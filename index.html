<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÉDICO PIRATA</title>
    <style>
        :root {
            --p-dark: #2c3e50; --p-gold: #c0a16b; --c-blue: #0077be;
            --c-sand: #fdfbf7; --o-stone: #d2b48c;
            --c1: #34495e; --c2: #d35400; --pv: #c0392b;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--c-sand); overflow: hidden; /* Evita doble scroll */
        }

        /* --- PANTALLA DE ACCESO --- */
        #l-s {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--c-blue) 0%, #ff7e5f 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        
        .l-b {
            background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 90%;
            border: 2px solid var(--p-gold); backdrop-filter: blur(10px);
        }

        .l-b input {
            width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd;
            border-radius: 8px; font-size: 16px; text-align: center; outline: none;
        }
        
        .l-b button {
            background: var(--p-dark); color: white; border: 1px solid var(--p-gold);
            padding: 12px; font-size: 16px; border-radius: 8px; cursor: pointer;
            width: 100%; font-weight: bold; text-transform: uppercase;
        }

        /* --- LAYOUT PRINCIPAL (Banner + Iframe) --- */
        .main-layout {
            display: flex; flex-direction: column; height: 100vh; width: 100vw;
        }

        /* Banner Superior */
        .h-b {
            height: 25vh; min-height: 180px; width: 100%;
            background: url('medico_pirate.png') no-repeat center center;
            background-size: cover; border-bottom: 5px solid var(--o-stone);
            position: relative; flex-shrink: 0;
        }

        /* Barra de Usuario (Capitán) */
        .user-bar {
            position: absolute; bottom: 10px; right: 20px;
            background: rgba(44, 62, 80, 0.85); color: white;
            padding: 8px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid var(--p-gold); backdrop-filter: blur(5px);
            font-size: 0.9rem;
        }

        .logout-btn {
            background: var(--pv); color: white; border: none;
            padding: 5px 12px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 0.8rem; transition: 0.3s;
        }
        .logout-btn:hover { background: #ff4d4d; }

        /* Contenedor de contenido */
        #content-area {
            flex-grow: 1; position: relative; width: 100%; overflow-y: auto;
        }

        /* Iframe de Trabajo (Toda la página menos el banner) */
        #work-frame {
            width: 100%; height: 100%; border: none; display: none;
            background: white;
        }

        /* Menú de selección inicial */
        #menu-grid {
            padding: 40px 20px; max-width: 1100px; margin: 0 auto;
        }

        h1 { font-size: 2.5rem; letter-spacing: 3px; text-align: center; border-bottom: 4px solid var(--p-gold); padding-bottom: 10px; margin-bottom: 30px; }
        .a-t { text-align: center; margin-bottom: 40px; font-weight: 500; font-size: 1.2rem; }

        .s-g { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .s-c { background: #fff; border-radius: 15px; padding: 30px; text-align: center; text-decoration: none; color: inherit; box-shadow: 0 5px 15px rgba(0,0,0,0.06); transition: 0.3s; border-bottom: 4px solid var(--p-gold); display: block; }
        .s-c:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .icon { font-size: 3rem; margin-bottom: 15px; }
        .disabled { opacity: 0.5; cursor: not-allowed; }

        /* Panel Admin */
        .a-p { background: #fff; padding: 25px; border-radius: 15px; border: 3px solid var(--pv); margin-top: 40px; }
    </style>
</head>
<body>

    <div id="l-s">
        <div class="l-b">
            <h2 style="letter-spacing:2px; margin-top:0;">MÉDICO PIRATA</h2>
            <p>Tripulación: Identifícate</p>
            <input type="password" id="u-i" placeholder="Código de acceso" onkeypress="if(event.key==='Enter')hL()">
            <button onclick="hL()">Navegar por la Bahía</button>
            <div id="e-m" style="color:red; display:none; margin-top:15px; font-weight:bold;">Clave incorrecta.</div>
        </div>
    </div>

    <div class="main-layout" id="main-view" style="display:none;">
        <div class="h-b">
            <div class="user-bar">
                <span>⚓ Tripulante: <strong id="display-user"></strong></span>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div id="content-area">
            <div id="menu-grid">
                <h1>MÉDICO PIRATA</h1>
                <div class="a-t">Recursos para medic@s piratas en Cádiz</div>
                
                <div class="s-g">
                    <a href="javascript:void(0)" onclick="openResource('index primero primer cuatrimestre.html')" class="s-c">
                        <div class="icon">&#128218;</div>
                        <h3 style="color:var(--c1)">1er Cuatrimestre</h3>
                        <span>Anatomía I, Biología, Física...</span>
                    </a>
                    <a href="javascript:void(0)" onclick="openResource('indice segundo cuatri de preimero.html')" class="s-c">
                        <div class="icon">&#128128;</div>
                        <h3 style="color:var(--c1)">2do Cuatrimestre</h3>
                        <span>Anatomía II, Histología...</span>
                    </a>
                </div>

                <div id="admin-zone"></div> </div>

            <iframe id="work-frame" name="work-frame"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, update, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const fC = {
            apiKey: "AIzaSyAKughV5w2XAKRm3rWuUmhVldwU2bjj0zY",
            authDomain: "portal-estudio-medicina.firebaseapp.com",
            databaseURL: "https://portal-estudio-medicina-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "portal-estudio-medicina",
            storageBucket: "portal-estudio-medicina.firebasestorage.app",
            messagingSenderId: "536326985694",
            appId: "1:536326985694:web:ee2428d39421653be26f4f"
        };

        const app = initializeApp(fC);
        const db = getDatabase(app);

        // Seguridad: Nombres ofuscados
        const _T = ["OTExNDM=", "bWFyaWFwZXJleg==", "bWFydGFqaW1lbmV6", "bWFydGFsb3Bleg==", "YWxiYWxhaW5leg==", "QnVjaGk="];

        window.hL = function() {
            const val = document.getElementById("u-i").value;
            const encoded = btoa(val);
            if (_T.includes(encoded)) {
                sessionStorage.setItem("_a_t", "1");
                sessionStorage.setItem("_a_u", val);
                location.reload(); // Recarga para aplicar la vista
            } else {
                document.getElementById("e-m").style.display = "block";
            }
        };

        window.logout = function() {
            sessionStorage.clear();
            location.reload();
        };

        window.openResource = function(url) {
            document.getElementById("menu-grid").style.display = "none";
            const frame = document.getElementById("work-frame");
            frame.src = url;
            frame.style.display = "block";
        };

        // Lógica de carga al iniciar
        window.onload = async function() {
            if (sessionStorage.getItem("_a_t") === "1") {
                const cU = sessionStorage.getItem("_a_u");
                document.getElementById("l-s").style.display = "none";
                document.getElementById("main-view").style.display = "flex";
                document.getElementById("display-user").innerText = cU;

                try {
                    update(ref(db, 'visitas/' + cU), { total: increment(1) });
                    
                    if (cU === "91143") {
                        const snap = await get(ref(db, 'visitas'));
                        const data = snap.val() || {};
                        let list = Object.keys(data).map(k => `<li><span>${k}</span> <strong>${data[k].total}</strong></li>`).join('');
                        
                        document.getElementById("admin-zone").innerHTML = `
                            <div class="a-p">
                                <h3 style="color:var(--pv)">Bitácora del Almirante</h3>
                                <div class="s-g" style="margin-bottom:20px">
                                    <a href="javascript:void(0)" onclick="openResource('privados.html')" class="s-c"><div class="icon">&#128128;</div>Exámenes</a>
                                    <a href="javascript:void(0)" onclick="openResource('quiz_privado_1.html')" class="s-c"><div class="icon">&#128272;</div>Quiz</a>
                                </div>
                                <ul style="list-style:none; padding:0;">${list}</ul>
                            </div>`;
                    }
                } catch (e) { }
            }
        };
    </script>
</body>
</html>

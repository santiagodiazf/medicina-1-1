<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bioquímica Médica - Batería Definitiva Extendida</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #c0392b; --bg: #f8f9fa; --sidebar-width: 80px; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        #start-screen, #results-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .start-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; border: 1px solid #ddd; overflow-y: auto; max-height: 90vh; }
        .start-card h1 { color: var(--primary); margin-bottom: 10px; }
        .start-card select, .start-card button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
        .start-card button { background: var(--accent); color: white; border: none; font-weight: bold; transition: 0.3s; }
        .start-card button:hover { background: #2980b9; }

        #quiz-layout { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        #sidebar { width: var(--sidebar-width); background: #2c3e50; color: white; overflow-y: auto; flex-shrink: 0; padding: 10px 5px; text-align: center; display: flex; flex-direction: column; gap: 5px; scrollbar-width: thin; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 0; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.2s; width: 100%; }
        .nav-btn.active { border: 2px solid white; font-weight: bold; }
        .nav-btn.correct { background: var(--success); }
        .nav-btn.incorrect { background: var(--error); }
        .nav-btn.marked::after { content: ' 🚩'; font-size: 10px; }

        #main-area { flex-grow: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .question-container { max-width: 900px; margin: 0 auto; padding-bottom: 150px; }
        
        .q-card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); position: relative; scroll-margin-top: 20px; }
        .q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .q-title { font-weight: bold; font-size: 1.1em; color: var(--primary); width: 85%; line-height: 1.4; }
        .q-mark { cursor: pointer; font-size: 0.9em; color: #7f8c8d; display: flex; align-items: center; gap: 5px; }
        
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn { text-align: left; background: #f8f9fa; border: 1px solid #dee2e6; padding: 14px 18px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1em; width: 100%; line-height: 1.3; }
        .opt-btn:hover:not(:disabled) { background: #e9ecef; border-color: var(--accent); }
        .opt-btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .opt-btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .opt-btn:disabled { cursor: default; }

        .explanation { margin-top: 15px; padding: 18px; background: #f0f7ff; border-left: 4px solid var(--accent); border-radius: 4px; display: none; animation: fadeIn 0.4s; font-size: 0.95em; color: #34495e; }
        .explanation strong { color: var(--accent); display: block; margin-bottom: 5px; }

        #btn-finalize { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; padding: 18px 35px; border-radius: 50px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 100; }
        
        .result-stats { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .stat-box { background: #f1f2f6; padding: 15px; border-radius: 8px; flex: 1; min-width: 120px; }
        .stat-val { font-size: 26px; font-weight: bold; display: block; }
        
        .retry-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .retry-btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .retry-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-all { background: var(--primary); grid-column: span 2; }
        .btn-failed { background: var(--error); }
        .btn-marked { background: #f39c12; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media(max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 60px; flex-direction: row; order: 2; overflow-x: auto; padding: 10px; }
            #main-area { height: calc(100vh - 60px); order: 1; padding: 15px; }
            .nav-btn { width: 45px; flex-shrink: 0; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-card">
            <h1>🧪 Bioquímica Médica Pro</h1>
            <p><strong>Batería Extendida con Preguntas Desdobladas (>215 preguntas)</strong></p>
            
            <label>Modo de Estudio:</label>
            <select id="mode-select" onchange="toggleExamOptions()">
                <option value="blocks">Por Bloques Temáticos</option>
                <option value="exam">Simulacro de Examen (Aleatorio)</option>
            </select>

            <div id="block-options">
                <label>Seleccionar Bloque:</label>
                <select id="block-select">
                    <option value="todos">Todos los Bloques (Completo)</option>
                    <option value="bloque1">Bloque I: Macronutrientes y Vitaminas</option>
                    <option value="bloque2">Bloque II: Digestión y Absorción</option>
                    <option value="bloque3">Bloque III: Tejido Adiposo y Lipoproteínas</option>
                    <option value="bloque4">Bloque IV: Inmunobioquímica</option>
                    <option value="bloque5">Bloque V: Endocrinología Molecular</option>
                    <option value="bloque6">Bloque VI: Señalización y Ciclo Celular</option>
                    <option value="bloque7">Bloque VII: Bioquímica de la Visión</option>
                    <option value="bloque8">Bloque VIII: Neurotransmisores</option>
                    <option value="bloque9">Bloque IX: Sangre, Hemo y Coagulación</option>
                    <option value="bloque10">Bloque X: Radicales Libres y Estrés</option>
                    <option value="bloque11">Bloque XI: Bioquímica Hepática</option>
                    <option value="bloque12">Bloque XII: Proteínas Fibrosas (Colágeno)</option>
                    <option value="bloque13">Bloque XIII: Equilibrio Hidroeléctrico</option>
                    <option value="bloque14">Bloque XIV: Calcio y Hueso</option>
                    <option value="bloque15">Bloque XV: Metabolismo Neoplásico</option>
                    <option value="bloque16">Bloque XVI: Bioquímica del Ejercicio</option>
                </select>
            </div>

            <div id="exam-options" style="display:none;">
                <label>Número de Preguntas:</label>
                <select id="q-amount">
                    <option value="30">30 preguntas</option>
                    <option value="60">60 preguntas</option>
                    <option value="100">100 preguntas</option>
                    <option value="999">Examen Total</option>
                </select>
            </div>

            <button onclick="startQuiz()">COMENZAR PREPARACIÓN</button>
        </div>
    </div>

    <div id="quiz-layout">
        <div id="sidebar"></div>
        <div id="main-area">
            <div id="questions-wrapper" class="question-container"></div>
        </div>
        <button id="btn-finalize" onclick="showResults()">🏁 FINALIZAR Y REVISAR</button>
    </div>

    <div id="results-modal" style="display:none;">
        <div class="start-card">
            <h2>Resultados del Test</h2>
            <div class="result-stats">
                <div class="stat-box" style="color:var(--success)">
                    <span class="stat-val" id="score-correct">0</span>
                    <span>Aciertos</span>
                </div>
                <div class="stat-box" style="color:var(--error)">
                    <span class="stat-val" id="score-wrong">0</span>
                    <span>Fallos</span>
                </div>
                <div class="stat-box" style="color:#f39c12">
                    <span class="stat-val" id="score-marked">0</span>
                    <span>Marcadas</span>
                </div>
            </div>
            
            <div class="retry-options">
                <button class="retry-btn btn-all" onclick="retry('all')">🔄 Repetir este mismo test</button>
                <button class="retry-btn btn-failed" onclick="retry('failed')">❌ Solo las falladas</button>
                <button class="retry-btn btn-marked" onclick="retry('marked')">🚩 Solo las marcadas</button>
                <button class="retry-btn btn-failed-marked" style="background:#8e44ad; grid-column: span 2;" onclick="retry('failed_marked')">⚠️ Falladas + Marcadas</button>
            </div>
            <button style="background:#7f8c8d; margin-top:15px;" onclick="location.reload()">🏠 Volver a la Selección</button>
        </div>
    </div>

    <script>
        // BASE DE DATOS COMPLETA + PREGUNTAS DESDOBLADAS
        const fullDB = [
            // BLOQUE 1
            { id:1, b:"bloque1", q:"1. Respecto al efecto térmico de los alimentos, el máximo valor se obtiene a:", o:["30 minutos", "5 horas", "11 horas", "10 minutos", "120 minutos"], c:4, e:"El efecto térmico alcanza su pico a los 120 minutos tras la ingesta." },
            { id:2, b:"bloque1", q:"2. Respecto a la ingesta de macronutrientes, señale la respuesta incorrecta:", o:["Los hidratos de carbono se pueden almacenar de forma ilimitada.", "El exceso de ingesta de grasas no estimula la oxidación de las mismas.", "Los polifenoles son componentes no nutricionales beneficiosos.", "Parte de los hidratos de carbono excedentes se emplean en la síntesis de lípidos."], c:0, e:"Incorrecta: El almacén de HC es limitado (glucógeno)." },
            { id:3, b:"bloque1", q:"3. Cual de las siguientes vitaminas es un derivado de isopreno:", o:["Vitamina D", "Vitamina E", "Vitamina C", "Vitamina B12", "Ácido lipoico"], c:1, e:"Las vitaminas derivadas del isopreno son A, E y K." },
            { id:4, b:"bloque1", q:"4. Señale la respuesta incorrecta en relación al cálculo del gasto energético, según la Ecuación de Weir:", o:["Se incluye el factor de actividad física.", "Tiene en cuenta el nitrógeno excretado.", "Requiere evaluar la producción de CO2.", "Necesita el valor de consumo de oxígeno."], c:0, e:"El factor de actividad física no está incluido intrínsecamente en la ecuación de Weir (que usa O2, CO2 y nitrógeno)." },
            { id:5, b:"bloque1", q:"5. Respecto a la recuperación de la vitamina E tras su mecanismo de acción, ¿qué coenzima será necesaria en este proceso?", o:["Fosfato de piridoxal", "NAD(P)H", "Coenzima A", "FADH2"], c:1, e:"Se regenera gracias a VitC y glutatión, que a su vez requieren NADPH." },
            { id:6, b:"bloque1", q:"6. Para que la vitamina D esté activa ha de hidroxilarse. Señale la respuesta correcta:", o:["Se hidroxila en el hígado en posición 25 y en posición 24.", "Se hidroxila primero en el hígado en posición 25 y posteriormente en riñón en posición 1.", "Se hidroxila primero en el riñón en posición 25 y posteriormente en hígado en posición 1.", "Se hidroxila sólo en el riñón en posición 24 y en posición 1."], c:1, e:"Hígado (25-OH) -> Riñón (1-alfa-OH) para formar 1,25(OH)2D3." },
            { id:7, b:"bloque1", q:"7. En el proceso de caquexia neoplásica, ¿qué tejidos sufren un mayor desgaste tisular asociado a este proceso?", o:["Músculo y tejido adiposo", "Riñón y glándulas suprarrenales", "Exclusivamente el cerebro", "Hígado y cerebro"], c:0, e:"El tumor promueve la degradación proteica muscular y la lipólisis." },
            { id:8, b:"bloque1", q:"8. ¿Cuál de los siguientes ácidos grasos es de tipo omega 9?", o:["Ácido esteárico", "Ácido linoleico", "Ácido oleico", "Ácido a-linolénico", "Ácido palmítico"], c:2, e:"El ácido oleico es el omega 9." },
            { id:801, b:"bloque1", q:"8.1. Desdoblamiento: ¿Cuál de los siguientes ácidos grasos es SATURADO de 18 carbonos?", o:["Ácido esteárico", "Ácido linoleico", "Ácido oleico", "Ácido a-linolénico", "Ácido palmítico"], c:0, e:"El ácido esteárico es C18:0." },
            { id:802, b:"bloque1", q:"8.2. Desdoblamiento: ¿Cuál de los siguientes ácidos grasos es el precursor de la serie omega 6?", o:["Ácido esteárico", "Ácido linoleico", "Ácido oleico", "Ácido a-linolénico", "Ácido palmítico"], c:1, e:"El ácido linoleico es esencial y precursor omega 6." },
            { id:803, b:"bloque1", q:"8.3. Desdoblamiento: ¿Cuál de los siguientes ácidos grasos es el precursor de la serie omega 3?", o:["Ácido esteárico", "Ácido linoleico", "Ácido oleico", "Ácido a-linolénico", "Ácido palmítico"], c:3, e:"El ácido alfa-linolénico (ALA) es precursor omega 3." },
            { id:9, b:"bloque1", q:"9. ¿Cuál de los siguientes ácidos grasos es del tipo omega 6?", o:["Ácido eicosapentaenoico", "Ácido docosahexaenoico", "Ácido a-linolénico", "Ácido araquidónico", "Ácido esteárico"], c:3, e:"El ácido araquidónico es un omega 6 sintetizado a partir del linoleico." },
            { id:901, b:"bloque1", q:"9.1. Desdoblamiento: ¿Cuáles de los siguientes son ácidos grasos poliinsaturados de la serie omega 3?", o:["Ácido linoleico y araquidónico", "Ácido eicosapentaenoico (EPA) y docosahexaenoico (DHA)", "Ácido esteárico y palmítico", "Ácido oleico"], c:1, e:"EPA y DHA son los omega 3 clave derivados del alfa-linolénico." },
            { id:10, b:"bloque1", q:"10. ¿Cuál es la respuesta correcta en relación a los efectos de la malnutrición proteico-calórica?", o:["Disminuye la actividad Na+/K+ ATPasa", "Aumenta la actividad Na+/K+ ATPasa", "Aumenta el transporte de glucosa", "No afecta al sistema de transporte de glucosa", "Aumenta la actividad de la enzima lipoproteinlipasa"], c:0, e:"La falta de energía reduce la actividad de bombas dependientes de ATP." },
            { id:11, b:"bloque1", q:"11. Indique la respuesta correcta respecto a la vitamina del grupo B que forma parte de la estructura de la Coenzima Fosfato de Piridoxal.", o:["Vitamina B1", "Vitamina B2", "Vitamina B6", "Vitamina B3", "Vitamina B5"], c:2, e:"Vitamina B6 = Piridoxina = Fosfato de piridoxal." },
            { id:12, b:"bloque1", q:"12. La estructura de beta-carotenos se caracteriza por presentar 2 anillos ionona, ¿en qué carbonos se establece el doble enlace de este tipo de anillo?", o:["C5-C6", "C4-C5", "C3-C4", "C2-C3", "C1-C2"], c:0, e:"Es una característica estructural del anillo beta-ionona." },
            { id:13, b:"bloque1", q:"13. El proceso de la autooxidación de la vitamina C se caracteriza por:", o:["Ser independiente del pH", "Depender del pH y favorecer la formación de H2O2", "Donar siempre 2 electrones", "Generar hierro férrico", "Recuperar su estado reducido por acción de la catalasa"], c:1, e:"Genera H2O2 en fluidos extracelulares dependiendo del pH." },

            { id:15, b:"bloque1", q:"15. Señale la respuesta correcta respecto a los receptores específicos para el ácido retinoico:", o:["Son receptores de superficie con actividad tirosin kinasa", "Estos receptores activan a la fosfolipasa C", "Actúan como poros de transición", "Son receptores nucleares", "Son receptores de superficie acoplados a proteína G"], c:3, e:"El ácido retinoico actúa directamente modulando la expresión génica." },
            { id:16, b:"bloque1", q:"16. Señale la respuesta correcta respecto a la formación del ácido retinoico:", o:["Procede directamente del retinol por oxidación reversible a nivel intestinal", "Se obtiene por oxidación irreversible del retinal, mediante la enzima aldehído deshidrogenasa", "Se obtiene por oxidación reversible, mediante la enzima aldehído oxidasa", "La enzima retinal descarboxilasa favorece la síntesis directa", "Se reduce por un proceso espontáneo oxidativo"], c:1, e:"Paso irreversible por la aldehído deshidrogenasa." },
            { id:17, b:"bloque1", q:"17. Señala la respuesta correcta respecto a la energía aprovechable que aportan las proteínas:", o:["4 Kcal/g", "9 Kcal/g", "7 Kcal/g", "5,3 Kcal/g"], c:0, e:"Tanto glúcidos como proteínas aportan 4 Kcal/g netas." },
            { id:18, b:"bloque1", q:"18. ¿Qué marcador bioquímico se emplea para monitorizar a corto plazo el estado de desnutrición?", o:["Prealbúmina", "Albúmina", "Transferrina", "Proteína ligada al retinol", "Ferritina"], c:0, e:"La prealbúmina tiene vida media muy corta, ideal para cambios agudos." },
            { id:19, b:"bloque1", q:"19. Señale la respuesta correcta respecto a los receptores específicos para el ácido retinoico:", o:["Son receptores nucleares", "Son receptores de superficie acoplados a proteínas G", "Son receptores de superficie con actividad tirosin kinasa", "Estos receptores activan a la fosfolipasa C"], c:0, e:"Pregunta repetida en DB: Son receptores nucleares RAR/RXR." },
            { id:20, b:"bloque1", q:"20. La Vitamina C tiene un potente efecto reductor. Señala la respuesta correcta en relación a la molécula que es necesaria para que recupere su estado reducido inicial:", o:["Glutatión reducido", "Vitamina E", "NADPH+", "Glutatión oxidado"], c:0, e:"El ciclo del glutatión mantiene la vitamina C reducida." },
            { id:21, b:"bloque1", q:"21. Los cambios metabólicos que se producen en un paciente oncológico y que están asociados a la aparición de caquexia neoplásica se caracterizan por:", o:["Pérdida de proteínas musculares", "Reducción de producción de proteínas de fase aguda", "Hay un aumento de la glucosa en sangre", "Se favorece la lipogénesis"], c:0, e:"Hay un catabolismo proteico masivo en músculo esquelético." },
            { id:22, b:"bloque1", q:"22. ¿Cuál de los siguientes factores no sería modificable como factor de riesgo cardiovascular?", o:["Edad", "Estrés", "Dieta", "Tabaco"], c:0, e:"Edad, sexo y genética no son modificables." },

            { id:24, b:"bloque1", q:"24. ¿Cuál es el principal indicador del estado nutricional?", o:["Balance nitrogenado", "Colesterolemia", "Glucemia", "Leucocitos", "Todas son ciertas"], c:0, e:"El estado nutricional requiere valoración integral." },

            // BLOQUE 2
            { id:25, b:"bloque2", q:"25. Respecto a la y-glutamiltranspeptidasa, señale la respuesta correcta (ciclo de Meister):", o:["Cataliza la transferencia del y-glutamil del glutatión a un aminoácido neutro", "Es una enzima citosólica", "Cataliza la transferencia de la glicina del glutatión a un aminoácido", "Cataliza la transferencia de la cisteína del glutatión a un aminoácido"], c:0, e:"Usa el gamma-glutamilo del glutatión para translocar aminoácidos.Degradacion del glutation->ruptura del enlace peptidico->y-glutuil transpeptidasa transportes aminoacido desde el interior del hemaptocito-Z una vez dentrolo une al glutamato que formaba parte del glutation se obtiene un dipeptido. Como el glutation pierde el glutamato se obtiene cisteinglicina.
" },
            { id:26, b:"bloque2", q:"26. Respecto al ciclo de Meister o gamma-glutamilo, señale la respuesta correcta:", o:["Permite el paso de aminoácidos básicos del enterocito a la sangre", "Permite la transferencia de aminoácidos a la cisteína del glutatión", "Permite el paso de aminoácidos neutros de la sangre a las células", "Permite la transferencia de aminoácidos a la histidina del glutatión", "Permite la transferencia de aminoácidos a la glicina del glutatión"], c:2, e:"Sirve principalmente para captar AA neutros de la sangre al interior celular." },
            { id:27, b:"bloque2", q:"27. Respecto a la enzima lipoproteina-lipasa (LPL), señale la respuesta correcta:", o:["Se localiza en el endotelio de los capilares", "Se localiza en la membrana de los eritrocitos", "Se inactiva por la insulina", "Reconoce la apoproteína b100", "Va asociada a micelas"], c:0, e:"LPL está unida al heparán sulfato del endotelio capilar de tejidos extrahepáticos, la insulina la activa. Reconoce a la APO C-II." },
            { id:28, b:"bloque2", q:"28. Indique la respuesta correcta en relación a la procedencia del glicerol 3 fosfato requerido por el tejido adiposo para la formación de triacilgliceridos:", o:["Se obtiene mediante fosforilación directa del glicerol en el propio tejido", "No se requiere glicerol 3 fosfato", "Los ácidos grasos se esterifican directamente sobre el glicerol sin fosforilar", "Los ácidos grasos se almacenan unidos a albúmina", "Procede del fosfato de dihidroxiacetona"], c:4, e:"El tejido adiposo carece de glicerol quinasa, debe usar la glucólisis." },
            { id:29, b:"bloque2", q:"29. El receptor APO B/E reconoce:", o:["La apoproteína b48 de los quilomicrones", "La apoproteína b100 de las lipoproteínas LDL intactas", "La apoproteína F", "La apoproteína A", "La apoproteína b50"], c:1, e:"El receptor LDL reconoce ApoB100 y ApoE." },
            { id:30, b:"bloque2", q:"30. Señale la respuesta correcta con respecto al transportador SGLT 1:", o:["Es un lípido de membrana", "Permite el paso de manosa desde el enterocito a la sangre", "Es dependiente de sodio", "Es independiente de sodio"], c:2, e:"SGLT (Sodium Glucose Transporter) usa gradiente de sodio." },

        // VARIABLES Y LOGICA DE ESTADO
        let currentQuestions = [];
        let userAnswers = {};

        function toggleExamOptions() {
            const mode = document.getElementById('mode-select').value;
            document.getElementById('block-options').style.display = mode === 'blocks' ? 'block' : 'none';
            document.getElementById('exam-options').style.display = mode === 'exam' ? 'block' : 'none';
        }

        function startQuiz() {
            const mode = document.getElementById('mode-select').value;
            userAnswers = {};

            if (mode === 'blocks') {
                const block = document.getElementById('block-select').value;
                currentQuestions = block === 'todos' ? [...fullDB] : fullDB.filter(q => q.b === block);
                // Orden numérico respetando los ID con decimales de desdoblamiento
                currentQuestions.sort((a, b) => a.id - b.id);
            } else {
                let amount = parseInt(document.getElementById('q-amount').value);
                if (amount === 999) amount = fullDB.length;
                const shuffled = [...fullDB].sort(() => 0.5 - Math.random());
                currentQuestions = shuffled.slice(0, amount);
            }

            renderQuiz();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-layout').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function renderQuiz() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('questions-wrapper');
            sidebar.innerHTML = '';
            main.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                // Sidebar button
                const navBtn = document.createElement('button');
                navBtn.className = 'nav-btn';
                navBtn.innerText = index + 1;
                navBtn.onclick = () => document.getElementById(`q-${q.id}`).scrollIntoView({behavior: 'smooth', block: 'start'});
                navBtn.id = `nav-${q.id}`;
                sidebar.appendChild(navBtn);

                // Tarjeta
                const card = document.createElement('div');
                card.className = 'q-card';
                card.id = `q-${q.id}`;
                
                card.innerHTML = `
                    <div class="q-header">
                        <div class="q-title">${index + 1}. ${q.q.replace(/^\d+\.\d*\s*/, '')}</div>
                        <label class="q-mark">
                            <input type="checkbox" onchange="toggleMark(${q.id}, this.checked)"> 🚩
                        </label>
                    </div>
                `;

                const optGrid = document.createElement('div');
                optGrid.className = 'options-grid';
                
                let optionsObj = q.o.map((txt, i) => ({ txt, originalIdx: i }));
                optionsObj.sort(() => Math.random() - 0.5); // Shuffle

                optionsObj.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = opt.txt;
                    btn.onclick = () => handleAnswer(q.id, opt.originalIdx, btn, q.c, q.e);
                    optGrid.appendChild(btn);
                });
                card.appendChild(optGrid);

                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                exp.innerHTML = `<strong>Explicación:</strong> ${q.e}`;
                card.appendChild(exp);

                main.appendChild(card);
            });
        }

        function handleAnswer(qId, selectedIdx, btn, correctIdx, explanation) {
            if (userAnswers[qId] && userAnswers[qId].answered) return;

            const isCorrect = selectedIdx === correctIdx;
            if (!userAnswers[qId]) userAnswers[qId] = {};
            userAnswers[qId].answered = true;
            userAnswers[qId].correct = isCorrect;

            if (isCorrect) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                const btns = btn.parentElement.querySelectorAll('.opt-btn');
                const correctText = fullDB.find(x => x.id === qId).o[correctIdx];
                btns.forEach(b => { if(b.innerText === correctText) b.classList.add('correct'); });
            }

            btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
            document.getElementById(`exp-${qId}`).style.display = 'block';
            document.getElementById(`nav-${qId}`).classList.add(isCorrect ? 'correct' : 'incorrect');
        }

        function toggleMark(qId, checked) {
            if (!userAnswers[qId]) userAnswers[qId] = {};
            userAnswers[qId].marked = checked;
            const btn = document.getElementById(`nav-${qId}`);
            if (checked) btn.classList.add('marked');
            else btn.classList.remove('marked');
        }

        function showResults() {
            let c = 0, w = 0, m = 0;
            currentQuestions.forEach(q => {
                const ua = userAnswers[q.id];
                if (ua) {
                    if (ua.correct) c++;
                    else if (ua.answered) w++;
                    if (ua.marked) m++;
                }
            });
            document.getElementById('score-correct').innerText = c;
            document.getElementById('score-wrong').innerText = w;
            document.getElementById('score-marked').innerText = m;
            document.getElementById('results-modal').style.display = 'flex';
        }

        function retry(mode) {
            let next = [];
            if (mode === 'all') next = [...currentQuestions];
            else if (mode === 'failed') next = currentQuestions.filter(q => userAnswers[q.id]?.answered && !userAnswers[q.id]?.correct);
            else if (mode === 'marked') next = currentQuestions.filter(q => userAnswers[q.id]?.marked);
            else if (mode === 'failed_marked') next = currentQuestions.filter(q => (userAnswers[q.id]?.answered && !userAnswers[q.id]?.correct) || userAnswers[q.id]?.marked);

            if (next.length === 0) return alert("No hay preguntas en esta categoría.");
            
            currentQuestions = next;
            userAnswers = {};
            document.getElementById('results-modal').style.display = 'none';
            renderQuiz();
            window.scrollTo(0,0);
        }
    </script>

        .nav-btn.correct { background: var(--success); }
        .nav-btn.wrong { background: var(--danger); }
        .nav-btn.marked { border: 2px solid var(--warning); box-shadow: 0 0 8px var(--warning); }

        /* --- Main Content --- */
        #main-container {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .setup-screen, .results-screen {
            text-align: center;
        }

        .question-box { display: none; }
        .question-box.active { display: block; }

        h2 { color: var(--primary); margin-top: 0; }
        .options-container { margin: 20px 0; }

        .option {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .option:hover:not([disabled]) { background: #f9f9f9; border-color: var(--secondary); }
        .option.correct { background: var(--success); color: white; border-color: var(--success); }
        .option.wrong { background: var(--danger); color: white; border-color: var(--danger); }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
        }
        .feedback.visible { display: block; background: #e8f4fd; border-left: 5px solid var(--secondary); }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button.btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;

        .btn-end { background: var(--danger); color: white; }
        .btn-mark { background: var(--warning); color: black; }

        .marker-status {
            font-size: 12px;
            font-weight: bold;
            color: var(--warning);
            margin-bottom: 5px;
            display: none;
        }
        .marker-status.active { display: block; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

    let currentQuestions = [];
    let userState = {}; // { indexInCurrent: { answered: bool, correct: bool, marked: bool } }
    let currentIndex = 0;

    function startQuiz(randomize) {
        document.getElementById('setup-screen').style.display = 'none';
        currentQuestions = [...rawQuestions];
        if (randomize) {
            currentQuestions.sort(() => Math.random() - 0.5);
        }
        initQuizState();
        renderSidebar();
        showQuestion(0);
    }

    function initQuizState() {
        userState = {};
        currentQuestions.forEach((_, i) => {
            userState[i] = { answered: false, correct: false, marked: false, selected: null };
        });
    }

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '';
        currentQuestions.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.id = `nav-${i}`;
            btn.innerText = i + 1;
            btn.onclick = () => showQuestion(i);
            sidebar.appendChild(btn);
        });
    }

    function showQuestion(index) {
        currentIndex = index;
        const container = document.getElementById('question-container');
        const q = currentQuestions[index];
        const state = userState[index];

        // Aleatorizar opciones para esta visualización
        const optionKeys = ['a', 'b', 'c', 'd'];
        const shuffledKeys = [...optionKeys].sort(() => Math.random() - 0.5);

        let optionsHtml = '';
        shuffledKeys.forEach(key => {
            let className = 'option';
            if (state.answered) {
                if (key === q.a) className += ' correct';
                else if (key === state.selected && key !== q.a) className += ' wrong';
            }

            optionsHtml += `
                <button class="${className}" 
                        onclick="checkAnswer('${key}')" 
                        ${state.answered ? 'disabled' : ''}>
                    ${key.toUpperCase()}) ${q.options[key]}
                </button>
            `;
        });

        container.innerHTML = `
            <div class="question-box active">
                <div class="marker-status ${state.marked ? 'active' : ''}" id="mark-label-${index}">★ MARCADA</div>
                <h2>Pregunta ${index + 1}</h2>
                <p style="font-size: 18px; line-height: 1.6;">${q.q}</p>
                <div class="options-container">${optionsHtml}</div>
                <div class="feedback ${state.answered ? 'visible' : ''}">
                    <strong>Explicación:</strong> ${q.exp}
                </div>
                <div class="controls">
                    <button class="btn btn-mark" onclick="toggleMark(${index})">
                        ${state.marked ? 'Desmarcar' : 'Marcar Pregunta'}
                    </button>
                    <div>
                        <button class="btn btn-end" onclick="endQuiz()">Finalizar</button>
                        <button class="btn btn-main" onclick="prevQ()" ${index === 0 ? 'disabled' : ''}>Anterior</button>
                        <button class="btn btn-main" onclick="nextQ()" ${index === currentQuestions.length - 1 ? 'disabled' : ''}>Siguiente</button>
                    </div>
                </div>
            </div>
        `;

        // Actualizar UI del sidebar
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${index}`).classList.add('active');
    }

    function checkAnswer(key) {
        const state = userState[currentIndex];
        const q = currentQuestions[currentIndex];
        if (state.answered) return;

        state.answered = true;
        state.selected = key;
        state.correct = (key === q.a);

        const navBtn = document.getElementById(`nav-${currentIndex}`);
        navBtn.classList.add(state.correct ? 'correct' : 'wrong');

        showQuestion(currentIndex);
    }

    function toggleMark(index) {
        userState[index].marked = !userState[index].marked;
        const navBtn = document.getElementById(`nav-${index}`);
        if (userState[index].marked) navBtn.classList.add('marked');
        else navBtn.classList.remove('marked');
        showQuestion(index);
    }

    function nextQ() { if (currentIndex < currentQuestions.length - 1) showQuestion(currentIndex + 1); }
    function prevQ() { if (currentIndex > 0) showQuestion(currentIndex - 1); }

    function endQuiz() {
        document.getElementById('question-container').innerHTML = '';
        document.getElementById('results-screen').style.display = 'block';
        
        let correctas = 0;
        let total = currentQuestions.length;
        Object.values(userState).forEach(s => { if(s.correct) correctas++; });
        
        document.getElementById('score-text').innerHTML = `
            <h3>Resultado: ${correctas} / ${total}</h3>
            <p>Puntuación: ${((correctas/total)*10).toFixed(2)} / 10</p>
        `;
    }

    function resetQuiz(mode) {
        let nextSet = [];
        const oldState = {...userState};
        const oldQuestions = [...currentQuestions];

        if (mode === 'all') {
            location.reload(); // Forma más limpia de reiniciar todo
            return;
        } else if (mode === 'failed') {
            oldQuestions.forEach((q, i) => { if (oldState[i].answered && !oldState[i].correct) nextSet.push(q); });
        } else if (mode === 'marked') {
            oldQuestions.forEach((q, i) => { if (oldState[i].marked) nextSet.push(q); });
        } else if (mode === 'failed-marked') {
            oldQuestions.forEach((q, i) => { 
                if (oldState[i].marked || (oldState[i].answered && !oldState[i].correct)) nextSet.push(q); 
            });
        }

        if (nextSet.length === 0) {
            alert("No hay preguntas que cumplan con este criterio.");
            return;
        }

        currentQuestions = nextSet;
        initQuizState();
        renderSidebar();
        document.getElementById('results-screen').style.display = 'none';
        showQuestion(0);
    }
</script>

</body>
</html>

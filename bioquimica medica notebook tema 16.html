<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Hígado y Zonación Hepática</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Índice lateral */
        #sidebar {
            width: 80px;
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            overflow-y: auto;
            border-right: 2px solid #1a252f;
        }

        .index-item {
            width: 40px;
            height: 40px;
            margin: 5px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.3s;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .index-item:hover { background: var(--accent); }
        .index-item.correct { background: var(--success); }
        .index-item.incorrect { background: var(--error); }
        .index-item.marked { position: relative; }
        .index-item.marked::after {
            content: '🚩';
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 10px;
        }

        /* Contenedor principal */
        #main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: transparent;
        }

        .card-setup {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-align: center; }
        
        /* Pantalla de Inicio */
        #setup-screen { text-align: center; }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-finish { background: #95a5a6; padding: 15px 40px; font-size: 1.1em;}

        /* Preguntas */
        .question-block { 
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border-left: 6px solid var(--secondary);
        }
        
        .options { margin-top: 20px; }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #f0f8ff; }
        .option-btn.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; }
        .option-btn.incorrect { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e1f5fe;
            border-left: 5px solid var(--accent);
            display: none;
            border-radius: 0 8px 8px 0;
        }

        .marking-zone {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        /* Pantalla Final */
        #result-screen { display: none; text-align: center; }
        .summary-stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat-box { padding: 15px; border-radius: 8px; background: #f8f9fa; min-width: 100px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}

        /* Botón Scroll to Top */
        #scrollTopBtn {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 40px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 1000;
        }
        #scrollTopBtn:hover {
            background-color: var(--primary);
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <div id="sidebar" style="display: none;"></div>

    <div id="main-content">
        <div class="container">
            <div id="setup-screen" class="card-setup">
                <h1>🧬 Fisiología: Hígado y Zonación</h1>
                <p>Bienvenido al cuestionario unificado (Bloques I al VII).</p>
                <div style="margin: 30px 0;">
                    <p>Selecciona el modo de orden:</p>
                    <button class="btn" onclick="startQuiz(false)">Orden Preestablecido</button>
                    <button class="btn" onclick="startQuiz(true)">Orden Aleatorio</button>
                </div>
            </div>

            <div id="quiz-screen" style="display: none;">
                <div id="question-container"></div>
                <div style="text-align: center; margin-top: 40px; margin-bottom: 60px;">
                    <button class="btn btn-finish" onclick="confirmFinish()">Finalizar Cuestionario</button>
                </div>
            </div>

            <div id="result-screen" class="card-setup">
                <h1>Resultados Finales</h1>
                <div class="summary-stats">
                    <div class="stat-box"><h2 id="res-total">0</h2><p>Respondidas</p></div>
                    <div class="stat-box" style="color: var(--success)"><h2 id="res-correct">0</h2><p>Correctas</p></div>
                    <div class="stat-box" style="color: var(--error)"><h2 id="res-fail">0</h2><p>Falladas</p></div>
                </div>
                <h3>¿Qué quieres hacer ahora?</h3>
                <div id="repeat-options">
                    <button class="btn" onclick="repeatMode('all')">Repetir Todo</button>
                    <button class="btn" onclick="repeatMode('failed')">Repetir Falladas</button>
                    <button class="btn" onclick="repeatMode('marked')">Repetir Marcadas</button>
                    <button class="btn" onclick="repeatMode('mixed')">Repetir Falladas + Marcadas</button>
                </div>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" onclick="scrollToTop()" title="Subir al inicio">↑</button>

<script>
const rawData = [
    { n: 1, q: "Respecto a la irrigación aferente del hígado, ¿cuál es la proporción y el origen de la sangre que recibe el lobulillo hepático?", a: "c", ex: "La mayor parte de la sangre que llega al hígado es venosa (vena porta), cargada de nutrientes del tracto digestivo, mientras que solo un 25% es sangre arterial oxigenada.", opts: ["75% proviene de la arteria hepática (rica en oxígeno) y 25% de la vena porta.", "100% proviene de la vena porta, ya que el hígado no recibe irrigación arterial directa.", "75% proviene de la vena porta (procedente del intestino, bazo y páncreas) y 25% de la arteria hepática (bombeada desde el corazón).", "50% de la vena hepática y 50% de la arteria hepática."] },
    { n: 2, q: "En un corte histológico normal del tejido hepático, ¿qué tipo celular representa aproximadamente el 80% del total de las células y se caracteriza por ser poliédrico y poliploide?", a: "c", ex: "Los hepatocitos son las células parenquimatosas principales y conforman la inmensa mayoría de la masa celular del hígado.", opts: ["Células de Kupffer.", "Células endoteliales.", "Hepatocitos.", "Células estrelladas (de Ito)."] },
    { n: 3, q: "Un paciente presenta un proceso infeccioso en la sangre que llega al hígado. ¿Qué células residentes en el hígado son las encargadas principales de la fagocitosis de patógenos y eritrocitos envejecidos?", a: "b", ex: "Las células de Kupffer son los macrófagos residentes del hígado.", opts: ["Colangiocitos.", "Células de Kupffer.", "Células hepáticas estrelladas.", "Hepatocitos pericentrales."] },
    { n: 4, q: "Durante el desarrollo de una cirrosis hepática, se produce un proceso patológico de fibrosis severa. ¿Qué tipo celular del hígado está directamente involucrado en este proceso patológico, además de su función fisiológica en el metabolismo de la vitamina A?", a: "b", ex: "Las células estrelladas almacenan lípidos y vitamina A, pero ante un daño hepático se activan y son las principales responsables de la fibrosis.", opts: ["Células de Kupffer.", "Células hepáticas estrelladas (células de Ito).", "Colangiocitos.", "Células endoteliales."] },
    { n: 5, q: "La \"Triada portal\" (de Glisson), ubicada en los vértices del lobulillo hepático clásico, está compuesta por las siguientes estructuras:", a: "b", ex: "La sangre entra por las \"esquinas\" del lobulillo a través de las ramas de la vena porta y la arteria hepática, fluyendo hacia la vena central.", opts: ["Vena central, arteria hepática y canalículo biliar.", "Vena porta, arteria hepática y conducto biliar.", "Vena hepática, vena porta y capilar linfático.", "Vena cava inferior, arteria hepática y conducto biliar."] },
    { n: 6, q: "(¡Pregunta de concepto clave!) La profesora insiste en cómo interpretar la \"Zonación Hepática\". ¿Cuál de las siguientes afirmaciones define MEJOR este concepto fisiológico?", a: "b", ex: "La profesora repite insistentemente que \"no es sí o no, es un gradiente\", los hepatocitos tienen flexibilidad pero predominan en la función que su microambiente favorece.", opts: ["Los hepatocitos periportales realizan ciertas rutas metabólicas, y los pericentrales tienen prohibido genéticamente realizarlas.", "Se refiere a un gradiente metabólico donde los hepatocitos de una zona son \"más eficientes\" o presentan una \"predominancia\" en ciertas vías metabólicas respecto a otros, dependiendo de su microambiente.", "La zonación divide al hígado físicamente con tabiques de colágeno impermeables.", "La zona pericentral recibe sangre directamente de la arteria aorta, marcando la diferencia."] },
    { n: 7, q: "Teniendo en cuenta el flujo sanguíneo en el lobulillo hepático, ¿qué perfil de oxígeno y nutrientes define a la Zona Periportal?", a: "c", ex: "Al ser la zona de \"entrada\" (vienen de la vena porta y arteria hepática), la sangre llega cargada de nutrientes recién absorbidos y de oxígeno.", opts: ["Bajo oxígeno y bajos nutrientes.", "Alto oxígeno y bajos nutrientes.", "Alto oxígeno y altos nutrientes.", "Bajo oxígeno y altos nutrientes."] },
    { n: 8, q: "En base al gradiente de oxígeno, ¿en qué zona del lobulillo hepático se favorece primariamente el metabolismo energético oxidativo (ciclo de Krebs, cadena respiratoria, beta-oxidación)?", a: "b", ex: "Debido a la mayor disponibilidad de oxígeno en la zona periportal, se favorecen las rutas metabólicas aeróbicas y oxidativas.", opts: ["Zona Pericentral.", "Zona Periportal.", "En el conducto biliar.", "En la vena central exclusivamente."] },
    { n: 9, q: "Al observar el metabolismo de los hidratos de carbono, si analizamos los hepatocitos de la zona Pericentral, ¿qué vía metabólica encontraremos con mayor actividad predominante?", a: "b", ex: "La zona pericentral, al tener menor tensión de oxígeno, favorece vías como la glucólisis y la lipogénesis, siendo complementaria a la periportal (que hace gluconeogénesis).", opts: ["Gluconeogénesis.", "Glucólisis.", "Ciclo de la Urea.", "Beta-oxidación."] },
    { n: 10, q: "Si aislamos hepatocitos de la zona Periportal y medimos su dotación enzimática, ¿cuál de las siguientes enzimas esperaríamos encontrar en MAYOR concentración/actividad en comparación con la zona pericentral?", a: "b", ex: "La Fructosa 1,6-bisfosfatasa es una enzima clave de la gluconeogénesis, ruta que predomina en la zona periportal.", opts: ["Piruvato quinasa.", "Fructosa 1,6-bisfosfatasa.", "Glucoquinasa.", "Glutamina sintasa."] },
    { n: 11, q: "(¡Pista de clase!) Tras una comida rica en carbohidratos, el páncreas secreta insulina. ¿Qué hepatocitos serán los PRIMEROS en detectar esta señal hormonal y, por tanto, serán más sensibles y eficientes en su respuesta?", a: "c", ex: "La profesora recalcó que la sangre del páncreas entra primero por la tríada portal, por lo que los hepatocitos periportales ven primero la señal y son \"los especialistas\" en responder a insulina y glucagón.", opts: ["Los hepatocitos pericentrales.", "Las células de Kupffer.", "Los hepatocitos de la zona periportal.", "Los colangiocitos."] },
    { n: 12, q: "En un experimento in vitro, se exponen hepatocitos periportales y pericentrales a concentraciones crecientes de Glucagón. ¿Qué resultado es congruente con la zonación hepática?", a: "c", ex: "Al ser más sensibles a las señales hormonales y tener el microambiente oxidativo, la zona periportal tiene una curva de respuesta gluconeogénica y cetogénica mucho mayor.", opts: ["Ambas poblaciones realizan gluconeogénesis con la misma eficacia.", "Solo los pericentrales responden al glucagón.", "Los periportales aumentan drásticamente su tasa de gluconeogénesis y cetogénesis en comparación con los pericentrales.", "El glucagón estimula la glucólisis en los periportales."] },
    { n: 13, q: "El metabolismo lipídico también se encuentra zonado. ¿Qué afirmación asocia correctamente la zona con su vía lipídica predominante?", a: "c", ex: "La zona periportal (abundante en O2) \"quema\" grasas (beta-oxidación) y produce cuerpos cetónicos, mientras que la pericentral sintetiza lípidos (lipogénesis).", opts: ["Zona Pericentral - Beta-oxidación.", "Zona Periportal - Lipogénesis.", "Zona Periportal - Beta-oxidación y Cetogénesis.", "Zona Pericentral - Síntesis de Colesterol."] },
    { n: 14, q: "Según la transcripción de la clase, respecto al metabolismo del colesterol y los ácidos biliares, ¿cómo se complementan las zonas del lobulillo?", a: "b", ex: "Explicado explícitamente por la profesora: \"En la periportal hay un ambiente que favorece la biosíntesis... Si viajo a la pericentral lo que tengo es la secreción o eliminación produciendo sales biliares\".", opts: ["La periportal destruye el colesterol y la pericentral lo fabrica.", "La periportal favorece la biosíntesis de colesterol, mientras que en la pericentral se favorece su secreción/eliminación produciendo sales biliares.", "Ambas zonas solo realizan síntesis de colesterol, sin eliminarlo.", "La pericentral envía el colesterol a la arteria aorta directamente."] },
    { n: 15, q: "¿En qué zona del lobulillo hepático predomina la actividad de biotransformación y detoxificación de fármacos o xenobióticos?", a: "b", ex: "Según el esquema de gradientes metabólicos, el metabolismo de xenobióticos predomina en la zona pericentral.", opts: ["Zona Periportal.", "Zona Pericentral.", "Conducto biliar.", "Vena porta."] },
    { n: 16, q: "La vía de señalización Wnt/β-catenina es un regulador maestro de la expresión génica zonal en el hígado. ¿Dónde es mayor su actividad?", a: "c", ex: "Las gráficas muestran claramente que la actividad Wnt/β-catenina es opuesta al gradiente de oxígeno, siendo máxima en la zona pericentral.", opts: ["En el conducto biliar exclusivamente.", "En la zona periportal, coincidiendo con el pico de oxígeno.", "En la zona pericentral.", "Es uniforme en todo el lobulillo."] },
    { n: 17, q: "(¡Pregunta de examen segura!) El metabolismo del nitrógeno tóxico (amonio) está espacialmente dividido para asegurar su total eliminación. ¿Qué ocurre en la Zona Periportal?", a: "b", ex: "En la zona periportal se encuentra el ciclo de la urea y la glutaminasa (que rompe la glutamina para meter ese nitrógeno al ciclo de la urea).", opts: ["El amonio se convierte en glutamina mediante la Glutamina Sintasa.", "Se produce la hidrólisis de glutamina (por la glutaminasa) liberando amonio que entra directamente al Ciclo de la Urea.", "Se realiza la glucólisis anaerobia.", "El amonio se exporta directamente a la vena central sin modificarse."] },
    { n: 18, q: "Como mecanismo de \"barrido final\" de seguridad para el amonio que haya escapado del ciclo de la urea, ¿qué ruta predomina en la Zona Pericentral?", a: "c", ex: "La zona pericentral actúa como \"esponja\" final. Usa el amonio residual para fabricar glutamina, la cual es segura de liberar a la sangre.", opts: ["Síntesis de urea.", "Excreción de amonio a la bilis.", "Síntesis de glutamina a partir de amonio y glutamato, catalizada por la Glutamina Sintasa.", "Degradación de proteínas musculares."] },
    { n: 19, q: "(¡Caso Clínico/Histológico de clase!) Un patólogo tiñe una biopsia hepática humana buscando la enzima Argininosuccinato Sintetasa 1 (ASS1), clave en el ciclo de la urea. Al ver la muestra, nota que ASS1 solo aparece en los bordes del lobulillo y no cerca de la vena central. ¿Cuál es la interpretación correcta según lo explicado en clase?", a: "b", ex: "La profesora dedicó gran parte de la clase a este ejemplo histológico. Si buscas ciclo de la urea en la zona pericentral no lo hallarás, y es normal, porque se expresa en la periportal.", opts: ["El paciente sufre un fallo grave del ciclo de la urea.", "Es un hallazgo completamente normal debido a la zonación hepática; ASS1 se expresa predominantemente en los hepatocitos periportales.", "Hay necrosis perivenosa severa.", "Hubo un error técnico en la tinción, ya que ASS1 debe ser uniforme en todo el hígado."] },
    { n: 20, q: "En la imagen de fluorescencia mostrada en clase, se utilizó la tinción de \"Glutamina Sintasa (GS)\" para identificar anatómicamente una región del lobulillo. ¿Qué zona queda teñida en azul marcando la presencia de esta enzima?", a: "c", ex: "La glutamina sintasa se expresa selectivamente en la zona pericentral como último paso del metabolismo del amonio.", opts: ["Zona periportal.", "Conducto biliar.", "Zona pericentral (alrededor de la vena central).", "Triada portal."] },
    { n: 21, q: "Si hay un daño masivo que destruye específicamente los hepatocitos de la zona PERIPORTAL, ¿qué parámetro metabólico esperaríamos ver peligrosamente aumentado en la sangre debido al fallo de la función principal de esta zona?", a: "b", ex: "Al destruirse la zona periportal, se pierde la maquinaria principal del Ciclo de la Urea, por lo que el amonio tóxico no se procesa y se acumula.", opts: ["Glucosa.", "Amonio.", "Urea.", "Cuerpos cetónicos."] },
    { n: 22, q: "Si un paciente sufre una enfermedad hepática severa que compromete globalmente la función del parénquima, ¿qué perfil analítico esperarías encontrar respecto a la albúmina y la glucosa?", a: "b", ex: "El hígado sintetiza casi toda la albúmina plasmática y es el encargado de mantener la glucemia (gluconeogénesis). Si falla, ambos niveles bajan.", opts: ["Hiperalbuminemia e Hiperglucemia.", "Hipoalbuminemia e Hipoglucemia.", "Hipoalbuminemia e Hiperglucemia.", "Albúmina normal e Hipoglucemia."] },
    { n: 23, q: "En la disfunción hepática grave, se observa un desequilibrio en el metabolismo del nitrógeno plasmático. ¿Cuál es el patrón típico?", a: "b", ex: "Al fallar el ciclo de la urea, el hígado no puede convertir el amonio tóxico en urea segura. Por tanto, sube el amonio y baja la urea en sangre.", opts: ["Disminución de amonio y aumento de urea.", "Aumento de amonio (↑) y disminución de urea (↓).", "Aumento de ambos parámetros.", "Disminución de ambos parámetros."] },
    { n: 24, q: "¿Por qué la Albúmina es considerada un excelente marcador de la función hepática en un paciente con cirrosis?", a: "c", ex: "La profesora explica que, ante la muerte celular por cirrosis, el hígado pierde la capacidad de producir esta proteína exclusiva, reflejándose en la analítica.", opts: ["Porque se sintetiza también en el riñón.", "Porque se acumula en la piel causando ictericia.", "Porque es sintetizada exclusivamente en el hígado; su baja concentración plasmática a lo largo del tiempo indica pérdida de función hepática (muerte celular).", "Porque es el principal transportador de oxígeno."] },
    { n: 25, q: "Paciente acude a urgencias con signos clínicos de disfunción neurológica (letargo, confusión y riesgo de coma hepático). ¿Qué alteración metabólica hepática explica principalmente este cuadro clínico según la clase?", a: "b", ex: "La toxicidad neurológica (encefalopatía hepática) viene dada fundamentalmente por el amonio tóxico no procesado y la falta de glucosa para el cerebro.", opts: ["Exceso en la producción de bilis.", "Incapacidad de detoxificar el amonio (acumulándose en el SNC) y alteración en el mantenimiento de la glucosa (hipoglucemia).", "Exceso de síntesis de albúmina.", "Hiperactividad del ciclo de Krebs."] },
    { n: 26, q: "Un paciente presenta problemas en la coagulación, edema (hinchazón abdominal o ascitis) y alteraciones endocrinas (como ginecomastia). ¿A qué se deben las alteraciones endocrinas según lo expuesto en clase?", a: "b", ex: "El hígado metaboliza el colesterol necesario para las hormonas esteroideas. Si falla, hay disfunción hormonal.", opts: ["A una falla renal primaria.", "Al compromiso de la síntesis y metabolismo de lípidos y colesterol en el hígado, base estructural para producir hormonas esteroideas.", "Al exceso de vitamina A liberada por las células de Ito.", "A la sobreproducción de albúmina."] },
    { n: 27, q: "¿Qué consecuencia tiene el fallo hepático sobre la farmacocinética de medicamentos (ej. paracetamol)?", a: "b", ex: "El hígado (especialmente la zona pericentral) biotransforma xenobióticos. Si falla, la vida media del fármaco se altera, pudiendo acumularse toxicidad.", opts: ["Los medicamentos no se absorben en el intestino.", "Se producen cambios impredecibles en la vida media (T1/2) de los fármacos debido al fallo en la detoxificación/biotransformación (usualmente alargando la vida media).", "Los medicamentos se degradan inmediatamente al entrar en contacto con la sangre.", "No hay ninguna alteración farmacocinética."] },
    { n: 28, q: "La Bilirrubina es un producto de desecho insoluble en agua. ¿De qué molécula biológica deriva fisiológicamente?", a: "c", ex: "Tras romperse los glóbulos rojos, el grupo hemo se degrada formando finalmente bilirrubina.", opts: ["Del catabolismo del colesterol.", "De la degradación de la albúmina.", "Del catabolismo del grupo hemo (procedente principalmente de los eritrocitos envejecidos).", "Del exceso de cuerpos cetónicos."] },
    { n: 29, q: "En estado normal (fisiológico), ¿cómo viaja la bilirrubina \"no conjugada\" por el plasma sanguíneo para llegar al hígado sin precipitar?", a: "b", ex: "Al ser insoluble, requiere de la albúmina como transportador plasmático hasta el hígado.", opts: ["Libre y disuelta en el agua del plasma.", "Unida a la albúmina.", "Empaquetada en quilomicrones.", "Unida covalentemente a los glóbulos blancos."] },

let questions = [];
let userAnswers = {}; 

function startQuiz(isRandom) {
    questions = [...rawData].map(q => {
        const correctText = q.opts[q.a.charCodeAt(0) - 97];
        const shuffledOpts = [...q.opts].sort(() => Math.random() - 0.5);
        const newCorrectLetter = String.fromCharCode(97 + shuffledOpts.indexOf(correctText));
        return { ...q, opts: shuffledOpts, a: newCorrectLetter };
    });

    if (isRandom) questions.sort(() => Math.random() - 0.5);

    renderQuiz();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('sidebar').style.display = 'flex';
}

function renderQuiz() {
    const container = document.getElementById('question-container');
    const sidebar = document.getElementById('sidebar');
    container.innerHTML = '';
    sidebar.innerHTML = '';

    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = `question-block qb-${i}`;
        div.innerHTML = `
            <h2>Pregunta ${i + 1}</h2>
            <p>${q.q}</p>
            <div class="options">
                ${q.opts.map((opt, idx) => `
                    <button class="option-btn" onclick="checkAnswer(${i}, '${String.fromCharCode(97 + idx)}', this)">
                        ${String.fromCharCode(97 + idx)}) ${opt}
                    </button>
                `).join('')}
            </div>
            <div class="explanation" id="ex-${i}">${q.ex}</div>
            <div class="marking-zone">
                <input type="checkbox" id="mark-${i}" onchange="toggleMark(${i})">
                <label for="mark-${i}">Marcar pregunta para revisión 🚩</label>
            </div>
        `;
        container.appendChild(div);

        const item = document.createElement('div');
        item.className = `index-item ii-${i}`;
        item.innerText = i + 1;
        item.onclick = () => {
            document.querySelector(`.qb-${i}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        sidebar.appendChild(item);
    });
    
    document.getElementById('main-content').scrollTop = 0;
}

function checkAnswer(qIdx, letter, btn) {
    if (userAnswers[qIdx]) return; 

    const isCorrect = letter === questions[qIdx].a;
    userAnswers[qIdx] = { selected: letter, correct: isCorrect, marked: document.getElementById(`mark-${qIdx}`).checked };

    const buttons = document.querySelectorAll(`.qb-${qIdx} .option-btn`);
    buttons.forEach(b => {
        b.disabled = true;
        const bLetter = b.innerText.split(')')[0].trim();
        if (bLetter === questions[qIdx].a) b.classList.add('correct');
        else if (bLetter === letter) b.classList.add('incorrect');
    });

    const sideItem = document.querySelector(`.ii-${qIdx}`);
    sideItem.classList.add(isCorrect ? 'correct' : 'incorrect');

    document.getElementById(`ex-${qIdx}`).style.display = 'block';
}

function toggleMark(index) {
    const sideItem = document.querySelector(`.ii-${index}`);
    if (document.getElementById(`mark-${index}`).checked) {
        sideItem.classList.add('marked');
    } else {
        sideItem.classList.remove('marked');
    }
}

function confirmFinish() {
    if (confirm("¿Estás seguro de que quieres finalizar el cuestionario?")) {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('main-content').scrollTop = 0;

    let correct = 0, failed = 0;
    Object.values(userAnswers).forEach(v => {
        if (v.correct) correct++;
        else failed++;
    });

    document.getElementById('res-total').innerText = Object.keys(userAnswers).length;
    document.getElementById('res-correct').innerText = correct;
    document.getElementById('res-fail').innerText = failed;
}

function repeatMode(mode) {
    let subSet = [];
    if (mode === 'all') {
        subSet = [...rawData];
    } else if (mode === 'failed') {
        subSet = questions.filter((_, i) => userAnswers[i] && !userAnswers[i].correct);
    } else if (mode === 'marked') {
        subSet = questions.filter((_, i) => document.getElementById(`mark-${i}`).checked);
    } else if (mode === 'mixed') {
        subSet = questions.filter((_, i) => 
            (userAnswers[i] && !userAnswers[i].correct) || document.getElementById(`mark-${i}`).checked
        );
    }

    if (subSet.length === 0) {
        alert("No hay preguntas en esta categoría.");
        return;
    }

    userAnswers = {};
    questions = subSet;
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('sidebar').style.display = 'flex';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuiz();
}

/* Lógica del botón Scroll to Top */
const mainContent = document.getElementById('main-content');
const scrollTopBtn = document.getElementById('scrollTopBtn');

mainContent.addEventListener('scroll', () => {
    if (mainContent.scrollTop > 300) {
        scrollTopBtn.style.display = 'block';
    } else {
        scrollTopBtn.style.display = 'none';
    }
});

function scrollToTop() {
    mainContent.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}
</script>

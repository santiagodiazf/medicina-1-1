    <script>
        // Datos de las preguntas (Bloque III)
        const rawQuestions = [
            {
                "text": "1. Una célula diferenciada típica, como un cardiomiocito, mantiene el mismo genoma que un hepatocito. La razón molecular de la diferencia funcional entre ambos radica en:",

                    { "text": "La variación en la composición del proteoma, siendo este menos representativo que el transcriptoma", "correct": false },
                    { "text": "Cambios controlados en la expresión génica, ya que una célula diferenciada típica expresa alrededor de la mitad de los genes de su repertorio total", "correct": true }
                ]
            },
            {
                "text": "2. En el contexto del desarrollo de mamíferos, el estado de 'totipotencia' se aplica a las células que:",
                "options": [
                    { "text": "Pueden diferenciarse en células de cualquiera de las tres capas germinales (pluripotencia)", "correct": false },
                    { "text": "Pueden diferenciarse en múltiples tipos celulares del mismo linaje (multipotencia)", "correct": false },

                    { "text": "Tienen la capacidad de generar todas las células diferenciadas en un organismo, incluidos los tipos de células embrionarias y extraembrionarias, desde el cigoto hasta la etapa de mórula", "correct": true }
                ]
            },
            {
                "text": "3. Las células madre embrionarias (ESC) son el ejemplo molecular de 'pluripotencia'. Esto implica que:",

                    { "text": "Solo pueden generar células precursoras miogénicas", "correct": false },
                    { "text": "Son capaces de producir tejidos extraembrionarios (totipotencia)", "correct": false },
                    { "text": "Tienen la capacidad de diferenciarse en células de cualquiera de las tres capas germinales: endodermo, ectodermo y mesodermo", "correct": true },

                ]
            },
            {
                "text": "4. El concepto de 'memoria celular' se basa en la herencia epigenética. Molecularmente, ¿qué mecanismos garantizan el mantenimiento de los patrones de expresión génica ya establecidos en una célula?",

                    { "text": "La replicación semiconservadora del ADN y la recombinación homóloga", "correct": false },
                    { "text": "El silenciamiento de transposones por piRNA y la acción de la enzima Dicer", "correct": false },
                    { "text": "La modificación del ADN (ejemplo, metilación) y la modificación de las histonas", "correct": true },
                    { "text": "La acción de los lncRNAs como esponjas de microARNs", "correct": false }
                ]
            },
            {
                "text": "5. ¿Cuál es el mecanismo molecular que emplean los potenciadores para favorecer la transcripción de un gen en eucariontes?",
                "options": [
                    { "text": "Silencian el transposón mediante la metilación del ADN regulador", "correct": false },
                    { "text": "Inhiben la unión del represor Lac al operón", "correct": false },
                    { "text": "Reclutan histona acetiltransferasa, lo que favorece la acetilación de las histonas y atrae a la maquinaria de transcripción", "correct": true },
                    { "text": "Dirigen complejos de proteínas a regiones específicas del ADN mediante su función de guía", "correct": false }
                ]
            },
            {
                "text": "6. El control de la expresión génica en eucariontes se basa en la regulación combinatoria. Esto significa que la expresión de un gen es determinada por:",
                "options": [
                    { "text": "La acción de la ARN polimerasa dependiente de ARN (como en el SARS-CoV-2)", "correct": false },
                    { "text": "La activación o represión de un único factor de transcripción", "correct": false },
                    { "text": "Grupos de reguladores de la transcripción que actúan de manera coordinada", "correct": true },
                    { "text": "La integración de un retrovirus en el genoma huésped", "correct": false }
                ]
            },
            {
                "text": "7. Molecularmente, ¿qué evento clave debe ocurrir para que las proteínas implicadas en la expresión génica tengan acceso a secuencias de ADN previamente empaquetadas en cromatina?",
                "options": [
                    { "text": "La degradación de los factores generales de transcripción por el proteasoma", "correct": false },
                    { "text": "La acción de ribozimas para catalizar el enlace peptídico", "correct": false },
                    { "text": "La relajación de la cromatina a un estado más descondensado, promovido por modificaciones epigenéticas", "correct": true },

                ]
            },
            {
                "text": "8. La reprogramación celular permite convertir directamente un tipo celular en otro, como células hepáticas en neuronas. Este proceso se consigue molecularmente mediante la introducción de:",

                    { "text": "MicroARNs que se unen al complejo RISC", "correct": false },
                    { "text": "ARN de interferencia para eliminar ARN 'extraño'", "correct": false },
                    { "text": "Reguladores de la transcripción", "correct": true },
                    { "text": "Editores primarios que corrigen errores de una sola letra", "correct": false }
                ]
            },
            {
                "text": "9. El operón lac en bacterias es un ejemplo de doble regulación. ¿Cuál es el requisito molecular para que el operón se active a su nivel máximo?",

                    { "text": "Presencia de glucosa y lactosa (Represor inactivo, Activador inactivo)", "correct": false },
                    { "text": "Ausencia de lactosa (Represor activo)", "correct": false },
                    { "text": "Ausencia de glucosa (Activador CAP unido) y presencia de lactosa (Represor Lac inactivo)", "correct": true },

            },
            {
                "text": "10. El control postranscripcional del ARN incluye la regulación de su traducción y estabilidad. ¿Cuál es la herramienta molecular que puede controlar la traducción al unirse a secuencias complementarias del ARNm?",

                    { "text": "Las histonas (control de la cromatina)", "correct": false },

                    { "text": "Las proteínas víricas codificadas por el SARS-CoV-2", "correct": false }

            {
                "text": "11. El microARN (miRNA) maduro se ensambla en el complejo RISC. ¿Cuál es la función molecular de este complejo en el control de la expresión génica?",

            {
                "text": "12. El RNA de interferencia (RNAi) se genera a partir de precursores de ARN bicatenario (dsRNA), a menudo de origen viral. ¿Qué enzima clave realiza el procesamiento de estos dsRNA largos en fragmentos más pequeños de doble cadena (siRNA)?",

                    { "text": "Histona acetiltransferasa", "correct": false },
                    { "text": "Guanylil transferasa", "correct": false },
                    { "text": "La enzima Dicer", "correct": true },
                    { "text": "La ARN polimerasa dependiente de ARN", "correct": false }
                ]
            },
            {
                "text": "13. El lncRNA Xist es un ejemplo crucial de cómo los lncRNAs influyen en la regulación génica a través de:",
                "options": [
                    { "text": "El silenciamiento de transposones en células germinales (piRNA)", "correct": false },
                    { "text": "La corrección de errores de una sola letra en el ADN (editores de bases)", "correct": false },
                    { "text": "La impronta génica y la estructura nuclear (inactivación del cromosoma X)", "correct": true },
                    { "text": "La reparación de roturas bicatenarias del ADN (recombinación homóloga)", "correct": false }
                ]
            },
            {
                "text": "14. Los lncRNAs pueden actuar como andamios moleculares. ¿Cuál es la implicación ultraestructural de esta función?",

                    { "text": "Dirigen complejos proteicos a regiones específicas del ADN", "correct": false },
                    { "text": "Se unen a microARNs para secuestrarlos ('Esponjas')", "correct": false },
                    { "text": "Unen múltiples proteínas (como las que modifican la cromatina) para organizar el espacio nuclear y la arquitectura genómica", "correct": true },

                ]
            },
            {
                "text": "15. La evolución de genes con nuevas funciones, como la familia de genes de globina, se postula que es posible gracias a un mecanismo molecular que permite la expansión del genoma. ¿Cuál es este mecanismo?",

                    { "text": "Mutaciones puntiformes neutras", "correct": false },
                    { "text": "Silenciamiento por el sistema CRISPR", "correct": false },
                    { "text": "Duplicación y divergencia génica, a menudo mediada por entrecruzamiento desigual", "correct": true },
                    { "text": "La regulación postranscripcional por piRNA", "correct": false }
                ]
            },
            {
                "text": "16. La variación genética en humanos, que condujo a la tolerancia a la lactosa en la edad adulta, es un ejemplo de mutación puntiforme que ocurre en:",

                    { "text": "La secuencia codificante de la enzima lactasa (exón)", "correct": false },

                    { "text": "El ADN regulador, lo que mantiene la expresión del gen de la lactasa", "correct": true }

            {
                "text": "17. Molecularmente, el origen de la mayoría de las proteínas humanas se atribuye a un mecanismo evolutivo de manipulación de las unidades codificantes. ¿Cuál es este proceso?",

                    { "text": "Duplicaciones de genomas completos", "correct": false },
                    { "text": "El control de la traducción por miRNA", "correct": false },
                    { "text": "Reordenamiento y duplicación de exones", "correct": true },
                    { "text": "La activación del operón lac en condiciones anaeróbicas", "correct": false }

            {
                "text": "18. En el contexto de la regulación del genoma, el silenciamiento de transposones (elementos móviles del ADN) en células germinales es una función específica llevada a cabo por:",

                    { "text": "miRNA (regulación expresión)", "correct": false },

                    { "text": "piRNA (Implícito por el contexto de ncRNA reguladores y genoma)", "correct": true }

            {
                "text": "19. Los retrovirus, como el VIH-1, se caracterizan molecularmente por:",

                    { "text": "La retrotranscripción de su genoma vírico y su posterior integración en el genoma huésped", "correct": true },

            {

                "options": [
                    { "text": "El conjunto total de proteínas expresadas por una célula en un momento dado", "correct": false },
                    { "text": "La secuencia completa de ADN de un organismo", "correct": false },
                    { "text": "El conjunto de moléculas de ARN (incluyendo ARNm y ncRNA) transcritas por una célula", "correct": true },
                    { "text": "La variación en la composición del genoma humano", "correct": false }
                ]
            },
            {
                "text": "50. La duplicación de genomas completos es un mecanismo de generación de variación genética que resulta en:",
                "options": [
                    { "text": "Mutaciones puntiformes", "correct": false },
                    { "text": "Una redundancia en la información genética y una oportunidad para la divergencia génica", "correct": true },
                    { "text": "La eliminación de ARNm 'extraño'", "correct": false },
                    { "text": "La unipotencia de las células precursoras", "correct": false }
                ]
            }
        ];

        // Añadimos propiedades de estado a las preguntas
        // userMarked: si el usuario marcó la pregunta para revisar
        // userFailed: si el usuario falló la pregunta en algún momento
        // userAnswered: si la pregunta ha sido respondida en la ronda actual
        const questions = rawQuestions.map(q => ({
            ...q,
            userMarked: false,
            userFailed: false,
            userAnswered: false,
            shuffledOptions: null 
        }));

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Renderiza el quiz con la lista de preguntas proporcionada
        function renderQuiz(questionsToRender) {
            const quizContainer = document.getElementById('quiz');
            quizContainer.innerHTML = '';
            
            // Ocultar resultados y mostrar botón finalizar
            document.getElementById('results-panel').style.display = 'none';
            document.getElementById('finish-container').style.display = 'block';

            if(questionsToRender.length === 0) {
                quizContainer.innerHTML = '<p style="text-align:center; padding:20px; font-style:italic; color:#666;">No hay preguntas que coincidan con este criterio.</p>';
                document.getElementById('finish-container').style.display = 'none';
                document.getElementById('results-panel').style.display = 'block';
                return;
            }

            questionsToRender.forEach((q) => {
                const questionBlock = document.createElement('div');
                questionBlock.className = 'question-block';

                // --- Pestaña "Marcar" ---
                const markContainer = document.createElement('label');
                markContainer.className = 'mark-container';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = q.userMarked;
                checkbox.onchange = function() {
                    q.userMarked = this.checked;
                };
                markContainer.appendChild(checkbox);
                markContainer.appendChild(document.createTextNode(" Marcar"));
                questionBlock.appendChild(markContainer);

                // --- Título ---
                const title = document.createElement('div');
                title.className = 'question-title';
                title.innerText = q.text;
                questionBlock.appendChild(title);

                // --- Opciones ---
                if (!q.shuffledOptions) {
                    q.shuffledOptions = [...q.options];
                    shuffleArray(q.shuffledOptions);
                }

                const optionsList = document.createElement('ul');
                optionsList.className = 'options-list';

                q.shuffledOptions.forEach(opt => {
                    const li = document.createElement('li');
                    li.className = 'option-item';
                    
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    
                    btn.onclick = function() {
                        q.userAnswered = true;

                        // Deshabilitar botones
                        const allBtns = optionsList.querySelectorAll('.option-btn');
                        allBtns.forEach(b => b.classList.add('disabled'));

                        if (opt.correct) {
                            btn.classList.add('correct');
                        } else {
                            btn.classList.add('incorrect');
                            q.userFailed = true; // Marcamos como fallada para futuras revisiones

                            // Mostrar la correcta
                            allBtns.forEach(b => {
                                const originalOpt = q.options.find(o => o.correct);
                                if (b.innerText === originalOpt.text) {
                                    b.classList.add('correct');
                                }
                            });
                        }
                    };

                    li.appendChild(btn);
                    optionsList.appendChild(li);
                });

                questionBlock.appendChild(optionsList);
                quizContainer.appendChild(questionBlock);
            });
        }

        // Renderizado inicial (todas las preguntas)
        renderQuiz(questions);

        // Lógica de Finalización
        const urlParams = new URLSearchParams(window.location.search);
        const testID = urlParams.get('id');

        document.getElementById('btn-finish').onclick = function() {
            // Calcular nota basada en las preguntas visibles actualmente
            const currentBlocks = document.querySelectorAll('.question-block');
            let totalCurrent = currentBlocks.length;
            let currentCorrect = 0;

            currentBlocks.forEach(block => {
                // Si está respondida (tiene botones disabled)
                if (block.querySelector('.disabled')) {
                    // Si no hay botón incorrecto, es un acierto
                    const hasIncorrect = block.querySelector('.incorrect');
                    if (!hasIncorrect) {
                        currentCorrect++;
                    }
                }
            });

            const notaFinal = totalCurrent > 0 ? Math.round((currentCorrect / totalCurrent) * 100) : 0;

            // Mostrar Panel
            document.getElementById('finish-container').style.display = 'none';
            const resultsPanel = document.getElementById('results-panel');
            resultsPanel.style.display = 'block';
            
            document.getElementById('score-text').innerHTML = 
                `Has acertado <b>${currentCorrect}</b> de <b>${totalCurrent}</b> preguntas visibles.<br>Nota de este intento: <b>${notaFinal}%</b>`;
            
            // Scroll hacia resultados
            resultsPanel.scrollIntoView({behavior: "smooth"});

            // Guardar nota solo si es el test completo original
            if (testID && totalCurrent === questions.length) {
                let intentos = parseInt(localStorage.getItem(`intentos_${testID}`) || 0);
                localStorage.setItem(`intentos_${testID}`, intentos + 1);

                let notaAnterior = localStorage.getItem(`nota_${testID}`);
                if (!notaAnterior || notaFinal > parseInt(notaAnterior)) {
                    localStorage.setItem(`nota_${testID}`, notaFinal);
                }
            }
        };

        // --- Lógica de Repetición (Filtros) ---
        function retryQuiz(mode) {
            let filteredQuestions = [];

            if (mode === 'all') {
                // Reiniciar todo
                questions.forEach(q => {
                    q.userFailed = false;
                    q.userMarked = false; // Desmarcar al reiniciar completo
                    q.userAnswered = false;
                    q.shuffledOptions = null; // Re-mezclar
                });
                filteredQuestions = questions;
            } 
            else if (mode === 'failed') {
                filteredQuestions = questions.filter(q => q.userFailed);
                // Resetear estado de respuesta para poder reintentar
                filteredQuestions.forEach(q => {
                    q.userAnswered = false; 
                    q.shuffledOptions = null;
                });
            } 
            else if (mode === 'marked') {
                filteredQuestions = questions.filter(q => q.userMarked);
                filteredQuestions.forEach(q => {
                    q.userAnswered = false;
                    q.shuffledOptions = null;
                });
            }
            else if (mode === 'mixed') {
                // Falladas O Marcadas
                filteredQuestions = questions.filter(q => q.userFailed || q.userMarked);
                filteredQuestions.forEach(q => {
                    q.userAnswered = false;
                    q.shuffledOptions = null;
                });
            }

            renderQuiz(filteredQuestions);

            // Actualizar título
            const modeTitles = {
                'all': 'Test Completo',
                'failed': 'Repaso de Fallos',
                'marked': 'Repaso de Marcadas',
                'mixed': 'Repaso (Falladas + Marcadas)'
            };
            document.getElementById('quiz-title').innerText = `Modo: ${modeTitles[mode]}`;
            
            // Subir al inicio
            window.scrollTo(0,0);
        }
    </script>

        { q: "Tras un desayuno abundante, todas las afirmaciones abajo indicadas son esperables, excepto una de ellas:", opts: ["Actividad incrementada de la acetil CoA carboxilasa (síntesis de ácidos grasos)", "Aumento de la glucogenolisis", "Actividad reducida de la piruvato carboxilasa", "Actividad reducida de la fosfoenol piruvato carboxiquinasa"], a: "Aumento de la glucogenolisis", exp: "La glucogenólisis se inhibe." },
        { q: "Identifica la afirmación incorrecta en relación al metabolismo energético en humanos:", opts: ["El ATP se puede formar en ausencia de oxígeno", "El eritrocito no puede formar oxalacetato para formar malato procedente de citrato", "No tiene efectos sobre el transporte de oxígeno en sangre", "Afecta a los niveles de glucógeno almacenado"], a: "No tiene efectos sobre el transporte de oxígeno en sangre", exp: "Incorrecto: El 2,3-BPG (glucólisis) afecta la afinidad de Hb por O2." },
        { q: "En la transducción de señal celular de la insulina mediada por PKB no interviene (Repetida):", opts: ["IRS-1", "Receptor tirosín kinasa dimérico", "Fosfolipasa C", "PI3K", "PDK"], a: "Fosfolipasa C", exp: "PLC no es vía principal de insulina/PKB." },
        { q: "Cual de las siguientes afirmaciones es correcta respecto a PKA:", opts: ["es una tirosín kinasa", "se activa por fosforilación", "se activa por insulina", "se activa por niveles intracelulares de AMPc", "Desfosforila a las enzimas del metabolismo intermediario"], a: "se activa por niveles intracelulares de AMPc", exp: "AMPc dependiente." }
    ];

    // --- LÓGICA DEL TEST ---
    let markedQuestions = new Set();
    let failedQuestions = new Set();

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function renderQuiz(questionsToLoad = quizData) {
        const container = document.getElementById('quiz-container');
        container.innerHTML = "";
        
        let items = [...questionsToLoad];
        // Solo barajar si cargamos todo el set
        if(questionsToLoad === quizData) items = shuffleArray([...quizData]);

        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';

            const header = document.createElement('div');
            header.className = 'question-header';
            header.innerHTML = `<span>Pregunta ${index + 1}</span>`;
            
            const checkDiv = document.createElement('div');
            checkDiv.className = 'checkbox-container';
            const check = document.createElement('input');
            check.type = 'checkbox';
            check.onclick = () => {
                if(check.checked) markedQuestions.add(item.q);
                else markedQuestions.delete(item.q);
            };
            checkDiv.appendChild(check);
            checkDiv.appendChild(document.createTextNode(" Marcar duda"));
            header.appendChild(checkDiv);
            card.appendChild(header);

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.textContent = item.q;

            // --- INSERCIÓN DE DIAGRAMAS ---
            if (item.q.includes("fosfofructoquinasa") || item.q.includes("bifuncional")) { 
                 qText.innerHTML += `<span class='img-tag'>[Diagrama: Regulación PFK-2/FBPasa-2 por Insulina/Glucagón]</span>`;
            } else if (item.q.includes("Cori") || item.q.includes("Cahill")) { 
                 qText.innerHTML += `<span class='img-tag'>[Diagrama: Ciclo de Cori vs Ciclo de Cahill]</span>`;
            } else if (item.q.includes("pentosas fosfato")) { 
                 qText.innerHTML += `<span class='img-tag'>[Diagrama: Fase Oxidativa vs No Oxidativa Pentosas]</span>`;
            } else if (item.q.includes("glucógeno sintasa") || item.q.includes("fosforilasa")) { 
                 qText.innerHTML += `<span class='img-tag'>[Diagrama: Regulación recíproca Glucógeno Sintasa/Fosforilasa]</span>`;
            } else if (item.q.includes("PKB") || item.q.includes("PI3K")) {
                 qText.innerHTML += `<span class='img-tag'>[Diagrama: Vía de señalización de Insulina]</span>`;
            }

            card.appendChild(qText);

            const optsDiv = document.createElement('div');
            optsDiv.className = 'options-container';
            
            let opts = item.opts.map(opt => ({ txt: opt, isCorrect: opt === item.a }));
            opts = shuffleArray(opts);

            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = `<strong>Explicación:</strong> ${item.exp}`;

            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.txt;
                btn.onclick = () => {
                    const btns = optsDiv.querySelectorAll('.option-btn');
                    btns.forEach(b => b.disabled = true);
                    
                    if(opt.isCorrect) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('incorrect');
                        failedQuestions.add(item);
                        btns.forEach(b => {
                            if(b.textContent === item.a) b.classList.add('correct');
                        });
                    }
                    expDiv.style.display = 'block';
                };
                optsDiv.appendChild(btn);
            });

            card.appendChild(optsDiv);
            card.appendChild(expDiv);
            container.appendChild(card);
        });

        document.getElementById('restart-menu').style.display = 'flex';
    }

    function restartQuiz(mode) {
        if (mode === 'all') renderQuiz(quizData);
        else if (mode === 'marked') {
            const subset = quizData.filter(i => markedQuestions.has(i.q));
            renderQuiz(subset);
        }
        else if (mode === 'failed') {
            renderQuiz(Array.from(failedQuestions));
        }
        else if (mode === 'failed_marked') {
            const subset = quizData.filter(i => markedQuestions.has(i.q) || failedQuestions.has(i));
            renderQuiz(subset);
        }
        window.scrollTo({top:0, behavior:'smooth'});
    }

    // Iniciar
    renderQuiz();

</script>
</body>

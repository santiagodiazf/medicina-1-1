let questions = [];
let state = {}; // id: {answered: bool, correct: bool, marked: bool}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function startQuiz(mode) {
    document.getElementById('overlay').style.display = 'none';
    questions = JSON.parse(JSON.stringify(rawData));
    
    if (mode === 'random') shuffle(questions);
    
    // Aleatorizar opciones en cada carga
    questions.forEach(q => {
        const correctText = q.options[q.correct];
        shuffle(q.options);
        q.correct = q.options.indexOf(correctText);
    });

    render();
}

function render() {
    const container = document.getElementById('quiz-anchor');
    const sidebar = document.getElementById('sidebar');
    container.innerHTML = '';
    sidebar.innerHTML = '';
    
    questions.forEach((q, index) => {
        const id = `q-${index}`;
        state[id] = state[id] || { answered: false, correct: false, marked: false };

        // Sidebar dot
        const dot = document.createElement('div');
        dot.className = 'nav-dot';
        dot.id = `nav-${id}`;
        dot.innerText = index + 1;
        dot.onclick = () => document.getElementById(id).scrollIntoView();
        if (state[id].marked) dot.classList.add('is-marked');
        sidebar.appendChild(dot);

        // Card
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = id;

        const header = document.createElement('div');
        header.className = 'q-header';
        
        const mark = document.createElement('div');
        mark.className = 'mark-btn' + (state[id].marked ? ' active' : '');
        mark.innerText = state[id].marked ? '★ Marcada' : '☆ Marcar';
        mark.onclick = () => toggleMark(id, mark);

        const text = document.createElement('div');
        text.className = 'q-text';
        text.innerText = q.q;

        header.appendChild(text);
        header.appendChild(mark);
        card.appendChild(header);

        const list = document.createElement('div');
        list.className = 'options-list';
        q.options.forEach((opt, idx) => {
            const item = document.createElement('div');
            item.className = 'option-item';
            item.innerText = opt;
            item.onclick = () => check(id, idx, q.correct, item, card, q.exp);
            list.appendChild(item);
        });
        card.appendChild(list);

        const exp = document.createElement('div');
        exp.className = 'explanation-box';
        exp.id = `exp-${id}`;
        exp.innerText = `Respuesta: ${q.options[q.correct]}\n\nExplicación: ${q.exp}`;
        card.appendChild(exp);

        container.appendChild(card);
    });
}

function toggleMark(id, btn) {
    state[id].marked = !state[id].marked;
    btn.classList.toggle('active');
    btn.innerText = state[id].marked ? '★ Marcada' : '☆ Marcar';
    document.getElementById(`nav-${id}`).classList.toggle('is-marked');
}

function check(id, sIdx, cIdx, item, card, expText) {
    if (state[id].answered) return;
    
    state[id].answered = true;
    const isOk = sIdx === cIdx;
    state[id].correct = isOk;

    const items = card.querySelectorAll('.option-item');
    items.forEach((it, i) => {
        it.classList.add('disabled');
        if (i === cIdx) it.classList.add('correct');
        else if (i === sIdx) it.classList.add('wrong');
    });

    card.querySelector('.explanation-box').style.display = 'block';
    const nav = document.getElementById(`nav-${id}`);
    nav.classList.add(isOk ? 'answered-ok' : 'answered-bad');
}

function finishQuiz() {
    const total = questions.length;
    const ok = Object.values(state).filter(v => v.correct).length;
    document.getElementById('score-summary').innerText = `Has completado el cuestionario. Aciertos: ${ok} de ${total}.`;
    document.getElementById('results-area').style.display = 'block';
    document.getElementById('results-area').scrollIntoView();
}

function restart(mode) {
    let nextQuestions = [];
    
    if (mode === 'all') {
        nextQuestions = JSON.parse(JSON.stringify(rawData));
    } else {
        questions.forEach((q, i) => {
            const s = state[`q-${i}`];
            const failed = s.answered && !s.correct;
            const marked = s.marked;
            if (mode === 'failed' && failed) nextQuestions.push(q);
            else if (mode === 'marked' && marked) nextQuestions.push(q);
            else if (mode === 'both' && (failed || marked)) nextQuestions.push(q);
        });
    }

    if (nextQuestions.length === 0) {
        alert("No hay preguntas que cumplan el criterio.");
        return;
    }

    questions = nextQuestions;
    state = {};
    document.getElementById('results-area').style.display = 'none';
    document.getElementById('overlay').style.display = 'flex';
}

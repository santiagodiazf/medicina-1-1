<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --correct-color: #27ae60;
            --incorrect-color: #c0392b;

        }

        body {

            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantalla de Inicio / Configuración */
        #setup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            text-align: center;
        }

        .btn-start {
            padding: 15px 35px;
            margin: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            background: #d35400;
        }

        /* Índice lateral (1 Columna) */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--primary-color);
            color: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 3px 0 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .nav-item {
            width: 45px;
            height: 45px;
            line-height: 45px;
            text-align: center;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .nav-item:hover { background: var(--accent-color); }
        .nav-item.answered-correct { background: var(--correct-color) !important; }
        .nav-item.answered-wrong { background: var(--incorrect-color) !important; }
        .nav-item.marked-q { border-color: var(--marked-color); color: var(--marked-color); font-weight: bold; }

        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 60px;
            scroll-behavior: smooth;
            background-color: var(--bg-color);

        .question-block {
            background: white;
            padding: 35px;
            margin-bottom: 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);

            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }

            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #2c3e50;
            line-height: 1.5;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            border: 2px solid #eaeded;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05rem;
            color: #555;
        }

        .option:hover {
            background: #f8f9f9;
            border-color: var(--accent-color);
            padding-left: 25px;
        }

        .option.correct {
            background: #d4edda !important;
            border-color: var(--correct-color) !important;
            color: #155724;
            font-weight: bold;
        }

        .option.wrong {
            background: #f8d7da !important;
            border-color: var(--incorrect-color) !important;
            color: #721c24;
        }

        .option.disabled {
            pointer-events: none;
        }

        .explanation {
            margin-top: 20px;
            padding: 20px;
            background: #fdf2e9;
            border-left: 5px solid var(--accent-color);
            display: none;
            font-size: 1rem;
            color: #844405;
            line-height: 1.4;
        }

        /* Pestaña de Marcado */
        .mark-tab {
            position: absolute;
            top: 0;
            right: 40px;
            background: #eee;
            padding: 8px 15px;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.3s;
            color: #777;
        }

        .mark-tab.active {
            background: var(--marked-color);
            color: #fff;
        }

        /* Pantalla final */
        #final-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            max-width: 600px;
            margin: 40px auto 100px auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        #score-circle {
            width: 120px;
            height: 120px;
            line-height: 120px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            font-size: 2rem;
            margin: 0 auto 20px auto;
            font-weight: bold;
        }

        .btn-finish {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<div id="setup-overlay">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Bioquímica: Tejido Adiposo</h1>

<div id="sidebar"></div>

<script>

    {

    {

    {

let questions = [];
let userState = {}; // qId: {answered: bool, correct: bool, marked: bool}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function initQuiz(mode) {
    document.getElementById('setup-overlay').style.display = 'none';
    questions = JSON.parse(JSON.stringify(rawData));
    
    if (mode === 'shuffle') shuffle(questions);

    // Mezclar opciones siempre
    questions.forEach(q => {
        const correctText = q.options[q.correct];
        shuffle(q.options);
        q.correct = q.options.indexOf(correctText);
    });

    renderQuiz();
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    const sidebar = document.getElementById('sidebar');
    container.innerHTML = '';
    sidebar.innerHTML = '';
    
    questions.forEach((data, index) => {
        const qId = `q-${index}`;
        userState[qId] = userState[qId] || { answered: false, correct: false, marked: false };

        // Sidebar
        const nav = document.createElement('div');
        nav.className = 'nav-item' + (userState[qId].marked ? ' marked-q' : '');
        nav.id = `nav-${qId}`;
        nav.innerText = index + 1;
        nav.onclick = () => document.getElementById(qId).scrollIntoView();
        sidebar.appendChild(nav);

        // Bloque Pregunta
        const block = document.createElement('div');
        block.className = 'question-block';
        block.id = qId;

        const tab = document.createElement('div');
        tab.className = `mark-tab ${userState[qId].marked ? 'active' : ''}`;
        tab.innerText = userState[qId].marked ? '★ Marcada' : '☆ Marcar';
        tab.onclick = () => toggleMark(qId, tab);
        block.appendChild(tab);

        const qText = document.createElement('div');
        qText.className = 'q-text';
        qText.innerText = data.q;
        block.appendChild(qText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options-container';

        data.options.forEach((opt, optIdx) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(qId, optIdx, data.correct, btn, block, data.exp);
            optionsDiv.appendChild(btn);
        });

        block.appendChild(optionsDiv);

        const expDiv = document.createElement('div');
        expDiv.className = 'explanation';
        expDiv.id = `exp-${qId}`;
        expDiv.innerText = `Respuesta Correcta: ${data.options[data.correct]}\n\nExplicación: ${data.exp}`;
        block.appendChild(expDiv);

        container.appendChild(block);
    });
}

function toggleMark(qId, tab) {
    userState[qId].marked = !userState[qId].marked;
    tab.classList.toggle('active');
    tab.innerText = userState[qId].marked ? '★ Marcada' : '☆ Marcar';
    document.getElementById(`nav-${qId}`).classList.toggle('marked-q');
}

function handleAnswer(qId, sIdx, cIdx, btn, block, exp) {
    if (userState[qId].answered) return;

    userState[qId].answered = true;
    const isCorrect = sIdx === cIdx;
    userState[qId].correct = isCorrect;

    const btns = block.querySelectorAll('.option');
    btns.forEach((b, i) => {
        b.classList.add('disabled');
        if (i === cIdx) b.classList.add('correct');
        else if (i === sIdx) b.classList.add('wrong');
    });

    block.querySelector('.explanation').style.display = 'block';
    const nav = document.getElementById(`nav-${qId}`);
    nav.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
}

function finishAndShowResults() {
    const total = questions.length;
    const correctas = Object.values(userState).filter(v => v.correct).length;
    const percent = Math.round((correctas / total) * 100);

    document.getElementById('score-circle').innerText = `${percent}%`;
    document.getElementById('score-text').innerText = `Has acertado ${correctas} de ${total} preguntas examinadas.`;
    
    document.getElementById('final-screen').style.display = 'block';
    document.getElementById('final-screen').scrollIntoView();
}

function restartQuiz(mode) {
    let filtered = [];
    
    if (mode === 'all') {
        filtered = JSON.parse(JSON.stringify(rawData));
    } else {
        questions.forEach((q, index) => {
            const state = userState[`q-${index}`];
            const isFailed = state.answered && !state.correct;
            const isMarked = state.marked;

            if (mode === 'failed' && isFailed) filtered.push(q);
            else if (mode === 'marked' && isMarked) filtered.push(q);
            else if (mode === 'both' && (isFailed || isMarked)) filtered.push(q);
        });
    }

    if (filtered.length === 0) {
        alert("No hay preguntas en esta categoría.");
        return;
    }

    questions = filtered;
    userState = {};
    document.getElementById('final-screen').style.display = 'none';
    document.getElementById('setup-overlay').style.display = 'flex';
}

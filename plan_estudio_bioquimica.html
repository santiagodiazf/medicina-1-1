<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plan de Estudio · Megaexamen Bioquímica</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg: #0f1424;
  --bg2: #161b32;
  --panel: #1c2240;
  --panel2: #252b4a;
  --border: #2d3458;
  --text: #e9ebff;
  --text2: #9aa0c8;
  --text3: #6b7095;
  --accent: #8b5cf6;
  --accent2: #a78bfa;
  --accent3: #c4b5fd;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --info: #60a5fa;
  --done: #10b981;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  overflow: hidden;
}
button { font: inherit; cursor: pointer; }
a { color: var(--accent2); }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Layout */
.app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 1fr 90px; height: 100vh; }
aside.sidebar {
  grid-row: 1 / 3;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 12px;
}
main.main {
  grid-column: 2;
  overflow-y: auto;
  padding: 24px 32px 24px 32px;
  background: linear-gradient(180deg, var(--bg) 0%, #0c1024 100%);
}
.timerbar {
  grid-column: 2;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  box-shadow: var(--shadow);
}

/* Sidebar */
.sb-header {
  padding: 8px 8px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sb-title {
  font-size: 14px; font-weight: 700; color: var(--accent2); letter-spacing: .03em;
  text-transform: uppercase;
}
.sb-subtitle { font-size: 11px; color: var(--text3); margin-top: 4px; }
.sb-progress { margin-top: 12px; }
.sb-progress-label {
  display: flex; justify-content: space-between; font-size: 11px;
  color: var(--text3); margin-bottom: 4px;
}
.progress-bar {
  height: 6px; background: var(--border); border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .3s;
}

.sb-section { margin-bottom: 16px; }
.sb-section-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text3); padding: 8px 8px 4px; font-weight: 700;
}
.sb-link {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 6px;
  font-size: 13px; color: var(--text2);
  transition: all .15s; cursor: pointer;
  border: 1px solid transparent;
}
.sb-link:hover { background: var(--panel); color: var(--text); }
.sb-link.active {
  background: var(--panel); color: var(--accent2);
  border-color: var(--accent);
}
.sb-link .ico { width: 18px; text-align: center; flex: 0 0 auto; }
.sb-fase { margin-bottom: 6px; }
.sb-fase-head {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 6px;
  font-size: 12px; font-weight: 600; color: var(--text);
  cursor: pointer; user-select: none;
  background: var(--panel);
  border: 1px solid var(--border);
}
.sb-fase-head:hover { border-color: var(--accent); }
.sb-fase-head .progressMini {
  margin-left: auto; font-size: 10px; color: var(--text3); font-weight: 500;
}
.sb-fase-days {
  padding: 6px 0 4px 8px;
}
.sb-fase.collapsed .sb-fase-days { display: none; }
.sb-day {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 5px;
  font-size: 12px; color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.sb-day:hover { background: var(--panel2); color: var(--text); }
.sb-day.active { background: var(--panel2); color: var(--accent2); font-weight: 600; }
.sb-day.done { color: var(--done); }
.sb-day.done::before { content: '✓ '; font-weight: 700; }
.sb-day .pct {
  margin-left: auto; font-size: 10px; color: var(--text3); font-weight: 500;
}

/* Main content */
.crumb { font-size: 11px; color: var(--text3); margin-bottom: 8px; letter-spacing: .03em; text-transform: uppercase; }
h1.maintitle {
  font-size: 24px; color: var(--accent2); margin-bottom: 8px; letter-spacing: -.01em;
}
.lead { color: var(--text2); margin-bottom: 24px; font-size: 15px; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.card-label { font-size: 10px; text-transform: uppercase; color: var(--text3); letter-spacing: .08em; }
.card-num { font-size: 28px; font-weight: 700; color: var(--accent2); margin: 6px 0; }
.card-foot { font-size: 11px; color: var(--text3); }

.section { margin-top: 32px; }
.section-title {
  font-size: 13px; text-transform: uppercase; letter-spacing: .05em;
  color: var(--accent2); font-weight: 700; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.fase-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  transition: all .15s; cursor: pointer;
}
.fase-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.fase-card-head { display: flex; align-items: center; gap: 12px; }
.fase-card-icon {
  width: 40px; height: 40px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; background: var(--panel2);
}
.fase-card-name { font-size: 16px; font-weight: 700; color: var(--text); }
.fase-card-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.fase-card-bar { margin-top: 12px; }

/* Day view */
.day-head { margin-bottom: 18px; }
.day-title { font-size: 22px; color: var(--accent2); }
.day-tema { font-size: 16px; color: var(--text); margin-top: 4px; }
.day-meta { font-size: 12px; color: var(--text3); margin-top: 6px; }

.session {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  position: relative;
  transition: all .15s;
}
.session.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
.session.done { background: linear-gradient(180deg, var(--panel) 0%, rgba(16,185,129,.08) 100%); }
.session-head { display: flex; align-items: center; gap: 12px; }
.session-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--panel2); color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
  flex: 0 0 auto;
}
.session.done .session-num { background: var(--done); color: white; }
.session.active .session-num { background: var(--accent); color: white; }
.session-info { flex: 1; }
.session-title { font-size: 14px; font-weight: 600; color: var(--text); }
.session-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.session-actions { display: flex; gap: 6px; }
.btn {
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 12px; font-size: 12px; font-weight: 500;
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent2); }
.btn.success { background: var(--success); color: #042c1c; border-color: var(--success); }
.btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn:disabled { opacity: .4; cursor: default; }

.session-body {
  margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border);
  display: none;
}
.session.open .session-body { display: block; }

.instrucciones {
  background: rgba(139,92,246,.08); border-left: 3px solid var(--accent);
  padding: 12px 14px; border-radius: 4px; font-size: 13px; line-height: 1.6;
  color: var(--text); margin-bottom: 12px;
}

/* Esquemas-resumen */
.esquema {
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px 22px; margin-top: 16px;
  font-size: 13.5px; line-height: 1.65; color: var(--text);
}
.esquema h3 { color: var(--accent2); margin: 16px 0 8px; font-size: 15px; }
.esquema h3:first-child { margin-top: 0; }
.esquema h4 { color: var(--accent3); margin: 12px 0 6px; font-size: 13.5px; }
.esquema p { margin: 6px 0; }
.esquema ul, .esquema ol { padding-left: 22px; margin: 6px 0; }
.esquema li { margin: 3px 0; }
.esquema strong { color: var(--accent3); }
.esquema em { color: var(--warning); font-style: normal; font-weight: 500; }
.esquema code {
  font-family: "SF Mono", Menlo, monospace; background: var(--bg2);
  padding: 1px 5px; border-radius: 3px; font-size: 12px;
}
.esquema table {
  width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12.5px;
}
.esquema th, .esquema td {
  border: 1px solid var(--border); padding: 6px 9px; text-align: left;
}
.esquema th { background: var(--panel); color: var(--accent2); }
.esquema tr:nth-child(even) td { background: rgba(139,92,246,.04); }

/* Mnemónicos */
.mnemo-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px;
}
.mnemo {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px;
}
.mnemo-num {
  display: inline-block; background: var(--accent); color: white;
  font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 4px;
  margin-bottom: 8px;
}
.mnemo-text { font-size: 13px; color: var(--text); }
.mnemo-text strong { color: var(--warning); }

/* Timer bar */
.timer-info { flex: 1; }
.timer-session-name { font-size: 12px; color: var(--text3); }
.timer-session-title { font-size: 14px; font-weight: 600; color: var(--text); }
.timer-display {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 32px; font-weight: 700; color: var(--accent2);
  letter-spacing: -.02em;
  min-width: 110px; text-align: center;
}
.timer-display.ending { color: var(--warning); animation: pulse 1s infinite; }
.timer-display.over { color: var(--danger); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }
.timer-controls { display: flex; gap: 8px; }
.timer-btn {
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all .15s;
}
.timer-btn:hover { border-color: var(--accent); background: var(--panel); }
.timer-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.timer-btn.primary:hover { background: var(--accent2); }

/* Empty state */
.empty {
  text-align: center; padding: 48px 24px; color: var(--text3);
}
.empty .ico { font-size: 48px; opacity: .5; margin-bottom: 16px; }

/* Switches/chips */
.chip {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 12px; background: var(--panel2); color: var(--text2);
  margin-right: 4px; border: 1px solid var(--border);
}
.chip.lectura { background: rgba(139,92,246,.15); color: var(--accent3); border-color: var(--accent); }
.chip.preguntas { background: rgba(96,165,250,.15); color: var(--info); border-color: var(--info); }
.chip.simulacro { background: rgba(251,191,36,.15); color: var(--warning); border-color: var(--warning); }
.chip.repaso { background: rgba(52,211,153,.15); color: var(--success); border-color: var(--success); }

/* Sync indicator + auth */
.auth-status {
  font-size: 11px; padding: 8px 10px; border-radius: 6px;
  background: var(--panel); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  cursor: pointer;
}
.auth-status:hover { border-color: var(--accent); }
.auth-status .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.auth-status.online .dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
.auth-status.offline .dot { background: var(--text3); }
.auth-status.syncing .dot { background: var(--warning); animation: pulse 1s infinite; }
.auth-status.error .dot { background: var(--danger); }
.auth-status .info { flex: 1; }
.auth-status .info .uid { font-size: 10px; color: var(--text3); margin-top: 1px; }

.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal.show { display: flex; }
.modal-box {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; max-width: 400px; width: 92%;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modal-box h3 { color: var(--accent2); margin-bottom: 8px; }
.modal-box p { color: var(--text2); font-size: 12px; margin-bottom: 16px; }
.modal-box input {
  width: 100%; padding: 10px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 14px; margin-bottom: 10px;
  box-sizing: border-box;
}
.modal-box input:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; margin-top: 8px; }
.modal-actions .btn { flex: 1; padding: 10px; }
.modal-error { color: var(--danger); font-size: 12px; min-height: 16px; margin: 4px 0 8px; }
.modal-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.modal-tab {
  flex: 1; padding: 10px; cursor: pointer; text-align: center;
  font-size: 13px; color: var(--text3); border-bottom: 2px solid transparent;
}
.modal-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* Responsive minimal */
@media (max-width: 880px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr 90px; }
  aside.sidebar { grid-row: auto; max-height: 200px; }
  main.main { padding: 16px; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
  <div class="timerbar" id="timerbar"></div>
</div>

<div class="modal" id="authModal">
  <div class="modal-box">
    <h3>🔐 Sincronizar progreso</h3>
    <p>Inicia sesión para que tu progreso se mantenga sincronizado entre ordenador, tablet y móvil. Misma cuenta que tu plataforma de bioquímica.</p>
    <div class="modal-tabs">
      <div class="modal-tab active" data-tab="login" onclick="switchAuthTab('login')">Iniciar sesión</div>
      <div class="modal-tab" data-tab="register" onclick="switchAuthTab('register')">Crear cuenta</div>
    </div>
    <input type="email" id="authEmail" placeholder="email" autocomplete="email">
    <input type="password" id="authPass" placeholder="contraseña" autocomplete="current-password">
    <div class="modal-error" id="authError"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAuthModal()">Cancelar</button>
      <button class="btn primary" id="authSubmit" onclick="authSubmit()">Iniciar sesión</button>
    </div>
    <p style="margin-top:14px;text-align:center"><a href="#" onclick="forgotPassword(event)" style="color:var(--text3);font-size:11px">¿Olvidaste tu contraseña?</a></p>
  </div>
</div>

<script>
/* ======================================================================
   PLAN DE ESTUDIO — DATOS
   ====================================================================== */

const PLAN = {
  fases: [
    {
      id: 1, nombre: 'Construcción', icon: '🏗️',
      sub: 'Días T-21 → T-15 · Levanto el andamio temático',
      dias: [
        { id: 'T-21', tema: 'Tiroides / insulina / glucagón', esq: 'tiroides',
          sesiones: [
            { t: 'Lectura del esquema-resumen', d: 10, tipo: 'lectura', esq: 'tiroides',
              ins: 'Lee el esquema con el iPhone fuera. Subraya mentalmente lo que NO sabías. No te aprendas nada todavía.' },
            { t: 'Preguntas del bloque (Tema 6 + Tema 9 + relacionadas)', d: 60, tipo: 'preguntas',
              ins: 'Abre la plataforma → Estudiar tema → "Tema 6: Endocrinología Molecular" + "Tema 9: Bioquímica Visual" (que en realidad es endocrino/tiroideo). Falla, marca, lee la explicación.' },
            { t: 'Simulacro de 50 preguntas aleatorias del megaexamen', d: 60, tipo: 'simulacro',
              ins: 'Megaexamen "🎯 3" con límite 50, sin filtrar. Esto te dice cuánto se te quedó. Sin pausar.' },
            { t: 'Repaso espaciado: marca y vuelve a hacer las falladas', d: 30, tipo: 'repaso',
              ins: 'Modo "Solo falladas" en la plataforma. Hasta acertar 2 seguidas cada una.' },
          ]
        },
        { id: 'T-20', tema: 'Digestión y absorción', esq: 'digestion',
          sesiones: [
            { t: 'Lectura del esquema-resumen', d: 10, tipo: 'lectura', esq: 'digestion', ins: 'Apunta en una hoja los 4 transportadores GLUT con su sustrato.' },
            { t: 'Preguntas del bloque (Tema 3 + Tema 5)', d: 60, tipo: 'preguntas', ins: 'Plataforma → "Tema 3: Digestión y Absorción" + "Tema 5: Proteínas y Digestión".' },
            { t: 'Simulacro de 50 preguntas aleatorias', d: 60, tipo: 'simulacro', ins: 'Megaexamen "🎯 3" con límite 50.' },
            { t: 'Repaso de las falladas de ayer y hoy', d: 30, tipo: 'repaso', ins: 'Modo "Solo falladas".' },
          ]
        },
        { id: 'T-19', tema: 'Hígado / xenobióticos / alcohol', esq: 'higado',
          sesiones: [
            { t: 'Lectura del esquema-resumen', d: 10, tipo: 'lectura', esq: 'higado', ins: 'Memoriza la frase: "DETOX en REL del hepatocito perivenoso".' },
            { t: 'Preguntas del bloque (Tema 17 + Tema 20)', d: 60, tipo: 'preguntas' },
            { t: 'Simulacro de 50 preguntas', d: 60, tipo: 'simulacro' },
            { t: 'Repaso falladas', d: 30, tipo: 'repaso' },
          ]
        },
        { id: 'T-18', tema: 'Nutrición / macronutrientes / vitaminas', esq: 'nutricion',
          sesiones: [
            { t: 'Lectura del esquema-resumen', d: 10, tipo: 'lectura', esq: 'nutricion' },
            { t: 'Preguntas del bloque (Tema 1 + Tema 2)', d: 60, tipo: 'preguntas' },
            { t: 'Simulacro de 50 preguntas', d: 60, tipo: 'simulacro' },
            { t: 'Repaso falladas', d: 30, tipo: 'repaso' },
          ]
        },
        { id: 'T-17', tema: 'Inmunidad / anticuerpos / MHC', esq: 'inmunidad',
          sesiones: [
            { t: 'Lectura del esquema-resumen', d: 10, tipo: 'lectura', esq: 'inmunidad' },
            { t: 'Preguntas del bloque (Tema 14)', d: 60, tipo: 'preguntas' },
            { t: 'Simulacro de 50 preguntas', d: 60, tipo: 'simulacro' },
            { t: 'Repaso falladas', d: 30, tipo: 'repaso' },
          ]
        },
        { id: 'T-16', tema: 'Hierro / hemo / Hb / coagulación', esq: 'hierro',
          sesiones: [
            { t: 'Lectura del esquema-resumen', d: 10, tipo: 'lectura', esq: 'hierro' },
            { t: 'Preguntas del bloque (Tema 12 + Tema 13)', d: 60, tipo: 'preguntas' },
            { t: 'Simulacro de 50 preguntas', d: 60, tipo: 'simulacro' },
            { t: 'Repaso falladas', d: 30, tipo: 'repaso' },
          ]
        },
        { id: 'T-15', tema: 'Día de repaso · síntesis transversal', esq: null,
          sesiones: [
            { t: 'Releer los 6 esquemas anteriores en cadena', d: 45, tipo: 'lectura', esq: 'all6', ins: 'Sin parar, una pasada rápida. Si algún concepto no te suena, marca el esquema para volver mañana.' },
            { t: 'Modo "Solo marcadas" + "Solo falladas"', d: 90, tipo: 'repaso', ins: 'Limpia tus marcas: vuelve a las que has señalado y hazlas hasta acertar.' },
            { t: 'Mini-test 30 preguntas mezcladas', d: 30, tipo: 'simulacro', ins: 'Megaexamen 30 preguntas para medir cómo van los 6 bloques juntos.' },
            { t: 'Escribir tabla mental: 6 bloques × 5 datos clave', d: 15, tipo: 'lectura', ins: 'Coge folio, escribe 6 columnas y de cabeza pon los 5 datos más importantes de cada bloque. Lo que NO te salga = lo que repasas mañana.' },
          ]
        },
      ]
    },
    {
      id: 2, nombre: 'Entrenamiento', icon: '⚙️',

<h3>🟠 4.6 — Hierro / hemo / Hb / coagulación <em>(4,7%)</em></h3>
<h4>Proteínas plasmáticas del hierro</h4>
<ul>
<li><strong>Transferrina</strong>: transporta Fe³⁺ en sangre.</li>
<li><strong>Ferritina</strong>: almacén intracelular. Almacena Fe²⁺.</li>
<li><strong>Hemopexina</strong>: une grupo HEMO libre.</li>

<li><strong>Ceruloplasmina</strong> (α2): transporta cobre. Ferroxidasa (Fe²⁺ → Fe³⁺). Wilson = déficit.</li>
</ul>
<h4>Hemoglobina mayoritaria adulto</h4>
<p><strong>HbA1 = α2β2</strong> (~97%). HbA2 = α2δ2 (~2,5%). HbF = α2γ2 (fetal).</p>
<h4>Curvas de saturación</h4>
<ul>
<li>Mioglobina: <strong>hiperbólica</strong> (un sitio).</li>
<li>Hemoglobina: <strong>sigmoidea</strong> (cooperatividad por 4 sitios).</li>
</ul>
<h4>Histidinas del hemo</h4>
<ul>
<li><strong>His F8 (proximal)</strong>: une el Fe²⁺. Al unirse el O2, "tira" del Fe y transmite cambio T→R.</li>
<li><strong>His E7 (distal)</strong>: NO une el hemo. Estabiliza el O2, dificulta unión del CO.</li>
</ul>
<h4>Estados R y T</h4>
<ul>
<li><strong>R (relajada, oxihemoglobina)</strong>: alta afinidad por O2.</li>
<li><strong>T (tensa, desoxi)</strong>: baja afinidad por O2. Estabilizada por <em>CO2 (carbamatos α-amino)</em>, ↑H+, ↑2,3-BPG, ↑Tª.</li>
</ul>
<h4>Efecto Bohr</h4>
<p>↑[H+] (pH ácido) y ↑CO2 → ↓afinidad Hb por O2 → curva a la <strong>derecha</strong> → libera O2 a tejidos activos.</p>

<ol>

<h4>Catabolismo</h4>
<p>Hemo → biliverdina (hemooxigenasa, libera CO + Fe²⁺) → bilirrubina (biliverdina reductasa) → albúmina-bilirrubina (<em>indirecta</em>) → hígado → <strong>diglucurónido (directa)</strong> → bilis → estercobilinógeno (heces).</p>
<h4>Coagulación</h4>
<ul>
<li>Vía intrínseca: <strong>XII (Hageman)</strong> → XI → IX → X.</li>
<li>Vía extrínseca: III (factor tisular) + VII → X.</li>
<li>Vía común: X → trombina (II) → fibrina (I).</li>
<li>Factores <strong>vit-K dependientes</strong>: II, VII, IX, X.</li>
<li><strong>Fibrinógeno → fibrina = trombina</strong>.</li>
<li><strong>Tromboxano A2</strong> (plaquetas): vasoconstrictor, proagregante.</li>
<li><strong>Prostaciclina (PGI2)</strong> (endotelio): vasodilatadora, antiagregante. Vía: ↑AMPc.</li>
</ul>

/* ======================================================================
   ESTADO Y PERSISTENCIA
   ====================================================================== */

const STORAGE_KEY = 'planEstudioBioqV1';

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) try { return JSON.parse(raw); } catch {}
  return {
    completed: {},  // "fase1.dia0.sesion0" => true
    currentFase: 0,
    currentDia: 0,
    currentSesion: null,
    timer: { start: 0, paused: 0, totalPausedMs: 0, isRunning: false, sessionDurMs: 0, sessionKey: null },
    streak: 0,
    lastActiveDay: null,
  };
}

let state = loadState();

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function save() {
  saveLocal();
  if (typeof fbSaveDebounced === 'function') fbSaveDebounced();
}

function sessionKey(faseIdx, diaIdx, sesIdx) {
  return `f${faseIdx}d${diaIdx}s${sesIdx}`;
}

function isCompleted(faseIdx, diaIdx, sesIdx) {
  return !!state.completed[sessionKey(faseIdx, diaIdx, sesIdx)];
}

function markCompleted(faseIdx, diaIdx, sesIdx) {
  state.completed[sessionKey(faseIdx, diaIdx, sesIdx)] = Date.now();
  // Actualizar streak
  const today = new Date().toDateString();
  if (state.lastActiveDay !== today) {
    const ayer = new Date(Date.now() - 24*60*60*1000).toDateString();
    state.streak = state.lastActiveDay === ayer ? (state.streak + 1) : 1;
    state.lastActiveDay = today;
  }
  save();
}

function unmarkCompleted(faseIdx, diaIdx, sesIdx) {
  delete state.completed[sessionKey(faseIdx, diaIdx, sesIdx)];
  save();
}

/* ======================================================================
   CÁLCULOS DE PROGRESO
   ====================================================================== */

function totalSesiones() {
  return PLAN.fases.reduce((acc, f) => acc + f.dias.reduce((a, d) => a + d.sesiones.length, 0), 0);
}

function completedCount() {
  return Object.keys(state.completed).length;
}

function faseProgress(faseIdx) {
  const f = PLAN.fases[faseIdx];
  let total = 0, done = 0;
  f.dias.forEach((d, di) => {
    d.sesiones.forEach((s, si) => {
      total++;
      if (isCompleted(faseIdx, di, si)) done++;
    });
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function diaProgress(faseIdx, diaIdx) {
  const d = PLAN.fases[faseIdx].dias[diaIdx];
  let done = 0;
  d.sesiones.forEach((s, si) => {
    if (isCompleted(faseIdx, diaIdx, si)) done++;
  });
  return { total: d.sesiones.length, done, pct: d.sesiones.length ? Math.round(done/d.sesiones.length*100) : 0 };
}

function nextSession() {
  for (let fi = 0; fi < PLAN.fases.length; fi++) {
    const f = PLAN.fases[fi];
    for (let di = 0; di < f.dias.length; di++) {
      const d = f.dias[di];
      for (let si = 0; si < d.sesiones.length; si++) {
        if (!isCompleted(fi, di, si)) return { fi, di, si };
      }
    }
  }
  return null;
}

}

function setView(v, fi, di, si) {
  state.view = v;
  if (fi !== undefined) state.currentFase = fi;
  if (di !== undefined) state.currentDia = di;
  if (si !== undefined) state.currentSesion = si;
  save();
  render();
}

function toggleFase(fi) {
  state.collapsed = state.collapsed || {};
  state.collapsed[fi] = !state.collapsed[fi];
  save();
  renderSidebar();
}

function goToNext() {
  const n = nextSession();
  if (!n) {
    setView('home');
    return;
  }
  setView('dia', n.fi, n.di);

  setTimeout(() => {
    const ses = document.querySelector(`[data-ses="${n.si}"]`);
    if (ses) {
      ses.classList.add('open');
      ses.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

function resetProgress() {
  if (!confirm('¿Reiniciar todo el progreso? No se puede deshacer.')) return;

    completed: {}, currentFase: 0, currentDia: 0, currentSesion: null,
    timer: { start: 0, paused: 0, totalPausedMs: 0, isRunning: false, sessionDurMs: 0, sessionKey: null },
    streak: 0, lastActiveDay: null, view: 'home', collapsed: {},

  save();
  render();
}

/* ======================================================================
   TEMPORIZADOR
   ====================================================================== */

let timerInterval = null;

function startSession(fi, di, si) {
  const s = PLAN.fases[fi].dias[di].sesiones[si];
  if (s.d <= 0) {
    completeSession(fi, di, si);
    return;
  }
  state.timer = {
    start: Date.now(),
    paused: 0,
    totalPausedMs: 0,
    isRunning: true,
    sessionDurMs: s.d * 60 * 1000,
    sessionKey: sessionKey(fi, di, si),
    sessionTitle: `${PLAN.fases[fi].dias[di].id} · ${s.t}`,
    sessionFi: fi, sessionDi: di, sessionSi: si,
  };
  save();
  startTicker();
  render();
}

function startTicker() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 250);
  updateTimer();
}

function pauseTimer() {
  if (state.timer.isRunning && !state.timer.paused) {
    state.timer.paused = Date.now();
    save();
    renderTimer();
  }
}
function resumeTimer() {
  if (state.timer.paused) {
    state.timer.totalPausedMs += Date.now() - state.timer.paused;
    state.timer.paused = 0;
    save();
    renderTimer();
  }
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  state.timer = { start: 0, paused: 0, totalPausedMs: 0, isRunning: false, sessionDurMs: 0, sessionKey: null };
  save();
  renderTimer();
}
function resetTimer() {
  if (state.timer.isRunning) {
    state.timer.start = Date.now();
    state.timer.paused = 0;
    state.timer.totalPausedMs = 0;
    save();
    renderTimer();
  }
}

function elapsedMs() {
  if (!state.timer.isRunning) return 0;
  const now = state.timer.paused || Date.now();
  return now - state.timer.start - state.timer.totalPausedMs;
}

function updateTimer() {
  renderTimer();
  // Si terminó, alerta visual; el usuario decide si marca completado.
  const elapsed = elapsedMs();
  if (elapsed >= state.timer.sessionDurMs && state.timer.isRunning && !state.timer._notified) {
    state.timer._notified = true;
    try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQwAAACAgICAgICAgICAgIA=').play(); } catch {}
    if (Notification && Notification.permission === 'granted') {
      new Notification('⏰ Tiempo cumplido', { body: state.timer.sessionTitle });
    }
  }
}

function renderTimer() {
  const bar = document.getElementById('timerbar');
  if (!state.timer.isRunning) {
    bar.innerHTML = `
      <div class="timer-info">
        <div class="timer-session-name">No hay sesión activa</div>
        <div class="timer-session-title">Selecciona una sesión y pulsa <strong>▶ Iniciar</strong></div>
      </div>`;
    return;
  }
  const elapsed = elapsedMs();
  const remaining = Math.max(0, state.timer.sessionDurMs - elapsed);
  const isPaused = !!state.timer.paused;
  const isOver = remaining === 0;
  const isEnding = remaining < 60_000 && remaining > 0;

  const mm = Math.floor(remaining / 60000);
  const ss = Math.floor((remaining % 60000) / 1000);
  const display = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;

  bar.innerHTML = `
    <div class="timer-info">
      <div class="timer-session-name">${isPaused?'⏸ Pausado · ':''}${isOver?'✓ Tiempo cumplido · ':''}En sesión</div>
      <div class="timer-session-title">${state.timer.sessionTitle || ''}</div>
    </div>
    <div class="timer-display ${isOver?'over':isEnding?'ending':''}">${display}</div>
    <div class="timer-controls">
      ${isPaused
        ? `<button class="timer-btn primary" title="Reanudar" onclick="resumeTimer()">▶</button>`
        : `<button class="timer-btn" title="Pausar" onclick="pauseTimer()">⏸</button>`}
      <button class="timer-btn" title="Reiniciar (repetir)" onclick="resetTimer()">↻</button>
      <button class="timer-btn" title="Marcar completada" onclick="completeSession(${state.timer.sessionFi},${state.timer.sessionDi},${state.timer.sessionSi})">✓</button>
      <button class="timer-btn" title="Cancelar" onclick="stopTimer()">✕</button>
    </div>`;
}

/* ======================================================================
   FIREBASE — sincronización entre dispositivos
   ====================================================================== */

const FB_CONFIG = {
  apiKey: "AIzaSyAKughV5w2XAKRm3rWuUmhVldwU2bjj0zY",
  authDomain: "portal-estudio-medicina.firebaseapp.com",
  databaseURL: "https://portal-estudio-medicina-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "portal-estudio-medicina",
  storageBucket: "portal-estudio-medicina.firebasestorage.app",
  messagingSenderId: "536326985694",
  appId: "1:536326985694:web:ee2428d39421653be26f4f"
};

let _fbDB = null, _fbAuth = null, _fbUser = null, _fbListener = null;
let _fbSyncStatus = 'offline'; // offline | online | syncing | error
let _fbSaveTimer = null;
let _fbApplyingRemote = false; // evita bucle local↔remoto

(function initFirebase() {
  try {
    if (typeof firebase === 'undefined') {
      console.warn('Firebase SDK no cargó. Sin sincronización.');
      return;
    }
    const app = firebase.initializeApp(FB_CONFIG, 'planEstudioApp');
    _fbAuth = firebase.auth(app);
    _fbDB = firebase.database(app);
    _fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    _fbAuth.onAuthStateChanged(function(user) {
      _fbUser = user;
      if (user) {
        _fbSyncStatus = 'syncing';
        renderSidebar();
        fbStartListener();
      } else {
        _fbSyncStatus = 'offline';
        if (_fbListener) {
          try { fbRef().off('value', _fbListener); } catch(e) {}
          _fbListener = null;
        }
        renderSidebar();
      }
    });
  } catch(e) { console.warn('Firebase init error:', e); }
})();

function fbRef() {
  if (!_fbDB || !_fbUser) return null;
  return _fbDB.ref('users/' + _fbUser.uid + '/' + STORAGE_KEY);
}

// Merge inteligente: une dos estados sin perder progreso de ningún dispositivo.
function mergeStates(local, remote) {
  if (!remote) return local;
  if (!local) return remote;
  const merged = JSON.parse(JSON.stringify(local));
  // completed: para cada key, conservar el más antiguo (=primer momento en que se completó)
  merged.completed = Object.assign({}, local.completed || {});
  Object.keys(remote.completed || {}).forEach(k => {
    if (!merged.completed[k]) merged.completed[k] = remote.completed[k];
    else if (remote.completed[k] < merged.completed[k]) merged.completed[k] = remote.completed[k];
  });
  // streak y lastActiveDay: tomar el más reciente
  if ((remote.lastActiveDay || '') >= (local.lastActiveDay || '')) {
    merged.streak = remote.streak || 0;
    merged.lastActiveDay = remote.lastActiveDay || null;
  }
  // collapsed, view, currentFase, currentDia: tomar lo local (UI propia del dispositivo)
  // timer: NO sincronizar (es del dispositivo en uso). Se mantiene el local.
  return merged;
}

function fbStartListener() {
  const ref = fbRef();
  if (!ref) return;
  if (_fbListener) { try { ref.off('value', _fbListener); } catch(e) {} }
  _fbListener = ref.on('value', function(snap) {
    const remote = snap.val();
    if (remote) {
      const merged = mergeStates(state, remote);
      _fbApplyingRemote = true;
      state = merged;
      saveLocal();
      _fbApplyingRemote = false;
      // Si remote tenía menos info, subimos el merged.
      const remoteJson = JSON.stringify(sanitizeForRemote(remote));
      const mergedJson = JSON.stringify(sanitizeForRemote(merged));
      if (remoteJson !== mergedJson) fbSaveImmediate();
    } else {
      // No había nada remoto → subimos el local actual.
      fbSaveImmediate();
    }
    _fbSyncStatus = 'online';
    render();
  }, function(err) {
    console.warn('Firebase listener error', err);
    _fbSyncStatus = 'error';
    renderSidebar();
  });
}

function sanitizeForRemote(s) {
  // Mandamos solo lo importante. Quitamos timer y vista efímera.
  return {
    completed: s.completed || {},
    streak: s.streak || 0,
    lastActiveDay: s.lastActiveDay || null,
  };
}

function fbSaveImmediate() {
  const ref = fbRef();
  if (!ref) return;
  _fbSyncStatus = 'syncing';
  renderSidebar();
  ref.set(sanitizeForRemote(state))
    .then(() => { _fbSyncStatus = 'online'; renderSidebar(); })
    .catch(e => { console.warn(e); _fbSyncStatus = 'error'; renderSidebar(); });
}

function fbSaveDebounced() {
  if (!_fbUser || _fbApplyingRemote) return;
  if (_fbSaveTimer) clearTimeout(_fbSaveTimer);
  _fbSaveTimer = setTimeout(fbSaveImmediate, 600);
}

function renderAuthStatus() {
  if (typeof firebase === 'undefined') return '';
  if (_fbUser) {
    const labels = { online: '✓ Sincronizado', syncing: '⟳ Sincronizando…', error: '⚠ Error de sincronización', offline: '⏸ Desconectado' };
    return `
      <div class="auth-status ${_fbSyncStatus}" onclick="toggleAuthMenu()">
        <span class="dot"></span>
        <div class="info">
          <div>${labels[_fbSyncStatus] || 'Conectado'}</div>
          <div class="uid">${_fbUser.email || ''}</div>
        </div>
        <span style="color:var(--text3);font-size:11px" title="Cerrar sesión" onclick="event.stopPropagation();fbLogout()">⎋</span>
      </div>`;
  }
  return `
    <div class="auth-status offline" onclick="openAuthModal()">
      <span class="dot"></span>
      <div class="info">
        <div>Sin sincronizar</div>
        <div class="uid">Iniciar sesión para sync</div>
      </div>
    </div>`;
}

function openAuthModal() {
  document.getElementById('authModal').classList.add('show');
  switchAuthTab('login');
  document.getElementById('authError').textContent = '';
}
function closeAuthModal() {
  document.getElementById('authModal').classList.remove('show');
}
function switchAuthTab(t) {
  document.querySelectorAll('.modal-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.tab === t));
  document.getElementById('authSubmit').textContent = t === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
  document.getElementById('authSubmit').dataset.tab = t;
}
function authSubmit() {
  const tab = document.getElementById('authSubmit').dataset.tab || 'login';
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const err = document.getElementById('authError');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Email y contraseña son obligatorios.'; return; }
  if (!_fbAuth) { err.textContent = 'Firebase no disponible.'; return; }
  const op = tab === 'login'
    ? _fbAuth.signInWithEmailAndPassword(email, pass)
    : _fbAuth.createUserWithEmailAndPassword(email, pass);
  op.then(() => closeAuthModal())
    .catch(e => { err.textContent = e.message || e.code; });
}
function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  if (!email) { document.getElementById('authError').textContent = 'Escribe tu email arriba primero.'; return; }
  _fbAuth.sendPasswordResetEmail(email)
    .then(() => { document.getElementById('authError').textContent = '✓ Email de recuperación enviado.'; })
    .catch(e => { document.getElementById('authError').textContent = e.message; });
}
function fbLogout() {
  if (!_fbAuth) return;
  if (!confirm('¿Cerrar sesión? Tu progreso quedará solo en este dispositivo hasta que vuelvas a iniciar sesión.')) return;
  _fbAuth.signOut();
}
function toggleAuthMenu() {
  if (_fbUser) return; // ya logueado, el ⎋ maneja logout
  openAuthModal();
}

if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
  // pedimos permiso suavemente al iniciar
  setTimeout(() => Notification.requestPermission().catch(()=>{}), 2000);
}

if (!state.view) state.view = 'home';
if (state.timer && state.timer.isRunning) startTicker();
render();

</script>

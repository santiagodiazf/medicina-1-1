<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz de Anatomía Integral</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --marked: #f1c40f;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Índice */
        #sidebar {
            width: 350px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .index-header {
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #ffffff33;
            margin-bottom: 15px;
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .index-item {
            background: #34495e;
            border: 1px solid #5d6d7e;
            color: white;
            padding: 8px 2px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .index-item:hover { background: var(--accent); }
        .index-item.answered-correct { background: var(--success); border-color: #1e8449; }
        .index-item.answered-wrong { background: var(--error); border-color: #922b21; }
        .index-item.is-marked {
            border: 2px solid var(--marked) !important;
            color: var(--marked);
            font-weight: bold;
        }

        /* Contenedor Principal */
        #main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .question-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            border-left: 5px solid #dcdde1;
        }

        .question-card.correct { border-left-color: var(--success); }
        .question-card.wrong { border-left-color: var(--error); }

        .mark-tab {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #7f8c8d;
            cursor: pointer;
            user-select: none;
            background: #f8f9fa;
            padding: 5px 10px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .mark-tab input {
            margin: 0;
            cursor: pointer;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
            line-height: 1.4;
            padding-right: 120px;
        }

        .option {
            display: block;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        .option:hover:not(.disabled) {
            background-color: #f0f7ff;
            border-color: var(--accent);
        }

        .option.selected-correct {
            background-color: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724;
            font-weight: 600;
        }

        .option.selected-wrong {
            background-color: #f8d7da !important;
            border-color: var(--error) !important;
            color: #721c24;
        }

        .option.show-correct {
            border-color: var(--success);
            background-color: #d4edda;
        }

        .option.disabled {
            pointer-events: none;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1565c0;
            display: none;
            line-height: 1.5;
            border-left: 4px solid var(--accent);
        }

        /* Modales y Botones */
        #init-overlay, #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2980b9; }

        .btn-finish {
            background: var(--error);
            color: white;
            position: fixed;
            bottom: 20px;
            right: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .hidden { display: none !important; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="init-overlay">
        <div class="modal">
            <h2>Cuestionario de Anatomía</h2>
            <p>Selecciona el modo de realización:</p>
            <button type="button" class="btn btn-primary" onclick="initQuiz(false)">Orden Preestablecido</button>
            <button type="button" class="btn btn-primary" onclick="initQuiz(true)">Orden Aleatorio</button>
        </div>
    </div>

    <div id="result-overlay" class="hidden">
        <div class="modal">
            <h2>Resultados</h2>
            <div id="final-stats"></div>
            <p>¿Qué deseas hacer ahora?</p>
            <div class="stats-grid">
                <button type="button" class="btn btn-primary" onclick="restart('all')">Repetir Completo</button>
                <button type="button" class="btn btn-primary" style="background:#e67e22" onclick="restart('failed')">Repetir Falladas</button>
                <button type="button" class="btn btn-primary" style="background:var(--marked); color:#000;" onclick="restart('marked')">Repetir Marcadas</button>
                <button type="button" class="btn btn-primary" style="background:var(--primary)" onclick="restart('both')">Falladas + Marcadas</button>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="index-header">
            <h3>Preguntas</h3>
        </div>
        <div id="index-grid" class="index-grid"></div>
    </div>

    <div id="main-content">
        <div id="quiz-container"></div>
        <button type="button" class="btn btn-finish" onclick="finishSession()">Finalizar Cuestionario</button>
    </div>

    <script>

        let questions = [];
        let state = {};

        function cloneQuestions(source) {
            return source.map(q => ({
                ...q,
                options: [...q.options]
            }));
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function prepareQuestions(list, shuffleQuestions = false) {
            const prepared = cloneQuestions(list);

            if (shuffleQuestions) {
                shuffleArray(prepared);
            }

            prepared.forEach(q => {
                const optionsWithMeta = q.options.map((text, idx) => ({
                    text,
                    isCorrect: idx === q.correct
                }));
                shuffleArray(optionsWithMeta);
                q.shuffledOptions = optionsWithMeta;
            });

            return prepared;
        }

        function initQuiz(shuffle) {
            questions = prepareQuestions(rawQuestions, shuffle);
            state = {};
            document.getElementById('init-overlay').classList.add('hidden');
            document.getElementById('result-overlay').classList.add('hidden');
            document.getElementById('main-content').scrollTop = 0;
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const grid = document.getElementById('index-grid');

            container.innerHTML = '';
            grid.innerHTML = '';

            questions.forEach((q, i) => {
                const idx = document.createElement('div');
                idx.className = 'index-item';
                idx.id = `idx-${i}`;
                idx.innerText = i + 1;
                idx.onclick = () => {
                    document.getElementById(`card-${i}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                grid.appendChild(idx);

                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `card-${i}`;

                card.innerHTML = `
                    <label class="mark-tab" for="chk-${i}">
                        <input type="checkbox" id="chk-${i}" onclick="event.stopPropagation(); toggleMark(${i});">
                        <span>Marcar</span>
                    </label>
                    <div class="question-text">${q.q}</div>
                    <div class="options-container">
                        ${q.shuffledOptions.map((opt, optIdx) => `
                            <div class="option" id="opt-${i}-${optIdx}" onclick="handleAnswer(${i}, ${optIdx})">
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="exp-${i}">
                        <strong>Explicación:</strong> ${q.exp}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function handleAnswer(qIdx, optIdx) {
            if (state[qIdx]?.answered) return;

            const question = questions[qIdx];
            const selectedOpt = question.shuffledOptions[optIdx];
            const isCorrect = selectedOpt.isCorrect;

            if (!state[qIdx]) state[qIdx] = {};
            state[qIdx].answered = true;
            state[qIdx].correct = isCorrect;

            const card = document.getElementById(`card-${qIdx}`);
            const idxItem = document.getElementById(`idx-${qIdx}`);
            const exp = document.getElementById(`exp-${qIdx}`);

            if (isCorrect) {
                document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected-correct');
                card.classList.add('correct');
                idxItem.classList.add('answered-correct');
            } else {
                document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected-wrong');
                card.classList.add('wrong');
                idxItem.classList.add('answered-wrong');

                question.shuffledOptions.forEach((opt, idx) => {
                    if (opt.isCorrect) {
                        document.getElementById(`opt-${qIdx}-${idx}`).classList.add('show-correct');
                    }
                });
            }

            question.shuffledOptions.forEach((_, idx) => {
                document.getElementById(`opt-${qIdx}-${idx}`).classList.add('disabled');
            });

            exp.style.display = 'block';
        }

        function toggleMark(i) {
            if (!state[i]) state[i] = {};
            state[i].marked = !state[i].marked;

            const checkbox = document.getElementById(`chk-${i}`);
            const idxItem = document.getElementById(`idx-${i}`);

            checkbox.checked = state[i].marked;
            idxItem.classList.toggle('is-marked', state[i].marked);
        }

        function finishSession() {
            const total = questions.length;
            let solved = 0;
            let correct = 0;

            questions.forEach((_, i) => {
                if (state[i]?.answered) {
                    solved++;
                    if (state[i].correct) correct++;
                }
            });

            const statsDiv = document.getElementById('final-stats');
            statsDiv.innerHTML = `
                <p style="font-size: 1.2rem">Has respondido <strong>${solved}</strong> de <strong>${total}</strong> preguntas.</p>
                <p style="font-size: 1.5rem; color: var(--success)">Aciertos: ${correct}</p>
                <p style="font-size: 1.5rem; color: var(--error)">Fallos: ${solved - correct}</p>
            `;

            document.getElementById('result-overlay').classList.remove('hidden');
        }

        function restart(mode) {
            let newSet = [];

            if (mode === 'all') {
                newSet = cloneQuestions(rawQuestions);
            } else {
                questions.forEach((q, i) => {
                    const isFailed = state[i]?.answered && !state[i]?.correct;
                    const isMarked = !!state[i]?.marked;

                    if (mode === 'failed' && isFailed) newSet.push({ ...q, options: [...q.options] });
                    if (mode === 'marked' && isMarked) newSet.push({ ...q, options: [...q.options] });
                    if (mode === 'both' && (isFailed || isMarked)) newSet.push({ ...q, options: [...q.options] });
                });
            }

            if (newSet.length === 0) {
                alert("No hay preguntas en esta categoría.");
                return;
            }

            questions = prepareQuestions(newSet, false);
            state = {};
            document.getElementById('result-overlay').classList.add('hidden');
            document.getElementById('main-content').scrollTop = 0;
            renderQuiz();
        }
    </script>

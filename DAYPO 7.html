        {

    // --- LÓGICA DEL TEST ---
    let markedQuestions = new Set();
    let failedQuestions = new Set();

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function renderQuiz(questionsToLoad = quizData) {
        const container = document.getElementById('quiz-container');
        container.innerHTML = "";
        
        // CORRECCIÓN: Eliminado el barajado de preguntas para mantener el orden original
        let items = [...questionsToLoad];
        
        // Actualizar mensaje de estado
        const statusDisplay = document.getElementById('status-display');
        if(questionsToLoad.length < quizData.length) {
            statusDisplay.textContent = `Repasando ${questionsToLoad.length} preguntas seleccionadas.`;
        } else {
            statusDisplay.textContent = "Responde las preguntas para ver las opciones de repaso.";
        }

        if(items.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; color:#666;">No hay preguntas en esta selección.</div>`;
            return;
        }

        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';

            // Cabecera
            const header = document.createElement('div');
            header.className = 'question-header';
            header.innerHTML = `<span>Pregunta</span>`;
            
            // Checkbox
            const checkDiv = document.createElement('div');
            checkDiv.className = 'checkbox-container';
            const check = document.createElement('input');
            check.type = 'checkbox';
            
            // Mantener estado del checkbox si ya estaba marcada
            if(markedQuestions.has(item.q)) check.checked = true;

            check.onclick = () => {
                if(check.checked) markedQuestions.add(item.q);
                else markedQuestions.delete(item.q);
            };
            checkDiv.appendChild(check);
            checkDiv.appendChild(document.createTextNode(" Marcar duda"));
            header.appendChild(checkDiv);
            
            card.appendChild(header);

            // Texto Pregunta
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.textContent = item.q;
            
            // Inserción de Diagramas
            if (item.q.includes("β-oxidación") || item.q.includes("pasos del ciclo")) { 
                 qText.innerHTML += `<span class='img-tag'></span>`;
            } else if (item.q.includes("HMG-CoA") || item.q.includes("colesterol")) { 
                 qText.innerHTML += `<span class='img-tag'></span>`;
            } else if (item.q.includes("lipoproteína") || item.q.includes("Quilomicrón")) { 
                 qText.innerHTML += `<span class='img-tag'></span>`;
            } else if (item.q.includes("ácido graso sintasa")) { 
                 qText.innerHTML += `<span class='img-tag'></span>`;
            } else if (item.q.includes("araquidónico")) {
                 qText.innerHTML += `<span class='img-tag'></span>`;
            }

            card.appendChild(qText);

            // Opciones
            const optsDiv = document.createElement('div');
            optsDiv.className = 'options-container';
            
            let opts = item.opts.map(opt => ({ txt: opt, isCorrect: opt === item.a }));
            // Mantenemos el barajado SOLO de las opciones, no de las preguntas
            opts = shuffleArray(opts);

            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = `<strong>Explicación:</strong> ${item.exp}`;

            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.txt;
                btn.onclick = () => {
                    const btns = optsDiv.querySelectorAll('.option-btn');
                    btns.forEach(b => b.disabled = true);
                    
                    if(opt.isCorrect) {
                        btn.classList.add('correct');
                        // Si se acierta, la quitamos de falladas si estaba ahí (opcional, según lógica de repaso)
                        // failedQuestions.delete(item); 
                    } else {
                        btn.classList.add('incorrect');
                        failedQuestions.add(item);
                        // Mostrar correcta
                        btns.forEach(b => {
                            if(b.textContent === item.a) b.classList.add('correct');
                        });
                    }
                    expDiv.style.display = 'block';
                };
                optsDiv.appendChild(btn);
            });

            card.appendChild(optsDiv);
            card.appendChild(expDiv);
            container.appendChild(card);
        });
    }

    // Funciones de control
    function restartQuiz(mode) {
        if (mode === 'all') {
            // Limpiamos fallos al reiniciar todo, pero mantenemos marcadas si se quiere
            failedQuestions.clear();
            renderQuiz(quizData);
        }
        else if (mode === 'marked') {
            const subset = quizData.filter(i => markedQuestions.has(i.q));
            renderQuiz(subset);
        }
        else if (mode === 'failed') {
            // Convertimos el Set a Array
            renderQuiz(Array.from(failedQuestions));
        }
        else if (mode === 'failed_marked') {
            // Unión: Preguntas que están en falladas O en marcadas
            const subset = quizData.filter(i => markedQuestions.has(i.q) || failedQuestions.has(i));
            renderQuiz(subset);
        }
        window.scrollTo({top:0, behavior:'smooth'});
    }

    // Iniciar
    renderQuiz();

</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Anatomía del Perineo Femenino</title>
    <script>
    // Comprobamos si NO existe la llave de acceso
    if (sessionStorage.getItem("_auth_tkn_882") !== "1") {
        // Expulsamos al usuario a la página principal
        // IMPORTANTE: Cambia "index.html" por el nombre exacto de tu archivo principal si se llama distinto
        window.location.replace("index.html");
    }
</script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .instructions {
            margin-bottom: 20px;
            color: #333;
            font-size: 16px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
        }
        .btn-verify {
            background-color: #4CAF50;
            color: white;
        }
        .btn-verify:hover {
            background-color: #45a049;
        }
        .btn-retry {
            background-color: #2196F3;
            color: white;
        }
        .btn-retry:hover {
            background-color: #1e88e5;
        }
        .score-display {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            color: #333;
        }
        .img-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 800px;
            border: 1px solid #ddd;
            background-color: white;
        }
        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .dropdown {
            position: absolute;
            width: 22%; 
            height: 2.5%;
            font-size: 11px;
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #666;
            border-radius: 3px;
            padding: 0 2px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .dropdown:focus {
            z-index: 10;
            border-color: #2196F3;
            outline: none;
        }
        .correct {
            background-color: #c8e6c9 !important;
            border: 2px solid #2e7d32 !important;
            color: #1b5e20;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ffcdd2 !important;
            border: 2px solid #c62828 !important;
            color: #b71c1c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quiz: Anatomía del Perineo Femenino</h1>
        <p class="instructions">Selecciona la estructura anatómica correcta en cada menú desplegable situado al final de las líneas indicadoras.</p>
        
        <div class="controls">
            <button class="btn-verify" onclick="verificarRespuestas()">Verificar Respuestas</button>
            <button class="btn-retry" onclick="reiniciarTest()">Volver a Intentar</button>
            <div id="score" class="score-display"></div>
        </div>

        <div class="img-wrapper">
            <img src="perineo_femenino.png" alt="Esquema del Perineo Femenino">
            
            <select class="dropdown" style="top: 29%; left: 18%;" data-correct="Rs. labiales posteriores"></select>
            <select class="dropdown" style="top: 32%; left: 5%;" data-correct="Membrana perineal"></select>
            <select class="dropdown" style="top: 43%; left: 4%;" data-correct="A. transversa"></select>
            <select class="dropdown" style="top: 48.5%; left: 4%;" data-correct="A. perineal"></select>
            <select class="dropdown" style="top: 53.5%; left: 4%;" data-correct="A. pudenda interna"></select>
            <select class="dropdown" style="top: 76%; left: 6%;" data-correct="Fosa isquioanal"></select>

            <select class="dropdown" style="top: 6%; left: 55%;" data-correct="A. dorsal del clítoris"></select>
            <select class="dropdown" style="top: 10.5%; left: 61%;" data-correct="A. profunda del clítoris"></select>
            <select class="dropdown" style="top: 22%; left: 59%;" data-correct="A. uretral"></select>
            <select class="dropdown" style="top: 27%; left: 59%;" data-correct="N. dorsal del clítoris"></select>
            <select class="dropdown" style="top: 30.5%; left: 61%;" data-correct="A. bulbovestibular"></select>
            <select class="dropdown" style="top: 37%; left: 70%;" data-correct="Fascia superior del diafragma urogenital"></select>
            <select class="dropdown" style="top: 45%; left: 71%;" data-correct="A. perineal"></select>
            <select class="dropdown" style="top: 49%; left: 69%;" data-correct="N. perineal"></select>
            <select class="dropdown" style="top: 56%; left: 70%;" data-correct="As. rectales inferiores"></select>
            <select class="dropdown" style="top: 66%; left: 69%;" data-correct="N. pudendo"></select>
            <select class="dropdown" style="top: 70%; left: 69%;" data-correct="A. pudenda interna"></select>
            <select class="dropdown" style="top: 81%; left: 66%;" data-correct="R. glútea"></select>
            
            <select class="dropdown" style="top: 87%; left: 63%;" data-correct="N. rectal inferior"></select>
        </div>
    </div>

    <script>
        const opciones = [
            "A. bulbovestibular",
            "A. dorsal del clítoris",
            "A. perineal",
            "A. profunda del clítoris",
            "A. pudenda interna",
            "A. transversa",
            "A. uretral",
            "As. rectales inferiores",
            "Fascia superior del diafragma urogenital",
            "Fosa isquioanal",
            "Membrana perineal",
            "N. dorsal del clítoris",
            "N. perineal",
            "N. pudendo",
            "N. rectal inferior",
            "R. glútea",
            "Rs. labiales posteriores"
        ];

        window.onload = function() {
            const selects = document.querySelectorAll('.dropdown');
            
            selects.forEach(select => {
                let defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.text = "--- Selecciona ---";
                select.appendChild(defaultOption);

                opciones.forEach(opcion => {
                    let opt = document.createElement('option');
                    opt.value = opcion;
                    opt.text = opcion;
                    select.appendChild(opt);
                });
            });
        };

        function verificarRespuestas() {
            const selects = document.querySelectorAll('.dropdown');
            let correctas = 0;
            let total = selects.length;

            selects.forEach(select => {
                let respuestaUsuario = select.value;
                let respuestaCorrecta = select.getAttribute('data-correct');

                select.classList.remove('correct', 'incorrect');

                if (respuestaUsuario === respuestaCorrecta) {
                    select.classList.add('correct');
                    correctas++;
                } else if (respuestaUsuario !== "") {
                    select.classList.add('incorrect');
                } else {
                    select.classList.add('incorrect');
                }
            });

            const scoreDiv = document.getElementById('score');
            scoreDiv.innerHTML = `Has acertado ${correctas} de ${total} preguntas.`;
            
            if (correctas === total) {
                scoreDiv.style.color = "#2e7d32";
            } else {
                scoreDiv.style.color = "#c62828";
            }
        }

        function reiniciarTest() {
            const selects = document.querySelectorAll('.dropdown');
            selects.forEach(select => {
                select.value = "";
                select.classList.remove('correct', 'incorrect');
            });
            document.getElementById('score').innerHTML = "";
        }
    </script>
</body>
</html>

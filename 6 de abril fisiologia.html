<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz: Fisiología Humana Integral</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --success: #27ae60;
            --error: #c0392b;
            --warning: #f39c12;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ebf0f1;
            margin: 0;
            display: flex;
        }

        /* Índice Lateral Compacto */
        #sidebar {
            width: 120px;
            background: var(--primary);
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            padding: 15px 5px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            align-content: start;
            z-index: 1000;
        }

        .index-dot {
            height: 35px;
            background: rgba(255,255,255,0.1);
            color: #bdc3c7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            transition: 0.2s;
        }

        .index-dot:hover { background: var(--secondary); color: white; }
        .index-dot.answered { background: var(--success); color: white; }
        .index-dot.marked { background: var(--warning) !important; color: var(--primary); }

        /* Contenido */
        #main-wrapper {
            margin-left: 120px;
            flex-grow: 1;
            padding: 40px;
            max-width: 1100px;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 40px;
            position: sticky;
            top: 20px;
            z-index: 900;
        }

        .question-card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            scroll-margin-top: 160px;
            border-left: 8px solid #d1d8e0;
            transition: 0.3s;
        }

        .question-card.active-q { border-left-color: var(--secondary); }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 15px;
        }

        .q-text { font-size: 1.15em; font-weight: 600; color: var(--primary); line-height: 1.5; }

        .mark-btn {
            background: #f1f2f6;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            white-space: nowrap;
        }

        .mark-btn.active { background: var(--warning); color: black; font-weight: bold; }

        .options-list { display: grid; gap: 12px; }

        .option {
            padding: 15px 20px;
            border: 2px solid #f1f2f6;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }

        .option:hover { border-color: var(--secondary); background: #f9fbff; }
        .option.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; }
        .option.incorrect { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }
        .option.disabled { pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 20px;
            background: #e1f5fe;
            border-left: 5px solid var(--secondary);
            border-radius: 0 8px 8px 0;
            display: none;
            font-size: 0.95em;
            color: #01579b;
        }

        /* Modales */
        .modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .action-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-modal" class="modal">
        <div class="modal-content">
            <h1>Master Test Fisiología</h1>
            <p>200 preguntas unificadas de todos los bloques temáticos.</p>
            <button class="action-btn" onclick="startQuiz(false)">Orden Lógico</button>
            <button class="action-btn" onclick="startQuiz(true)">Mezclar Todo</button>
        </div>
    </div>

    <div id="sidebar"></div>

    <div id="main-wrapper">
        <header>
            <h2 id="quiz-title" style="margin:0">Cuestionario Unificado</h2>
            <div id="progress" style="margin: 10px 0; color: var(--secondary); font-weight: bold;"></div>
            <button class="action-btn" style="padding: 8px 15px; font-size: 0.8em;" onclick="showFinalResults()">Finalizar y Corregir</button>
        </header>

        <div id="questions-container"></div>

        <div id="finish-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Resultados Finales</h2>
                <div id="score-text" style="font-size: 2.5em; margin: 20px 0; color: var(--primary);"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="action-btn" onclick="restart('all')">Repetir Todo</button>
                    <button class="action-btn" id="btn-failed" onclick="restart('failed')">Solo Falladas</button>
                    <button class="action-btn" id="btn-marked" onclick="restart('marked')">Solo Marcadas</button>
                    <button class="action-btn" id="btn-both" onclick="restart('both')">Falladas + Marcadas</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            // --- BLOQUE 1: CONCEPTO 1 A 7 (14 preguntas) ---
            { id: 1, q: "Si introducimos un glóbulo rojo en una solución de urea de 300 mOsM, ¿qué ocurrirá fisiológicamente con el volumen de la célula?", options: ["La célula se encogerá porque la solución es hipertónica.", "El volumen celular no cambiará porque la solución es isosmolar e isotónica.", "La urea difundirá hacia el interior de la célula arrastrando agua consigo, por lo que la célula se hinchará (la solución es hipotónica).", "La urea bloqueará los canales de acuaporinas impidiendo el paso de agua."], correct: 2, exp: "Aunque sea isosmolar (300 mOsM), la urea es un soluto penetrante. Al entrar a la célula a favor de gradiente, arrastra agua por ósmosis, hinchando la célula. Por eso es hipotónica." },
            { id: 2, q: "A diferencia de la osmolaridad, el concepto fisiológico de 'tonicidad' de una solución hace referencia exclusivamente a:", options: ["El número total de partículas disueltas por litro de solución.", "La capacidad de la solución para modificar el volumen celular, lo cual depende de la permeabilidad de la membrana a los solutos.", "La carga eléctrica neta del compartimento extracelular.", "La concentración de proteínas plasmáticas."], correct: 1, exp: "La tonicidad describe cómo afecta una solución al volumen de una célula, dependiendo de si los solutos pueden o no atravesar la membrana." },
            { id: 3, q: "Si mediante una manipulación experimental logramos que la membrana de una neurona sea EXCLUSIVAMENTE permeable al ión Potasio ($K^+$), ¿cuál será su potencial de membrana?", options: ["0 mV, debido a la neutralidad eléctrica.", "Coincidirá exactamente con el potencial de equilibrio para el Sodio (+65 mV).", "Coincidirá exactamente con el potencial de equilibrio para el Potasio (-85 mV).", "Se producirá una despolarización hasta alcanzar el umbral."], correct: 2, exp: "Si la membrana es permeable a un solo ión, el potencial de membrana se iguala matemáticamente al potencial de equilibrio (Nernst) de ese ión." },
            { id: 4, q: "El profesor advirtió sobre la importancia de pequeños cambios en la concentración extracelular de un ión que afectan al potencial en reposo y causan arritmias letales. ¿A qué ión se refería?", options: ["Al Sodio ($Na^+$).", "Al Calcio ($Ca^{2+}$).", "Al Cloro ($Cl^-$).", "Al Potasio ($K^+$)."], correct: 3, exp: "La membrana en reposo es muy permeable al potasio. Variaciones en la calemia (hipo/hipercalemia) alteran drásticamente el potencial de reposo cardíaco." },
            { id: 5, q: "¿Qué efecto tiene sobre la integración sináptica que una neurona posea una Constante de Tiempo ($\\tau$) muy LENTA (ej. 100 ms)?", options: ["Impide la generación de un potencial de acción.", "Aumenta la probabilidad de que se produzca una Sumación Temporal de dos potenciales consecutivos.", "Convierte los potenciales inhibidores en excitadores.", "Disminuye la capacitancia de la membrana."], correct: 1, exp: "Si $\\tau$ es larga, el voltaje cae muy lentamente. Esto permite que un segundo estímulo se 'monte' sobre el primero antes de que este se disipe." },
            { id: 6, q: "Si la Constante de Longitud o Espacio ($\\lambda$) de una dendrita aumenta debido a una mayor resistencia de membrana ($R_m$), el resultado será:", options: ["Una atenuación mucho más rápida de la señal.", "Una mayor atenuación espacial que impedirá la sumación.", "Una menor atenuación espacial de los potenciales locales, facilitando la Sumación Espacial.", "La inactivación absoluta de los canales de fuga."], correct: 2, exp: "A mayor $\\lambda$, la señal viaja más lejos sin perder fuerza, permitiendo que estímulos de distintas ramas lleguen al cono axónico y se sumen." },
            { id: 7, q: "En un experimento de fijación de voltaje (Voltage-Clamp), al añadir Tetrodotoxina (TTX), ¿qué componente del potencial de acción desaparece?", options: ["La corriente transitoria rápida de entrada, mediada por los canales de Sodio.", "La corriente persistente tardía de salida, mediada por el Potasio.", "La corriente de fuga de Cloro.", "El potencial de reposo de la célula."], correct: 0, exp: "La TTX bloquea específicamente los canales de sodio voltaje-dependientes, eliminando la fase de despolarización." },
            { id: 8, q: "¿Qué estado conformacional de los canales iónicos es el responsable del Periodo Refractario ABSOLUTO?", options: ["Los canales de potasio bloqueados por calcio.", "Los canales de sodio voltaje-dependientes en estado INACTIVADO.", "Los canales de sodio en estado CERRADO pero activables.", "La bomba $Na^+/K^+$ consumiendo ATP."], correct: 1, exp: "La compuerta de inactivación del canal de Na+ está cerrada; es mecánicamente imposible abrirlo de nuevo hasta que la membrana repolarice." },
            { id: 9, q: "¿Qué proteína de la membrana vesicular actúa como el 'sensor de calcio' que desencadena la exocitosis?", options: ["Sintaxina.", "SNAP-25.", "Sinaptotagmina.", "Dinamina."], correct: 2, exp: "La sinaptotagmina detecta el Calcio y orquesta la fusión de la vesícula mediada por el complejo SNARE." },
            { id: 10, q: "El tétanos produce una parálisis ESPÁSTICA porque:", options: ["Actúa sobre la unión neuromuscular activando los receptores nicotínicos.", "Bloquea la liberación de neurotransmisores inhibidores (Glicina/GABA) en el SNC.", "Destruye la enzima acetilcolinesterasa.", "Induce una endocitosis masiva de los receptores musculares."], correct: 1, exp: "Al viajar al SNC e impedir la inhibición, las motoneuronas se sobreexcitan de forma incontrolada." },
            { id: 11, q: "Al aplicar noradrenalina a un músculo liso, este se contrae. Si aplicamos 'Fentolamina' antes, no hay contracción. Esto es porque:", options: ["Es un agonista competitivo.", "Es un inhibidor enzimático.", "Es un antagonista adrenérgico que bloquea el receptor sin transmitir señal.", "Es una proteína quinasa."], correct: 2, exp: "Un antagonista ocupa el receptor (afinidad) pero no lo activa (falta de eficacia), bloqueando al ligando natural." },
            { id: 12, q: "En la Diabetes tipo II, la célula realiza un proceso de 'Down-regulation', que consiste en:", options: ["Secretar glucagón.", "Transformar receptores en intracelulares.", "Endocitar y destruir sus propios receptores de membrana para disminuir su sensibilidad.", "Cambiar la especificidad del receptor."], correct: 2, exp: "Ante niveles excesivos de hormona, la célula retira sus receptores para protegerse de la sobreestimulación (genera resistencia)." },
            { id: 13, q: "Bioquímicamente, ¿qué evento causa el 'Rigor Mortis' tras el fallecimiento?", options: ["Destrucción de la Titina.", "Incapacidad de hidrolizar la Acetilcolina.", "Agotamiento del ATP, lo que impide que la miosina se separe de la actina.", "Liberación del fosfato inorgánico."], correct: 2, exp: "La unión de un nuevo ATP es necesaria para que la cabeza de miosina suelte la actina. Sin ATP, se quedan pegadas." },
            { id: 14, q: "El músculo del corredor de maratón es más estrecho y rojizo porque:", options: ["Predominan las Fibras Rápidas Glucolíticas (Tipo IIb).", "Carece de mioglobina.", "Predominan las Fibras Lentas Oxidativas (Tipo I), con más mitocondrias y capilares.", "Usa solo Fosfato de Creatina."], correct: 2, exp: "Las fibras tipo I son delgadas (menor volumen), resistentes y rojas por su alta vascularización y mioglobina para usar oxígeno." },

            // --- BLOQUE 2: CONCEPTO 8 A 14 (14 preguntas) ---
            { id: 15, q: "(Exp. Hamburger) Si se amputa una extremidad en desarrollo, las motoneuronas correspondientes desaparecen porque:", options: ["Migraron hacia el encéfalo.", "La falta de diana impidió recibir neurotrofinas, induciendo apoptosis.", "Se transformaron en glía.", "Hubo necrosis hemorrágica."], correct: 1, exp: "La supervivencia neuronal depende de captar factores de crecimiento limitados de la célula diana. Sin diana, mueren." },
            { id: 16, q: "¿Qué factor potencia la neuroplasticidad y supervivencia neuronal tras el ejercicio físico?", options: ["Ácido láctico.", "Óxido Nítrico microglial.", "Factor Neurotrófico Derivado del Cerebro (BDNF).", "Caspasas."], correct: 2, exp: "El ejercicio estimula la liberación de BDNF, que mejora la salud y plasticidad de las neuronas." },
            { id: 17, q: "¿Qué proteína clave (GTPasa) inicia la cascada de las MAP-quinasas y su mutación se vincula al cáncer?", options: ["Proteína G alfa estimuladora.", "Proteína Ras.", "Adenilato Ciclasa.", "Fosfolipasa C."], correct: 1, exp: "Ras actúa como un interruptor. Si muta y se queda 'encendida' en forma GTP, produce proliferación celular incontrolada (tumor)." },
            { id: 18, q: "(Caso Barbacid) La estrategia para que el cáncer de páncreas remitiera fue:", options: ["Inducir hiperglucemia.", "Inhibir simultáneamente RTK, bloquear Ras y degradar STAT3.", "Activar receptores muscarínicos.", "Altas dosis de interleuquina-1."], correct: 1, exp: "Atacar toda la cascada de señalización (membrana, intermediario y núcleo) bloqueó la proliferación tumoral." },
            { id: 19, q: "¿Cuál es el mecanismo por el cual el Óxido Nítrico (NO) provoca vasodilatación?", options: ["Activa la Guanilato Ciclasa, aumentando el GMP cíclico (cGMP).", "Se une a receptores Gq liberando Calcio.", "Bloquea canales de Sodio.", "Inhibe la Acetilcolinesterasa."], correct: 0, exp: "El NO difunde libremente al citoplasma del músculo liso y activa la Guanilato Ciclasa soluble." },
            { id: 20, q: "¿Qué enzima bloquean los AINEs (Ibuprofeno/Aspirina) para frenar la inflamación y el dolor?", options: ["Lipooxigenasa.", "Adenilato Ciclasa.", "Ciclooxigenasa (COX).", "Tirosina Hidroxilasa."], correct: 2, exp: "Al inhibir la COX, se corta la síntesis de prostaglandinas, mediadores clave del dolor y la fiebre." },
            { id: 21, q: "Las moléculas de adhesión que median el 'rodamiento' inicial débil de los leucocitos son:", options: ["Selectinas.", "Integrinas.", "Conexinas.", "Cadherinas."], correct: 0, exp: "Las selectinas frenan al leucocito (unión débil) permitiendo que ruede por el endotelio antes de fijarse con las integrinas." },
            { id: 22, q: "Las células del corazón funcionan como sincitio eléctrico gracias a:", options: ["Uniones estrechas.", "Cadherinas.", "Uniones comunicantes (Gap junctions) de conexina.", "Inmunoglobulinas."], correct: 2, exp: "Las Gap junctions permiten el paso directo de iones entre citoplasmas, coordinando la contracción." },
            { id: 23, q: "¿Qué enzima transforma el fibrinógeno en hilos de fibrina?", options: ["Plasmina.", "Factor von Willebrand.", "Trombina.", "Prostaciclina."], correct: 2, exp: "La trombina es la enzima ejecutora final de la cascada de coagulación." },
            { id: 24, q: "¿Qué factor estabiliza el coágulo creando enlaces covalentes entre fibras de fibrina?", options: ["Calcio.", "Factor Xa.", "Factor XIII.", "tPA."], correct: 2, exp: "El factor XIII actúa como 'pegamento' final para dar resistencia tridimensional al coágulo." },
            { id: 25, q: "La Potenciación a Largo Plazo (LTP) se consolida cuando el Calcio activa:", options: ["Proteín-fosfatasas.", "Proteín-quinasas (CaMKII/PKC) que insertan receptores AMPA.", "Canales de potasio.", "Acetilcolinesterasa."], correct: 1, exp: "El aumento de receptores AMPA en la membrana fortalece la respuesta sináptica futura." },
            { id: 26, q: "La Depresión a Largo Plazo (LTD) o 'olvido' ocurre cuando el Calcio bajo activa:", options: ["Fosfatasas que retiran (internalizan) receptores AMPA.", "Bloqueo por Magnesio.", "Destrucción de vesículas de glutamato.", "Toxina botulínica."], correct: 0, exp: "Niveles bajos de calcio activan fosfatasas que quitan los receptores de la superficie." },
            { id: 27, q: "La baja discriminación táctil de la espalda se explica por:", options: ["Divergencia.", "Convergencia (campos receptivos grandes en una sola neurona secundaria).", "Adaptación rápida.", "Ausencia de canales ionotrópicos."], correct: 1, exp: "Muchos sensores envían señal al mismo punto central, perdiendo el 'detalle' del mapa táctil." },
            { id: 28, q: "La llegada de LUZ al fotorreceptor (bastón) provoca:", options: ["Despolarización por Calcio.", "Bloqueo de transducina.", "Activación de fosfodiesterasa, baja el GMPc e HIPERPOLARIZACIÓN.", "Liberación de glutamato."], correct: 2, exp: "Es contraintuitivo: la luz cierra canales y 'apaga' eléctricamente a la célula." },

            // --- BLOQUE 3: CONCEPTO 15 A 20 (12 preguntas) ---
            { id: 29, q: "¿Qué efecto tiene la mielina sobre las propiedades pasivas para aumentar la velocidad?", options: ["Aumenta capacitancia y baja resistencia interna.", "Baja resistencia de membrana.", "Aumenta resistencia de membrana y disminuye capacitancia.", "Bloquea canales de potasio."], correct: 2, exp: "Actúa como aislante: evita fugas ($R_m$) y separa cargas ($C_m$), haciendo que el impulso 'salte'." },
            { id: 30, q: "En la Esclerosis Múltiple, el bloqueo de la conducción se debe a:", options: ["Pérdida de mielina, aumenta capacitancia y genera fugas masivas.", "Hipertrofia de astrocitos.", "Toxina botulínica.", "Mutación de canales de sodio."], correct: 0, exp: "Sin mielina, la señal se fuga por la membrana desnuda y no llega al siguiente nodo." },
            { id: 31, q: "El experimento de la Peroxidasa de Rábano (HRP) demostró:", options: ["El viaje al soma.", "El reciclaje local de membrana por endocitosis.", "Que el calcio no es necesario.", "Que la peroxidasa es precursor de ACh."], correct: 1, exp: "Se vio cómo las vesículas captaban la enzima del exterior al formarse de nuevo tras la exocitosis." },
            { id: 32, q: "¿Qué proteína 'estrangula' el cuello de la vesícula endocítica?", options: ["Sinaptobrevina.", "Clatrina.", "Dinamina.", "Sintaxina."], correct: 2, exp: "La dinamina consume energía para 'cortar' la vesícula de la membrana plasmática." },
            { id: 33, q: "En el músculo, ¿qué evento desencadena el 'golpe de fuerza'?", options: ["Unión de ATP.", "Hidrólisis de ATP.", "Liberación del Fosfato inorgánico ($P_i$) de la miosina.", "Cierre de la bomba SERCA."], correct: 2, exp: "Al 'escupir' el fosfato, la miosina libera la energía que mueve mecánicamente el filamento de actina." },
            { id: 34, q: "En el músculo relajado, ¿qué hace el complejo Troponina-Tropomiosina?", options: ["Bomba de calcio.", "La tropomiosina bloquea físicamente los sitios de unión para miosina.", "Conecta línea Z y M.", "Libera ACh."], correct: 1, exp: "La tropomiosina 'estorba' en medio de la actina para evitar la contracción accidental." },
            { id: 35, q: "La Atropina sube la frecuencia cardíaca porque:", options: ["Es agonista nicotínico.", "Es antagonista muscarínico, bloqueando el freno parasimpático.", "Inhibe la AChE.", "Destruye la proteína Gi."], correct: 1, exp: "Bloquea los receptores M2 del corazón, impidiendo que la acetilcolina lo frene." },
            { id: 36, q: "La Pilocarpina en el glaucoma actúa como:", options: ["Agonista muscarínico (mimetiza ACh).", "Bloqueante nicotínico.", "Destruye SNARE.", "Inhibidor de dopamina."], correct: 0, exp: "Mimetiza al parasimpático, induciendo miosis y facilitando el drenaje del ojo." },
            { id: 37, q: "En las piernas del maratoniano predominan:", options: ["Fibras Tipo IIb blancas.", "Fibras Tipo I rojas, oxidativas y resistentes.", "Músculo liso.", "Fibras sin túbulos T."], correct: 1, exp: "Son fibras preparadas para el oxígeno, ricas en mitocondrias y capilares." },
            { id: 38, q: "¿De dónde obtiene energía el músculo en los primeros 5-7 segundos de sprint?", options: ["Oxidación de grasas.", "Fosfato de Creatina vía Creatín-quinasa.", "Bomba SERCA.", "Fermentación alcohólica."], correct: 1, exp: "Es el reservorio de energía inmediata ('flash') antes de que arranque la glucólisis." },
            { id: 39, q: "La llegada de LUZ al bastón retiniano provoca:", options: ["Despolarización.", "Síntesis de AMPc.", "Activación de fosfodiesterasa, baja el GMPc e HIPERPOLARIZACIÓN.", "Contracción física."], correct: 2, exp: "La luz detiene la 'corriente oscura' de sodio, volviendo la célula más negativa." },
            { id: 40, q: "Dejar de sentir el roce de la ropa es un ejemplo de:", options: ["Periodo refractario.", "Convergencia.", "Adaptación rápida (receptores fásicos).", "Inhibición lateral."], correct: 2, exp: "Los receptores fásicos detectan la novedad pero se callan ante el estímulo constante." },

            // --- BLOQUE 4: BLOQUES 1 AL 11 (80 preguntas - Unificadas) ---
            { id: 41, q: "¿Qué marcador mide el volumen del plasma sanguíneo?", options: ["Inulina.", "Sodio radiactivo.", "Azul de Evans.", "Agua deuterada."], correct: 2, exp: "Se une a la albúmina y no sale del capilar." },
            { id: 42, q: "Si colocamos una célula en urea 300 mM:", options: ["No pasa nada.", "Se encoge.", "Se hincha porque la urea entra con agua.", "Expulsa urea."], correct: 2, exp: "Urea = soluto penetrante. Genera hinchamiento (hipotónica)." },
            { id: 43, q: "Ión más abundante en el líquido intracelular:", options: ["Sodio.", "Potasio.", "Calcio.", "Cloro."], correct: 1, exp: "El $K^+$ es el catión intracelular principal." },

            { id: 200, q: "Si bloqueas canales K voltaje-dependientes:", options: ["Sin despolarización.", "PA prolongado (falla repolarización).", "Mielina crece.", "Hiperpolarización infinita."], correct: 1, exp: "No puede bajar el voltaje." }
        ];

        let questions = [];
        let answersState = {};
        let marked = new Set();

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz(isRandom) {
            document.getElementById('start-modal').classList.add('hidden');
            questions = isRandom ? shuffle([...allQuestions]) : [...allQuestions];
            renderAll();
        }

        function renderAll() {
            const container = document.getElementById('questions-container');
            const sidebar = document.getElementById('sidebar');
            container.innerHTML = '';
            sidebar.innerHTML = '';

            questions.forEach((item, index) => {
                // Sidebar compact dots
                const dot = document.createElement('div');
                dot.className = `index-dot ${marked.has(item.id) ? 'marked' : ''}`;
                dot.id = `dot-${index}`;
                dot.innerText = index + 1;
                dot.onclick = () => document.getElementById(`q-${index}`).scrollIntoView({behavior: 'smooth'});
                sidebar.appendChild(dot);

                // Card
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${index}`;

                let opts = item.options.map((t, i) => ({ text: t, originalIdx: i }));
                shuffle(opts);

                card.innerHTML = `
                    <div class="q-header">
                        <span class="q-text">${index + 1}. ${item.q}</span>
                        <button class="mark-btn ${marked.has(item.id) ? 'active' : ''}" onclick="toggleMark(${item.id}, ${index})">
                            ${marked.has(item.id) ? '★' : '☆'}
                        </button>
                    </div>
                    <div class="options-list">
                        ${opts.map(o => `
                            <div class="option" onclick="handleSelect(this, ${index}, ${o.originalIdx}, ${item.correct})">
                                ${o.text}
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="feed-${index}">
                        <strong>Fisiología:</strong> ${item.exp}
                    </div>
                `;
                container.appendChild(card);
            });
            updateProgress();
        }

        function toggleMark(id, index) {
            if (marked.has(id)) marked.delete(id);
            else marked.add(id);
            document.getElementById(`dot-${index}`).classList.toggle('marked');
            const btn = document.querySelector(`#q-${index} .mark-btn`);
            btn.classList.toggle('active');
            btn.innerText = marked.has(id) ? '★' : '☆';
        }

        function handleSelect(el, qIdx, selectedIdx, correctIdx) {
            if (answersState[qIdx]) return;
            const isCorrect = selectedIdx === correctIdx;
            answersState[qIdx] = { correct: isCorrect };
            
            el.classList.add(isCorrect ? 'correct' : 'incorrect');
            document.getElementById(`feed-${qIdx}`).style.display = 'block';
            document.getElementById(`dot-${qIdx}`).classList.add('answered');
            
            const card = document.getElementById(`q-${qIdx}`);
            card.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
            updateProgress();
        }

        function updateProgress() {
            const done = Object.keys(answersState).length;
            document.getElementById('progress').innerText = `Respondidas: ${done} / ${questions.length}`;
        }

        function showFinalResults() {
            const modal = document.getElementById('finish-modal');
            const scoreText = document.getElementById('score-text');
            const correctOnes = Object.values(answersState).filter(a => a.correct).length;
            scoreText.innerText = `${correctOnes} / ${questions.length}`;

            const hasFailed = Object.values(answersState).some(a => !a.correct);
            const hasMarked = marked.size > 0;
            document.getElementById('btn-failed').style.display = hasFailed ? 'block' : 'none';
            document.getElementById('btn-marked').style.display = hasMarked ? 'block' : 'none';
            document.getElementById('btn-both').style.display = (hasFailed || hasMarked) ? 'block' : 'none';
            modal.classList.remove('hidden');
        }

        function restart(mode) {
            let nextSet = [];
            const failedIds = Object.keys(answersState).filter(idx => !answersState[idx].correct).map(idx => questions[idx].id);

            if (mode === 'all') nextSet = [...allQuestions];
            else if (mode === 'failed') nextSet = allQuestions.filter(q => failedIds.includes(q.id));
            else if (mode === 'marked') nextSet = allQuestions.filter(q => marked.has(q.id));
            else if (mode === 'both') nextSet = allQuestions.filter(q => failedIds.includes(q.id) || marked.has(q.id));

            questions = nextSet;
            answersState = {};
            document.getElementById('finish-modal').classList.add('hidden');
            renderAll();
            window.scrollTo(0,0);
        }
    </script>

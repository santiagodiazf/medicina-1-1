<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bioquímica 183 - Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #c0392b; --bg: #f8f9fa; --sidebar-width: 80px; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* PANTALLA DE INICIO */
        #start-screen, #results-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .start-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; border: 1px solid #ddd; }
        .start-card h1 { color: var(--primary); margin-bottom: 20px; }
        .start-card select, .start-card button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; }
        .start-card button { background: var(--accent); color: white; border: none; font-weight: bold; transition: 0.3s; }
        .start-card button:hover { background: #2980b9; }

        /* LAYOUT PRINCIPAL */
        #quiz-layout { display: flex; width: 100%; height: 100%; display: none; /* Oculto al inicio */ }
        
        /* SIDEBAR NAVEGACIÓN */
        #sidebar { width: var(--sidebar-width); background: #2c3e50; color: white; overflow-y: auto; flex-shrink: 0; padding: 10px 5px; text-align: center; display: flex; flex-direction: column; gap: 5px; scrollbar-width: thin; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 0; border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.2s; width: 100%; }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-btn.active { border: 2px solid white; font-weight: bold; }
        .nav-btn.correct { background: var(--success); }
        .nav-btn.incorrect { background: var(--error); }
        .nav-btn.marked::after { content: ' 🚩'; font-size: 10px; }

        /* AREA DE PREGUNTAS */
        #main-area { flex-grow: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; position: relative; }
        .question-container { max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        
        /* TARJETA DE PREGUNTA */
        .q-card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); position: relative; scroll-margin-top: 20px; }
        .q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .q-title { font-weight: bold; font-size: 1.1em; color: var(--primary); width: 85%; }
        .q-mark { cursor: pointer; font-size: 0.9em; color: #7f8c8d; display: flex; align-items: center; gap: 5px; }
        .q-mark input { transform: scale(1.3); cursor: pointer; }
        
        /* OPCIONES */
        .options-grid { display: flex; flex-direction: column; gap: 8px; }
        .opt-btn { text-align: left; background: #f8f9fa; border: 1px solid #dee2e6; padding: 12px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 1em; width: 100%; }
        .opt-btn:hover:not(:disabled) { background: #e9ecef; }
        .opt-btn.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .opt-btn:disabled { cursor: default; opacity: 0.8; }

        /* EXPLICACIÓN */
        .explanation { margin-top: 15px; padding: 15px; background: #e8f4fd; border-left: 4px solid #3498db; border-radius: 4px; display: none; animation: fadeIn 0.3s; font-size: 0.95em; }
        .explanation strong { color: #2980b9; }

        /* BOTÓN FLOTANTE FINALIZAR */
        #btn-finalize { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        #btn-finalize:hover { transform: scale(1.05); }

        /* MODAL RESULTADOS */
        .result-stats { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .stat-box { background: #f1f2f6; padding: 15px; border-radius: 8px; min-width: 100px; }
        .stat-val { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #777; }
        
        .retry-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .retry-btn { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .btn-all { background: var(--primary); grid-column: span 2; }
        .btn-failed { background: var(--error); }
        .btn-marked { background: #f39c12; }
        .btn-failed-marked { background: #8e44ad; grid-column: span 2; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Responsive */
        @media(max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 50px; flex-direction: row; order: 2; overflow-x: auto; padding: 5px; }
            #main-area { height: calc(100vh - 50px); order: 1; padding: 20px; }
            .nav-btn { width: 40px; flex-shrink: 0; }
        }
    </style>
</head>
<body>

            <p>Selecciona el modo de estudio:</p>

                    <option value="bloque12">Bloque XII (Colágeno)</option>
                    <option value="bloque16">Bloque XVI (Músculo/Ejercicio)</option>
                </select>
            </div>

            <div id="exam-options" style="display:none;">
                <label for="q-amount">Número de preguntas:</label>
                <select id="q-amount">
                    <option value="20">20 preguntas aleatorias</option>
                    <option value="30">30 preguntas aleatorias</option>

                    <option value="75">75 preguntas aleatorias</option>
                    <option value="100">100 preguntas aleatorias</option>
                </select>
            </div>

            <button onclick="startQuiz()">COMENZAR TEST</button>
        </div>
    </div>

    <div id="quiz-layout">
        <div id="sidebar">
            </div>
        <div id="main-area">
            <div id="questions-wrapper" class="question-container">
                </div>
        </div>
        <button id="btn-finalize" onclick="showResults()">🏁 Finalizar y Revisar</button>
    </div>

    <div id="results-modal" style="display:none;">
        <div class="start-card">
            <h2>Resultados</h2>
            <div class="result-stats">
                <div class="stat-box" style="color:var(--success)">
                    <span class="stat-val" id="score-correct">0</span>
                    <span class="stat-label">Aciertos</span>
                </div>
                <div class="stat-box" style="color:var(--error)">
                    <span class="stat-val" id="score-wrong">0</span>
                    <span class="stat-label">Fallos</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="score-marked">0</span>
                    <span class="stat-label">Marcadas</span>
                </div>
            </div>
            
            <p>¿Qué deseas hacer ahora?</p>
            <div class="retry-options">
                <button class="retry-btn btn-all" onclick="retry('all')">🔄 Repetir Completo</button>
                <button class="retry-btn btn-failed" onclick="retry('failed')">❌ Repetir solo Falladas</button>
                <button class="retry-btn btn-marked" onclick="retry('marked')">🚩 Repetir solo Marcadas</button>

            </div>
            <button style="background:#7f8c8d; margin-top:10px;" onclick="location.reload()">🏠 Volver al Inicio</button>
        </div>
    </div>

        // VARIABLES DE ESTADO
        let currentQuestions = [];
        let userAnswers = {}; // { qId: { selected: index, correct: bool, marked: bool } }

        // ==========================================
        // LÓGICA DE INICIO Y FILTRADO
        // ==========================================
        function toggleExamOptions() {
            const mode = document.getElementById('mode-select').value;
            document.getElementById('block-options').style.display = mode === 'blocks' ? 'block' : 'none';
            document.getElementById('exam-options').style.display = mode === 'exam' ? 'block' : 'none';
        }

        function startQuiz() {
            const mode = document.getElementById('mode-select').value;
            userAnswers = {}; // Reset

            if (mode === 'blocks') {
                const block = document.getElementById('block-select').value;
                currentQuestions = block === 'todos' 
                    ? [...fullDB] 
                    : fullDB.filter(q => q.b === block);
            } else {
                const amount = parseInt(document.getElementById('q-amount').value);
                const shuffled = [...fullDB].sort(() => 0.5 - Math.random());
                currentQuestions = shuffled.slice(0, amount);
            }

            if(currentQuestions.length === 0) return alert("No hay preguntas en esta selección.");

            renderQuiz();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-layout').style.display = 'flex';
        }

        // ==========================================
        // RENDERIZADO DEL QUIZ (PRINCIPAL)
        // ==========================================
        function renderQuiz() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('questions-wrapper');
            
            sidebar.innerHTML = '';
            main.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                // 1. Crear botón sidebar
                const navBtn = document.createElement('button');
                navBtn.className = 'nav-btn';
                navBtn.innerText = index + 1;
                navBtn.onclick = () => document.getElementById(`q-${q.id}`).scrollIntoView({behavior: 'smooth'});
                navBtn.id = `nav-${q.id}`;
                sidebar.appendChild(navBtn);

                // 2. Mezclar opciones (Aleatoriedad solicitada)
                // Creamos un array de objetos con texto e índice original para no perder la correcta
                let optionsObj = q.o.map((txt, i) => ({ txt, originalIdx: i }));
                // Shuffle
                optionsObj.sort(() => Math.random() - 0.5);

                // 3. Crear tarjeta pregunta
                const card = document.createElement('div');
                card.className = 'q-card';
                card.id = `q-${q.id}`;
                
                // Header con Título y Checkbox
                card.innerHTML = `
                    <div class="q-header">
                        <div class="q-title">${q.q}</div>
                        <label class="q-mark">
                            <input type="checkbox" onchange="toggleMark(${q.id}, this.checked)">
                            Marcar
                        </label>
                    </div>
                `;

                // Grid de Opciones
                const optGrid = document.createElement('div');
                optGrid.className = 'options-grid';
                
                optionsObj.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = opt.txt;
                    btn.onclick = () => handleAnswer(q.id, opt.originalIdx, btn, optionsObj, q.c);
                    optGrid.appendChild(btn);
                });
                card.appendChild(optGrid);

                // Explicación (oculta)
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.id = `exp-${q.id}`;
                // Generamos una explicación automática basada en la respuesta correcta
                exp.innerHTML = `<strong>Respuesta Correcta:</strong> ${q.o[q.c]}`; 
                card.appendChild(exp);

                main.appendChild(card);
            });
        }

        // ==========================================
        // LÓGICA DE RESPUESTA
        // ==========================================
        function handleAnswer(qId, selectedOriginalIdx, btnElement, optionsObj, correctIdx) {
            // Prevenir responder dos veces
            if (userAnswers[qId] && userAnswers[qId].answered) return;

            const isCorrect = selectedOriginalIdx === correctIdx;
            
            // Guardar estado
            if (!userAnswers[qId]) userAnswers[qId] = {};
            userAnswers[qId].answered = true;
            userAnswers[qId].correct = isCorrect;

            // UI Botón seleccionado
            if (isCorrect) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('wrong');
                // Buscar y resaltar la correcta visualmente
                const siblings = btnElement.parentElement.children;
                for (let sib of siblings) {
                    // Texto del botón vs Texto de la opción correcta
                    // (Comparar texto es más seguro tras el shuffle)
                    const dbQ = fullDB.find(x => x.id === qId);
                    if (sib.innerText === dbQ.o[correctIdx]) {
                        sib.classList.add('correct');
                    }
                }
            }

            // Deshabilitar todos los botones de esta pregunta
            const siblings = btnElement.parentElement.children;
            for (let sib of siblings) sib.disabled = true;

            // Mostrar explicación
            document.getElementById(`exp-${qId}`).style.display = 'block';

            // Actualizar Sidebar
            const navBtn = document.getElementById(`nav-${qId}`);
            navBtn.classList.add(isCorrect ? 'correct' : 'incorrect');
        }

        function toggleMark(qId, isChecked) {
            if (!userAnswers[qId]) userAnswers[qId] = {};
            userAnswers[qId].marked = isChecked;
            
            const navBtn = document.getElementById(`nav-${qId}`);
            if (isChecked) navBtn.classList.add('marked');
            else navBtn.classList.remove('marked');
        }

        // ==========================================
        // FINALIZAR Y REPETIR
        // ==========================================
        function showResults() {
            let correct = 0, wrong = 0, marked = 0;
            
            currentQuestions.forEach(q => {
                const ua = userAnswers[q.id];
                if (ua) {
                    if (ua.correct) correct++;
                    else if (ua.answered) wrong++; // Solo cuenta fallada si la respondió mal
                    if (ua.marked) marked++;
                }
            });

            document.getElementById('score-correct').innerText = correct;
            document.getElementById('score-wrong').innerText = wrong;
            document.getElementById('score-marked').innerText = marked;
            
            document.getElementById('results-modal').style.display = 'flex';
        }

        function retry(mode) {
            let nextQuestions = [];

            if (mode === 'all') {
                // Reiniciar tal cual estaba
                nextQuestions = [...currentQuestions];
            } else if (mode === 'failed') {
                nextQuestions = currentQuestions.filter(q => {
                    const ua = userAnswers[q.id];
                    return ua && ua.answered && !ua.correct;
                });
            } else if (mode === 'marked') {
                nextQuestions = currentQuestions.filter(q => {
                    const ua = userAnswers[q.id];
                    return ua && ua.marked;
                });
            } else if (mode === 'failed_marked') {
                nextQuestions = currentQuestions.filter(q => {
                    const ua = userAnswers[q.id];
                    const isFailed = ua && ua.answered && !ua.correct;
                    const isMarked = ua && ua.marked;
                    return isFailed || isMarked;
                });
            }

            if (nextQuestions.length === 0) {
                alert("No hay preguntas que cumplan ese criterio.");
                return;
            }

            // Reiniciar UI
            currentQuestions = nextQuestions;
            userAnswers = {}; // Limpiar respuestas previas
            document.getElementById('results-modal').style.display = 'none';
            document.getElementById('start-screen').style.display = 'none';
            renderQuiz();
        }

    </script>

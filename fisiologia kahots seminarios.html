<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Quiz Fisiología Humana</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --light: #ecf0f1;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
            overflow: hidden;
        }

        /* Modal Inicial */
        #setup-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .modal-content button {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: var(--secondary);
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        /* Sidebar con scroll */
        #sidebar {
            width: 100px;
            background: var(--primary);
            color: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            flex-shrink: 0;
            scrollbar-width: thin;
        }

        .nav-btn {
            width: 50px;
            height: 40px;
            margin: 4px 0;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-btn.active { border: 2px solid white; background: rgba(255,255,255,0.2); }
        .nav-btn.answered-correct { background: var(--success); border-color: var(--success); }
        .nav-btn.answered-wrong { background: var(--danger); border-color: var(--danger); }
        .nav-btn.marked { border: 2px solid var(--warning); box-shadow: 0 0 8px var(--warning); }

        /* Contenedor Principal */
        #main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        .question-card {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .mark-toggle {
            background: #fff9db;
            border: 1px solid var(--warning);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 20px;
            color: #856404;
        }

        .mark-toggle.active { background: var(--warning); color: white; }

        .option {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #edeff0;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            background: white;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) { border-color: var(--secondary); background: #f0f7ff; }
        .option.correct { background: #d4edda; border-color: var(--success); color: #155724; font-weight: bold; }
        .option.wrong { background: #f8d7da; border-color: var(--danger); color: #721c24; }
        .option.disabled { cursor: default; }

        .explanation-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background: #e1f5fe;
            border-left: 5px solid var(--secondary);
            display: none;
            font-size: 15px;
            line-height: 1.5;
        }

        .footer-nav {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .btn-ui { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-prev { background: #bdc3c7; }
        .btn-next { background: var(--dark); color: white; }
        .btn-finish { background: var(--danger); color: white; }

        /* Resultados */
        #results-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            text-align: center;
            width: 100%;
            overflow-y: auto;
        }

        .retry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 600px;
            margin-top: 25px;
        }

        .retry-grid button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            cursor: pointer;
        }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="setup-modal">
        <div class="modal-content">
            <h1>Preparado para el Test</h1>
            <p>Se han cargado <strong>85 preguntas</strong> literales.</p>
            <button onclick="initQuiz(false)">Orden de los Temas</button>
            <button onclick="initQuiz(true)">Mezclar Todo (Aleatorio)</button>
        </div>
    </div>

    <div id="sidebar"></div>

    <main id="main-container">
        <div id="question-area"></div>
        <div class="footer-nav">
            <button class="btn-ui btn-finish" onclick="confirmFinish()">Finalizar</button>
            <div>
                <button class="btn-ui btn-prev" onclick="changeQ(-1)">Anterior</button>
                <button class="btn-ui btn-next" onclick="changeQ(1)">Siguiente</button>
            </div>
        </div>
    </main>

    <div id="results-screen">
        <h1>Cuestionario Completado</h1>
        <div id="final-stats" style="font-size: 22px; margin: 20px 0;"></div>
        <div class="retry-grid">
            <button onclick="reloadTest('all')">Repetir Cuestionario Completo</button>
            <button onclick="reloadTest('failed')">Repetir solo las Falladas</button>
            <button onclick="reloadTest('marked')">Repetir solo las Marcadas</button>
            <button onclick="reloadTest('failed-marked')">Falladas + Marcadas</button>
        </div>
    </div>

    <script>
        const database = [
            // --- Tanda 1 (Neurofisiología Anterior) ---
            { n: 1, q: "Referente al potencial de acción:", a: ["La fase de despolarización viene determinada por la apertura de canales de K+ dependientes de voltaje", "Puede ser despolarizante o hiperpolarizante", "En el periodo refractario absoluto los canales de Na+ dependientes de voltaje están en su conformación inactivada", "Durante el periodo refractario relativo no se puede generar un segundo potencial de acción"], c: 2, e: "En el periodo refractario absoluto, los canales de Na+ están inactivados, impidiendo físicamente un nuevo p.a." },
            { n: 2, q: "Referente a la velocidad de conducción axonal:", a: ["Es directamente proporcional a la resistencia interna o axial", "Es directamente proporcional a la resistencia de membrana (Rm)", "Es directamente proporcional a la capacitancia de membrana (Cm)", "Es menor cuanto mayor diámetro axonal"], c: 1, e: "Una mayor $R_m$ evita la pérdida de corriente, permitiendo que el potencial viaje más rápido por el axón." },
            { n: 3, q: "En condiciones fisiológicas, una célula cuya permeabilidad al K+ es 1 y al resto de iones es 0, tendrá un potencial de membrana en reposo igual a:", a: ["+55 mV", "El potencial de equilibrio del K+", "0 mV", "El potencial de equilibrio del Na+"], c: 1, e: "Si solo es permeable a un ión, el $V_m$ será igual al potencial de Nernst de ese ión." },
            { n: 4, q: "Respecto a las propiedades pasivas de las membranas es CORRECTO:", a: ["La constante de tiempo ($\tau$) viene determinada por la capacitancia y la resistencia de la membrana", "A mayor constante de espacio ($\lambda$) la distancia recorrida es menor", "A mayor $\tau$ mayor probabilidad de sumación espacial", "Vienen determinadas por canales dependientes de voltaje"], c: 0, e: "$\tau = r_m \cdot c_m$. Define la velocidad de carga y descarga de la membrana." },
            { n: 5, q: "Respecto a la neurogénesis:", a: ["Neuronas, glía y microglía derivan del ectodermo", "Las células de microglía tienen origen mesodérmico", "La placa neural es endodermo", "El tubo neural se forma de las crestas"], c: 1, e: "La microglía proviene del mesodermo (macrófagos), el resto del sistema nervioso del ectodermo." },
            { n: 6, q: "En la neurotransmisión glutamatérgica:", a: ["Los receptores metabotrópicos tipo II y III son autorreceptores.", "NMDA son los únicos en sinapsis adultas.", "AMPA son dependientes de voltaje.", "NMDA media respuestas inhibitorias."], c: 0, e: "Los mGluR II y III suelen situarse en el terminal presináptico para regular la liberación." },
            { n: 7, q: "Respecto a los mecanismos de integración sináptica es CIERTO que:", a: ["Mayor $\tau$ menor suma temporal", "PPSE frecuentemente son despolarizantes", "PPSI son siempre hiperpolarizantes", "Menor $\lambda$ menor probabilidad de suma espacial"], c: 3, e: "Si $\lambda$ es pequeña, el potencial se atenúa muy rápido y no llega a sumarse con otros lejanos." },
            { n: 8, q: "¿Qué propiedad NO tiene por qué cumplir una sustancia para ser considerada neurotransmisor?", a: ["Siempre debe provocar una despolarización", "Se debe encontrar en terminaciones sinápticas", "Se debe liberar por despolarización", "Deben existir receptores específicos"], c: 0, e: "Falso, porque existen neurotransmisores inhibitorios (hiperpolarizantes) como el GABA." },
            { n: 9, q: "En relación con la neurotransmisión colinérgica, es CORRECTO que:", a: ["El transporte de colina es dependiente de sodio.", "AChE degrada 1/3 de la ACh.", "El paso limitante es la conversión por colinacetiltransferasa", "Sinapsis preganglionares son muscarínicas."], c: 0, e: "La recaptación de colina por el transportador CHT es el paso limitante y depende de $Na^+$." },
            { n: 10, q: "En cuanto al ciclo de contracción en el músculo esquelético:", a: ["Golpe de fuerza es por liberación de ADP", "En rigor la miosina tiene unido ADP", "Tropomiosina debe desplazarse para exponer el sitio de unión", "En relajación hay ATP unido"], c: 2, e: "El desplazamiento de la tropomiosina por el $Ca^{2+}$ es el 'interruptor' de la contracción." },
            { n: 11, q: "En cuanto a la neurotransmisión por aminas biógenas:", a: ["Degradación solo por MAO.", "Solo se reponen por síntesis en Golgi.", "Dopamina no tiene actividad neurotransmisora.", "Recaptación por transportadores específicos (DAT, NET, SERT)"], c: 3, e: "Cada amina tiene su transportador de alta afinidad específico en la membrana presináptica." },
            { n: 12, q: "Referente al músulo liso:", a: ["Ca-Calmodulina activa la fosfatasa", "Calcio viene preferentemente del RS", "ATPasa se activa por defosforilación", "Su aparato contráctil carece de troponina"], c: 3, e: "El músculo liso no tiene troponina; usa calmodulina para activar la quinasa (MLCK)." },
            { n: 13, q: "Sobre el control de la tensión muscular por el SNC es INCORRECTO:", a: ["Lentas oxidativas se reclutan antes", "Unidades motoras grandes se reclutan antes", "Tensión depende del número de unidades motoras", "Tensión depende de la frecuencia de disparo"], c: 1, e: "Incorrecto: El principio del tamaño de Henneman dice que las pequeñas se reclutan PRIMERO." },
            { n: 14, q: "La corriente en la placa neuromuscular es independiente de:", a: ["Gradiente de concentración iónica", "Cantidad de glutamato liberado", "Potencial de membrana postsináptica", "Número de canales abiertos"], c: 1, e: "En la placa motora el neurotransmisor es la Acetilcolina, no el glutamato." },
            { n: 15, q: "En cuanto a los receptores sensoriales es CORRECTO que:", a: ["Discriminación espacial aumenta por inhibición lateral.", "Gusto es solo metabotrópico", "Umbral receptor = Umbral perceptivo.", "Tónicos son de adaptación rápida."], c: 0, e: "La inhibición lateral 'limpia' la señal aumentando el contraste y la agudeza espacial." },
            { n: 16, q: "En procesos de aprendizaje y memoria:", a: ["LTP implica aumento de eficacia funcional y estructural.", "LTD implica activación de quinasas.", "Habituación aumenta eficacia.", "Sensibilización disminuye eficacia."], c: 0, e: "La LTP crea cambios duraderos, desde la inserción de receptores hasta nuevas espinas dendríticas." },
            
            // --- TANDA 2 (NUEVAS PREGUNTAS) ---
            { n: 17, q: "¿Qué efecto es más probable que NO tenga relación con una canalopatía cardiaca?", a: ["Taquicardia", "Bradicardia", "Arritmia", "Infarto de miocardio"], c: 3, e: "El infarto es una causa isquémica (falta de riego), no una alteración primaria de canales iónicos (canalopatía)." },
            { n: 18, q: "¿Qué deja pasar la bicapa lipídica directamente?", a: ["Glucosa", "Moléculas liposolubles", "Iones", "Moléculas hidrosolubles grandes"], c: 1, e: "La bicapa es de naturaleza lipídica; solo moléculas afines (liposolubles) o gases pasan por difusión simple." },
            { n: 19, q: "¿Qué es la presión osmótica?", a: ["Presión en el citoplasma", "Presión en el núcleo", "Presión en el espacio intercelular", "Presión para igualar volúmenes"], c: 3, e: "Es la fuerza necesaria para detener el flujo neto de agua a través de una membrana semipermeable." },
            { n: 20, q: "¿Qué describe la ley de Fick?", a: ["Flujo de agua", "Flujo de moléculas", "Flujo de electricidad", "Flujo de calor"], c: 1, e: "Determina la velocidad de difusión de partículas a través de una superficie." },
            { n: 21, q: "¿Qué ocurre en una solución hipotónica?", a: ["Células se crenan", "Células se deshidratan", "Células se estabilizan", "Células se hinchan"], c: 3, e: "El agua entra a la célula donde hay más soluto, provocando su hinchamiento." },
            { n: 22, q: "¿Qué son los canales iónicos?", a: ["Proteínas de transporte", "Carbohidratos", "Ácidos nucleicos", "Lípidos de membrana"], c: 0, e: "Son proteínas integrales que forman poros selectivos para el paso de iones." },
            { n: 23, q: "¿Qué es la ósmosis?", a: ["Movimiento de iones", "Movimiento de solutos", "Movimiento de proteínas", "Movimiento de agua"], c: 3, e: "Difusión pasiva del solvente (agua) hacia zonas de mayor concentración de soluto." },
            { n: 24, q: "¿Cuál es la función de las permeasas?", a: ["Transportar solutos a favor de gradiente", "Producir ATP", "Almacenar energía", "Transportar solutos en contra del gradiente"], c: 0, e: "Son transportadores que facilitan el paso de moléculas sin gasto de energía (Difusión Facilitada)." },
            { n: 25, q: "¿Qué representa la Km en la cinética de difusión facilitada?", a: ["Velocidad máxima", "Afinidad del soluto por el sitio de unión", "Cantidad de transportador", "Concentración de ATP"], c: 1, e: "A menor $K_m$, mayor es la afinidad del transportador por su ligando." },
            { n: 26, q: "¿Qué transporta el transportador GLUT?", a: ["Proteínas", "Ácidos grasos", "Hexosas (como glucosa)", "Aminoácidos"], c: 2, e: "La familia GLUT se encarga de la difusión facilitada de glucosa y otras hexosas." },
            { n: 27, q: "En la Difusión Facilitada la velocidad de transporte NO depende de:", a: ["Concentración del soluto", "Afinidad del soluto", "Cantidad de transportador", "La carga eléctrica del soluto"], c: 3, e: "La difusión facilitada de moléculas neutras como glucosa depende de gradiente y saturación, no de carga eléctrica." },
            { n: 28, q: "En el proceso de inhibición competitiva:", a: ["Disminuye la Vmax", "No se afecta el transporte", "Aumenta la Vmax", "Cambia la Km por el soluto"], c: 3, e: "El inhibidor compite por el sitio de unión, por lo que parece que hay menos afinidad (sube la $K_m$)." },
            { n: 29, q: "¿Qué es el simporte?", a: ["Transportar un soluto", "Transporte en direcciones opuestas", "Transporte de dos solutos en la misma dirección", "Transporte pasivo puro"], c: 2, e: "Es un tipo de cotransporte donde ambas moléculas se mueven en el mismo sentido." },
            { n: 30, q: "La ATPasa de Na+ - K+:", a: ["Usa energía indirecta", "Mueve iones a favor de gradiente", "Saca más cargas positivas de las que mete", "Mete 3 Na por cada 2 K"], c: 2, e: "Es electrogénica: saca 3 $Na^+$ y mete 2 $K^+$. Neto: 1 carga positiva fuera." },
            { n: 31, q: "En un estado de acidosis, ¿qué sucede a nivel renal?", a: ["Excreción de H+", "Reabsorción de K+", "Excreción de HCO3-", "Excreción de K+"], c: 0, e: "El riñón intenta compensar la acidez eliminando protones ($H^+$) por la orina." },
            { n: 32, q: "La Glucosuria renal puede deberse a:", a: ["Exceso de SGLT intestinal", "Defecto de SGLT renal", "Exceso de SGLT renal", "Defecto de SGLT intestinal"], c: 1, e: "Si el transportador SGLT renal falla, no se reabsorbe la glucosa y aparece en orina." },
            { n: 33, q: "La destrucción autoinmune de las células β-pancreáticas son la base de:", a: ["Diabetes tipo I", "Aterosclerosis", "Diabetes tipo II", "Exocitosis"], c: 0, e: "La falta de insulina por destrucción celular es la causa de la Diabetes Tipo 1." },
            { n: 34, q: "Los anticuerpos de la leche materna pasan al recién nacido por:", a: ["Difusión facilitada", "Transcitosis", "Fagocitosis", "Difusión simple"], c: 1, e: "Es un transporte vesicular a través de la célula (del polo luminal al basal)." },
            { n: 35, q: "¿Cómo se transporta el hierro en sangre?", a: ["Como hemosiderina", "Como transferrina", "Como ferritina", "Libre"], c: 1, e: "La transferrina es la proteína plasmática encargada de escoltar al hierro." },
            { n: 36, q: "Una alteración genética que dificulta la endocitosis de LDL provoca:", a: ["Aterosclerosis prematura", "Ascenso del Cádiz", "Diabetes II", "Diabetes I"], c: 0, e: "Si el LDL no entra a las células, se acumula en sangre formando placas de ateroma." },
            { n: 37, q: "¿Cómo se elimina del plasma el LDL 'colesterol malo'?", a: ["Endocitosis mediada por receptor", "Difusión", "Transcitosis", "Exocitosis"], c: 0, e: "Las células lo captan mediante receptores específicos en fositas revestidas." },
            { n: 38, q: "Las hormonas esteroideas:", a: ["Receptores en membrana", "Se unen a receptores intracelulares", "Respuesta rápida", "Señal eléctrica"], c: 1, e: "Al ser liposolubles, cruzan la membrana y actúan en el núcleo o citoplasma." },
            { n: 39, q: "Ordena la secuencia de señalización correcta:", a: ["Receptor -> Señal -> Respuesta", "Molécula señal -> Receptor -> Señal intracelular -> Respuesta", "Respuesta -> Receptor -> Señal", "Señal -> Señal intracelular -> Receptor"], c: 1, e: "Secuencia fisiológica clásica de transducción de señales." },
            { n: 40, q: "¿Por qué unas células responden a unas señales y no a otras?", a: ["Señales al azar", "Concentración de señal", "Depende de los receptores que expresen", "Todas responden igual"], c: 2, e: "La especificidad celular viene dada por la presencia del receptor correspondiente." },
            { n: 41, q: "¿Por qué los receptores celulares son un objetivo clave en fármacos?", a: ["Regulan funciones y comunicación intercelular", "Solo en células enfermas", "Reemplazan receptores dañados", "Eliminan receptores malos"], c: 0, e: "Al modular receptores, podemos controlar procesos biológicos específicos." },
            { n: 42, q: "Cuando un receptor celular se une a su ligando, siempre genera una respuesta inmediata.", a: ["Verdadero", "Falso"], c: 1, e: "Falso. Algunas respuestas (transcripción génica) pueden tardar horas o días." },
            { n: 43, q: "¿Qué ventajas ofrece una cascada de señalización?", a: ["Amplificación y regulación eficiente", "Disminución de sensibilidad", "Aumento tiempo respuesta", "Inhibición completa"], c: 0, e: "Una sola molécula de señal puede activar miles de efectores finales (amplificación)." },
            { n: 44, q: "Si un fármaco ACh origina bradicardia, ¿qué administrarías como antídoto?", a: ["Atropina (Antagonista muscarínico)", "Pilocarpina", "Paracetamol", "Propranolol"], c: 0, e: "La atropina bloquea los receptores muscarínicos del corazón, revirtiendo la bradicardia." },
            { n: 45, q: "¿Qué consecuencias tiene la exposición prolongada a un fármaco?", a: ["Desensibilización y tolerancia", "Inhibición de proteínas", "Bloqueo transcripción", "Aumento afinidad"], c: 0, e: "La célula se adapta reduciendo el número o sensibilidad de sus receptores (Down-regulation)." },
            { n: 46, q: "Las vías de señalización constituyen una diana terapéutica para muchas patologías.", a: ["Verdadero", "Falso"], c: 0, e: "Cierto, la mayoría de los fármacos actuales actúan sobre estas vías." },
            { n: 47, q: "Orden local a lejano de comunicación celular:", a: ["Contacto, Autocrina, Paracrina, Endocrina", "Endocrina, Paracrina, Autocrina, Contacto", "Autocrina, Paracrina, Endocrina, Contacto", "Contacto, Paracrina, Autocrina, Endocrina"], c: 0, e: "Endocrina es la más lejana (viaja por sangre a todo el cuerpo)." },
            { n: 48, q: "¿Cuál es la principal función de las neurotrofinas?", a: ["Supervivencia y diferenciación neuronal", "Homeostasis del calcio", "Promover inflamación", "Inhibir sinapsis"], c: 0, e: "Son factores esenciales para que las neuronas no mueran durante el desarrollo." },
            { n: 49, q: "La proteína RAS actúa como una GTPasa reguladora del ciclo celular.", a: ["Verdadero", "Falso"], c: 0, e: "Cierto, es un interruptor molecular que alterna entre estados unidos a GTP/GDP." },
            { n: 50, q: "En cáncer, ¿qué efecto tiene un aumento del factor VEGF?", a: ["Limita crecimiento", "Aumenta angiogénesis (creación vasos)", "Inhibe metástasis", "Induce apoptosis"], c: 1, e: "Los tumores secretan VEGF para atraer vasos sanguíneos y nutrirse." },
            { n: 51, q: "¿Cuál es la característica de la comunicación paracrina?", a: ["Respuestas lentas", "Larga distancia", "Señal en células cercanas", "Solo embrionario"], c: 2, e: "Se difunde por el líquido intersticial a células vecinas." },
            { n: 52, q: "Los receptores de factores de crecimiento son fundamentalmente:", a: ["Tirosinacinasa (RTK)", "Acoplados a proteína G", "Canales iónicos", "Intracelulares"], c: 0, e: "Al unirse el ligando, se autofosforilan iniciando la cascada de crecimiento." },
            { n: 53, q: "En la transición epitelio-mesenquimal (EMT), ¿qué molécula disminuye?", a: ["N-cadherina", "E-cadherina", "Integrina", "ICAM"], c: 1, e: "La pérdida de E-cadherina permite a las células soltarse del epitelio y migrar." },
            { n: 54, q: "¿Qué estructura permite intercambio directo sin exponerse al exterior?", a: ["Uniones GAP", "Desmosomas", "Uniones ocluyentes", "Uniones adherentes"], c: 0, e: "Las GAP (conexones) comunican directamente los citoplasmas de dos células." },
            { n: 55, q: "Las integrinas se unen principalmente a la matriz extracelular.", a: ["Verdadero", "Falso"], c: 0, e: "Cierto, anclan la célula a proteínas como colágeno o fibronectina." },
            { n: 56, q: "¿Qué molécula participa en la extravasación de leucocitos (diapédesis)?", a: ["Cadherina", "Selectinas", "Conexinas", "Ocludinas"], c: 1, e: "Las selectinas permiten el rodamiento inicial de los glóbulos blancos por el vaso." },
            { n: 57, q: "¿Qué proteína media la adhesión en uniones adherentes?", a: ["Integrinas", "Selectinas", "Cadherinas", "Conexinas"], c: 2, e: "Las cadherinas son las proteínas 'pegamento' que dependen de calcio." },
            { n: 58, q: "Los leucotrienos están implicados en la inflamación y broncoconstricción.", a: ["Verdadero", "Falso"], c: 0, e: "Cierto, son potentes mediadores inflamatorios en el asma." },
            { n: 59, q: "¿Por qué la aspirina previene eventos cardiovasculares?", a: ["Bloquea síntesis de TXA2 (antiagregante)", "Aumenta prostaciclina", "Bloquea serotonina", "Produce NO"], c: 0, e: "Al inhibir el tromboxano, las plaquetas no se pegan y no forman trombos." },
            { n: 60, q: "¿Qué enzima sintetiza óxido nítrico en el endotelio?", a: ["eNOS", "NADPH oxidasa", "Guanilato ciclasa", "Prostaciclina S"], c: 0, e: "La eNOS (Endothelial Nitric Oxide Synthase) es la responsable en el vaso." },
            { n: 61, q: "¿Cuál NO es un efecto fisiológico del óxido nítrico?", a: ["Vasodilatación", "Contracción del músculo liso", "Inhibición plaquetaria", "Neurotransmisión"], c: 1, e: "El NO es vasodilatador, por lo tanto provoca relajación, no contracción." },
            { n: 62, q: "¿Principal vía del NO en el músculo liso?", a: ["Guanilato ciclasa / GMPc", "Adenilato ciclasa / AMPc", "Inhibición PLC", "Canales de Calcio"], c: 0, e: "El NO activa la guanilato ciclasa soluble, subiendo el GMPc que relaja el músculo." },
            { n: 63, q: "Relativo a una hiperpotasemia grave:", a: ["Parada cardíaca", "Hiperpolarización", "Excreción renal excesiva", "No afecta"], c: 0, e: "Demasiado $K^+$ fuera despolariza las células cardíacas y puede detener el corazón." },
            { n: 64, q: "El aumento de permeabilidad a qué ión NO provocaría despolarización:", a: ["Na+", "Ca2+", "Cl-", "K+"], c: 3, e: "El $K^+$ sale de la célula, haciendo el interior más negativo (hiperpolarización)." },
            { n: 65, q: "Relativo al Vm en reposo de una célula:", a: ["Cerca de E de Na", "Cerca de E de K", "Cerca del ión más permeable", "No flujo neto"], c: 2, e: "El potencial de membrana siempre 'se rinde' ante el ión que tiene más puertas abiertas." },
            { n: 66, q: "Relativo al potencial de equilibrio (Nernst):", a: ["Flujo neto presente", "Es cero siempre", "No flujo neto para ese ión", "Igual a Vm siempre"], c: 2, e: "Es el punto exacto donde la fuerza eléctrica compensa a la química; flujo neto = 0." },
            { n: 67, q: "¿Cómo se comportan los canales de fuga en el análogo eléctrico?", a: ["Transformador", "Inductancia", "Capacitancia", "Resistencia"], c: 3, e: "Oponen resistencia al paso de la corriente iónica." },
            { n: 68, q: "¿Qué propiedad describe la capacidad de almacenar cargas opuestas?", a: ["Conductancia", "Modelo RC", "Capacitancia", "Resistencia"], c: 2, e: "La bicapa lipídica actúa como un condensador (capacitancia)." },
            { n: 69, q: "¿Qué determina la constante de espacio ($\lambda$)?", a: ["Atenuación espacial", "Tiempo total", "Amplitud inicial", "Fuerza señal"], c: 0, e: "Describe cuánto decae el potencial a lo largo de la distancia." },
            { n: 70, q: "¿Qué efecto tiene un aumento en $\tau$?", a: ["Suma temporal", "Baja suma espacial", "Sube suma espacial", "Extiende curso temporal"], c: 0, e: "Si el potencial dura más tiempo, es más fácil que llegue otro y se sumen." },
            { n: 71, q: "¿Cuál NO es una característica de los potenciales sinápticos?", a: ["Despolarizantes", "Propagación con decremento", "Propagación activa", "Son graduados"], c: 2, e: "Se propagan de forma PASIVA (electrotónica), no activa como el p.a." },
            { n: 72, q: "¿Qué ión es crucial en la despolarización del p.a. neuronal?", a: ["Sodio", "Calcio", "Cloro", "Potasio"], c: 0, e: "La entrada masiva de $Na^+$ dispara la positividad." },
            { n: 73, q: "¿Qué ocurre durante la repolarización?", a: ["Entrada Na", "Aumento Vm", "Salida Na", "Salida K+"], c: 3, e: "La salida de $K^+$ devuelve a la célula a su estado negativo de reposo." },
            { n: 74, q: "¿Qué características son propias de los potenciales de acción?", a: ["Suma temporal", "Comportamiento óhmico", "Son estereotipados", "Son graduados"], c: 2, e: "Son 'todo o nada'; siempre tienen la misma forma y amplitud." },
            { n: 75, q: "¿Qué caracteriza el periodo refractario absoluto?", a: ["Na inactivados", "P.a. posible", "Suma espacial", "Intensidad mayor"], c: 0, e: "Es imposible generar un p.a. porque los canales de $Na^+$ no pueden abrirse." },
            { n: 76, q: "¿Qué tipo de canales se abren durante la despolarización?", a: ["Na+ voltaje-dependientes", "Ca2+ voltaje", "Cl- voltaje", "K+ voltaje"], c: 0, e: "Se abren de forma explosiva al alcanzar el umbral." },
            { n: 77, q: "¿Qué determina la frecuencia máxima de disparo neuronal?", a: ["Duración potencial", "Tamaño célula", "Intensidad", "Periodos refractarios"], c: 3, e: "El tiempo que la neurona tarda en 'recuperarse' limita cuántos p.a. puede lanzar." },
            { n: 78, q: "¿Qué es el síndrome de Guillain-Barré?", a: ["Enfermedad desmielinizante", "Digestiva", "Respiratoria", "Circulatoria"], c: 0, e: "Es un ataque autoinmune a la mielina de los nervios periféricos." },
            { n: 79, q: "¿Qué es la esclerosis múltiple?", a: ["Ósea", "Muscular", "Enfermedad desmielinizante", "Cardíaca"], c: 2, e: "Afecta a la mielina del Sistema Nervioso Central." },
            { n: 80, q: "¿Qué ocurre si falta mielina?", a: ["Conducción lenta", "Conducción normal", "Inversa", "Rápida"], c: 0, e: "Al no haber aislamiento, la corriente se fuga y el impulso va mucho más despacio." },
            { n: 81, q: "¿Qué parámetro afecta la velocidad de conducción del p.a.?", a: ["Soma", "Axón longitud", "Dendritas", "Resistencia interna"], c: 3, e: "Menor resistencia interna (axón más gordo) = mayor velocidad." },
            { n: 82, q: "¿Qué estrategia evolutiva aumenta más la velocidad?", a: ["Diámetro", "Capacitancia", "Bajar Rm", "Mielinización"], c: 3, e: "La mielina permite la conducción saltatoria, que es la más eficiente." },
            { n: 83, q: "¿A qué hace referencia la capacitancia de membrana?", a: ["Distribución", "Pérdida", "Generación", "Almacenamiento de carga"], c: 3, e: "La membrana actúa como un almacén temporal de iones." },
            { n: 84, q: "¿Cómo se propaga el potencial de acción?", a: ["Circular", "Aleatorio", "Unidireccional", "Bidireccional"], c: 2, e: "Debido a la inactivación de los canales de $Na^+$ detrás de él, solo puede ir hacia delante." },
            { n: 85, q: "¿Dónde inicia el potencial de acción?", a: ["Segmento inicial", "Soma", "Terminal", "Dendritas"], c: 0, e: "En el cono axónico, donde hay mayor densidad de canales de $Na^+$." }
        ];

        let questions = [];
        let curIdx = 0;
        let userAnswers = {}; 
        let markedQs = new Set();

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initQuiz(isRandom) {
            document.getElementById('setup-modal').style.display = 'none';
            questions = isRandom ? shuffle([...database]) : [...database];
            curIdx = 0;
            userAnswers = {};
            questions.forEach(q => {
                const opts = q.a.map((txt, i) => ({txt, originalIdx: i}));
                q.shuffledA = isRandom ? shuffle(opts) : opts;
            });
            renderSidebar();
            showQuestion(0);
        }

        function renderSidebar() {
            const side = document.getElementById('sidebar');
            side.innerHTML = '';
            questions.forEach((_, i) => {
                const b = document.createElement('button');
                b.className = 'nav-btn';
                b.id = `nav-${i}`;
                b.innerText = i + 1;
                b.onclick = () => showQuestion(i);
                side.appendChild(b);
            });
        }

        function showQuestion(idx) {
            curIdx = idx;
            const q = questions[idx];
            const area = document.getElementById('question-area');
            const isAnswered = userAnswers[idx] !== undefined;

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${idx}`).classList.add('active');

            let optionsHtml = '';
            q.shuffledA.forEach(opt => {
                let stateClass = '';
                if (isAnswered) {
                    if (opt.originalIdx === q.c) stateClass = 'correct';
                    else if (opt.originalIdx === userAnswers[idx].selected) stateClass = 'wrong';
                    stateClass += ' disabled';
                }
                optionsHtml += `<button class="option ${stateClass}" onclick="checkAnswer(${opt.originalIdx})">${opt.txt}</button>`;
            });

            area.innerHTML = `
                <div class="question-card">
                    <div class="q-header">
                        <span>${idx + 1} / ${questions.length}</span>
                        <button class="mark-toggle ${markedQs.has(q.n) ? 'active' : ''}" onclick="toggleMark(${q.n})">
                            ${markedQs.has(q.n) ? '★ Marcada' : '☆ Marcar'}
                        </button>
                    </div>
                    <h2>${q.q}</h2>
                    <div>${optionsHtml}</div>
                    <div class="explanation-box" id="exp-${idx}">${q.e}</div>
                </div>
            `;
            if (isAnswered) document.getElementById(`exp-${idx}`).style.display = 'block';
            if (window.MathJax) MathJax.typeset();
        }

        function checkAnswer(selectedIdx) {
            if (userAnswers[curIdx] !== undefined) return;
            const q = questions[curIdx];
            const correct = selectedIdx === q.c;
            userAnswers[curIdx] = { selected: selectedIdx, correct };
            document.getElementById(`nav-${curIdx}`).classList.add(correct ? 'answered-correct' : 'answered-wrong');
            showQuestion(curIdx);
        }

        function toggleMark(n) {
            if (markedQs.has(n)) markedQs.delete(n);
            else markedQs.add(n);
            document.getElementById(`nav-${curIdx}`).classList.toggle('marked', markedQs.has(n));
            showQuestion(curIdx);
        }

        function changeQ(step) {
            const next = curIdx + step;
            if (next >= 0 && next < questions.length) showQuestion(next);
        }

        function confirmFinish() {
            if (confirm("¿Finalizar el test y ver resultados?")) showResults();
        }

        function showResults() {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('sidebar').style.display = 'none';
            const screen = document.getElementById('results-screen');
            screen.style.display = 'flex';
            let correct = Object.values(userAnswers).filter(v => v.correct).length;
            document.getElementById('final-stats').innerHTML = `Aciertos: <strong>${correct}</strong> / ${questions.length}`;
        }

        function reloadTest(mode) {
            let newSet = [];
            if (mode === 'all') newSet = [...database];
            else if (mode === 'failed') newSet = questions.filter((q, i) => userAnswers[i] && !userAnswers[i].correct);
            else if (mode === 'marked') newSet = questions.filter(q => markedQs.has(q.n));
            else if (mode === 'failed-marked') newSet = questions.filter((q, i) => (userAnswers[i] && !userAnswers[i].correct) || markedQs.has(q.n));

            if (newSet.length === 0) { alert("Sin preguntas."); return; }
            questions = newSet;
            curIdx = 0; userAnswers = {};
            questions.forEach(q => {
                const opts = q.a.map((txt, i) => ({txt, originalIdx: i}));
                q.shuffledA = opts;
            });
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            document.getElementById('sidebar').style.display = 'flex';
            renderSidebar();
            questions.forEach((q, i) => { if (markedQs.has(q.n)) document.getElementById(`nav-${i}`).classList.add('marked'); });
            showQuestion(0);
        }
    </script>
</body>

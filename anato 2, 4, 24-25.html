    { id: 128, q: "24. A la altura de la abertura torácica superior, ¿cuál es la relación del nervio frénico con la gruesa vena subclavia antes de entrar al tórax?", a: "b", ex: "Cruza el desfiladero cérvicotorácico pasando justo por entre los vasos subclavios,.", o: ["a) Pasa por detrás del cuello de la primera costilla, muy dorsal a la vena.", "b) Pasa emparedado entre la arteria y la vena subclavia, relacionándose estrechamente con ambas.", "c) Discurre por dentro de la luz de la vena yugular interna.", "d) Se hace posterior y acompaña al esófago."] },
    { id: 129, q: "25. La vascularización gonadal femenina corre a cargo de la arteria ovárica. Para llegar desde el retroperitoneo hasta el ovario, esta arteria discurre por el interior de:", a: "c", ex: "El ligamento suspensorio es un pliegue peritoneal que \"envuelve\" a los vasos ováricos en su descenso hacia la fosa ovárica,.", o: ["a) El ligamento redondo del útero.", "b) El ligamento ancho (en su porción del mesometrio).", "c) El ligamento suspensorio del ovario (infundibulopélvico).", "d) El ligamento uterosacro."] },
    { id: 130, q: "26. ¿De qué gran tronco vascular se origina directamente la arteria ovárica en el abdomen?", a: "c", ex: "Como vaso gonadal (al igual que la arteria testicular), nace directamente de la cara lateral de la aorta abdominal,.", o: ["a) De la arteria ilíaca interna (hipogástrica).", "b) De la arteria uterina.", "c) De la aorta abdominal (a nivel lumbar).", "d) De la arteria pudenda interna."] },
    { id: 131, q: "27. Además de transportar los vasos ováricos, el ligamento suspensorio cumple una función de fijación extendiéndose desde la extremidad tubárica del ovario hasta:", a: "b", ex: "Fija el polo superior del ovario a la pared pélvica lateral,.", o: ["a) El vértice de la vejiga urinaria.", "b) La pared lateral de la pelvis.", "c) El conducto inguinal.", "d) El monte de Venus."] },
    { id: 132, q: "28. Durante el desarrollo fetal, el testículo desciende desde el abdomen hasta el escroto. ¿Qué estructura de origen embrionario arrastra consigo y termina rodeando al testículo en forma de serosa aislada?", a: "a", ex: "Al bajar, empuja una bolsa de peritoneo (el proceso vaginal) que se estrangula y deja una cápsula serosa doble alrededor del testículo (la túnica vaginal),.", o: ["a) El peritoneo parietal, que forma el conducto peritoneovaginal (túnica vaginal).", "b) El músculo transverso del abdomen puro.", "c) El uraco atrófico.", "d) La túnica albugínea vesical."] },
    { id: 133, q: "29. ¿Qué estructura cordonal fibrosa es la responsable mecánica de ir \"traccionando\" del testículo hacia la bolsa escrotal (y arrastrando estos planos abdominales)?", a: "b", ex: "El gubernáculo es la \"guía\" que tira del testículo hacia su destino final extraabdominal,.", o: ["a) El conducto deferente.", "b) El gubernáculo (gubernaculum testis).", "c) El ligamento de Henle.", "d) La fascia transversalis."] },
    { id: 134, q: "30. Como resultado de este arrastre, los planos musculares del abdomen forman las fascias del cordón espermático. ¿De qué músculo abdominal deriva la fascia espermática externa?", a: "c", ex: "La capa más superficial del abdomen (oblicuo externo) da lugar a la capa más superficial del cordón (fascia espermática externa),.", o: ["a) Del oblicuo interno.", "b) De la fascia transversalis.", "c) Del músculo oblicuo externo.", "d) Del músculo cremáster."] },
    { id: 135, q: "31. La clasificación peritoneal divide a los órganos según su movilidad. ¿Cuál de las siguientes porciones del tubo digestivo NO es completamente intraperitoneal (carece de meso libre)?", a: "d", ex: "El colon ascendente y descendente son órganos retroperitoneales secundarios; están pegados a la pared posterior y solo cubiertos por peritoneo por delante,.", o: ["a) El estómago.", "b) El colon transverso.", "c) El yeyuno e íleon.", "d) El colon ascendente (y descendente)."] },
    { id: 136, q: "32. La fijación del colon ascendente y descendente a la pared posterior del abdomen se realiza mediante unas fascias de coalescencia originadas durante el desarrollo embrionario, denominadas:", a: "a", ex: "El peritoneo de estos segmentos cólicos se fusionó con el peritoneo parietal posterior formando la fascia de Toldt,.", o: ["a) Fascias de Toldt (derecha e izquierda).", "b) Fascia de Treitz.", "c) Fascia de Gerota.", "d) Fascia de Buck."] },
    { id: 137, q: "33. Por el contrario, un órgano genuinamente intraperitoneal (como el colon transverso o las asas de yeyuno) se caracteriza por:", a: "b", ex: "Los órganos intraperitoneales cuelgan de un \"tallo\" vascular de doble hoja peritoneal (meso) que los une a la pared posterior,.", o: ["a) Estar incrustado directamente en el músculo psoas.", "b) Estar suspendido en la cavidad abdominal por un mesenterio (meso) que le otorga gran movilidad.", "c) Carecer absolutamente de recubrimiento seroso.", "d) Estar por fuera de la fascia transversalis."] },
    { id: 138, q: "34. En la base de la vejiga masculina, rodeando el inicio de la uretra (cuello vesical), se encuentra el esfínter uretral interno. Su función principal durante el acto sexual es:", a: "b", ex: "Al contraerse, sella el \"techo\" de la próstata, obligando al semen (que entra por los conductos eyaculadores) a salir disparado por la uretra hacia el exterior y no hacia la orina.", o: ["a) Relajarse para permitir el llenado vesical.", "b) Contraerse fuertemente para impedir la entrada de semen en la vejiga (eyaculación retrógrada).", "c) Impulsar pasivamente el líquido prostático hacia el exterior.", "d) Dilatar la uretra esponjosa."] },
    { id: 139, q: "35. A diferencia del esfínter uretral externo (que es voluntario), el esfínter uretral INTERNO está compuesto histológicamente por:", a: "c", ex: "Es una condensación involuntaria de la musculatura lisa (detrusor) del propio cuello de la vejiga.", o: ["a) Fibras musculares estriadas esqueléticas.", "b) Fascículos de colágeno inerte y tendinoso.", "c) Fibras musculares lisas dependientes del músculo detrusor.", "d) Anillos cartilaginosos incompletos."] },
    { id: 140, q: "36. Para cumplir su función valvular impidiendo la eyaculación retrógrada en el momento del orgasmo, este esfínter liso requiere un fuerte estímulo de contracción provisto por:", a: "b", ex: "La eyaculación (emisión y cierre del cuello vesical) es un evento dominado por el sistema simpático. El parasimpático vacía la vejiga (relaja el esfínter),.", o: ["a) El nervio pudendo somático.", "b) Fibras del sistema nervioso simpático (niveles toracolumbares).", "c) El nervio frénico vagal.", "d) Fibras del sistema parasimpático sacro (S2-S4)."] },

    // --- BLOQUE 1 A 15 (SET 3 - 45 PREGUNTAS) ---
    { id: 141, q: "1. Según la anatomía cervical, el músculo escaleno ANTERIOR se inserta superiormente en las apófisis transversas cervicales e inferiormente en la primera costilla. ¿En qué relieve exacto de las apófisis transversas toma su origen este vientre muscular?", a: "c", ex: "Como has anotado, el escaleno anterior busca los \"tubérculos anteriores\" de las vértebras cervicales, siendo el más ventral del grupo.", o: ["a) Únicamente en la apófisis espinosa de C7.", "b) En los tubérculos posteriores de las apófisis transversas.", "c) En los tubérculos anteriores de las apófisis transversas (C3-C6).", "d) En el tubérculo carotídeo de Chassaignac exclusivamente."] },
    { id: 142, q: "2. A diferencia del anterior, ¿dónde toman sus orígenes vertebrales los músculos escalenos MEDIO y POSTERIOR?", a: "b", ex: "Tu nota es exacta: el escaleno anterior va al tubérculo anterior, y el medio y posterior nacen en los tubérculos posteriores.", o: ["a) En la apófisis odontoides del axis.", "b) En los tubérculos posteriores de las apófisis transversas cervicales.", "c) En el ligamento nucal y arco posterior del atlas.", "d) En las apófisis articulares lumbares."] },
    { id: 143, q: "3. Esta separación en sus orígenes e inserciones (1ª y 2ª costilla) crea un espacio vital conocido como desfiladero de los escalenos. ¿Qué relación establece el músculo escaleno ANTERIOR con los grandes vasos subclavios en la 1ª costilla?", a: "b", ex: "El escaleno anterior divide el paquete: la vena se queda ventral a él y la arteria queda atrapada dorsal a él junto con el plexo.", o: ["a) Pasa por detrás de la arteria y la vena subclavia.", "b) Tiene por delante a la vena subclavia y por detrás a la arteria subclavia.", "c) Envuelve a ambos vasos en un estuche fascial único.", "d) Pasa entre la arteria subclavia y el plexo braquial."] },
    { id: 144, q: "4. El testículo y el cordón espermático arrastran varias capas de la pared abdominal durante su descenso. ¿Cuál de las siguientes membranas NO forma parte envolvente del cordón espermático en su trayecto, sino que es un saco seroso exclusivo del testículo?", a: "c", ex: "La túnica vaginal es un repliegue del peritoneo que envuelve al testículo en el escroto, pero no recubre al cordón espermático a lo largo del canal inguinal.", o: ["a) La fascia espermática externa.", "b) La fascia cremastérica.", "c) La túnica vaginal (y su cavidad).", "d) La fascia espermática interna."] },
    { id: 145, q: "5. Analizando la constitución del cordón espermático, ¿de qué plano profundo de la pared abdominal deriva la FASCIA ESPERMÁTICA INTERNA al ser arrastrada?", a: "b", ex: "\"La fascia transversalis forma la fascia espermática interna al ser arrastrada por el testículo\".", o: ["a) Del peritoneo parietal.", "b) De la fascia transversalis.", "c) Del músculo transverso del abdomen puro.", "d) Del músculo oblicuo externo."] },
    { id: 146, q: "6. ¿Y qué músculo o plano abdominal es el responsable de dar origen a la FASCIA CREMASTÉRICA (y al músculo cremáster) que envuelve el cordón de forma intermedia?", a: "a", ex: "\"El músculo oblicuo interno va a originar la fascia cremastérica, que va a tener fibras para el músculo cremáster\".", o: ["a) El músculo oblicuo interno.", "b) El músculo transverso del abdomen.", "c) La aponeurosis del oblicuo externo.", "d) El ligamento inguinal."] },
    { id: 147, q: "7. La envoltura fascial del músculo recto anterior del abdomen (vaina de los rectos) varía según el nivel. En los 2/3 superiores del abdomen, ¿la aponeurosis de qué músculo se DESDOBLA para envolver al recto tanto por su cara anterior como posterior?", a: "c", ex: "En la región superior, la aponeurosis del oblicuo interno se abre en dos hojas, una pasa por delante y otra por detrás del músculo recto.", o: ["a) El oblicuo externo.", "b) El transverso del abdomen.", "c) El oblicuo interno (menor).", "d) El psoas ilíaco."] },
    { id: 148, q: "8. Por debajo del nivel del ombligo, se produce un cambio brusco en la disposición de estas aponeurosis que marca el inicio del 1/3 inferior de la vaina. Este límite fibroso transversal se denomina:", a: "a", ex: "El Arco de Douglas es el límite inferior de la lámina posterior de la vaina de los rectos.", o: ["a) Arco de Douglas (línea arqueada).", "b) Línea semilunar de Spiegel.", "c) Tendón conjunto de Henle.", "d) Ligamento interfoveolar."] },
    { id: 149, q: "9. Al traspasar este Arco de Douglas hacia abajo, todas las aponeurosis (incluida la del oblicuo interno y el transverso) pasan a situarse por DELANTE del músculo recto. ¿Qué fina capa es la única que queda cubriendo la cara POSTERIOR del recto en esta zona baja?", a: "c", ex: "El recto queda \"desnudo\" de aponeurosis en su cara posterior, apoyándose directamente sobre la fascia transversal.", o: ["a) El músculo piramidal.", "b) La aponeurosis del oblicuo externo.", "c) La fascia transversal (transversalis) y el peritoneo parietal.", "d) El saco de Douglas."] },
    { id: 150, q: "10. La asimetría anatómica del tórax hace que las relaciones vasculares de los pedículos pulmonares difieran. ¿Qué gran vaso venoso cabalga transversalmente por encima (relación superior) del bronquio principal DERECHO, algo que no ocurre en el lado izquierdo?", a: "c", ex: "La vena ácigos asciende por la derecha y hace su \"cayado\" saltando justo por encima del bronquio principal derecho para desembocar en la cava superior.", o: ["a) El cayado de la aorta.", "b) La vena pulmonar superior derecha.", "c) El cayado de la vena ácigos.", "d) El tronco braquiocefálico."] },
    { id: 151, q: "11. Por el contrario, ¿qué inmenso vaso arterial \"cabalga\" y se relaciona íntimamente con la cara superior y posterior del bronquio principal IZQUIERDO?", a: "a", ex: "El arco aórtico se monta sobre el bronquio principal izquierdo.", o: ["a) El cayado de la arteria aorta torácica.", "b) La vena hemiácigos.", "c) La arteria torácica interna.", "d) El tronco pulmonar inferior."] },
    { id: 152, q: "12. Geométricamente, el bronquio principal DERECHO también se diferencia del izquierdo en que, para acomodarse a la anatomía de su pulmón, el derecho es:", a: "b", ex: "Esta morfología es la causa de que la inmensa mayoría de los cuerpos extraños aspirados caigan al pulmón derecho.", o: ["a) Mucho más largo, angulado y de menor diámetro.", "b) Más corto, más ancho y de disposición mucho más vertical (casi en línea con la tráquea).", "c) Carente de anillos de cartílago.", "d) Intrapleural desde su inicio."] },
    { id: 153, q: "13. Topográficamente, el punto de referencia crucial para clasificar quirúrgicamente a una hernia inguinal como \"directa\" o \"indirecta\" (oblicua) es su relación posicional con:", a: "c", ex: "Como bien anotas, la arteria epigástrica inferior es la frontera anatómica de clasificación.", o: ["a) El uraco (ligamento umbilical medio).", "b) El ligamento pectíneo de Cooper.", "c) Los vasos (arterias) epigástricos inferiores.", "d) La vena femoral de la fosa oval."] },
    { id: 154, q: "14. Según esta clasificación, una hernia inguinal DIRECTA es aquella que protruye de atrás hacia delante atravesando una debilidad de la pared conocida como el triángulo de Hesselbach. Esta zona se corresponde con la:", a: "b", ex: "Las hernias directas asoman por la fosita medial (Triángulo de Hesselbach), medial a los vasos epigástricos inferiores.", o: ["a) Fosita inguinal lateral (por fuera de la arteria epigástrica).", "b) Fosita inguinal medial (por dentro de la arteria epigástrica inferior).", "c) Fosita supravesical.", "d) Laguna vascular."] },
    { id: 155, q: "15. Por el contrario, una hernia inguinal INDIRECTA (oblicua externa) es la que se introduce acompañando al cordón espermático a través del anillo inguinal profundo. Topográficamente, este orificio se ubica en la:", a: "b", ex: "Entra por la fosa lateral, es decir, lateral al relieve de los vasos epigástricos inferiores.", o: ["a) Fosita supravesical.", "b) Fosita inguinal lateral (por fuera/lateral a la arteria epigástrica inferior).", "c) Fascia lata.", "d) Línea alba superior."] },
    { id: 156, q: "16. Entre el tejido fibrocartilaginoso del disco intervertebral y el tejido óseo cortical de la cara superior/inferior del cuerpo vertebral adyacente, existe una capa de transición histológica vital. Se trata de:", a: "a", ex: "Como has apuntado en tus dudas, entre el núcleo/anillo y el hueso duro hay una capa de cartílago hialino que actúa como barrera y zona de crecimiento.", o: ["a) La placa terminal cartilaginosa (o placa de cartílago hialino).", "b) El ligamento longitudinal posterior adherido.", "c) Una capa de líquido sinovial puro.", "d) La piamadre espinal."] },
    { id: 157, q: "17. Fisiológicamente, dado que el disco intervertebral maduro es avascular (no tiene venas ni arterias propias), la función principal de esta placa terminal de cartílago es:", a: "b", ex: "Actúa como una \"esponja porosa\" que deja pasar los nutrientes de los vasos vertebrales al disco.", o: ["a) Segregar líquido cefalorraquídeo.", "b) Permitir la nutrición del núcleo pulposo mediante la difusión (imbibición) de nutrientes y oxígeno desde el hueso esponjoso subyacente.", "c) Generar los glóbulos rojos espinales.", "d) Conducir la inervación motora."] },
    { id: 158, q: "18. Clínicamente, si debido a un traumatismo axial o degeneración, el núcleo pulposo se hernia rompiendo esta placa cartilaginosa y se introduce hacia el INTERIOR del cuerpo vertebral esponjoso, se denomina:", a: "b", ex: "Es la clásica hernia vertical que agujerea la placa y entra en el hueso, visible en resonancias magnéticas.", o: ["a) Hernia discal posterolateral.", "b) Hernia intraesponjosa (Nódulo de Schmorl).", "c) Espondilolistesis.", "d) Nódulo de Luschka."] },
    { id: 159, q: "19. La tráquea desciende por el mediastino superior hasta su punto de bifurcación en los dos bronquios principales (la carina traqueal). Topográficamente, este importante hito ocurre a nivel vertebral de:", a: "c", ex: "La bifurcación traqueal ocurre clásicamente a nivel del disco intervertebral entre la cuarta y quinta vértebra torácica.", o: ["a) C6-C7.", "b) T1-T2.", "c) T4-T5.", "d) T8-T9."] },
    { id: 160, q: "20. Si trasladamos este nivel vertebral (T4-T5) hacia la anatomía de superficie en la cara anterior del tórax, este plano horizontal se corresponde exactamente con:", a: "c", ex: "El ángulo entre el manubrio y el cuerpo del esternón es el gran proyector topográfico de la carina y el mediastino.", o: ["a) La horquilla esternal.", "b) El apéndice xifoides.", "c) El Ángulo de Louis (ángulo esternal).", "d) La articulación esternoclavicular."] },
    { id: 161, q: "21. Además de marcar la bifurcación de la tráquea, este \"plano transverso del tórax\" trazado desde el Ángulo de Louis señala otro hito vascular cardiovascular fundamental. Hablamos de:", a: "c", ex: "La aorta ascendente se vuelve cayado al cruzar T4 hacia arriba, y el cayado se vuelve aorta descendente al cruzar T4 hacia abajo.", o: ["a) El hiato aórtico diafragmático.", "b) La desembocadura de la cava inferior.", "c) El inicio y el final de la porción transversa del cayado aórtico.", "d) El origen de las arterias coronarias basal."] },
    { id: 162, q: "22. Anatómicamente, la glándula mamaria presenta una prolongación de su tejido glandular que se escapa de los límites circulares de la base de la mama. Esta \"Cola de Spence\" se extiende dirigiéndose hacia:", a: "c", ex: "Es una lengüeta de tejido mamario normal que sube buscando el hueco de la axila.", o: ["a) La región clavicular y yugular (hacia arriba y adentro).", "b) El músculo recto del abdomen (hacia abajo).", "c) La fosa axilar (prolongación axilar hacia arriba y afuera).", "d) El esternón medial (prolongación preesternal)."] },
    { id: 163, q: "23. ¿De qué cuadrante de la mama se origina o arranca invariablemente esta prolongación axilar (Cola de Spence)?", a: "b", ex: "Se desprende del cuadrante superior lateral (externo) de la mama.", o: ["a) Cuadrante superointerno.", "b) Cuadrante superoexterno.", "c) Cuadrante inferointerno.", "d) Cuadrante inferoexterno."] },
    { id: 164, q: "24. Clínicamente, el cuadrante superoexterno y la cola de Spence son las zonas de mayor incidencia de cáncer de mama. Gran parte de su drenaje linfático inicial viaja inmediatamente hacia:", a: "b", ex: "Debido a su proximidad e invasión de la fascia axilar, su drenaje a los ganglios pectorales (axilares) es masivo.", o: ["a) Los ganglios paraesternales (mamarios internos).", "b) Los ganglios axilares de la base (grupo pectoral o anterior).", "c) Los ganglios inguinales superficiales.", "d) Los ganglios mesentéricos."] },
    { id: 165, q: "25. El páncreas vierte su secreción exocrina en el duodeno. ¿A través de qué estructura anatómica labrada en la pared de la segunda porción del duodeno desemboca el conducto pancreático principal (de Wirsung)?", a: "b", ex: "Como has anotado, drena en la papila mayor de la porción descendente del duodeno.", o: ["a) En el píloro gástrico.", "b) En la papila duodenal mayor (carúncula mayor).", "c) En la papila duodenal menor.", "d) En la flexura duodenoyeyunal."] },
    { id: 166, q: "26. En el interior de esta papila duodenal mayor, el conducto pancreático principal suele fusionarse con el conducto colédoco para formar una dilatación final común conocida como:", a: "c", ex: "Ambos fluidos (bilis y jugo pancreático) se mezclan en esta cavidad (Ampolla de Vater) antes de salir al intestino.", o: ["a) Divertículo de Meckel.", "b) Cisterna del quilo.", "c) Ampolla hepatopancreática (de Vater).", "d) Válvula connivente de Kerckring."] },
    { id: 167, q: "27. Para regular el flujo de estos jugos y evitar el reflujo del contenido intestinal, la porción terminal de este complejo posee un engrosamiento de musculatura lisa circular denominado:", a: "a", ex: "El esfínter de Oddi domina la apertura de la papila.", o: ["a) Esfínter hepatopancreático (de Oddi).", "b) Esfínter pilórico superior.", "c) Músculo suspensorio de Treitz.", "d) Esfínter de Morgagni."] },
    { id: 168, q: "28. En la pared posterior del abdomen existen puntos débiles herniarios. Además del triángulo inferior (de Petit), existe el espacio de Grynfelt-Lesshaft. Topográficamente se corresponde con el:", a: "a", ex: "Grynfelt es el triángulo lumbar SUPERIOR, situado más profundo y craneal que el de Petit.", o: ["a) Triángulo lumbar superior.", "b) Triángulo lumbocostal de Bochdalek.", "c) Anillo inguinal profundo.", "d) Triángulo esterno-costal de Larrey."] },
    { id: 169, q: "29. ¿Qué estructuras anatómicas forman los límites clásicos de este triángulo de Grynfelt en la pared lumbar?", a: "b", ex: "Es un resquicio delimitado por la última costilla, los músculos paravertebrales (medial) y el oblicuo menor (lateral). El suelo es la aponeurosis del transverso.", o: ["a) Borde de la cresta ilíaca, dorsal ancho y oblicuo externo.", "b) La 12ª costilla (techo), el músculo erector de la columna (medial) y el músculo oblicuo interno (lateral).", "c) El psoas mayor, el cuadrado lumbar y el riñón.", "d) El ligamento inguinal, sartorio y aductor largo."] },
    { id: 170, q: "30. Clínicamente, el triángulo de Grynfelt es de gran relevancia quirúrgica porque:", a: "b", ex: "Al ser una zona sin cobertura muscular gruesa, la grasa extraperitoneal o las vísceras retroperitoneales pueden herniarse por aquí hacia el flanco.", o: ["a) Es el lugar por donde protruyen las hernias inguinales directas.", "b) Es el punto anatómico por donde con mayor frecuencia emergen las hernias lumbares (hernia de Grynfelt).", "c) Es la única zona donde se puede extirpar el apéndice.", "d) Es el paso de la arteria mesentérica superior."] },
    { id: 171, q: "31. El hígado se relaciona ampliamente con el diafragma. El gran espacio anatómico en la parte posterior del hígado desprovisto de peritoneo, delimitado por las hojas del ligamento coronario y que contacta directamente con el diafragma es:", a: "c", ex: "El área desnuda es la gran zona sin serosa en la cara diafragmática posterior del hígado.", o: ["a) La fosa vesicular.", "b) El lóbulo caudado de Spiegel.", "c) El área desnuda (pars affixa).", "d) El lecho gástrico esplénico."] },
    { id: 172, q: "32. Si atendemos a los límites descritos, el techo o repliegue peritoneal transversal que limita superiormente esta zona libre de peritoneo corresponde a:", a: "b", ex: "El ligamento coronario, al abrirse, delimita el área desnuda del hígado.", o: ["a) El ligamento gastrohepático.", "b) La hoja superior del ligamento coronario.", "c) El epiplon menor.", "d) La hoz de la vena porta."] },
    { id: 173, q: "33. En la cara anterior de la unión hepato-diafragmática, descendiendo sagitalmente desde este ligamento coronario y separando ambos lóbulos, se encuentra el:", a: "a", ex: "Como has anotado, el ligamento falciforme forma la delimitación anterior en esta topografía de fijación hepática.", o: ["a) Ligamento falciforme.", "b) Ligamento redondo.", "c) Ligamento venoso.", "d) Omento menor."] },
    { id: 174, q: "34. El músculo platisma (cutáneo del cuello) es una lámina muscular muy fina situada en la cara anterolateral del cuello. En cuanto a su compartimentación fascial, tal y como has señalado, la estructura que lo envuelve es:", a: "c", ex: "El platisma es un músculo dérmico que se apoya sobre la cara superficial de la fascia cervical que envuelve al esternocleidomastoideo, careciendo él mismo de estuche profundo.", o: ["a) La lámina prevertebral de la fascia cervical profunda.", "b) La vaina carotídea profunda.", "c) Ninguna (carece de fascia de revestimiento profunda, está inmerso en la fascia/tejido subcutáneo superficial).", "d) La fascia endotorácica de Sibson."] },
    { id: 175, q: "35. Por ser un músculo originado a partir de los arcos faríngeos primitivos (músculo de la mímica facial), el platisma recibe su inervación motora del:", a: "c", ex: "Al igual que los músculos de la cara, está inervado por el nervio facial.", o: ["a) Nervio frénico.", "b) Nervio vago (X).", "c) Ramo cervical del nervio facial (VII).", "d) Plexo braquial somático."] },
    { id: 176, q: "36. Como el platisma es extremadamente superficial, transcurre cruzando por encima de estructuras de gran importancia médica en el cuello. Inmediatamente profundo a él (cubierta por el músculo) suele discurrir:", a: "c", ex: "La vena yugular externa desciende cruzando el cuello justo por debajo del platisma, por lo que este músculo suele abrirse en las cirugías de abordaje venoso.", o: ["a) La médula espinal.", "b) La arteria aorta descendente.", "c) La vena yugular externa.", "d) El nervio ciático."] },
    { id: 177, q: "37. El epidídimo es la estructura en la que maduran los espermatozoides. Topográficamente, el epidídimo se adosa a modo de \"cresta\" o \"casco\" sobre qué superficie del testículo:", a: "b", ex: "El epidídimo \"cabalga\" sobre el testículo abrazando su polo superior y recorriendo su borde posterior.", o: ["a) El polo inferior y la cara anterior lisa y convexa.", "b) El borde posterior y parte del polo superior del testículo.", "c) Profundamente incrustado en el centro del parénquima testicular.", "d) Envuelto en la piel escrotal lateral."] },
    { id: 178, q: "38. La porción más abultada y craneal del epidídimo, que descansa directamente sobre el polo superior de la gónada, se denomina:", a: "b", ex: "La \"cabeza\" es la masa ensanchada superior donde aterrizan los conductillos eferentes.", o: ["a) Cuerpo del epidídimo.", "b) Cabeza del epidídimo.", "c) Red testicular (Rete testis).", "d) Mediastino testicular."] },
    { id: 179, q: "39. En su descenso por el borde posterior del testículo, el epidídimo se va estrechando hasta formar la \"cola\". ¿Qué conducto grueso y tubular nace como continuación directa de esta cola del epidídimo?", a: "c", ex: "La cola del epidídimo se acoda hacia arriba y se transforma en el conducto deferente, que formará parte del cordón espermático.", o: ["a) El conducto eyaculador.", "b) El uréter pélvico.", "c) El conducto deferente.", "d) La uretra esponjosa."] },
    { id: 180, q: "40. En el corazón adulto, la depresión central en el tabique interauricular se denomina fosa oval. El borde engrosado y muscular que rodea a esta fosa oval (el \"Limbo de la fosa oval\") recibe el nombre epónimo de:", a: "a", ex: "Como has anotado, el epónimo clásico del limbo de la fosa oval es el \"Anillo de Vieussens\".", o: ["a) Anillo de Vieussens.", "b) Válvula de Eustaquio.", "c) Seno de Thebesio.", "d) Espolón de Wolff."] },
    { id: 181, q: "41. Desde el punto de vista topográfico, ¿desde qué cavidad cardíaca se puede observar clara y prominentemente este reborde muscular (Limbo) alrededor de la fosa oval?", a: "b", ex: "La fosa oval y su fuerte limbo son la marca característica del tabique visto desde la cara de la aurícula derecha.", o: ["a) Desde el ventrículo derecho.", "b) Desde la aurícula derecha.", "c) Desde el interior del cayado aórtico.", "d) Desde el ventrículo izquierdo."] },
    { id: 182, q: "42. Embriológicamente, la persistencia de este marco grueso que constituye el Limbo de la fosa oval representa el vestigio inferior del:", a: "c", ex: "El septum secundum forma la pared gruesa con el orificio central, mientras que el septum primum actúa como la tela fina que tapará el fondo de esa ventana.", o: ["a) Foramen interventricular primario.", "b) Septum primum.", "c) Septum secundum.", "d) Tronco arterioso."] },
    { id: 183, q: "43. Siguiendo tu apunte anatómico, ¿por qué motivo morfológico afirmamos que el colon ASCENDENTE NO es un órgano retroperitoneal puro (primario) como el riñón, sino que \"no es entero retroperitoneal\"?", a: "b", ex: "\"El colon ascendente y descendente son secundariamente retroperitoneal\" ya que están \"pegados\" a la pared posterior pero tapizados por delante por peritoneo.", o: ["a) Porque cuelga completamente suelto y móvil con un largo meso propio en todo su recorrido.", "b) Porque es un órgano que durante el desarrollo era intraperitoneal libre y secundariamente fue empujado hacia la pared posterior, conservando cobertura peritoneal en sus caras anterior y laterales (retroperitoneal secundario).", "c) Porque carece por completo de capa serosa en cualquier zona de su trayecto pélvico.", "d) Porque atraviesa el diafragma diafragmático puro sin serosa."] },
    { id: 184, q: "44. A diferencia del colon ascendente, el segmento intestinal que le precede en la fosa ilíaca derecha, el CIEGO, se caracteriza por ser:", a: "c", ex: "Como has precisado: \"El ciego es intraperitoneal entero\".", o: ["a) Un órgano completamente fusionado y rígido retroperitoneal por fascia.", "b) El inicio del intestino delgado yeyunal libre puro pilórico.", "c) Un órgano enteramente intraperitoneal, recubierto de serosa y con cierta movilidad.", "d) Desprovisto de válvula íleocecal en el ángulo apendicular lateral."] },
    { id: 185, q: "45. La capa fibrosa o tejido conectivo avascular que fija permanentemente la cara posterior del colon ascendente a la pared retroperitoneal del abdomen recibe el nombre de:", a: "a", ex: "El peritoneo original del colon se funde con el parietal posterior formando la fascia de Toldt, que lo \"pega\" al lecho renal/lumbar derecho.", o: ["a) Fascia de Toldt derecha (fascia de coalescencia).", "b) Fascia de Treitz pancreática.", "c) Fascia espermática interna vesical.", "d) Ligamento esplenorrenal mayor."] },
    { id: 186, q: "1. La arteria vertebral asciende por el cuello atravesando los forámenes transversos de las vértebras cervicales. ¿Cuál es la ÚLTIMA y más alta vértebra por cuyo foramen transverso discurre esta arteria antes de buscar el cráneo?", a: "b", ex: "La arteria vertebral sube de C6 a C1. El atlas (C1) es la última vértebra que atraviesa.", o: ["a) C2 (Axis).", "b) C1 (Atlas).", "c) El hueso occipital directamente.", "d) C7 (Vértebra prominente)."] },
    { id: 187, q: "2. Inmediatamente después de atravesar el foramen transverso del atlas (C1), ¿qué particular trayecto topográfico realiza la arteria vertebral?", a: "c", ex: "Al salir de C1, hace una curva pronunciada hacia atrás (acostándose en el arco posterior del atlas) formando parte del triángulo suboccipital.", o: ["a) Desciende bruscamente hacia la glándula tiroides.", "b) Entra directamente por delante de la apófisis odontoides.", "c) Se acoda y discurre horizontalmente hacia atrás, apoyándose en un surco sobre el arco posterior del atlas.", "d) Se fusiona inmediatamente con la vena yugular interna."] },
    { id: 188, q: "3. Para poder ingresar finalmente al conducto raquídeo y ascender por el foramen magno hacia el encéfalo, la arteria vertebral debe perforar una resistente membrana. Se trata de:", a: "a", ex: "Perfora esta membrana fibrosa situada entre el atlas y el hueso occipital para entrar a la cavidad craneal junto a la médula.", o: ["a) La membrana atloido-occipital (occipitoatloidea) posterior.", "b) El ligamento amarillo de C2.", "c) La fascia prevertebral cervical pura.", "d) El ligamento nucal superficial."] },
    { id: 189, q: "4. Las venas lumbares ascendentes son troncos venosos vitales para la formación del sistema ácigos. Tal y como has anotado, es FALSO decir que provienen de las venas ilíacas comunes. Su verdadero origen anatómico se da por:", a: "b", ex: "Las venas lumbares ascendentes se forman por una red anastomótica vertical que une las venas lumbares segmentarias entre sí, paralelas a la cava.", o: ["a) La bifurcación directa de la vena cava inferior en L4.", "b) La anastomosis longitudinal (unión vertical) de las sucesivas venas lumbares transversales a cada lado de la columna.", "c) La prolongación directa de las venas renales hacia abajo.", "d) El drenaje exclusivo de la vena gonadal izquierda."] },
    { id: 190, q: "5. En su ascenso hacia el tórax para convertirse en el sistema ácigos/hemiácigos, ¿con qué músculo de la pared posterior del abdomen mantienen una íntima relación pasando por su espesor o por delante de él?", a: "c", ex: "Suben adosadas a los cuerpos vertebrales, cruzando profundamente a nivel de las inserciones del psoas y los pilares del diafragma.", o: ["a) El músculo recto anterior del abdomen.", "b) El músculo transverso del abdomen.", "c) El músculo psoas mayor (y sus arcos de inserción).", "d) El músculo piramidal de la pelvis."] },
    { id: 191, q: "6. ¿Cuál es el destino torácico inmediato de la vena lumbar ascendente DERECHA al cruzar el diafragma?", a: "b", ex: "La lumbar ascendente derecha más la vena subcostal derecha forman la raíz de la gran vena Ácigos torácica.", o: ["a) Se convierte en la vena hemiácigos.", "b) Se une a la vena subcostal derecha para formar el origen de la vena Ácigos mayor.", "c) Drena directamente en la aurícula izquierda.", "d) Desemboca en el conducto torácico linfático."] },
    { id: 192, q: "13. El tendón intermedio cruzado del músculo omohioideo establece una importante relación de fijación aponeurótica. ¿A qué estructura contribuye a formar o tensar?", a: "c", ex: "\"El tendón intermedio se ubica profundo al ECM y cubriendo superficialmente la vena yugular interna. Forma la vaina carotídea\" y la mantiene tensa para evitar el colapso venoso.", o: ["a) Al ligamento nucal posterior.", "b) A la vaina de los músculos rectos del abdomen.", "c) A la vaina carotídea (sobre la vena yugular interna).", "d) A la pleura cervical (fascia de Sibson)."] },
    { id: 193, q: "43. Los barorreceptores son mecanorreceptores especializados en detectar cambios rápidos en la presión arterial. Sus dos localizaciones anatómicas primordiales son:", a: "b", ex: "Es la clásica ubicación de los detectores de alta presión (\"Barorreceptores principales se encuentran en el seno carotídeo y en el arco aórtico\").", o: ["a) El seno venoso coronario y la aurícula derecha.", "b) El seno carotídeo (en la bifurcación de la carótida) y la pared del arco aórtico (cayado aórtico).", "c) Las venas cavas y las venas pulmonares.", "d) Las arterias renales yuxtaglomerulares exclusivamente."] },
    { id: 194, q: "44. ¿A través de qué nervio craneal se envía prioritariamente la información sensitiva de presión del seno carotídeo?", a: "b", ex: "El seno carotídeo está inervado clásicamente por el IX par (Glosofaríngeo).", o: ["a) A través del nervio olfatorio (I).", "b) A través de una rama del nervio glosofaríngeo (IX par craneal, nervio de Hering).", "c) A través del nervio hipogloso (XII motor).", "d) A través del nervio facial (VII)."] }
];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startQuiz(randomize) {
    isRandom = randomize;
    document.getElementById('setup-screen').style.display = 'none';
    currentQuestions = randomize ? shuffle([...masterQuestions]) : [...masterQuestions];
    renderQuiz();
}

function renderQuiz() {
    const wrapper = document.getElementById('questions-wrapper');
    const nav = document.getElementById('index-nav');
    wrapper.innerHTML = '';
    nav.innerHTML = '';

    currentQuestions.forEach((question, index) => {
        // Shuffling options locally for this render
        const originalCorrectText = question.o[question.a.charCodeAt(0) - 97];
        let shuffledOptions = shuffle([...question.o]);
        let newCorrectIndex = shuffledOptions.indexOf(originalCorrectText);

        const block = document.createElement('div');
        block.className = 'question-block';
        block.id = `q-block-${index}`;
        block.innerHTML = `
            <div class="mark-btn">
                <label><input type="checkbox" onchange="toggleMark(${index}, this.checked)" ${markedQuestions.has(question.id) ? 'checked' : ''}> Marcar</label>
            </div>
            <p><strong>${question.q}</strong></p>
            <div class="options-container" id="opt-cont-${index}">
                ${shuffledOptions.map((opt, i) => `
                    <div class="option" onclick="checkAnswer(${index}, ${i}, ${newCorrectIndex}, '${question.id}')" data-idx="${i}">
                        ${opt}
                    </div>
                `).join('')}
            </div>
            <div class="explanation" id="exp-${index}">${question.ex}</div>
        `;
        wrapper.appendChild(block);

        // Sidebar Item
        const navItem = document.createElement('div');
        navItem.className = 'index-item';
        navItem.id = `nav-item-${index}`;
        navItem.innerText = index + 1;
        if(markedQuestions.has(question.id)) navItem.classList.add('marked');
        navItem.onclick = () => document.getElementById(`q-block-${index}`).scrollIntoView({behavior: 'smooth'});
        nav.appendChild(navItem);
    });
}

function checkAnswer(qIdx, selectedIdx, correctIdx, originalId) {
    const container = document.getElementById(`opt-cont-${qIdx}`);
    const options = container.getElementsByClassName('option');
    const exp = document.getElementById(`exp-${qIdx}`);
    const navItem = document.getElementById(`nav-item-${qIdx}`);

    if (userAnswers[originalId] !== undefined) return;

    userAnswers[originalId] = (selectedIdx === correctIdx);

    for (let i = 0; i < options.length; i++) {
        options[i].classList.add('disabled');
        if (i === correctIdx) options[i].classList.add('correct');
        if (i === selectedIdx && selectedIdx !== correctIdx) options[i].classList.add('wrong');
    }

    exp.style.display = 'block';
    navItem.classList.add(selectedIdx === correctIdx ? 'answered-correct' : 'answered-wrong');
}

function toggleMark(index, isChecked) {
    const qId = currentQuestions[index].id;
    const navItem = document.getElementById(`nav-item-${index}`);
    if (isChecked) {
        markedQuestions.add(qId);
        navItem.classList.add('marked');
    } else {
        markedQuestions.delete(qId);
        navItem.classList.remove('marked');
    }
}

function finishQuiz() {
    const total = currentQuestions.length;
    const correct = Object.values(userAnswers).filter(v => v === true).length;
    document.getElementById('score-text').innerText = `Resultado: ${correct} de ${total}`;
    document.getElementById('results-screen').style.display = 'block';
}

function restartWith(mode) {
    let nextQuestions = [];
    
    if (mode === 'all') {
        nextQuestions = [...masterQuestions];
    } else if (mode === 'failed') {
        nextQuestions = masterQuestions.filter(q => userAnswers[q.id] === false);
    } else if (mode === 'marked') {
        nextQuestions = masterQuestions.filter(q => markedQuestions.has(q.id));
    } else if (mode === 'failed-marked') {
        nextQuestions = masterQuestions.filter(q => userAnswers[q.id] === false || markedQuestions.has(q.id));
    }

    if (nextQuestions.length === 0) {
        alert("No hay preguntas que coincidan con esta selección.");
        return;
    }

    userAnswers = {};
    currentQuestions = isRandom ? shuffle(nextQuestions) : nextQuestions;
    document.getElementById('results-screen').style.display = 'none';
    window.scrollTo(0,0);
    renderQuiz();
}
</script>

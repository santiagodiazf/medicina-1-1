            { id: 124, text: "Si un paciente sufre un atragantamiento total en el restaurante, la maniobra rápida de punción salvavidas (\"Cricotirotomía\") se realiza perforando:", options: [ { text: "a) El cartílago tiroides directamente.", isCorrect: false }, { text: "b) La membrana tirohioidea.", isCorrect: false }, { text: "c) El ligamento cricotiroideo medio (la depresión blanda justo debajo de la nuez de Adán).", isCorrect: true }, { text: "d) La línea alba.", isCorrect: false } ], explanation: "Acceso rápido a la vía aérea infraglótica, sorteando las cuerdas vocales ocluidas." },
            { id: 125, text: "La arteria encargada de vascularizar a los dos tercios inferiores de la médula espinal (Toracolumbar) de forma crítica, cuya lesión accidental provoca paraplejia, es:", options: [ { text: "a) La arteria torácica interna.", isCorrect: false }, { text: "b) La arteria radicular magna de Adamkiewicz.", isCorrect: true }, { text: "c) La arteria vertebral.", isCorrect: false }, { text: "d) La arteria sacra media.", isCorrect: false } ], explanation: "Entra habitualmente entre T9 y L2 por el lado izquierdo. Vital en cirugías de aorta." },
            { id: 126, text: "¿A qué nivel topográfico vertebral atraviesa el Esófago el diafragma (Hiato esofágico)?", options: [ { text: "a) T8.", isCorrect: false }, { text: "b) T10.", isCorrect: true }, { text: "c) T12.", isCorrect: false }, { text: "d) L1.", isCorrect: false } ], explanation: "Recordad la \"Regla de los pares\": Cava 8, Esófago 10, Aorta 12." },
            { id: 127, text: "El hiato esofágico NO solo da paso al tubo digestivo, sino que lo acompañan íntimamente adheridos:", options: [ { text: "a) El conducto torácico.", isCorrect: false }, { text: "b) Los troncos de los nervios Vagos (izquierdo y derecho).", isCorrect: true }, { text: "c) Las venas ácigos y hemiácigos.", isCorrect: false }, { text: "d) La arteria epigástrica superior.", isCorrect: false } ], explanation: "Los vagos acompañan al esófago rotando con él durante el desarrollo embriológico para inervar el estómago." },
            { id: 128, text: "En pacientes con cirrosis hepática severa (\"el filtro del hígado se atasca\"), la sangre del sistema portal busca volver al corazón por derivaciones. ¿Qué patología grave se produce en el esófago inferior por esta hipertensión portal?", options: [ { text: "a) Cáncer de laringe.", isCorrect: false }, { text: "b) Varices esofágicas (con alto riesgo de sangrado digestivo mortal).", isCorrect: true }, { text: "c) Acidez gástrica leve.", isCorrect: false }, { text: "d) Neumonía.", isCorrect: false } ], explanation: "La sangre deriva por el plexo submucoso esofágico, hinchando las venas que comunican el sistema porta con el sistema cava superior." },
            { id: 129, text: "El uréter, en su descenso hacia la pelvis, tiene una relación cruzada muy famosa por delante del psoas con unos vasos muy largos que se dirigen a las gónadas. Son:", options: [ { text: "a) Los vasos epigástricos inferiores.", isCorrect: false }, { text: "b) Los vasos testiculares / ováricos (vasos gonadales).", isCorrect: true }, { text: "c) Los vasos ilíacos internos.", isCorrect: false }, { text: "d) Los vasos lumbares.", isCorrect: false } ], explanation: "Un cólico nefrítico o ureteral referirá el dolor al mismo territorio testicular o labial que vascularizan e inervan esos elementos adyacentes." },
            { id: 130, text: "El músculo cremáster se origina por la \"fuga\" o arrastre de fibras musculares hacia el cordón espermático provenientes de:", options: [ { text: "a) El oblicuo mayor (externo) y el recto anterior.", isCorrect: false }, { text: "b) El oblicuo menor (interno) y el transverso del abdomen.", isCorrect: true }, { text: "c) El músculo piramidal.", isCorrect: false }, { text: "d) El músculo pectíneo.", isCorrect: false } ], explanation: "Cuando el testículo empuja el techo del trayecto inguinal, se lleva fibras de estos músculos para su termorregulación." },
            { id: 131, text: "El drenaje venoso del corazón desemboca mayoritariamente en la Aurícula Derecha a través de:", options: [ { text: "a) Las venas pulmonares.", isCorrect: false }, { text: "b) El Seno Coronario (cuya entrada está limitada por la válvula de Tebesio y forma parte del triángulo de Koch).", isCorrect: true }, { text: "c) La Vena Cava Superior.", isCorrect: false }, { text: "d) La arteria aorta.", isCorrect: false } ], explanation: "Recoge casi toda la sangre venosa del propio miocardio." },
            { id: 132, text: "Para localizar el nodo auriculoventricular (AV o de Aschoff-Tawara) en una cirugía cardíaca, buscaremos el Triángulo de Koch, situado en:", options: [ { text: "a) El ventrículo izquierdo.", isCorrect: false }, { text: "b) La aurícula derecha (limitado por la valva septal tricuspídea, el tendón de Todaro y el orificio del seno coronario).", isCorrect: true }, { text: "c) El ápex cardíaco.", isCorrect: false }, { text: "d) La orejuela izquierda.", isCorrect: false } ], explanation: "Geometría anatómica pura para ubicar el sistema de conducción eléctrica (\"el retraso fisiológico\")." },
            { id: 133, text: "Asimetría linfática: La linfa del cuerpo drena en el conducto torácico (hacia la izquierda) a EXCEPCIÓN de la cabeza, cuello, brazo derecho y hemitórax superior derecho, que drena a través del conducto linfático derecho en:", options: [ { text: "a) La aurícula derecha.", isCorrect: false }, { text: "b) La vena cava inferior.", isCorrect: false }, { text: "c) El ángulo yugulosubclavio DERECHO.", isCorrect: true }, { text: "d) Directamente en el pulmón.", isCorrect: false } ], explanation: "Concepto clínico vital porque las diseminaciones y adenopatías tumorales obedecen a esta asimetría dándole preponderancia a la encrucijada izquierda (Ganglio de Virchow)." },
            { id: 134, text: "La Cisterna del Quilo (o de Pecquet) es una dilatación linfática receptora abdominal situada a nivel de L1-L2, que es el punto de origen del gran:", options: [ { text: "a) Conducto deferente.", isCorrect: false }, { text: "b) Conducto torácico.", isCorrect: true }, { text: "c) Conducto de Santorini.", isCorrect: false }, { text: "d) Sistema venoso ácigos.", isCorrect: false } ], explanation: "Recolecta toda la linfa \"grasienta\" intestinal y de extremidades inferiores para subirla al tórax." },
            { id: 135, text: "El espacio pleural más declive donde se acumulan patológicamente los derrames de líquido (borrando la silueta puntiaguda normal en una radiografía frontal de tórax) es el:", options: [ { text: "a) Receso costomediastínico.", isCorrect: false }, { text: "b) Receso costodiafragmático.", isCorrect: true }, { text: "c) Receso retrofaríngeo.", isCorrect: false }, { text: "d) Seno coronario.", isCorrect: false } ], explanation: "El fondo de saco agudo entre la pared torácica lateral y la caída del diafragma. El sumidero por gravedad." },
            { id: 136, text: "El nervio frénico, motor del diafragma, desciende por el cuello hacia el tórax apoyado directamente sobre la cara anterior de qué músculo:", options: [ { text: "a) Psoas mayor.", isCorrect: false }, { text: "b) Escaleno medio.", isCorrect: false }, { text: "c) Escaleno anterior.", isCorrect: true }, { text: "d) Esternocleidomastoideo.", isCorrect: false } ], explanation: "Cruza la cara anterior de este músculo cervical y queda por detrás de la vena subclavia pero por delante de la arteria subclavia." },
            { id: 137, text: "¿Cuál de las siguientes costillas se articula atípicamente con un solo cuerpo vertebral (carilla completa) y carece de tubérculo costal, por lo que NO tiene articulación costotransversaria funcional?", options: [ { text: "a) 1ª costilla.", isCorrect: false }, { text: "b) 2ª costilla.", isCorrect: false }, { text: "c) 7ª costilla.", isCorrect: false }, { text: "d) 11ª y 12ª costillas (flotantes).", isCorrect: true } ], explanation: "Al ser flotantes y no participar en el asa de cubo respiratoria fija, no necesitan el doble apoyo biomecánico posterior, anclándose en la pared abdominal." },
            { id: 138, text: "En la biomecánica respiratoria, un paciente que sufre fracturas costales múltiples sucesivas y al inspirar ese segmento de la pared del tórax \"se hunde\" hacia dentro, está sufriendo:", options: [ { text: "a) Respiración diafragmática.", isCorrect: false }, { text: "b) Respiración paradójica (Volet costal o tórax inestable).", isCorrect: true }, { text: "c) Cifosis.", isCorrect: false }, { text: "d) Pectus excavatum congénito.", isCorrect: false } ], explanation: "La presión negativa intratorácica que entra el aire, al perder el soporte óseo rígido, succiona el trozo roto de costillas hacia adentro." },
            { id: 139, text: "Si un paciente tiene anestesiada/seccionada la inervación intercostal superficial (músculos paralizados de la pared torácica), seguirá pudiendo inspirar profundamente gracias a un potente músculo \"inspirador accesorio\" originado en el cuello, que eleva las dos primeras costillas:", options: [ { text: "a) El recto del abdomen.", isCorrect: false }, { text: "b) Los escalenos.", isCorrect: true }, { text: "c) El dorsal ancho.", isCorrect: false }, { text: "d) El transverso del tórax.", isCorrect: false } ], explanation: "Son flexores del cuello, pero si se fija el cuello, tiran de la caja torácica hacia arriba (Tiraje costal)." },
            { id: 140, text: "La membrana tectoria (\"techo\" craneocervical) es la potente continuación superior ancha y firme del:", options: [ { text: "a) Ligamento longitudinal anterior.", isCorrect: false }, { text: "b) Ligamento amarillo.", isCorrect: false }, { text: "c) Ligamento longitudinal posterior (LLP).", isCorrect: true }, { text: "d) Ligamento nucal.", isCorrect: false } ], explanation: "El LLP asciende por dentro del canal, cruza el diente del axis y se inserta en el borde anterior del foramen magno cambiando de nombre." }
        ];

        let currentQuestions = [];
        let userAnswers = {};
        let markedQuestions = new Set();

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function startQuiz(randomizeOrder) {
            document.getElementById('start-modal').classList.add('hidden');
            document.getElementById('end-modal').classList.add('hidden');
            
            currentQuestions = JSON.parse(JSON.stringify(dbQuestions));
            if (randomizeOrder) {
                currentQuestions = shuffleArray(currentQuestions);
            }

            userAnswers = {};
            markedQuestions.clear();
            renderQuiz();
        }

        function retryQuiz(mode) {
            document.getElementById('end-modal').classList.add('hidden');
            let pool = [];
            
            if (mode === 'all') {
                pool = [...dbQuestions];
            } else if (mode === 'failed') {
                pool = dbQuestions.filter(q => userAnswers[q.id] === false);
            } else if (mode === 'marked') {
                pool = dbQuestions.filter(q => markedQuestions.has(q.id));
            } else if (mode === 'failed_marked') {
                pool = dbQuestions.filter(q => userAnswers[q.id] === false || markedQuestions.has(q.id));
            }

            if (pool.length === 0) {
                alert("No hay preguntas en esta categoría para repetir.");
                showEndScreen();
                return;
            }

            const randomize = confirm("¿Quieres mezclar el orden de estas preguntas aleatoriamente para este intento?");
            
            currentQuestions = JSON.parse(JSON.stringify(pool));
            if (randomize) {
                currentQuestions = shuffleArray(currentQuestions);
            }

            userAnswers = {};
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('questions-container');
            const indexGrid = document.getElementById('index-grid');
            container.innerHTML = '';
            indexGrid.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                const visualNumber = index + 1;
                
                // Botón del Índice
                const btn = document.createElement('a');
                btn.href = `#q-${q.id}`;
                btn.className = 'index-btn';
                btn.id = `index-btn-${q.id}`;
                btn.textContent = visualNumber;
                if(markedQuestions.has(q.id)) btn.classList.add('marked');
                indexGrid.appendChild(btn);

                // Tarjeta de la Pregunta
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${q.id}`;

                const header = document.createElement('div');
                header.className = 'question-header';
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.innerHTML = `${visualNumber}. ${q.text}`;
                
                const markBtn = document.createElement('button');
                markBtn.className = `mark-btn ${markedQuestions.has(q.id) ? 'active' : ''}`;
                markBtn.innerHTML = '📌 Marcar';
                markBtn.onclick = () => toggleMark(q.id, markBtn);

                header.appendChild(title);
                header.appendChild(markBtn);
                card.appendChild(header);

                // Lista de Opciones (Mezcladas)
                const optionsList = document.createElement('ul');
                optionsList.className = 'options-list';
                optionsList.id = `options-${q.id}`;
                
                let shuffledOptions = shuffleArray([...q.options]);

                shuffledOptions.forEach((opt, optIndex) => {
                    const li = document.createElement('li');
                    li.className = 'option-item';
                    
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = `label-${q.id}-${optIndex}`;
                    
                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `question-${q.id}`;
                    input.value = opt.isCorrect;
                    input.onchange = () => handleAnswer(q.id, input, opt, shuffledOptions, optionsList, q.explanation);
                    
                    label.appendChild(input);
                    const spanText = document.createElement('span');
                    spanText.innerHTML = opt.text;
                    label.appendChild(spanText);
                    
                    li.appendChild(label);
                    optionsList.appendChild(li);
                });

                card.appendChild(optionsList);

                // Caja de Feedback
                const feedback = document.createElement('div');
                feedback.id = `feedback-${q.id}`;
                feedback.className = 'feedback';
                card.appendChild(feedback);

                container.appendChild(card);
            });
        }

        function handleAnswer(qId, selectedInput, selectedOption, allOptionsData, optionsListElement, explanation) {
            const inputs = optionsListElement.querySelectorAll('input');
            inputs.forEach(inp => {
                inp.disabled = true;
                inp.parentElement.classList.add('disabled');
            });

            const isCorrect = selectedOption.isCorrect;
            userAnswers[qId] = isCorrect;

            const indexBtn = document.getElementById(`index-btn-${qId}`);
            indexBtn.classList.remove('correct', 'incorrect');
            indexBtn.classList.add(isCorrect ? 'correct' : 'incorrect');

            inputs.forEach(inp => {
                if (inp.value === 'true') {
                    inp.parentElement.classList.add('correct-answer');
                } else if (inp === selectedInput && !isCorrect) {
                    inp.parentElement.classList.add('incorrect-answer');
                }
            });

            const feedbackEl = document.getElementById(`feedback-${qId}`);
            feedbackEl.classList.add('show');
            
            if (isCorrect) {
                feedbackEl.classList.add('success');
                feedbackEl.innerHTML = `<strong>¡Correcto!</strong><br><em>Explicación de clase: ${explanation}</em>`;
            } else {
                feedbackEl.classList.add('error');
                feedbackEl.innerHTML = `<strong>Incorrecto.</strong><br><em>Explicación de clase: ${explanation}</em>`;
            }
        }

        function toggleMark(qId, btnElement) {
            if (markedQuestions.has(qId)) {
                markedQuestions.delete(qId);
                btnElement.classList.remove('active');
                document.getElementById(`index-btn-${qId}`).classList.remove('marked');
            } else {
                markedQuestions.add(qId);
                btnElement.classList.add('active');
                document.getElementById(`index-btn-${qId}`).classList.add('marked');
            }
        }

        function showEndScreen() {
            let correctCount = 0;
            let answeredCount = 0;
            
            currentQuestions.forEach(q => {
                if (userAnswers[q.id] !== undefined) {
                    answeredCount++;
                    if (userAnswers[q.id] === true) correctCount++;
                }
            });

            const total = currentQuestions.length;
            const scoreText = `Has respondido ${answeredCount} de ${total} preguntas.<br><strong>Aciertos: ${correctCount}</strong>`;
            
            document.getElementById('results-text').innerHTML = scoreText;
            
            const hasFailed = currentQuestions.some(q => userAnswers[q.id] === false);
            const hasMarked = markedQuestions.size > 0;
            
            document.getElementById('btn-retry-failed').style.display = hasFailed ? 'block' : 'none';
            document.getElementById('btn-retry-marked').style.display = hasMarked ? 'block' : 'none';
            document.getElementById('btn-retry-both').style.display = (hasFailed || hasMarked) ? 'block' : 'none';

            document.getElementById('end-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Integral de Anatomía - 160 Preguntas</title>
    <style>
        :root {
            --primary: #1a252f;
            --secondary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f1c40f;
            --bg: #f8f9fa;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* BARRA LATERAL / ÍNDICE */
        #sidebar {
            width: 320px;
            height: 100vh;
            background: var(--primary);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #sidebar h2 { font-size: 1.1rem; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 15px;
        }

        .index-item {
            background: var(--secondary);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            padding: 6px 0;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .index-item:hover { background: var(--accent); color: white; }
        .index-item.active { border: 1px solid var(--accent); box-shadow: 0 0 5px var(--accent); }
        .index-item.correct { background: var(--success) !important; color: white; }
        .index-item.wrong { background: var(--error) !important; color: white; }
        .index-item.marked { background: var(--warning) !important; color: black; font-weight: bold; }

        /* CONTENIDO PRINCIPAL */
        #main-content {
            margin-left: 320px;
            flex: 1;
            padding: 40px;
            max-width: 900px;
            margin-right: auto;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            border-top: 4px solid var(--secondary);
        }

        .mark-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #eee;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .mark-btn.active { background: var(--warning); color: black; }

        .question-header { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; color: var(--primary); }

        .options-list { display: flex; flex-direction: column; gap: 12px; }

        .option {
            padding: 15px;
            border: 2px solid #eaeeef;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s all;
            position: relative;
        }

        .option:hover:not(.locked) { border-color: var(--accent); background: #f0f7ff; }
        .option.selected { border-color: var(--accent); background: #e1f0fa; }
        .option.correct-ans { background: #d4edda; border-color: var(--success); color: #155724; font-weight: bold; }
        .option.wrong-ans { background: #f8d7da; border-color: var(--error); color: #721c24; }
        .option.locked { cursor: default; }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4fd;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
            display: none;
            font-size: 0.95rem;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MODALES */
        #overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-main { background: var(--accent); color: white; }
        .btn-main:hover { background: #2980b9; }
        .btn-finish { background: var(--error); color: white; position: fixed; bottom: 30px; right: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal" id="modal-start">
            <h1>Examen de Anatomía</h1>
            <p>Selecciona el modo de inicio:</p>
            <button class="btn btn-main" onclick="initQuiz(false)">Orden Preestablecido</button>
            <button class="btn btn-main" onclick="initQuiz(true)">Orden Aleatorio (Mezclar)</button>
        </div>

        <div class="modal hidden" id="modal-results">
            <h1>Resultados Finales</h1>
            <p id="final-score" style="font-size: 1.5rem; font-weight: bold;"></p>
            <div class="btn-group">
                <button class="btn btn-main" onclick="restartQuiz('all')">Repetir Cuestionario Completo</button>
                <button class="btn btn-main" style="background:#e67e22" onclick="restartQuiz('failed')">Repetir solo Falladas</button>
                <button class="btn btn-main" style="background:var(--warning); color:black" onclick="restartQuiz('marked')">Repetir solo Marcadas</button>
                <button class="btn btn-main" style="background:var(--secondary)" onclick="restartQuiz('failed_marked')">Repetir Falladas + Marcadas</button>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <h2>ÍNDICE DE PREGUNTAS</h2>
        <div class="index-grid" id="index-grid"></div>
    </div>

    <div id="main-content">
        <div id="quiz-body"></div>
        <button class="btn btn-finish" onclick="showResults()">Finalizar y Corregir</button>
    </div>

    <script>
        // BASE DE DATOS DE PREGUNTAS (160 PREGUNTAS LITERALES)
        const db = [
            // BLOQUE 1: RAQUIS
            { q: "1. Según se describe en la anatomía del raquis, ¿qué porción anatómica específica del disco intervertebral carece por completo de vascularización en el adulto y depende puramente de la difusión (imbibición) para nutrirse?", options: ["Las láminas periféricas del anillo fibroso.", "El núcleo pulposo.", "Los platillos o láminas terminales cartilaginosas.", "El ligamento longitudinal posterior."], correct: 1, exp: "El profesor hace hincapié en que, una vez que termina la osificación de las vértebras, el núcleo pulposo queda aislado, convirtiéndose en la mayor estructura anatómica del organismo carente de vascularización directa." },
            { q: "2. Debido a su nula vascularización y a depender de la difusión, el núcleo pulposo sufre un proceso fisiológico progresivo con la edad que afecta enormemente a la biomecánica del raquis. ¿Cuál es la consecuencia directa de este hecho?", options: ["El núcleo pulposo se hipertrofia al generar su propia red arterial anastomótica.", "El núcleo pulposo se fusiona gradualmente con el ligamento amarillo.", "Pierde su capacidad hidrofílica (se deshidrata), disminuyendo sus proteoglicanos, lo que merma su capacidad de absorber fuerzas compresivas y reduce la flexibilidad del raquis.", "Se transforma en músculo estriado."], correct: 2, exp: "Al nutrirse tan precariamente, con la edad el núcleo pulposo pierde agua (pasa del 88% en el nacimiento a un 65% en la vejez) y los proteoglicanos se degradan." },
            { q: "3. \"El binomio vascular-nervioso\". Al igual que ocurre con su falta de riego sanguíneo, la inervación del disco intervertebral no es homogénea. ¿Qué parte del disco es la ÚNICA que recibe terminaciones nerviosas (propiocepción y dolor) de los ramos espinales?", options: ["El núcleo pulposo en todo su espesor.", "Las láminas periféricas más superficiales del anillo fibroso.", "Únicamente la porción anterior, inervada por el nervio vago.", "El disco intervertebral carece totalmente de nervios en toda su estructura."], correct: 1, exp: "Trampa clásica. Mientras que el núcleo pulposo y las láminas internas son totalmente avasculares y carecen de nervios, la periferia del disco sí está inervada." },
            { q: "4. El núcleo pulposo es una estructura avascular de consistencia gelatinosa. Desde el punto de vista embriológico, ¿de qué estructura primitiva es un vestigio directo?", options: ["De la notocorda.", "Del tubo neural.", "De los miotomas dorsales.", "Del arco aórtico."], correct: 0, exp: "Los restos del cordón macizo central de la notocorda quedan atrapados en el centro del disco, formando así el núcleo pulposo." },
            
            // CONCEPTO 1: ARTERIA VERTEBRAL
            { q: "C1-1. La arteria vertebral es fundamental para la irrigación del encéfalo posterior. Anatómicamente, su origen principal se localiza como la primera rama ascendente de:", options: ["El arco aórtico directamente.", "La arteria carótida común.", "La arteria subclavia pre-escalénica.", "El tronco tirocervical anterior."], correct: 2, exp: "La arteria vertebral nace de la porción pre-escalénica (primera porción) de la arteria subclavia." },
            { q: "C1-2. En su porción cervical o de ascenso, la arteria vertebral busca protegerse en el conducto óseo formado por los forámenes transversos. Lo habitual es que ingrese a este conducto a nivel de la vértebra:", options: ["C4.", "C5.", "C6.", "C7."], correct: 2, exp: "Como norma anatómica, la arteria vertebral omite el foramen transverso de C7 e ingresa al conducto raquídeo a partir de la vértebra C6." },
            { q: "C1-3. Topográficamente, justo antes de ingresar en su primer foramen transverso, la arteria vertebral (porción prevertebral) asciende relacionándose directamente con la cara posterior del músculo:", options: ["Elevador de la escápula.", "Escaleno anterior.", "Esternocleidomastoideo.", "Escaleno posterior."], correct: 1, exp: "La arteria nace de la subclavia y sube hacia C6 pasando por detrás del músculo escaleno anterior." },
            { q: "C1-4. Tras atravesar el foramen magno, ambas arterias vertebrales (derecha e izquierda) convergen en la cara anterior del puente (protuberancia) para formar:", options: ["La arteria basilar.", "La arteria cerebral media.", "La arteria comunicante anterior.", "El seno sagital superior."], correct: 0, exp: "Ambas vertebrales se fusionan en la línea media intracraneal para formar el tronco basilar." },

            // CONCEPTO 2: VENA CAVA INFERIOR / HEPÁTICA
            { q: "C2-5. El sistema venoso abdominal es complejo. ¿Cuál drena su contenido DIRECTAMENTE en la Vena Cava Inferior?", options: ["La vena gástrica izquierda.", "La vena mesentérica superior.", "La vena esplénica principal.", "Las venas suprahepáticas."], correct: 3, exp: "Las venas gástrica, mesentérica y esplénica forman el sistema Porta. Solo tras pasar el hígado, la sangre sale por las suprahepáticas a la Cava Inferior." },
            { q: "C2-6. Las venas hepáticas vierten su sangre en la Vena Cava Inferior en un punto topográfico situado inmediatamente a nivel de:", options: ["El hiato aórtico (T12).", "El orificio del centro tendinoso del diafragma (T8).", "El hiato esofágico (T10).", "La bifurcación aórtica (L4)."], correct: 1, exp: "Drenan en la Cava Inferior inmediatamente antes de que atraviese el centro frénico (T8) para entrar al corazón." },
            { q: "C2-7. Todas las siguientes venas son afluentes directos de la Cava Inferior, EXCEPTO:", options: ["Vena renal izquierda.", "Vena gonadal derecha.", "Vena mesentérica inferior.", "Venas lumbares medias."], correct: 2, exp: "La vena mesentérica inferior drena habitualmente en la vena esplénica (sistema Porta)." },
            { q: "C2-8. En la clínica de la hipertensión portal, una importante anastomosis porto-cava natural ocurre a nivel de:", options: ["El plexo venoso submucoso del esófago inferior.", "La red vascular de la curvatura mayor gástrica.", "La confluencia de las venas ilíacas comunes.", "Las venas intercostales posteriores altas."], correct: 0, exp: "La vena gástrica izquierda (Porta) se anastomosa con las venas esofágicas (Cava Superior)." },

            // CONCEPTO 3: GLANDE
            { q: "C3-9. El glande del pene está constituido exclusivamente por la dilatación distal de:", options: ["Los cuerpos cavernosos.", "El cuerpo esponjoso.", "La túnica albugínea fibrosa.", "La fascia profunda de Buck."], correct: 1, exp: "Es el cuerpo esponjoso (que aloja la uretra) el que se expande para formar el glande." },
            { q: "C3-10. En el espesor del glande, la uretra esponjosa presenta una dilatación característica denominada:", options: ["Colículo seminal.", "Seno prostático.", "Fosa navicular.", "Utrículo prostático."], correct: 2, exp: "La fosa navicular es el ensanchamiento final de la luz uretral dentro del glande." },
            { q: "C3-11. El límite proximal prominente del glande, que sobresale sobre los cuerpos cavernosos, se denomina:", options: ["Rafe perineal medio.", "Cuerpo perineal tendinoso.", "Ligamento suspensorio.", "Corona del glande."], correct: 3, exp: "La corona del glande marca el reborde proximal de la estructura." },
            { q: "C3-12. La inervación sensitiva somática del glande es vehiculizada por el nervio dorsal del pene, que es rama terminal del:", options: ["Pudendo (S2-S4).", "Genitofemoral (L1-L2).", "Ilioinguinal (L1).", "Obturador (L2-L4)."], correct: 0, exp: "La sensibilidad exquisita del glande la da el nervio pudendo." },

            // CONCEPTO 4: TRIÁNGULO DE PETIT
            { q: "C4-13. El límite ANTERIOR del triángulo lumbar inferior (de Petit) está formado por el borde posterior del músculo:", options: ["Dorsal ancho.", "Cuadrado lumbar.", "Oblicuo externo.", "Oblicuo interno."], correct: 2, exp: "El oblicuo externo forma el límite anterior, mientras que el dorsal ancho forma su límite posterior." },
            { q: "C4-14. El límite POSTERIOR de este triángulo de Petit corresponde al borde anteroinferior del músculo:", options: ["Serrato posteroinferior.", "Dorsal ancho.", "Psoas mayor.", "Transverso del abdomen."], correct: 1, exp: "El músculo dorsal ancho, al ascender desde la cresta ilíaca, delimita por detrás este espacio." },
            { q: "C4-15. La base del triángulo lumbar de Petit está constituida por:", options: ["La 12ª costilla.", "La cresta ilíaca.", "La espina ciática.", "El ligamento inguinal."], correct: 1, exp: "La cresta ilíaca cierra el triángulo por debajo." },
            { q: "C4-16. El SUELO de este triángulo está formado por el músculo:", options: ["Psoas mayor.", "Cuadrado lumbar.", "Oblicuo interno.", "Fascia toracolumbar."], correct: 2, exp: "El suelo muscular está tapizado por las fibras del músculo oblicuo interno del abdomen." },

            // CONCEPTO 5: ECM
            { q: "C5-17. El borde posterior del esternocleidomastoideo marca la frontera ANTERIOR de:", options: ["El triángulo carotídeo.", "El triángulo cervical posterior (lateral).", "La región submandibular.", "El triángulo muscular anterior."], correct: 1, exp: "Dorsalmente al ECM se abre el triángulo cervical posterior u occipital." },
            { q: "C5-18. El punto de Erb (emergencia sensitiva) corresponde a:", options: ["Plexo braquial.", "Nervio frénico.", "Nervio vago.", "Plexo cervical superficial."], correct: 3, exp: "Donde emergen ramos como el auricular magno, occipital menor, cervical transverso y supraclaviculares." },
            { q: "C5-19. El borde posterior del ECM es cruzado superficialmente en diagonal por:", options: ["Vena yugular interna.", "Vena retromandibular.", "Vena yugular externa.", "Vena subclavia."], correct: 2, exp: "La yugular externa viaja por fuera al ECM, cruzándolo hacia atrás." },
            { q: "C5-20. El suelo muscular del triángulo posterior está formado por:", options: ["Escalenos y elevador de la escápula.", "Músculos infrahioideos.", "Constrictor de la faringe.", "Trapecio superior."], correct: 0, exp: "Está tapizado por los escalenos y el elevador de la escápula." },

            // CONCEPTO 6: ROTACIÓN
            { q: "C6-21. El movimiento de ROTACIÓN pura (axial) alcanza su máxima amplitud a nivel de:", options: ["L4-L5.", "T4-T8.", "C0-C1.", "C1-C2 (Atlanto-axial)."], correct: 3, exp: "La articulación atlanto-axial es responsable de más del 50% de la rotación del cuello." },
            { q: "C6-22. La articulación atlanto-axial media es mecánicamente:", options: ["Sincondrosis.", "Artrodia plana.", "Trocoide (en pivote).", "Condílea biaxial."], correct: 2, exp: "Cilindro (diente del axis) girando dentro de un anillo osteofibroso." },
            { q: "C6-23. El eje óseo vertical sobre el cual pivota el Atlas (C1) es:", options: ["El diente (apófisis odontoides) del Axis.", "El tubérculo anterior del Atlas.", "La apófisis espinosa de C2.", "Las masas laterales del occipital."], correct: 0, exp: "El diente del axis actúa como el eje mecánico de rotación." },
            { q: "C6-24. La rotación atlanto-axial está protegida y limitada por:", options: ["Ligamento longitudinal anterior.", "Ligamentos alares.", "Ligamento amarillo.", "Membrana tectoria."], correct: 1, exp: "Los ligamentos alares actúan como cuerdas de freno que limitan la rotación excesiva." },

            // CONCEPTO 7: MOVIMIENTO LUMBAR
            { q: "C7-25. La disposición anatómica de la columna lumbar favorece mayoritariamente:", options: ["Flexión y extensión.", "Rotación axial pura.", "Flexión lateral izquierda.", "Flexión lateral derecha."], correct: 0, exp: "Vértebras lumbares y discos gruesos están optimizados para la flexo-extensión." },
            { q: "C7-26. La limitación de la ROTACIÓN lumbar se debe a:", options: ["Anchura de discos.", "Fusión de espinosas.", "Ligamento longitudinal.", "Orientación casi sagital de las carillas articulares."], correct: 3, exp: "Las apófisis articulares se encajan mirándose medial y lateralmente (plano sagital)." },
            { q: "C7-27. ¿Qué músculo acentúa la lordosis lumbar (extensión) si sufre un espasmo?", options: ["Transverso del abdomen.", "Dorsal ancho.", "Psoas mayor.", "Recto del abdomen."], correct: 2, exp: "El psoas mayor tira de la columna hacia anterior y abajo." },
            { q: "C7-28. Principal ligamento que frena la hiperextensión lumbar:", options: ["Ligamento amarillo.", "Ligamento longitudinal anterior.", "Ligamento interespinoso.", "Ligamento supraespinoso."], correct: 1, exp: "Es el único ligamento de la columna que limita la extensión." },

            // CONCEPTO 8: TIROIDEA SUPERIOR
            { q: "C8-29. La arteria Tiroidea Superior es la primera rama colateral de:", options: ["Cayado aórtico.", "Arteria subclavia.", "Arteria carótida externa.", "Arteria carótida interna."], correct: 2, exp: "Nace justo por encima de la bifurcación carotídea." },
            { q: "C8-30. El origen de la tiroidea superior suele proyectarse a nivel de:", options: ["T1-T2.", "C1-C2.", "C3-C4.", "C7-T1."], correct: 2, exp: "Coincide con el nivel del borde superior del cartílago tiroides." },
            { q: "C8-31. En su descenso, la arteria tiroidea superior se relaciona con el nervio:", options: ["Ramo externo del laríngeo superior.", "Nervio laríngeo recurrente.", "Nervio frénico.", "Cadena simpática."], correct: 0, exp: "Inerva al cricotiroideo y acompaña íntimamente a la arteria." },
            { q: "C8-32. Arteria que perfora la membrana tirohioidea para vascularizar la laringe:", options: ["Faríngea ascendente.", "Laríngea superior.", "Cricotiroidea media.", "Cervical transversa."], correct: 1, exp: "Acompañada del ramo interno del nervio laríngeo superior." },

            // CONCEPTO 9: COLON IZQUIERDO
            { q: "C9-33. La irrigación del colon izquierdo depende íntegramente de:", options: ["Tronco celíaco.", "Arteria mesentérica superior.", "Arteria mesentérica inferior.", "Arterias ilíacas internas."], correct: 2, exp: "Responsable del territorio derivado del intestino posterior." },
            { q: "C9-34. Primera rama colateral de la arteria mesentérica inferior:", options: ["Arteria ileocólica.", "Arteria rectal superior.", "Arteria sigmoidea.", "Arteria cólica izquierda."], correct: 3, exp: "Se dirige al flanco para vascularizar el colon descendente." },
            { q: "C9-35. La anastomosis continua entre colon derecho e izquierdo se llama:", options: ["Tronco gastrocólico.", "Plexo profundo.", "Arteria marginal (Drummond) / Arco de Riolano.", "Arteria rectosigmoidea."], correct: 2, exp: "Asegura el flujo si se obstruye una de las arterias mesentéricas." },
            { q: "C9-36. La vena mesentérica inferior desemboca habitualmente en:", options: ["Vena cava inferior.", "Vena porta hepática.", "Vena esplénica.", "Vena renal izquierda."], correct: 2, exp: "Luego se unirá a la mesentérica superior para formar la Porta." },

            // CONCEPTO 10: HIATO DE WINSLOW
            { q: "C10-37. Límite ANTERIOR del hiato de Winslow (contiene la tríada portal):", options: ["Vena cava inferior.", "Pedículo renal.", "Arteria mesentérica.", "Borde libre del epiplón menor."], correct: 3, exp: "El ligamento hepatoduodenal es el borde anterior y encapsula a la tríada portal." },
            { q: "C10-38. Límite POSTERIOR del hiato de Winslow:", options: ["Arteria aorta.", "Vena cava inferior.", "Vena esplénica.", "Vena renal izquierda."], correct: 1, exp: "La VCI cubierta por peritoneo forma la pared dorsal estricta." },
            { q: "C10-39. Límite SUPERIOR o techo del hiato de Winslow:", options: ["Lóbulo cuadrado.", "Lóbulo caudado (Spiegel).", "Lecho vesicular.", "Ligamento falciforme."], correct: 1, exp: "El lóbulo caudado cuelga superiormente conformando el techo." },
            { q: "C10-40. Límite INFERIOR del hiato de Winslow:", options: ["Primera porción del duodeno.", "Cuerpo del páncreas.", "Colon transverso.", "Curvatura menor."], correct: 0, exp: "El bulbo duodenal marca el suelo del orificio." },

            // CONCEPTO 11: HILIO HEPÁTICO
            { q: "C11-41. Elemento situado más POSTERIOR en el hilio hepático:", options: ["Arteria hepática propia.", "Conducto colédoco.", "Vena porta hepática.", "Vena hepática media."], correct: 2, exp: "La vena porta es el tronco de mayor calibre y se sitúa posteriormente." },
            { q: "C11-42. Elemento de la tríada situado en posición ANTEROLATERAL (derecha):", options: ["Vena porta.", "Arteria hepática.", "Arteria gástrica.", "Conducto colédoco."], correct: 3, exp: "La vía biliar está a la derecha y la arteria hepática a la izquierda." },
            { q: "C11-43. La arteria hepática propia es rama directa de:", options: ["Tronco celíaco.", "Arteria mesentérica superior.", "Arteria hepática común.", "Arteria gastroduodenal."], correct: 2, exp: "Cuando la común emite la gastroduodenal, pasa a llamarse propia." },
            { q: "C11-44. Las estructuras del hilio discurren en el interior de:", options: ["Ligamento falciforme.", "Ligamento coronario.", "Ligamento redondo.", "Ligamento hepatoduodenal."], correct: 3, exp: "Asciende encapsulado en el borde libre del epiplón menor." },

            { q: "S4-C5-17. Utilidad de zona avascular de orejuela izquierda:", options: ["Marcapasos.", "Incisiones/Catéteres sin riesgo sangrado.", "Contraste.", "Válvula aórtica."], correct: 1, exp: "El ciego distal tiene paredes finas y carece de troncos coronarios." },
            { q: "S4-C5-18. Estructura que oculta la base de la orejuela izquierda:", options: ["Arteria circunfleja y vena cardíaca magna.", "Cava superior.", "Braquiocefálico.", "Marginal."], correct: 0, exp: "Tapa el inicio de la circunfleja en surco auriculoventricular." },
            { q: "S4-C5-19. Rugosidades internas favorecen:", options: ["Rotura mitral.", "Trombos (estasis en FA).", "Infartos septo.", "Derrame."], correct: 1, exp: "Músculos pectíneos forman relieves intrincados." },
            { q: "S4-C5-20. Embriológicamente la orejuela es:", options: ["Verdadera aurícula primitiva.", "Tronco arterioso.", "Septo secundum.", "Venas pulmonares."], correct: 0, exp: "Cámara trabeculada primitiva fetal." },

            // CONCEPTO 6 (SET 4): EPIESPINALES
            { q: "S4-C6-21. El ligamento supraespinoso (epiespinal) une:", options: ["Pedículos.", "Ápex (vértice) de apófisis espinosas.", "Cuerpos lumbares.", "Bases transversas."], correct: 1, exp: "Cuerda continua desde C7 hasta la cresta sacra." },
            { q: "S4-C6-22. Ligamentos tensados al máximo en:", options: ["Inclinación.", "Hiperlordosis.", "Flexión profunda.", "Rotación."], correct: 2, exp: "Actúan frenando la separación de los arcos posteriores." },
            { q: "S4-C6-23. Nombre del supraespinoso en región cervical:", options: ["Longitudinal.", "Ligamento nucal (septum nuchae).", "Fascia toracolumbar.", "Tectoria."], correct: 1, exp: "Tabique sagital hasta protuberancia occipital." },
            { q: "S4-C6-24. Relación interespinosos y supraespinoso:", options: ["Planos ortogonales.", "Transversas.", "Fusionados (Interespinoso rellena, supraespinoso cose punta).", "Anterior médula."], correct: 2, exp: "Conforman un complejo ligamentoso continuo posterior." },

            // CONCEPTO 8 (SET 4): LONGITUDINAL ANTERIOR
            { q: "S4-C8-29. Ligamento longitudinal anterior frena la:", options: ["Rotación.", "Hiperextensión / Extensión violenta.", "Flexión.", "Inclinación."], correct: 1, exp: "Ubicado en cara anterior de cuerpos y discos." },
            { q: "S4-C8-30. Morfología del longitudinal anterior:", options: ["Banda que se afina y expande lateralmente sobre cuerpos y discos.", "Perfora anillo.", "Canal medular.", "Solo espinosas."], correct: 0, exp: "Tapiza pilar anterior ensanchándose en discos." },
            { q: "S4-C8-31. Posición del Longitudinal Posterior:", options: ["Transversas.", "Erector columna.", "DENTRO del canal medular (cara post cuerpos y discos).", "Aorta."], correct: 2, exp: "Freno para la flexión y prevención hernia posterior." },
            { q: "S4-C8-32. Riesgo en fase de rebote (extensión) de latigazo cervical:", options: ["Ligamento amarillo.", "Interespinoso.", "Longitudinal Anterior y largo del cuello.", "Médula."], correct: 2, exp: "El estiramiento violento daña la cara anterior del raquis." },

            // CONCEPTO 9 (SET 4): ERECTOR SPINAE
            { q: "S4-C9-33. Fascículos del Erector de la Columna (lat a med):", options: ["Iliocostal, Longísimo y Espinoso.", "Semiespinoso, Multífido, Rotadores.", "Dorsal ancho, Trapecio, Romboides.", "Cuadrado, Psoas, Ilíaco."], correct: 0, exp: "Masa muscular tractora posterior del dorso." },
            { q: "S4-C9-34. Origen de la masa del Erector de la Columna:", options: ["Cráneo.", "12 costillas.", "Sacro, espinosas lumbares y cresta ilíaca.", "Sínfisis."], correct: 2, exp: "Aponeurosis tendinosa compartida baja." },
            { q: "S4-C9-35. Contracción BILATERAL del erector produce:", options: ["Flexión crunch.", "Extensión o erección (enderezamiento) del tronco.", "Asma.", "Desplazamiento cadera."], correct: 1, exp: "Endereza el tronco contra gravedad." },
            { q: "S4-C9-36. Estuche fibroso del Erector:", options: ["Vaina rectos.", "Hojas posterior y media de fascia toracolumbar.", "Peritoneo.", "Pleural."], correct: 1, exp: "Encajonado en canaleja profunda vertebral." }
        ];

        let quizQuestions = [];
        let state = {}; // { index: { selected, marked, correct } }

        function initQuiz(shuffle) {
            quizQuestions = [...db];
            if (shuffle) quizQuestions.sort(() => Math.random() - 0.5);
            
            // Randomize options for each question
            quizQuestions.forEach(item => {
                let optionsData = item.options.map((text, i) => ({ text, isCorrect: i === item.correct }));
                optionsData.sort(() => Math.random() - 0.5);
                item.shuffledOptions = optionsData;
            });

            document.getElementById('overlay').classList.add('hidden');
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-body');
            const grid = document.getElementById('index-grid');
            container.innerHTML = '';
            grid.innerHTML = '';

            quizQuestions.forEach((item, i) => {
                // Sidebar item
                const idxBtn = document.createElement('div');
                idxBtn.className = 'index-item';
                idxBtn.id = `idx-${i}`;
                idxBtn.innerText = i + 1;
                idxBtn.onclick = () => document.getElementById(`card-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                grid.appendChild(idxBtn);

                // Card
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <button class="mark-btn" id="mark-${i}" onclick="toggleMark(${i})">
                        <span>★</span> <span>Marcar</span>
                    </button>
                    <div class="question-header">${item.q}</div>
                    <div class="options-list">
                        ${item.shuffledOptions.map((opt, optIdx) => `
                            <div class="option" id="q${i}-o${optIdx}" onclick="handleSelect(${i}, ${optIdx})">
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation-box" id="exp-${i}">
                        <strong>Explicación:</strong> ${item.exp}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function handleSelect(qIdx, optIdx) {
            if (state[qIdx]?.selected !== undefined) return;

            const question = quizQuestions[qIdx];
            const isCorrect = question.shuffledOptions[optIdx].isCorrect;
            state[qIdx] = { ...state[qIdx], selected: optIdx, correct: isCorrect };

            const optEl = document.getElementById(`q${qIdx}-o${optIdx}`);
            const idxEl = document.getElementById(`idx-${qIdx}`);
            const expEl = document.getElementById(`exp-${qIdx}`);

            if (isCorrect) {
                optEl.classList.add('correct-ans');
                idxEl.classList.add('correct');
            } else {
                optEl.classList.add('wrong-ans');
                idxEl.classList.add('wrong');
                // Show correct one
                question.shuffledOptions.forEach((o, index) => {
                    if (o.isCorrect) document.getElementById(`q${qIdx}-o${index}`).classList.add('correct-ans');
                });
            }

            // Lock all options
            question.shuffledOptions.forEach((_, index) => {
                document.getElementById(`q${qIdx}-o${index}`).classList.add('locked');
            });

            expEl.style.display = 'block';
        }

        function toggleMark(i) {
            if (!state[i]) state[i] = {};
            state[i].marked = !state[i].marked;
            document.getElementById(`mark-${i}`).classList.toggle('active');
            document.getElementById(`idx-${i}`).classList.toggle('marked', state[i].marked);
        }

        function showResults() {
            let score = 0;
            const total = quizQuestions.length;
            Object.values(state).forEach(s => { if (s.correct) score++; });

            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('modal-start').classList.add('hidden');
            document.getElementById('modal-results').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Nota: ${score} / ${total} (${((score/total)*100).toFixed(1)}%)`;
        }

        function restartQuiz(mode) {
            let nextSet = [];
            if (mode === 'all') {
                nextSet = db;
            } else if (mode === 'failed') {
                quizQuestions.forEach((q, i) => { if (state[i] && !state[i].correct) nextSet.push(q); });
            } else if (mode === 'marked') {
                quizQuestions.forEach((q, i) => { if (state[i]?.marked) nextSet.push(q); });
            } else if (mode === 'failed_marked') {
                quizQuestions.forEach((q, i) => { if (state[i] && (!state[i].correct || state[i].marked)) nextSet.push(q); });
            }

            if (nextSet.length === 0) {
                alert("No hay preguntas en esta categoría.");
                return;
            }

            // Reset
            state = {};
            quizQuestions = nextSet;
            quizQuestions.forEach(item => {
                let optionsData = item.options.map((text, i) => ({ text, isCorrect: i === item.correct }));
                optionsData.sort(() => Math.random() - 0.5);
                item.shuffledOptions = optionsData;
            });

            document.getElementById('overlay').classList.add('hidden');
            renderQuiz();
            window.scrollTo(0,0);
        }
    </script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Histología: Tejido Conjuntivo y Epitelio Glandular</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #9b59b6;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f5f7fa;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Índice lateral */
        #sidebar {
            width: 85px;
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            overflow-y: auto;
            border-right: 2px solid #1a252f;
        }

        .index-item {
            width: 45px;
            height: 45px;
            margin: 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--secondary);
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: 0.2s ease-in-out;
            border: 2px solid transparent;
        }

        .index-item:hover { background: var(--accent); }
        .index-item.active { border-color: white; background: var(--accent); }
        .index-item.correct { background: var(--success); }
        .index-item.incorrect { background: var(--error); }
        .index-item.marked { position: relative; border-left: 4px solid #f1c40f; }

        /* Contenedor principal */
        #main-content {
            flex: 1;
            padding: 40px 20px;
            overflow-y: auto;
            position: relative;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        
        /* Pantalla de Inicio */
        #setup-screen { text-align: center; padding: 40px 0; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.05em;
            margin: 10px;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }
        .btn-finish { background: #7f8c8d; margin-top: 40px; }

        /* Preguntas */
        .question-block { display: none; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question-block.active { display: block; }
        
        .options { margin: 25px 0; }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 2px solid #eef2f5;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
            color: var(--text);
            line-height: 1.4;
        }
        .option-btn:hover:not(:disabled) { background: #f8f0fc; border-color: var(--accent); }
        .option-btn.correct { background: #e8f8f5 !important; border-color: var(--success) !important; color: #1e8449; font-weight: 600; }
        .option-btn.incorrect { background: #fdedec !important; border-color: var(--error) !important; color: #c0392b; }

        .explanation {
            margin-top: 25px;
            padding: 20px;
            background: #f4ecf7;
            border-left: 5px solid var(--accent);
            display: none;
            border-radius: 4px;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .marking-zone {
            background: #f8f9fa;
            padding: 12px 18px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-top: 15px;
            border: 1px solid #e9ecef;
            font-weight: 500;
        }

        /* Navegación inferior */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #f1f3f5;
        }

        /* Pantalla Final */
        #result-screen { display: none; text-align: center; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .stat-card {
            padding: 25px;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 5px solid #bdc3c7;
        }
        .stat-card h2 { margin: 0; font-size: 2.5em; }
        .stat-card p { margin: 10px 0 0 0; color: #7f8c8d; font-weight: 600; text-transform: uppercase; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="sidebar"></div>

    <div id="main-content">
        <div class="container">
            <div id="setup-screen">
                <h1>🔬 Histología: Conjuntivo y Glandular</h1>
                <p style="font-size: 1.1em; color: #7f8c8d;">Bloques 1 al 8. Consta de 80 preguntas literales.</p>
                <div style="margin-top: 35px;">
                    <p style="font-weight: 600; margin-bottom: 20px;">Selecciona el modo de realización:</p>
                    <button class="btn" onclick="startQuiz(false)">Orden Preestablecido</button>
                    <button class="btn" onclick="startQuiz(true)">Mezclar Preguntas</button>
                </div>
            </div>

            <div id="quiz-screen" style="display: none;">
                <div id="question-container"></div>
                <div class="nav-buttons">
                    <button class="btn btn-finish" onclick="confirmFinish()">Finalizar Test</button>
                    <div>
                        <button class="btn" id="prevBtn" onclick="changeQuestion(-1)">Anterior</button>
                        <button class="btn" id="nextBtn" onclick="changeQuestion(1)">Siguiente</button>
                    </div>
                </div>
            </div>

            <div id="result-screen">
                <h1>Resultados de la Sesión</h1>
                <div class="stats-grid">
                    <div class="stat-card"><h2 id="res-total">0</h2><p>Respondidas</p></div>
                    <div class="stat-card" style="border-color: var(--success); color: var(--success)"><h2 id="res-correct">0</h2><p>Correctas</p></div>
                    <div class="stat-card" style="border-color: var(--error); color: var(--error)"><h2 id="res-fail">0</h2><p>Falladas</p></div>
                </div>
                <h3 style="margin-bottom: 20px; color: var(--primary);">Opciones de Repetición:</h3>
                <div id="repeat-options">
                    <button class="btn" onclick="repeatMode('all')">Repetir Test Completo</button>
                    <button class="btn" onclick="repeatMode('failed')">Repetir Solo Falladas</button>
                    <button class="btn" onclick="repeatMode('marked')">Repetir Solo Marcadas 🚩</button>
                    <button class="btn" onclick="repeatMode('mixed')">Repetir Falladas + Marcadas</button>
                </div>
            </div>
        </div>
    </div>

<script>
const rawData = [
    { n: 1, q: "A diferencia de los tejidos epiteliales, ¿cuál es la característica morfológica principal del tejido conjuntivo?", a: "c", ex: "La profesora recalca que, a diferencia del epitelio, aquí predominan las grandes cantidades de sustancia intercelular y fibras que separan a las células.", opts: ["Células muy unidas sin apenas espacio.", "Ausencia total de vasos sanguíneos.", "Las células están muy separadas por una abundante matriz o sustancia intercelular.", "Siempre forma conductos excretores."] },
    { n: 2, q: "¿De qué célula originaria derivan todas las células propias del tejido conjuntivo?", a: "b", ex: "Todas las células del tejido conjuntivo (fibroblastos, adipocitos, osteoblastos) derivan de células mesenquimales estelares de origen mesodérmico.", opts: ["De la célula epitelial basal.", "De la célula madre pluripotente mesenquimal (del mesodermo).", "Del monocito.", "Del ectodermo."] },
    { n: 3, q: "A nivel clínico, si se desarrolla un tumor maligno cuyo origen está en las células del tejido conjuntivo (mesenquimales), este se denominará:", a: "b", ex: "La profesora explica que los tumores de origen epitelial son carcinomas, mientras que los de origen conjuntivo (hueso, cartílago, etc.) son sarcomas.", opts: ["Carcinoma.", "Sarcoma.", "Adenoma.", "Papiloma."] },
    { n: 4, q: "¿Qué función vital desempeña el tejido conjuntivo en relación con el tejido epitelial que tiene por encima?", a: "b", ex: "El epitelio es avascular, por lo que el conjuntivo subyacente es fundamental para su soporte arquitectural y nutrición a través de sus vasos.", opts: ["Lo queratiniza.", "Le proporciona sostén y una función trófica, ya que el conjuntivo está vascularizado y aporta nutrientes.", "Le transmite el impulso nervioso exclusivo.", "Lo aísla del sistema inmunológico."] },
    { n: 5, q: "En el tejido conjuntivo diferenciamos dos grandes grupos de células: las residentes y las emigrantes. ¿De dónde proceden habitualmente las emigrantes?", a: "c", ex: "Las emigrantes nacen en órganos hemopoyéticos (médula ósea) y migran por la sangre para intervenir en la respuesta inflamatoria en el conjuntivo.", opts: ["Del ectodermo superficial.", "De la división celular de los fibroblastos locales.", "De la médula ósea, viajando a través de la sangre.", "De los ganglios nerviosos."] },
    { n: 6, q: "¿Cuál es la célula fundamental, residente y más abundante del tejido conjuntivo?", a: "c", ex: "Es la célula encargada de sintetizar todos los demás elementos de la matriz, tanto fibras como sustancia fundamental.", opts: ["El macrófago.", "El mastocito.", "El fibroblasto.", "El pericito."] },
    { n: 7, q: "Morfológicamente, ¿cómo se identifica a un fibroblasto maduro y activo al microscopio?", a: "b", ex: "Su alta función de síntesis hace que tenga el RER y el aparato de Golgi muy desarrollados.", opts: ["Es redondo con un núcleo poli-lobulado.", "Es una célula alargada/fusiforme con prolongaciones, núcleo ovalado y abundante retículo endoplásmico rugoso para síntesis de proteínas.", "Es gigante y multinucleado.", "Está completamente vacío ópticamente."] },
    { n: 8, q: "¿Cómo se denomina al fibroblasto que está en estado de reposo o inactivo (término clásico)?", a: "c", ex: "Aunque se usa menos hoy en día, el fibrocito es el estado inactivo, más pequeño y con menos prolongaciones, que puede revertir a fibroblasto si hay una herida.", opts: ["Plasmocito.", "Miofibroblasto.", "Fibrocito.", "Macrófago."] },
    { n: 9, q: "¿Qué células residentes se asocian estrechamente a los vasos sanguíneos, enrollándose a su alrededor y almacenando glucógeno?", a: "b", ex: "Hacen de \"junta\" alrededor de los vasos, son contráctiles y su característica típica es el almacenamiento de glucógeno para nutrirse.", opts: ["Los mastocitos.", "Los pericitos.", "Las células plasmáticas.", "Los condroblastos."] },
    { n: 10, q: "Ante una herida (solución de continuidad), se activan unas células que actúan como \"puntos de sutura\" biológicos intentando aproximar los bordes gracias a sus filamentos contráctiles. ¿Cuáles son?", a: "c", ex: "Tienen características de fibroblasto pero contienen miofilamentos contráctiles (alfa-actina) para la contracción de la herida.", opts: ["Células cebadas.", "Pericitos.", "Miofibroblastos.", "Células caliciformes."] },
    { n: 11, q: "El macrófago, la célula encargada de fagocitar (\"célula basurera\"), no nace siendo macrófago. ¿Cuál es su célula precursora en la sangre?", a: "c", ex: "El monocito se genera en la médula ósea, viaja por la sangre y al salir al tejido conjuntivo se diferencia en macrófago.", opts: ["El linfocito B.", "El mastocito.", "El monocito.", "El neutrófilo."] },
    { n: 12, q: "¿Qué pista visual infalible da la profesora para reconocer un monocito en un frotis sanguíneo?", a: "b", ex: "La indentación típica en forma de habichuela es la clave diagnóstica del monocito en histología.", opts: ["Núcleo en rueda de carro.", "Núcleo en forma de habichuela o riñón (con una indentación).", "Citoplasma lleno de gránulos naranjas.", "Ausencia de núcleo."] },
    { n: 13, q: "Si un patógeno es muy grande y un solo macrófago no puede fagocitarlo, ¿qué hace según la metáfora de la profesora?", a: "b", ex: "La profesora bromea diciendo que \"llama a otros elefantes\" para fusionarse y formar células gigantes, típicas alrededor de suturas o astillas.", opts: ["Se suicida por apoptosis.", "Llama a otros macrófagos y se fusionan formando una \"Célula gigante de cuerpo extraño\" o células epitelioides.", "Se convierte en hueso.", "Lo ignora y vuelve a la sangre."] },
    { n: 14, q: "Además de fagocitar, el macrófago tiene la vital función de \"Presentación de antígenos\". ¿A quién le presenta el antígeno de la bacteria destruida?", a: "c", ex: "Actúa como célula presentadora de antígenos (CPA) para que el linfocito T ponga en marcha la defensa celular específica.", opts: ["Al fibroblasto.", "Al eritrocito.", "Al linfocito T.", "Al mastocito."] },
    { n: 15, q: "Las Células Plasmáticas son las fábricas de anticuerpos (inmunoglobulinas) del cuerpo. ¿De qué célula derivan?", a: "b", ex: "El linfocito B, encargado de la inmunidad humoral, se transforma en célula plasmática.", opts: ["Del Linfocito T.", "Del Linfocito B.", "Del Monocito.", "Del Pericito."] },
    { n: 16, q: "Pista microscópica clave: ¿Cómo es el núcleo característico de una célula plasmática?", a: "c", ex: "Es la forma más típica de identificarla, junto con su halo perinuclear claro que corresponde al aparato de Golgi.", opts: ["Polilobulado.", "En forma de herradura.", "Excéntrico, con la cromatina en parches formando una \"rueda de carro\" o \"tablero de ajedrez\".", "Completamente transparente."] },
    { n: 17, q: "En una alergia (como la congestión nasal), las células responsables de liberar grandes cantidades de histamina son:", a: "c", ex: "Están repletos de gránulos con mediadores vasoactivos como la histamina, que provocan vasodilatación y edema en las alergias.", opts: ["Los fibroblastos.", "Los macrófagos.", "Los mastocitos (células cebadas).", "Los eritrocitos."] },
    { n: 18, q: "La profesora describe a los mastocitos al microscopio con una metáfora visual muy gráfica:", a: "b", ex: "Son células tan cargadas de gránulos (\"células cebadas/gordas\") que el punteado oculta el núcleo subyacente.", opts: ["Parecen un huevo frito.", "Parece que les han echado \"un puñadito de sal\" por encima, ya que los gránulos tapan el núcleo como un paño sutil.", "Parecen una estrella de mar.", "Parecen una rueda de carro."] },
    { n: 19, q: "¿Qué inmunoglobulina (anticuerpo) se fija a la pared del mastocito dando la orden de que libere sus gránulos ante un alérgeno?", a: "c", ex: "La IgE producida por las células plasmáticas actúa en colaboración con los receptores del mastocito para disparar la alergia.", opts: ["IgA.", "IgG.", "IgE.", "IgM."] },
    { n: 20, q: "El marcador específico por excelencia de los mastocitos, que se almacena en sus gránulos junto a la histamina, es la:", a: "b", ex: "Es una enzima exclusiva y marcador específico de los mastocitos (no está en basófilos).", opts: ["Serotonina.", "Triptasa.", "Actina.", "Colagenasa."] },
    { n: 21, q: "Los leucocitos polimorfonucleares (cuyo núcleo parece una salchicha de varios lóbulos) que acuden rápidamente a las infecciones bacterianas se llaman:", a: "b", ex: "Su citoplasma no se tiñe ni con ácido ni base (neutro) y son la primera línea contra bacterias.", opts: ["Eosinófilos.", "Neutrófilos.", "Basófilos.", "Monocitos."] },
    { n: 22, q: "Si en un análisis histológico observamos células emigrantes con el citoplasma lleno de gránulos teñidos intensamente de rosa/naranja brillante, estaremos ante:", a: "a", ex: "Sus gránulos captan la eosina (colorante ácido) volviéndose rosas/naranjas.", opts: ["Eosinófilos, asociados a alergias y parásitos.", "Macrófagos.", "Linfocitos T.", "Neutrófilos."] },
    { n: 23, q: "¿Cuál es la proteína fibrilar más abundante del organismo, que aporta gran resistencia mecánica al estiramiento?", a: "c", ex: "Es la fibra por excelencia del tejido conjuntivo denso y laxo.", opts: ["La elastina.", "La queratina.", "El colágeno.", "La fibrilina."] },
    { n: 24, q: "La síntesis del colágeno requiere hidroxilación de la prolina y lisina en el RER. Para este paso es fundamental la presencia de:", a: "b", ex: "Sin Vitamina C (ácido ascórbico), la hélice no se forma correctamente, originando patologías como el escorbuto.", opts: ["Vitamina D.", "Vitamina C.", "Vitamina A.", "Calcio."] },
    { n: 25, q: "El precursor soluble que expulsa el fibroblasto y que, una vez fuera de la célula, pierde sus extremos no helicoidales para polimerizar en fibrillas se llama:", a: "b", ex: "La enzima procolágeno peptidasa lo escinde extracelularmente para que pueda polimerizar en fibrillas insolubles.", opts: ["Proelastina.", "Procolágeno (que pasa a tropocolágeno extracelular).", "Fibrilina.", "Hialuronano."] },
    { n: 26, q: "¿Qué tipo de colágeno es el que resiste la tensión y forma el 90% del colágeno corporal (huesos, tendones, piel)?", a: "a", ex: "Es el colágeno estructural principal en tendones y dermis.", opts: ["Tipo I.", "Tipo II.", "Tipo III.", "Tipo IV."] },
    { n: 27, q: "¿Qué tipo de colágeno forma redes en la lámina basal (epitelios)?", a: "c", ex: "Especializado en mallas de soporte subepitelial.", opts: ["Tipo I.", "Tipo II.", "Tipo IV.", "Tipo III."] },
    { n: 28, q: "Las fibras reticulares, que forman redes de sostén en ganglios linfáticos, hígado y glándulas, están compuestas por:", a: "b", ex: "El colágeno III forma estas finas redes (reticulina).", opts: ["Colágeno Tipo II.", "Colágeno Tipo III.", "Elastina.", "Fibronectina."] },
    { n: 29, q: "Para teñir y visualizar las fibras de reticulina al microscopio, debemos emplear:", a: "c", ex: "Las fibras reticulares son argirófilas, por lo que captan la plata y se ven negras.", opts: ["Hematoxilina.", "Ácido peryódico de Schiff (PAS).", "Técnicas de sales de plata (argénticas).", "Orceína."] },
    { n: 30, q: "Las fibras elásticas, capaces de distenderse y volver a su forma, tienen un núcleo amorfo central rodeado de una red de microfibrillas. Sus componentes son:", a: "b", ex: "La elastina da la capacidad de estirarse y la fibrilina limita y organiza la fibra.", opts: ["Colágeno y ácido hialurónico.", "Centro de elastina y red de fibrilina.", "Proteoglicanos y laminina.", "Queratina y miosina."] },
    { n: 31, q: "Si se produce un defecto genético en las fibras elásticas, los pacientes pueden desarrollar órganos anormalmente frágiles (ej. rotura aórtica). Esto se conoce como Síndrome de:", a: "c", ex: "El síndrome de Marfan afecta a las fibras elásticas.", opts: ["Escorbuto.", "Osteogénesis imperfecta.", "Marfan.", "Queloides."] },
    { n: 32, q: "Al microscopio óptico, ¿qué tinción específica resalta las fibras elásticas de color pardo/oscuro?", a: "c", ex: "La Orceína (o Verhoeff) es selectiva para la elastina.", opts: ["H-E.", "Tricrómico de Masson.", "Orceína.", "Azul Alcián."] },
    { n: 33, q: "La sustancia fundamental es el medio acuoso donde nadan las células y fibras. ¿Cuál es la gigantesca molécula no sulfatada que forma su eje principal reteniendo enormes cantidades de agua?", a: "a", ex: "Atrapa agua creando un gel viscoso que resiste la compresión.", opts: ["El ácido hialurónico (hialuronano).", "El colágeno I.", "La fibronectina.", "La laminina."] },
    { n: 34, q: "Las bacterias patógenas agresivas pueden invadir fácilmente el tejido conjuntivo rompiendo este gel de sustancia fundamental si poseen la enzima:", a: "c", ex: "Degradan el ácido hialurónico, licuando la matriz para expandir la infección.", opts: ["Triptasa.", "Colagenasa.", "Hialuronidasa.", "Peroxidasa."] },
    { n: 35, q: "¿Cómo se denomina al tejido conjuntivo más común, situado justo debajo de los epitelios, que contiene células, fibras y matriz en proporción \"equilibrada\"?", a: "b", ex: "Sirve de relleno y soporte básico, con vasos sanguíneos y abundantes células inmunes.", opts: ["Tejido conjuntivo mucoso.", "Tejido conjuntivo laxo.", "Tejido conjuntivo denso regular.", "Tejido elástico."] },
    { n: 36, q: "Si en un tejido predominan absolutamente los gruesos haces de fibras de colágeno entrelazados en múltiples direcciones y hay muy pocas células, se trata de:", a: "c", ex: "Su matriz densa irregular otorga resistencia a la tracción en múltiples ejes (como la piel).", opts: ["Tejido conjuntivo mucoso.", "Tejido adiposo.", "Tejido conjuntivo denso no orientado / irregular (ej. dermis profunda).", "Tejido conjuntivo laxo."] },
    { n: 37, q: "Los tendones y ligamentos deben soportar enorme tensión en un solo eje. Por ello están formados por:", a: "a", ex: "Sus gruesas fibras de colágeno están perfectamente paralelas y ordenadas en la dirección de la fuerza.", opts: ["Tejido conjuntivo denso orientado o regular.", "Tejido adiposo blanco.", "Tejido reticular.", "Epitelio estratificado."] },
    { n: 38, q: "El tejido conjuntivo mucoso se caracteriza por un dominio abrumador de sustancia fundamental amorfa y grandes fibroblastos estrellados. En un adulto no se encuentra apenas, pero en el feto es el componente principal de:", a: "c", ex: "La gelatina de Wharton es el tejido mucoso por excelencia.", opts: ["La pleura.", "El hígado.", "El cordón umbilical (Gelatina de Wharton).", "El tendón de Aquiles."] },
    { n: 39, q: "La profesora menciona que, aunque los libros digan que en el adulto no hay tejido mucoso, existe una excepción donde persiste tejido mesenquimal/mucoso. ¿Dónde?", a: "a", ex: "Es un resquicio anatómico de tejido tipo mucoso en la vida adulta.", opts: ["En la pulpa de los dientes.", "En las válvulas cardíacas.", "En la córnea.", "En la uña."] },

let questions = [];
let currentIndex = 0;
let userAnswers = {}; 

function startQuiz(isRandom) {
    questions = [...rawData].map(q => {
        const correctText = q.opts[q.a.charCodeAt(0) - 97];
        const shuffledOpts = [...q.opts].sort(() => Math.random() - 0.5);
        const newCorrectLetter = String.fromCharCode(97 + shuffledOpts.indexOf(correctText));
        return { ...q, opts: shuffledOpts, a: newCorrectLetter };
    });

    if (isRandom) questions.sort(() => Math.random() - 0.5);

    renderQuiz();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    showQuestion(0);
}

function renderQuiz() {
    const container = document.getElementById('question-container');
    const sidebar = document.getElementById('sidebar');
    container.innerHTML = '';
    sidebar.innerHTML = '';

    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = `question-block qb-${i}`;
        div.innerHTML = `
            <h2 style="color: var(--primary); margin-bottom: 20px;">Pregunta ${i + 1}</h2>
            <p style="font-size: 1.15em; font-weight: 500; margin-bottom: 20px;">${q.q}</p>
            <div class="options">
                ${q.opts.map((opt, idx) => `
                    <button class="option-btn" onclick="checkAnswer(${i}, '${String.fromCharCode(97 + idx)}', this)">
                        <strong style="margin-right: 10px; color: var(--primary);">${String.fromCharCode(97 + idx)})</strong> ${opt}
                    </button>
                `).join('')}
            </div>
            <div class="explanation" id="ex-${i}"><strong>Explicación de la profesora:</strong><br>${q.ex}</div>
            <div class="marking-zone" onclick="toggleMarkTrigger(${i})">
                <input type="checkbox" id="mark-${i}" onclick="event.stopPropagation()">
                <label>Marcar pregunta para revisar después 🚩</label>
            </div>
        `;
        container.appendChild(div);

        const item = document.createElement('div');
        item.className = `index-item ii-${i}`;
        item.innerText = i + 1;
        item.onclick = () => showQuestion(i);
        sidebar.appendChild(item);
    });
}

function showQuestion(index) {
    document.querySelectorAll('.question-block').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.index-item').forEach(i => i.classList.remove('active'));
    
    document.querySelector(`.qb-${index}`).classList.add('active');
    document.querySelector(`.ii-${index}`).classList.add('active');
    
    currentIndex = index;
    updateNav();
}

function checkAnswer(qIdx, letter, btn) {
    if (userAnswers[qIdx]) return; 

    const isCorrect = letter === questions[qIdx].a;
    userAnswers[qIdx] = { selected: letter, correct: isCorrect };

    const buttons = document.querySelectorAll(`.qb-${qIdx} .option-btn`);
    buttons.forEach(b => {
        b.disabled = true;
        const bLetter = b.querySelector('strong').innerText.replace(')', '').toLowerCase();
        if (bLetter === questions[qIdx].a) b.classList.add('correct');
        else if (bLetter === letter) b.classList.add('incorrect');
    });

    const sideItem = document.querySelector(`.ii-${qIdx}`);
    sideItem.classList.add(isCorrect ? 'correct' : 'incorrect');
    document.getElementById(`ex-${qIdx}`).style.display = 'block';
}

function toggleMarkTrigger(index) {
    const cb = document.getElementById(`mark-${index}`);
    cb.checked = !cb.checked;
    const sideItem = document.querySelector(`.ii-${index}`);
    if (cb.checked) sideItem.classList.add('marked');
    else sideItem.classList.remove('marked');
}

function changeQuestion(dir) {
    const newIdx = currentIndex + dir;
    if (newIdx >= 0 && newIdx < questions.length) showQuestion(newIdx);
}

function updateNav() {
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
}

function confirmFinish() {
    if (confirm("¿Estás seguro de que quieres finalizar y ver tus estadísticas?")) showResults();
}

function showResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('sidebar').style.display = 'none';

    let correct = 0, failed = 0;
    Object.values(userAnswers).forEach(v => {
        if (v.correct) correct++;
        else failed++;
    });

    document.getElementById('res-total').innerText = Object.keys(userAnswers).length;
    document.getElementById('res-correct').innerText = correct;
    document.getElementById('res-fail').innerText = failed;
}

function repeatMode(mode) {
    let subSet = [];
    if (mode === 'all') subSet = [...rawData];
    else if (mode === 'failed') subSet = questions.filter((_, i) => userAnswers[i] && !userAnswers[i].correct);
    else if (mode === 'marked') subSet = questions.filter((_, i) => document.getElementById(`mark-${i}`).checked);
    else if (mode === 'mixed') subSet = questions.filter((_, i) => (userAnswers[i] && !userAnswers[i].correct) || document.getElementById(`mark-${i}`).checked);

    if (subSet.length === 0) {
        alert("No hay preguntas en esta categoría para repetir.");
        return;
    }

    userAnswers = {};
    questions = subSet;
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('sidebar').style.display = 'flex';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuiz();
    showQuestion(0);
}
</script>

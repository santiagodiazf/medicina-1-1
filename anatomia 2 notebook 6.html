<script>
// Base de datos de 70 preguntas literales
const db = [
    { q: `1. El músculo diafragma presenta tres grandes orificios (hiatos) para el paso de estructuras vitales. Cumpliendo la "regla de los pares", el hiato aórtico se localiza a nivel de:`, opts: [`T8.`, `T10.`, `T12.`, `L2.`], c: 2 },
    { q: `2. Siguiendo esta misma disposición topográfica ascendente y haciéndose cada vez más anterior, el hiato esofágico se sitúa a nivel de:`, opts: [`T8.`, `T10.`, `T12.`, `L1.`], c: 1 },
    { q: `3. El hiato para la vena cava inferior es el más alto y anterior de los tres grandes. ¿A qué nivel se sitúa?`, opts: [`T8.`, `T10.`, `T12.`, `T6.`], c: 0 },
    { q: `4. ¿Qué diferencia morfológica y funcional fundamental (la "trampa" que remarca Prada) tiene el hiato de la vena cava inferior respecto a los otros dos grandes orificios?`, opts: [`Está formado exclusivamente por músculo.`, `Se sitúa en la hoja izquierda del centro frénico.`, `Atraviesa el centro tendinoso (centro frénico) y no una porción muscular, por lo que la tensión del tendón durante la inspiración ABRE el orificio facilitando el retorno venoso.`, `Contiene también el conducto torácico.`], c: 2 },
    { q: `5. El hiato esofágico no solo permite el paso del esófago a la cavidad abdominal, sino que lo acompañan dos importantes nervios parasimpáticos. Son:`, opts: [`Los nervios esplácnicos mayor y menor.`, `Los nervios frénicos derecho e izquierdo.`, `Los troncos vagales (nervios vagos o PC X).`, `Los nervios iliohipogástricos.`], c: 2 },
    { q: `6. Curiosamente, los nervios vagos cambian de posición al pasar por el hiato esofágico: el vago izquierdo se hace anterior y el derecho se hace posterior. Según el profesor, ¿por qué ocurre esto?`, opts: [`Porque el corazón los empuja.`, `Porque durante el desarrollo embriológico, el tubo digestivo sufre una rotación anatómica, y el esófago rota arrastrando consigo a los nervios que van adheridos a él.`, `Porque el hiato es asimétrico.`, `Por un error aleatorio del desarrollo.`], c: 1 },
    { q: `7. El hiato aórtico (T12) está delimitado por un arco fibroso que salta entre los dos pilares musculares principales del diafragma. Este es el:`, opts: [`Ligamento arqueado lateral.`, `Ligamento arqueado medial.`, `Ligamento arqueado medio.`, `Ligamento inguinal.`], c: 2 },
    { q: `8. Si este ligamento arqueado medio se tensa en exceso o tiene una disposición muy caudal, puede comprimir un gran vaso que nace inmediatamente por debajo de él en la aorta, causando problemas digestivos severos (dispepsia crónica). Se trata de:`, opts: [`La arteria mesentérica superior.`, `Las arterias renales.`, `El tronco celíaco.`, `La arteria ilíaca.`], c: 2 },
    { q: `9. Acompañando a la aorta por el hiato aórtico (T12) asciende hacia el tórax una estructura vital para el drenaje de líquidos del cuerpo. Es:`, opts: [`La vena ácigos.`, `La vena hemiácigos.`, `El conducto torácico (linfático).`, `El nervio vago.`], c: 2 },
    { q: `10. La hernia de hiato es una patología frecuente provocada por la debilidad de las fibras musculares que envuelven al esófago. Estas fibras en forma de "lazada" que abrazan al esófago provienen principalmente de:`, opts: [`La porción condral del diafragma.`, `El pilar derecho del diafragma.`, `El centro frénico.`, `El ligamento arqueado lateral.`], c: 1 },
    { q: `11. Las inserciones lumbares del diafragma forman arcos tendinosos sobre los músculos de la pared posterior del abdomen. El ligamento arqueado MEDIAL (arco del psoas) salta sobre la cara anterior del músculo:`, opts: [`Cuadrado lumbar.`, `Psoas mayor.`, `Ilíaco.`, `Transverso del abdomen.`], c: 1 },
    { q: `12. El ligamento arqueado LATERAL (arco del cuadrado) permite que el diafragma salte sobre la cara anterior del músculo:`, opts: [`Dorsal ancho.`, `Psoas mayor.`, `Cuadrado lumbar (de los lomos).`, `Oblicuo interno.`], c: 2 },
    { q: `13. A nivel de estos pilares y arcos, existe una pequeña dehiscencia o resquicio muscular por donde penetran desde el tórax hacia el abdomen los nervios que darán inervación SIMPÁTICA a las vísceras. Son:`, opts: [`Los nervios vagos.`, `Los nervios frénicos.`, `Los nervios esplácnicos mayor y menor.`, `Los nervios lumbares ascendentes.`], c: 2 },
    { q: `14. Las venas lumbares ascendentes, que recogen la sangre de la pared abdominal, atraviesan el diafragma (a veces perforando los pilares o bajo el ligamento arqueado medial) para transformarse en el tórax en:`, opts: [`Vena cava inferior.`, `Vena porta.`, `Sistema de venas Ácigos (derecha) y Hemiácigos (izquierda).`, `Venas frénicas inferiores.`], c: 2 },
    { q: `15. Entre la porción lumbar del diafragma y la porción costal se forma un triángulo de debilidad fascial por ausencia de fibras, vértice de la 12ª costilla, conocido como Triángulo Lumbocostal. ¿Qué patología aparece aquí?`, opts: [`Hernia de hiato.`, `Hernia de Bochdalek (hernia diafragmática congénita o adquirida).`, `Hernia inguinal.`, `Pericarditis.`], c: 1 },
    { q: `16. Existe otro triángulo de debilidad en la parte anterior, entre la porción costal y la porción esternal del diafragma (Triángulo de Morgagni/Esternocostal). Por ahí atraviesan:`, opts: [`Los vasos torácicos internos (mamaria interna) que pasan a llamarse vasos epigástricos superiores.`, `La vena cava inferior.`, `El nervio frénico.`, `El uréter.`], c: 0 },
    { q: `17. El diafragma está irrigado por su cara superior por unas arterias que nacen de la arteria mamaria interna (torácica interna) y que acompañan al nervio frénico pegadas al saco pericárdico. Se llaman:`, opts: [`Arterias frénicas inferiores.`, `Arterias pericardiofrénicas.`, `Arterias musculofrénicas.`, `Arterias intercostales.`], c: 1 },
    { q: `18. La arteria musculofrénica, que irriga la inserción costal del diafragma, también es rama terminal de la:`, opts: [`Aorta torácica.`, `Arteria subclavia directa.`, `Arteria torácica interna (mamaria interna).`, `Arteria coronaria derecha.`], c: 2 },
    { q: `19. El músculo diafragma y el pericardio fibroso comparten origen embriológico y están fuertemente unidos en el centro frénico. Esto explica que compartan inervación motora y sensitiva a través de:`, opts: [`Los nervios intercostales (exclusivamente).`, `El nervio vago.`, `El nervio frénico (C3-C5).`, `El plexo celíaco.`], c: 2 },
    { q: `20. Si un paciente sufre una pericarditis aguda o una irritación química del diafragma central, el "dolor referido" se proyectará típicamente hacia:`, opts: [`La fosa ilíaca derecha.`, `La zona de los hombros y cuello (territorio sensitivo de C3-C5).`, `La cara medial del brazo izquierdo.`, `El ombligo.`], c: 1 },
    { q: `21. La asimetría de las cúpulas diafragmáticas es evidente. La cúpula DERECHA asciende mucho más (hasta el 4º o 5º espacio intercostal) debido a que tiene debajo un órgano macizo muy voluminoso:`, opts: [`El estómago.`, `El bazo.`, `El hígado.`, `El riñón derecho.`], c: 2 },
    { q: `22. Por el contrario, la cúpula diafragmática IZQUIERDA está más descendida porque tiene apoyado encima, en el lado torácico, a:`, opts: [`La vena cava.`, `El corazón (saco pericárdico).`, `El pulmón izquierdo.`, `El conducto torácico.`], c: 1 },
    { q: `23. El hígado está cubierto casi totalmente por peritoneo, pero hay una zona en su cara posterior y superior que está directamente en contacto con el diafragma, sin serosa de por medio. Esta zona es:`, opts: [`El área desnuda del hígado.`, `El ligamento falciforme.`, `El hilio hepático.`, `La fosa cística.`], c: 0 },
    { q: `24. El profesor describe a los pulmones como órganos "plásticos" (como plastilina) que se adaptan a todos los recesos de la cavidad torácica. El ángulo agudo y profundo que se forma entre la pared de las costillas y la cúpula del diafragma se denomina:`, opts: [`Receso costomediastínico.`, `Receso costodiafragmático.`, `Seno coronario.`, `Triángulo de Petit.`], c: 1 },
    { q: `25. La importancia CRÍTICA del receso costodiafragmático en la práctica médica radica en que:`, opts: [`Ahí se localiza el corazón.`, `Es el punto anatómico más declive de la cavidad pleural y donde, por pura gravedad, se acumulan líquidos patológicos (derrames pleurales, empiemas, sangre).`, `Es la zona donde nunca hay pleura.`, `Aloja el estómago.`], c: 1 },
    { q: `26. La capa de "pintura elástica" que tapiza las paredes de la cavidad torácica y el diafragma es continua. La porción que tapiza directamente la cara superior del diafragma se llama:`, opts: [`Pleura visceral.`, `Pleura parietal diafragmática.`, `Fascia endotorácica.`, `Pericardio seroso.`], c: 1 },
    { q: `27. La sangre del tubo digestivo no puede volver directamente a la vena cava. Primero debe pasar por el filtro del hígado a través del:`, opts: [`Sistema venoso Ácigos.`, `Sistema venoso Porta.`, `Sistema Linfático.`, `Polígono de Willis.`], c: 1 },
    { q: `28. En pacientes con cirrosis o daño hepático severo, el "filtro" del hígado se bloquea. ¿Qué consecuencia anatómico-clínica muy grave se produce a nivel del esófago por este tapón?`, opts: [`El paciente no puede tragar (disfagia).`, `La sangre busca vías alternativas en la anastomosis porto-cava del esófago inferior, dilatando las venas submucosas y creando varices esofágicas que pueden romperse y provocar vómitos de sangre (hematemesis).`, `El esófago se osifica.`, `La vena cava estalla.`], c: 1 },
    { q: `29. La linfa del tubo digestivo y miembros inferiores se recolecta en el abdomen en la Cisterna del Quilo. Desde ahí, sube por el conducto torácico y desemboca en:`, opts: [`La vena cava inferior.`, `La vena porta.`, `El ángulo yugulosubclavio IZQUIERDO.`, `La aurícula derecha.`], c: 2 },
    { q: `30. Si el profesor explica que el drenaje linfático es asimétrico y la mayoría del cuerpo drena a la izquierda, ¿qué única porción del cuerpo drena a través de la Gran Vena Linfática al ángulo yugulosubclavio DERECHO?`, opts: [`Solo la pierna derecha.`, `La mitad derecha de la cabeza, cuello, brazo derecho y mitad superior derecha del tórax.`, `El hígado exclusivamente.`, `Ambos pulmones.`], c: 1 },
    { q: `31. La pared anterolateral del abdomen está formada por tres músculos planos y superpuestos. El más externo de ellos, cuyas fibras van hacia abajo y hacia el centro (como meter las manos en los bolsillos), es el:`, opts: [`Oblicuo menor (interno).`, `Transverso del abdomen.`, `Oblicuo mayor (externo).`, `Recto del abdomen.`], c: 2 },
    { q: `32. El Oblicuo mayor se origina en la cara externa de las costillas y tiene un patrón de interdigitación muy claro: superiormente con el pectoral mayor, lateralmente con el serrato anterior, y dorsalmente se encuentra con:`, opts: [`El dorsal ancho.`, `El romboides.`, `El psoas.`, `El trapecio.`], c: 0 },
    { q: `33. Al terminar en su porción inferior, la aponeurosis del Oblicuo mayor se engrosa, salta desde la espina ilíaca anterosuperior hasta la espina del pubis, y forma una estructura clave:`, opts: [`La vaina de los rectos.`, `El ligamento de Poupart o ligamento inguinal.`, `El tendón conjunto.`, `El arco de Douglas.`], c: 1 },
    { q: `34. Por encima de la sínfisis del pubis, la aponeurosis del Oblicuo mayor se "raja" formando unos pilares para dejar la apertura anatómica del anillo inguinal SUPERFICIAL. Estos pilares son:`, opts: [`Anterior, medio y posterior.`, `Pilar externo, pilar interno y el pilar posterior (de Colles) que cruza la línea media.`, `Ligamento pectíneo y lacunar.`, `Exclusivamente un pilar central.`], c: 1 },
    { q: `35. Para darle consistencia a este anillo y que no se desgarre, existen unas fibras aponeuróticas que cruzan transversalmente por encima de la apertura, llamadas:`, opts: [`Fibras arciformes.`, `Ligamento de Gimbernat.`, `Tendón conjunto.`, `Línea alba.`], c: 0 },
    { q: `36. El segundo plano abdominal corresponde al músculo Oblicuo Menor (Interno). Sus fibras tienen una dirección que es:`, opts: [`Vertical perfecta.`, `Contrapuesta al oblicuo mayor, ascendiendo hacia arriba y hacia la línea media.`, `Transversal pura.`, `Descendente extrema.`], c: 1 },
    { q: `37. El Oblicuo menor y el Transverso del abdomen se originan en el tercio lateral del ligamento inguinal. Las fibras que saltan formando un arco o techo sobre el conducto inguinal terminan insertándose juntas en el pubis formando el:`, opts: [`Ligamento lacunar.`, `Tendón conjunto (hoz inguinal).`, `Anillo profundo.`, `Ligamento pectíneo.`], c: 1 },
    { q: `38. Todos estos músculos planos (Oblicuos y Transverso) finalizan en láminas aponeuróticas que envuelven a los músculos Rectos anteriores, formando la Vaina de los Rectos, que finalmente se funde en la línea media creando:`, opts: [`La línea arqueada.`, `La línea alba (cordón fibroso blanco y fuerte).`, `El ombligo.`, `La cicatriz gravídica.`], c: 1 },
    { q: `39. Pregunta quirúrgica de Prada: Si tienes que hacer una incisión vertical larga en el abdomen (laparotomía), anatómicamente parece ideal cortar por la línea alba porque no hay músculo ni grandes vasos. ¿Por qué en la práctica muchos cirujanos hacen la incisión paramediana izquierda?`, opts: [`Porque la línea alba es imposible de cortar.`, `Porque a la derecha está el apéndice siempre.`, `Porque al ser un tejido fibroso avascularizado (sin sangre), su capacidad de cicatrización y curación es mucho peor que la del músculo vascularizado.`, `Porque en la línea media está la aorta.`], c: 2 },
    { q: `40. En las mujeres embarazadas, el estímulo de la hormona estimulante de melanocitos (MSH) oscurece la línea alba, transformándola temporalmente en:`, opts: [`La línea arqueada.`, `La línea nigra.`, `Un estría atrófica.`, `El cloasma gravídico.`], c: 1 },
    { q: `41. La constitución de la Vaina de los Rectos NO es igual en todo el abdomen. Por debajo del ombligo (Línea Arqueada de Douglas), las aponeurosis de los tres músculos pasan todas por DELANTE del recto anterior. Por tanto, la cara posterior del músculo recto queda:`, opts: [`Cubierta por hueso.`, `Envuelta por el oblicuo mayor.`, `Desnuda de aponeurosis, tapizada únicamente por la fina fascia transversalis y el peritoneo.`, `Adherida a la vejiga urinaria.`], c: 2 },
    { q: `42. Los nervios raquídeos que van a dar inervación sensitiva a la región más baja del abdomen y los genitales (Iliohipogástrico e Ilioinguinal) salen de:`, opts: [`T1.`, `L1 (con aporte de T12).`, `L5.`, `S2.`], c: 1 },
    { q: `43. Estos nervios (Iliohipogástrico e Ilioinguinal) emergen por el borde lateral del psoas mayor y se apoyan directamente sobre la cara anterior del músculo:`, opts: [`Cuadrado de los lomos (lumbar).`, `Diafragma.`, `Dorsal ancho.`, `Serrato anterior.`], c: 0 },
    { q: `44. El plexo lumbar tiene la peculiaridad de formarse anatómicamente DENTRO del espesor de un músculo. Este músculo que alberga las raíces lumbares es:`, opts: [`El Cuadrado lumbar.`, `El Transverso del abdomen.`, `El Psoas Mayor.`, `El Ilíaco.`], c: 2 },

    { q: `67. El drenaje venoso de los primeros espacios intercostales posteriores no va directamente a la ácigos, sino que lo recoge un tronco venoso que drena preferentemente hacia arriba (vena intercostal suprema). Esto ilustra que en el tórax y diafragma hay sangre que drena a la Cava Superior y otra a la Cava Inferior, estableciendo:`, opts: [`Anastomosis porto-cava.`, `Anastomosis Cavo-Cavas.`, `Circulación fetal.`, `Fístulas arteriovenosas.`], c: 1 },
    { q: `68. En la región del cuello, las fascias organizan el espacio. El tubo fascial que envuelve a la arteria carótida, la vena yugular interna y el nervio vago es:`, opts: [`La fascia prevertebral.`, `La vaina carotídea.`, `La vaina visceral.`, `La fascia de Scarpa.`], c: 1 },
    { q: `69. Si un paciente sufre una herida profunda en el cuello que secciona la vena Yugular Interna, el riesgo de muerte por "embolia gaseosa" (entrada masiva de aire al corazón) se multiplica debido a que:`, opts: [`La arteria se dilata.`, `El tendón intermedio del músculo Omohioideo está adherido a la vaina carotídea y, al estar tenso, tira de la pared de la vena y la mantiene ABIERTA como un tubo rígido (impidiendo que se colapse).`, `El nervio vago detiene el corazón.`, `El diafragma se paraliza instantáneamente.`], c: 1 },
    { q: `70. ¿Dónde debemos auscultar típicamente si queremos escuchar el Foco Aórtico (válvula aórtica) según el mapa topográfico de Prada?`, opts: [`En el 5º espacio intercostal izquierdo, línea medioclavicular (ápex).`, `En el apéndice xifoides.`, `En el 2º espacio intercostal DERECHO, línea paraesternal.`, `En el cuello.`], c: 2 }

// Estado de la aplicación
let activeQuestions = [];
let answers = {};
let marked = {};
let currentOrderMode = 'original';

// Utilidad para mezclar arrays
function shuffleArray(array) {
    let newArr = [...array];
    for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
}

// Inicia el quiz
function startQuiz(orderMode) {
    currentOrderMode = orderMode;
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('quiz-layout').style.display = 'flex';
    
    activeQuestions = db.map((item, index) => ({
        ...item,
        originalId: index + 1
    }));

    if (orderMode === 'random') {
        activeQuestions = shuffleArray(activeQuestions);
    }

    resetState();
    buildInterface();
}

// Lógica de repetición
function retakeQuiz(mode) {
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('quiz-layout').style.display = 'flex';

    let toKeep = [];
    if (mode === 'all') {
        toKeep = db.map((_, i) => i + 1);
    } else if (mode === 'failed') {
        toKeep = activeQuestions.filter(q => answers[q.originalId] === false).map(q => q.originalId);
    } else if (mode === 'marked') {
        toKeep = activeQuestions.filter(q => marked[q.originalId]).map(q => q.originalId);
    } else if (mode === 'failed_marked') {
        toKeep = activeQuestions.filter(q => answers[q.originalId] === false || marked[q.originalId]).map(q => q.originalId);
    }

    if (toKeep.length === 0) {
        alert("No hay preguntas en esta categoría.");
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('quiz-layout').style.display = 'none';
        return;
    }

    activeQuestions = db.filter((_, i) => toKeep.includes(i + 1)).map(item => ({
        ...item,
        originalId: db.indexOf(item) + 1
    }));

    if (currentOrderMode === 'random') {
        activeQuestions = shuffleArray(activeQuestions);
    }

    resetState();
    buildInterface();
}

function resetState() {
    answers = {};
}

// Construcción del DOM
function buildInterface() {
    const sidebar = document.getElementById('sidebar');
    const container = document.getElementById('questions-container');
    
    sidebar.innerHTML = '';
    container.innerHTML = '';

    activeQuestions.forEach((q, index) => {
        // Dot del sidebar
        const dot = document.createElement('div');
        dot.className = `nav-dot ${marked[q.originalId] ? 'is-marked' : ''}`;
        dot.id = `nav-${q.originalId}`;
        dot.innerHTML = `${index + 1}<div class="mark-indicator"></div>`;
        dot.onclick = () => {
            document.getElementById(`q-${q.originalId}`).scrollIntoView({behavior: 'smooth'});
        };
        sidebar.appendChild(dot);

        // Tarjeta de la pregunta
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${q.originalId}`;

        // Mezclar opciones
        let optionsWithIndex = q.opts.map((text, i) => ({ text, isCorrect: i === q.c }));
        optionsWithIndex = shuffleArray(optionsWithIndex);

        let optionsHTML = '';
        optionsWithIndex.forEach((opt, optIndex) => {
            optionsHTML += `<button class="option-btn" id="opt-${q.originalId}-${optIndex}" 
                onclick="selectAnswer(${q.originalId}, ${opt.isCorrect}, ${optIndex}, '${opt.text.replace(/'/g, "\\'")}')">
                ${opt.text}
            </button>`;
        });

        const isMarked = marked[q.originalId] ? 'marked' : '';
        const markText = marked[q.originalId] ? '★ Marcada' : '☆ Marcar';

        card.innerHTML = `
            <div class="question-header">
                <h3 class="question-text">${index + 1}. ${q.q.replace(/^\d+\.\s*/, '')}</h3>
                <button class="mark-btn ${isMarked}" id="mark-${q.originalId}" onclick="toggleMark(${q.originalId})">${markText}</button>
            </div>
            <div class="options-grid" id="grid-${q.originalId}">
                ${optionsHTML}
            </div>
            <div class="feedback" id="feedback-${q.originalId}"></div>
        `;

        container.appendChild(card);
    });
    
    document.getElementById('main-content').scrollTop = 0;
}

// Acción de respuesta
function selectAnswer(qId, isCorrect, optIndex, optText) {
    if (answers[qId] !== undefined) return;

    answers[qId] = isCorrect;
    
    const grid = document.getElementById(`grid-${qId}`);
    const buttons = grid.getElementsByClassName('option-btn');
    const feedback = document.getElementById(`feedback-${qId}`);
    const navDot = document.getElementById(`nav-${qId}`);

    for (let i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (buttons[i].id === `opt-${qId}-${optIndex}`) {
            buttons[i].classList.add(isCorrect ? 'correct' : 'incorrect');
        } else if (buttons[i].getAttribute('onclick').includes('true')) {
            buttons[i].classList.add('missed-correct');
        }
    }

    navDot.classList.add(isCorrect ? 'correct' : 'incorrect');
    feedback.style.display = 'block';
    
    const correctOriginalOptionText = db.find(x => x.originalId === qId || x.q.startsWith(qId + ".")).opts[db.find(x => x.originalId === qId || x.q.startsWith(qId + ".")).c];

    if (isCorrect) {
        feedback.innerHTML = `<strong>¡Correcto!</strong> La respuesta es: ${correctOriginalOptionText}`;
        feedback.style.borderLeftColor = 'var(--correct)';
    } else {
        feedback.innerHTML = `<strong>Incorrecto.</strong> La respuesta correcta era: ${correctOriginalOptionText}`;
        feedback.style.borderLeftColor = 'var(--incorrect)';
    }
}

// Acción marcar
function toggleMark(qId) {
    marked[qId] = !marked[qId];
    
    const btn = document.getElementById(`mark-${qId}`);
    const dot = document.getElementById(`nav-${qId}`);

    if (marked[qId]) {
        btn.classList.add('marked');
        btn.innerHTML = '★ Marcada';
        dot.classList.add('is-marked');
    } else {
        btn.classList.remove('marked');
        btn.innerHTML = '☆ Marcar';
        dot.classList.remove('is-marked');
    }
}

// Acción finalizar
function finishQuiz() {
    let correctCount = 0;
    let incorrectCount = 0;
    let unattemptedCount = 0;

    activeQuestions.forEach(q => {
        if (answers[q.originalId] === true) correctCount++;
        else if (answers[q.originalId] === false) incorrectCount++;
        else unattemptedCount++;
    });

    document.getElementById('quiz-layout').style.display = 'none';
    document.getElementById('results-screen').style.display = 'flex';

    document.getElementById('results-summary').innerHTML = `
        Aciertos: <span style="color: var(--correct)">${correctCount}</span> | 
        Fallos: <span style="color: var(--incorrect)">${incorrectCount}</span> | 
        Sin responder: ${unattemptedCount}
    `;

    const totalFailed = activeQuestions.filter(q => answers[q.originalId] === false).length;
    const totalMarked = Object.values(marked).filter(v => v).length;
    
    document.getElementById('btn-retake-failed').disabled = totalFailed === 0;
    document.getElementById('btn-retake-marked').disabled = totalMarked === 0;
    document.getElementById('btn-retake-both').disabled = (totalFailed === 0 && totalMarked === 0);
}
</script>

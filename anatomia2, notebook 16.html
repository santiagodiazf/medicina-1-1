<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Anatomía y Embriología Abdominal</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --marked: #f1c40f;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Modal Inicial */
        #setup-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .modal-box button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            transition: 0.2s;
        }
        .modal-box button:hover { opacity: 0.9; }

        /* Índice Lateral */
        #sidebar {
            width: 70px;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }
        .idx-btn {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: #3e5871;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .idx-btn.active { border-color: white; }
        .idx-btn.correct { background-color: var(--success); }
        .idx-btn.wrong { background-color: var(--error); }
        .idx-btn.marked { box-shadow: 0 0 0 3px var(--marked); }

        /* Contenedor Principal */
        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }
        .header {
            max-width: 800px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .finish-top-btn {
            background: var(--error);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Cartas de Pregunta */
        .q-card {
            background: white;
            max-width: 800px;
            margin: 0 auto 40px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            scroll-margin-top: 20px;
        }
        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt {
            padding: 15px;
            border: 2px solid #edf0f2;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .opt:hover:not(.disabled) { background: #f8f9fa; border-color: #cbd5e0; }
        .opt.correct-match { background: #d1fae5; border-color: var(--success); pointer-events: none; }
        .opt.wrong-match { background: #fee2e2; border-color: var(--error); pointer-events: none; }
        .opt.disabled { pointer-events: none; opacity: 0.8; }

        /* Feedback y Marcado */
        .feedback {
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-left: 5px solid var(--accent);
            border-radius: 4px;
            display: none;
            font-style: italic;
        }
        .feedback.visible { display: block; }
        
        .mark-box {
            margin-top: 15px;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #666;
        }
        .mark-box input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }

        /* Pantalla de Resultados */
        #results-screen {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .retry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .retry-grid button {
            padding: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
        }
        .retry-grid button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div id="setup-modal">
        <div class="modal-box">
            <h2>Configuración del Quiz</h2>
            <p>Selecciona el orden de las preguntas:</p>
            <button onclick="initQuiz(false)">Orden Preestablecido</button>
            <button onclick="initQuiz(true)">Mezclar Aleatoriamente</button>
        </div>
    </div>

    <div id="sidebar"></div>

    <div id="main-content">
        <div id="quiz-area">
            <div class="header">
                <h2>Cuestionario de Anatomía</h2>
                <button class="finish-top-btn" onclick="showResults()">Finalizar y Corregir</button>
            </div>
            <div id="questions-container"></div>
        </div>

        <div id="results-screen">
            <h1 id="score-display">0 / 40</h1>
            <p>Has completado el cuestionario. ¿Qué te gustaría hacer ahora?</p>
            <div class="retry-grid">
                <button onclick="reloadSubset('all')">Repetir Completo</button>
                <button onclick="reloadSubset('failed')">Repetir Falladas</button>
                <button onclick="reloadSubset('marked')">Repetir Marcadas</button>
                <button onclick="reloadSubset('failed_marked')">Repetir Falladas + Marcadas</button>
            </div>
        </div>
    </div>

    <script>
        const rawData = [
            { id: 1, q: "1. Durante el desarrollo embrionario, el intestino primitivo anterior está vascularizado por un tronco arterial específico. ¿Qué gran vaso de la aorta abdominal se correlaciona con la irrigación de los derivados de este intestino primitivo anterior (estómago, hígado, duodeno proximal)?", options: ["a) Arteria mesentérica superior.", "b) Tronco celíaco.", "c) Arteria mesentérica inferior.", "d) Arterias ilíacas comunes."], correct: 1, expl: "Existe una correlación directa: el tronco celíaco irriga el intestino primitivo anterior, la mesentérica superior el medio, y la mesentérica inferior el posterior." },
            { id: 2, q: "2. Debido a la rotación del estómago durante el desarrollo embrionario, los nervios vagos que descendían por el esófago cambian de posición. ¿Cómo quedan situados topográficamente sobre el estómago?", options: ["a) Ambos nervios vagos quedan en la curvatura menor.", "b) El vago derecho se sitúa en la cara anterior y el izquierdo en la cara posterior.", "c) El vago izquierdo se sitúa en la cara anterior y el vago derecho en la cara posterior.", "d) Qiden retroperitoneales formando el ganglio celíaco exclusivo."], correct: 2, expl: "El tubo gira, arrastrando al vago izquierdo hacia adelante (anterior) y al vago derecho hacia atrás (posterior), donde este último organizará el plexo celíaco." },
            { id: 3, q: "3. En la inervación autónoma del abdomen, el profesor advierte de un error frecuente sobre las cadenas ganglionares. ¿Cuál es la afirmación anatómicamente CORRECTA?", options: ["a) La cadena paravertebral toracolumbar es exclusivamente parasimpática.", "b) El nervio vago forma la cadena simpática paravertebral.", "c) No existe cadena parasimpática paravertebral; la cadena paravertebral es exclusivamente simpática.", "d) El simpático y el parasimpático hacen sinapsis en la pared del órgano diana."], correct: 2, expl: "El profesor hace un inciso rotundo: la cadena paravertebral es solo simpática; el parasimpático (Vago) hace sinapsis postganglionar muy cerca de la víscera." },
            { id: 4, q: "4. Embriológicamente, la \"hoja esplácnica del mesodermo\" recubre al tubo digestivo endodérmico. Además de originar el peritoneo visceral, ¿qué otra estructura vital de la pared intestinal deriva de esta hoja?", options: ["a) La mucosa absortiva.", "b) Las glándulas endocrinas del estómago.", "c) La musculatura lisa mural (circulares y longitudinales).", "d) El plexo mientérico de Auerbach puramente nervioso."], correct: 2, expl: "La esplacnopleura origina la lámina serosa de cobertura (peritoneo) y la estructura de fibra muscular lisa que le da motilidad al tubo." },
            { id: 5, q: "5. El proceso de rotación del estómago tracciona del mesogastrio dorsal. ¿Qué importante cavidad de receso peritoneal se crea justo por detrás del estómago debido a esta rotación?", options: ["a) Saco de Douglas.", "b) Receso subfrénico.", "c) Transcavidad de los epiplones (bolsa omental).", "d) Fosa isquioanal."], correct: 2, expl: "Al girar el estómago, arrastra su meso dorsal y crea un espacio \"escondido\" detrás de él llamado bolsa omental o transcavidad de los epiplones." },
            { id: 6, q: "6. ¿Qué órgano se origina como una evaginación independiente desarrollándose entre las dos láminas del mesogastrio dorsal, siendo empujado hacia el hipocondrio izquierdo?", options: ["a) El páncreas ventral.", "b) El hígado.", "c) El bazo.", "d) La glándula suprarrenal."], correct: 2, expl: "El bazo se forma aislado en el mesogastrio dorsal y, al rotar el estómago, queda relegado a la izquierda." },
            { id: 7, q: "7. El páncreas tiene un doble origen embrionario (yema dorsal y ventral). Según el profesor, ¿de dónde brota la yema o esbozo pancreático VENTRAL?", options: ["a) Del mesogastrio dorsal.", "b) Directamente de la pared de la aorta.", "c) Del esbozo o yema hepática.", "d) Del ciego primitivo."], correct: 2, expl: "Las imágenes y la explicación muestran que la porción ventral del páncreas y la vesícula biliar emergen a partir del divertículo o esbozo hepático." },
            { id: 8, q: "8. El páncreas y el colon ascendente/descendente se forman inicialmente envueltos en peritoneo, pero luego quedan adosados y fijados a la pared abdominal posterior perdiendo su movilidad. Al los órganos con esta evolución se les denomina:", options: ["a) Intraperitoneales puros.", "b) Primariamente retroperitoneales.", "c) Secundariamente retroperitoneales.", "d) Extraperitoneales pélvicos."], correct: 2, expl: "El profesor insiste en que, dado que comenzaron en la cavidad y luego fueron excluidos hacia atrás mediante fascias de coalescencia, su nombre exacto es \"secundariamente retroperitoneales\"." },
            { id: 9, q: "9. Al asomarnos a la cavidad abdominal, desde la curvatura mayor del estómago cuelga un gran faldón de doble lámina peritoneal, a menudo infiltrado de grasa, que cubre las asas intestinales. Es el:", options: ["a) Epiplón (omento) menor.", "b) Ligamento falciforme.", "c) Mesocolon transverso.", "d) Epiplón (omento) mayor."], correct: 3, expl: "El omento mayor deriva del mesogastrio dorsal, cuelga de la curvatura mayor y tiene función de \"policía\" aislando procesos inflamatorios." },
            { id: 10, q: "10. El Epiplón (omento) menor se extiende desde la curvatura menor del estómago hasta la cara visceral del hígado. Su borde lateral derecho es un borde libre engrosado. ¿Qué estructuras vitales discurren por el interior de este borde libre engrosado?", options: ["a) La arteria y vena esplénica.", "b) Los vasos mesentéricos superiores.", "c) Los elementos del pedículo hepático (vena porta, arteria hepática propia, vía biliar).", "d) El uraco y los vasos epigástricos."], correct: 2, expl: "El borde libre del epiplón menor delimita el Hiato de Winslow por delante, y contiene en su espesor reforzado el pedículo hepático." },
            { id: 11, q: "11. Clínicamente, el profesor destaca que el cardias (unión esofagogástrica) NO es un verdadero esfínter anatómico, sino fisiológico. En un recién nacido con inmadurez del tono del cardias, ¿qué síntoma es frecuente?", options: ["a) Vómitos en escopetazo inmediatos (estenosis).", "b) Reflujo o rebosamiento libre de la leche al estar en decúbito.", "c) Imposibilidad total para deglutir la leche.", "d) Megacolon congénito."], correct: 1, expl: "Al no tener tono muscular esfinteriano desarrollado, por pura gravedad el contenido estomacal pasa al esófago y rebosa hacia afuera." },
            { id: 12, q: "12. Por el contrario, el píloro SÍ posee una musculatura circular muy engrosada (esfínter anatómico). Si un lactante nace con una hipertrofia (estenosis) congénita de este músculo, ¿qué ocurre con el alimento?", options: ["a) Pasa demasiado rápido causando síndrome de \"dumping\".", "b) El bebé se sacia rápidamente y no quiere comer más.", "c) El contenido no puede pasar al duodeno, el bebé no se sacia y lo expulsa repetidamente hacia afuera.", "d) Se absorbe íntegramente en el fundus gástrico."], correct: 2, expl: "El canal pilórico cerrado impide el vaciado gástrico; el niño tiene hambre constantemente y vomita por rebosamiento de la cavidad gástrica llena." },
            { id: 13, q: "13. A nivel macroscópico, para delimitar topográficamente dónde termina el cuerpo del estómago y comienza la porción del antro pilórico, los cirujanos se basan en una muesca en la curvatura menor llamada:", options: ["a) Ángulo de His.", "b) Incisura (cisura) angularis.", "c) Ligamento de Treitz.", "d) Ampolla de Vater."], correct: 1, expl: "La cisura angularis en la curvatura menor es el reparo anatómico que separa el cuerpo gástrico del antro." },
            { id: 14, q: "14. El dolor referido es una clave clínica. Dado que el estómago (fundus/cardias) está separado del saco pericárdico únicamente por el diafragma, ¿con qué otra patología pueden confundirse a menudo los dolores de la región gástrica superior?", options: ["a) Con una apendicitis aguda.", "b) Con un dolor de origen cardíaco (angina/infarto).", "c) Con un cólico nefrítico.", "d) Con una hernia inguinal."], correct: 1, expl: "El profesor remarca que muchos dolores epigástricos se confunden con origen cardíaco debido a la vecindad íntima separada solo por el diafragma." },
            { id: 15, q: "15. La vascularización arterial del estómago forma dos arcos o arcadas anastomóticas. La Arteria Gástrica Izquierda irriga la curvatura menor, pero ¿de qué tronco arterial principal nace directamente?", options: ["a) Arteria mesentérica superior.", "b) Arteria hepática común.", "c) Arteria esplénica.", "d) Tronco celíaco."], correct: 3, expl: "La arteria gástrica izquierda es una de las tres ramas directas primarias del tronco celíaco." },
            { id: 16, q: "16. Para completar la arcada de la curvatura menor, existe la Arteria Gástrica Derecha. ¿De dónde suele originarse esta arteria?", options: ["a) Directamente de la aorta abdominal.", "b) De la arteria esplénica.", "c) De la arteria hepática común (o hepática propia).", "d) De la arteria mesentérica inferior."], correct: 2, expl: "La gástrica derecha (pilórica) proviene del sistema de la hepática común." },
            { id: 17, q: "17. En la curvatura mayor del estómago, la Arteria Gastroepiploica Izquierda desciende para irrigarla. ¿De qué arteria madre nace?", options: ["a) Tronco celíaco directamente.", "b) Arteria esplénica.", "c) Arteria mesentérica superior.", "d) Arteria gastroduodenal."], correct: 1, expl: "Nace de la arteria esplénica antes de que esta penetre en el hilio del bazo." },
            { id: 18, q: "18. Finalmente, la Arteria Gastroepiploica Derecha, que se anastomosa con la izquierda en la curvatura mayor, procede de:", options: ["a) La arteria mesentérica superior.", "b) La arteria esplénica.", "c) La arteria gastroduodenal (rama de la hepática común).", "d) Las arterias lumbares."], correct: 2, expl: "La gastroduodenal, rama de la hepática común, desciende y da origen a la gastroepiploica derecha." },
            { id: 19, q: "19. ¿Por qué el estómago posee este patrón de 4 arterias (2 gástricas y 2 gastroepiploicas) que se anastomosan creando arcadas, según razonó el profesor?", options: ["a) Para que dos irriguen el fundus y dos el píloro.", "b) Para enviar ramas transversales que aseguren la irrigación completa de la cara anterior y la cara posterior del órgano independientemente de su distensión.", "c) Para crear un sistema venoso porta paralelo.", "d) Para irrigar secundariamente al diafragma."], correct: 1, expl: "Las arcadas superior e inferior emiten ramas hacia las caras anterior y posterior, asegurando vascularización perimetral completa en este órgano de gran volumen." },
            { id: 20, q: "20. Drenaje venoso abdominal: El profesor advierte tajantemente que la sangre procedente del tubo digestivo infradiafragmático (estómago, intestinos) NO desemboca directamente en la Vena Cava Inferior. ¿Hacia qué sistema se dirige?", options: ["a) Hacia el sistema Ácigos / Hemiácigos.", "b) Hacia el sistema de la Vena Porta.", "c) Hacia la vena esplénica exclusivamente, que va al corazón.", "d) Hacia las venas renales."], correct: 1, expl: "La diapositiva lo resalta con exclamación: \"No retorna a la cava; va hacia el sistema porta!\" para ser depurada por el hígado." },
            { id: 21, q: "21. El tronco principal de la Vena Porta se forma, clásicamente detrás del cuello del páncreas, por la confluencia directa de dos grandes venas:", options: ["a) Vena cava inferior y vena hepática.", "b) Vena mesentérica superior y vena esplénica.", "c) Vena gástrica izquierda y vena umbilical.", "d) Vena mesentérica inferior y vena renal."], correct: 1, expl: "La vena porta hepática se origina por la unión de la vena mesentérica superior y la vena esplénica (la mesentérica inferior suele drenar en la esplénica)." },
            { id: 22, q: "22. Al estudiar el intestino medio, el profesor describe un crecimiento tan acelerado en longitud (formando un asa en horquilla) que no cabe en el abdomen embrionario. ¿Qué proceso fisiológico ocurre en la sexta semana?", options: ["a) Se reabsorbe la mitad del yeyuno.", "b) El intestino se hernia temporalmente hacia el interior del cordón umbilical (herniación fisiológica).", "c) Sube a ocupar la cavidad pleural torácica.", "d) Se adhiere permanentemente a la pared posterior retroperitoneal."], correct: 1, expl: "Debido a su longitud, sale del abdomen hacia el pedículo vitelino/cordón umbilical, rotando allí antes de regresar." },
            { id: 23, q: "23. El conducto onfalomesentérico (vitelino) conecta el intestino primitivo medio con el saco vitelino. Si la porción proximal de este conducto no se oblitera ni desaparece, genera un residuo en el íleon conocido como:", options: ["a) Apéndice vermiforme.", "b) Divertículo de Meckel.", "c) Ampolla de Vater.", "d) Píloro ectópico."], correct: 1, expl: "El divertículo de Meckel es un residuo del conducto onfalomesentérico, como un \"dedo de guante\", que puede inflamarse o formar fístulas u quistes." },
            { id: 24, q: "24. El ángulo duodenoyeyunal marca la transición entre el duodeno (fijo) y el yeyuno (móvil). Existe un elemento músculo-ligamentoso que sostiene este ángulo, conocido epónimamente como:", options: ["a) Fascia de Toldt.", "b) Músculo esfínter de Oddi.", "c) Ligamento de Treitz (músculo suspensorio del duodeno).", "d) Ligamento falciforme."], correct: 2, expl: "El ligamento/músculo de Treitz suspende la flexura duodeno-yeyunal y es el límite clásico entre hemorragia digestiva alta y baja." },
            { id: 25, q: "25. A nivel macroscópico, si comparamos un asa de yeyuno con una de íleon, el yeyuno se caracteriza internamente por una gran abundancia de:", options: ["a) Placas de Peyer (tejido linfoide).", "b) Pliegues circulares o válvulas conniventes gruesas y numerosas.", "c) Tenias colónicas.", "d) Apéndices epiploicos adiposos."], correct: 1, expl: "El yeyuno tiene mucosas con grandes pliegues circulares para máxima absorción, mientras el íleon presenta más tejido linfoide (placas de Peyer) y pliegues menos marcados." },
            { id: 26, q: "26. El Intestino Grueso (Colon) presenta unas características morfológicas externas exclusivas que permiten distinguirlo del delgado. ¿Cuáles son?", options: ["a) Es completamente liso y carece de mesenterio.", "b) Presenta cintillas longitudinales (Tenias), abollonaduras (Haustras) y acúmulos grasos (Apéndices epiploicos u omentales).", "c) Posee vellosidades intestinales gigantes visibles a simple vista.", "d) Tiene tres capas musculares completas e idénticas a las del estómago."], correct: 1, expl: "Estas tres características (tenias, haustras, apéndices epiploicos) son las señas de identidad macroscópica del colon." },
            { id: 27, q: "27. La válvula ileocecal, que regula el paso del íleon al ciego, se caracteriza morfológicamente en su visión interna por presentar:", options: ["a) Un esfínter de músculo estriado voluntario.", "b) Forma de nido de golondrina con nódulos.", "c) Una apertura alargada en forma de ojal flanqueada por dos labios que se unen lateralmente formando frenillos.", "d) Cuatro valvas dispuestas en cruz."], correct: 2, expl: "Las imágenes y apuntes destacan la \"apertura y frenillos de los labios\" de la válvula ileocecal." },
            { id: 28, q: "28. Durante la fijación del tubo digestivo a la pared posterior (\"secundariamente retroperitoneal\"), el colon ascendente y el descendente desarrollan unas fascias de coalescencia o adherencia denominadas:", options: ["a) Fascias de Treitz.", "b) Ligas gastrohepáticas.", "c) Fascias de Toldt (derecha e izquierda).", "d) Mesenterio propio."], correct: 2, expl: "La fascia de coalescencia del colon ascendente y descendente a la pared posterior se denomina fascia de Toldt." },
            { id: 29, q: "29. En la anatomía de los recesos y dinámica de fluidos abdominal, el profesor destaca que si un paciente está en decúbito (acostado horizontalmente), el líquido peritoneal (sangre, pus, células tumorales):", options: ["a) Queda confinado e inmovilizado en la pelvis.", "b) Se evapora hacia el espacio retroperitoneal.", "c) Se horizontaliza y difunde fulgurantemente por toda la cavidad a través de los espacios parietocólicos.", "d) Desaparece al ser absorbido por el epiplón menor instantáneamente."], correct: 2, expl: "El profesor advierte que la posición supina horizontaliza el líquido, permitiendo su libre y rápida difusión por toda la cavidad peritoneal compartida." },
            { id: 30, q: "30. Topográficamente, si un sujeto está en bipedestación o semisentado, el punto más declive (más bajo) de toda la cavidad peritoneal, donde se acumulan inicialmente los líquidos o colecciones, es el:", options: ["a) Receso subfrénico.", "b) Receso hepatorrenal de Morison.", "c) Fondo de saco de Douglas (rectouterino en la mujer / rectovesical en el varón).", "d) Hiato de Winslow."], correct: 2, expl: "El fondo de saco de Douglas es el receso peritoneal pélvico más inferior, lugar típico de acumulación de líquidos libres." },
            { id: 31, q: "31. El hígado presenta en su cara posterior y superior una gran zona que contacta directamente con el diafragma y carece de recubrimiento peritoneal visceral. Esta zona se denomina:", options: ["a) Área desnuda (Pars affixa), delimitada por las hojas del ligamento coronario.", "b) Fosa cística.", "c) Lóbulo caudado o de Spiegel.", "d) Ligamento falciforme."], correct: 0, expl: "El área desnuda está rodeada por el ligamento coronario y es la zona de adhesión directa hígado-diafragma sin peritoneo intermedio." },
            { id: 32, q: "32. La irrigación del colon está dividida según su origen embriológico. ¿Qué arteria se encarga de irrigar el ciego, colon ascendente y los 2/3 derechos del colon transverso (derivados del intestino medio)?", options: ["a) Tronco celíaco.", "b) Arteria mesentérica inferior.", "c) Arteria ilíaca interna.", "d) Arteria mesentérica superior."], correct: 3, expl: "La AMS irriga todo el intestino primitivo medio (delgado hasta los 2/3 proximales del colon transverso)." },
            { id: 33, q: "33. A partir del tercio izquierdo del colon transverso, colon descendente, sigma y porción superior del recto (intestino posterior), la irrigación corre a cargo de:", options: ["a) Arteria pudenda interna.", "b) Arteria esplénica.", "c) Arteria mesentérica inferior.", "d) Arteria mesentérica superior."], correct: 2, expl: "La AMI irriga el territorio del intestino primitivo posterior." },
            { id: 34, q: "34. La ampolla rectal presenta en su luz interna unos gruesos pliegues transversales de mucosa y submucosa destinados a soportar el peso del contenido fecal. ¿Cuál es su nombre epónimo?", options: ["a) Válvulas de Houston (Válvulas rectales).", "b) Columnas de Morgagni.", "c) Válvulas conniventes de Kerckring.", "d) Línea pectínea."], correct: 0, expl: "Las válvulas transversales rectales se denominan Válvulas de Houston." },
            { id: 35, q: "35. Más distalmente, en el conducto anal, se aprecian unos pliegues mucosos longitudinales unidos en su base por unas pequeñas válvulas (cuya inflamación origina las hemorroides internas). Estas crestas son las:", options: ["a) Válvulas de Houston.", "b) Columnas de Morgagni.", "c) Tenias longitudinales anales.", "d) Líneas anocutáneas o blancas de Hilton."], correct: 1, expl: "Las columnas anales longitudinales son las columnas de Morgagni." },
            { id: 36, q: "36. La continencia fecal voluntaria depende críticamente de un fascículo muscular del músculo Elevador del Ano, que forma una cincha en forma de \"U\" alrededor de la unión anorrectal angulándola hacia adelante. Es el:", options: ["a) Músculo esfínter interno del ano.", "b) Músculo obturador interno.", "c) Músculo puborrectal.", "d) Músculo coccígeo."], correct: 2, expl: "El músculo puborrectal, desde el pubis, abraza al recto y tira de él, siendo vital para mantener el ángulo anorrectal y la continencia fecal." },
            { id: 37, q: "37. El Recto posee una rica irrigación arterial procedente de distintos niveles. La Arteria Rectal Media nace directamente de una arteria pélvica clave. ¿De cuál?", options: ["a) Arteria aorta abdominal inferior.", "b) Arteria mesentérica inferior.", "c) Arteria ilíaca interna (hipogástrica).", "d) Arteria pudenda interna."], correct: 2, expl: "El esquema muestra a la arteria rectal media como rama directa de la arteria ilíaca interna derecha/izquierda en la pelvis." },
            { id: 38, q: "38. La inervación parasimpática de la pelvis (que promueve la erección, micción y defecación) NO procede del nervio Vago, ya que este no llega tan abajo. ¿De dónde provienen estas fibras parasimpáticas que ascienden a los plexos hipogástricos?", options: ["a) Del ganglio estrellado cervical.", "b) De los nervios esplácnicos pélvicos (segmentos sacros S2 a S4).", "c) De los nervios esplácnicos torácicos mayores.", "d) De la cadena simpática lumbar."], correct: 1, expl: "El esquema pélvico marca los \"Pelvic splanchnic nerves (parasympathetics from S2 to S4)\" aportando el parasimpático ascendente." },
            { id: 39, q: "39. En la anatomía de superficie, los dolores viscerales del abdomen se refieren a cuadrantes concretos. Si dividimos el abdomen en 9 regiones, ¿cómo se denomina la región superior media, ubicada sobre el estómago y bajo la apófisis xifoides, donde el estómago presenta muy poco espacio de palpación directa?", options: ["a) Hipocondrio derecho.", "b) Fosa ilíaca.", "c) Epigastrio.", "d) Mesogastrio o umbilical."], correct: 2, expl: "El epigastrio es la zona central superior, lugar de abordaje limitado del estómago por la parrilla costal y el hígado." },
            { id: 40, q: "40. El Bazo, órgano del hipocondrio izquierdo, moldea su forma por el contacto con los órganos vecinos, dejando en su cara visceral tres \"facetas\" o impresiones características. ¿Cuáles son?", options: ["a) Faceta hepática, duodenal y cardíaca.", "b) Faceta gástrica, renal (izquierda) y cólica (ángulo esplénico).", "c) Faceta esofágica, pancreática y pélvica.", "d) Faceta suprarrenal derecha, yeyunal e ileal."], correct: 1, expl: "El esquema del bazo marca claramente las impresiones \"Faceta gástrica\" (anterior), \"Faceta renal\" (posterior) y \"Faceta cólica\" (inferior) por su relación con estómago, riñón y colon." }
        ];

        let currentData = [];
        let userStats = {}; // id: {answered: bool, correct: bool, marked: bool}

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz(isRandom) {
            document.getElementById('setup-modal').style.display = 'none';
            currentData = isRandom ? shuffle([...rawData]) : [...rawData];
            
            // Inicializar estado de usuario para todas las preguntas originales
            rawData.forEach(q => {
                userStats[q.id] = { answered: false, correct: null, marked: false };
            });

            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('questions-container');
            const sidebar = document.getElementById('sidebar');
            container.innerHTML = '';
            sidebar.innerHTML = '';

            currentData.forEach((item, index) => {
                // Generar botón de índice
                const idxBtn = document.createElement('div');
                idxBtn.className = 'idx-btn';
                idxBtn.id = `idx-${item.id}`;
                idxBtn.innerText = index + 1;
                idxBtn.onclick = () => {
                    document.getElementById(`q-${item.id}`).scrollIntoView();
                    document.querySelectorAll('.idx-btn').forEach(b => b.classList.remove('active'));
                    idxBtn.classList.add('active');
                };
                sidebar.appendChild(idxBtn);

                // Generar carta de pregunta
                const card = document.createElement('div');
                card.className = 'q-card';
                card.id = `q-${item.id}`;

                // Mezclar opciones localmente para cada pregunta
                const correctText = item.options[item.correct];
                let shuffledOptions = shuffle([...item.options]);

                card.innerHTML = `
                    <div class="q-text">${item.q}</div>
                    <div class="options-list">
                        ${shuffledOptions.map(opt => `
                            <div class="opt" onclick="checkAnswer(this, ${item.id}, '${opt.replace(/'/g, "\\'")}', '${correctText.replace(/'/g, "\\'")}')">${opt}</div>
                        `).join('')}
                    </div>
                    <div id="feed-${item.id}" class="feedback">${item.expl}</div>
                    <div class="mark-box">
                        <input type="checkbox" onchange="toggleMark(${item.id}, this)" ${userStats[item.id].marked ? 'checked' : ''}> Marcar esta pregunta
                    </div>
                `;
                container.appendChild(card);
            });
            updateVisuals();
        }

        function checkAnswer(el, qId, selected, correct) {
            if (userStats[qId].answered) return;

            const isCorrect = selected === correct;
            userStats[qId].answered = true;
            userStats[qId].correct = isCorrect;

            const card = document.getElementById(`q-${qId}`);
            const options = card.querySelectorAll('.opt');
            
            options.forEach(o => {
                o.classList.add('disabled');
                if (o.innerText === correct) o.classList.add('correct-match');
                if (o === el && !isCorrect) o.classList.add('wrong-match');
            });

            document.getElementById(`feed-${qId}`).classList.add('visible');
            updateVisuals();
        }

        function toggleMark(qId, cb) {
            userStats[qId].marked = cb.checked;
            updateVisuals();
        }

        function updateVisuals() {
            Object.keys(userStats).forEach(id => {
                const btn = document.getElementById(`idx-${id}`);
                if (!btn) return;
                btn.classList.remove('correct', 'wrong', 'marked');
                if (userStats[id].answered) {
                    btn.classList.add(userStats[id].correct ? 'correct' : 'wrong');
                }
                if (userStats[id].marked) btn.classList.add('marked');
            });
        }

        function showResults() {
            document.getElementById('quiz-area').style.display = 'none';
            const screen = document.getElementById('results-screen');
            screen.style.display = 'block';

            let score = 0;
            currentData.forEach(q => {
                if (userStats[q.id].correct) score++;
            });

            document.getElementById('score-display').innerText = `${score} / ${currentData.length}`;
            window.scrollTo(0,0);
        }

        function reloadSubset(type) {
            let nextData = [];
            
            if (type === 'all') {
                nextData = [...rawData];
            } else if (type === 'failed') {
                nextData = rawData.filter(q => userStats[q.id].answered && !userStats[q.id].correct);
            } else if (type === 'marked') {
                nextData = rawData.filter(q => userStats[q.id].marked);
            } else if (type === 'failed_marked') {
                nextData = rawData.filter(q => (userStats[q.id].answered && !userStats[q.id].correct) || userStats[q.id].marked);
            }

            if (nextData.length === 0) {
                alert("No hay preguntas en esta categoría.");
                return;
            }

            // Resetear el estado de respuesta para las que se van a repetir
            nextData.forEach(q => {
                userStats[q.id].answered = false;
                userStats[q.id].correct = null;
            });

            currentData = nextData;
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuiz();
        }
    </script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Anatomía - Completo</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --marked: #f1c40f;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
        }

        /* Sidebar con índice */
        #sidebar {
            width: 320px;
            height: 100vh;
            background: var(--primary);
            color: white;
            position: fixed;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .index-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #ffffff33;
            padding-bottom: 10px;
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .index-btn {
            background: #34495e;
            border: 1px solid #5d6d7e;
            color: white;
            padding: 8px 0;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .index-btn:hover { background: var(--accent); }
        .index-btn.correct { background: var(--success); border-color: var(--success); }
        .index-btn.wrong { background: var(--error); border-color: var(--error); }
        .index-btn.marked { border: 2px solid var(--marked); color: var(--marked); font-weight: bold; }

        /* Contenido Principal */
        #content {
            margin-left: 320px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
        }

        .question-card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .mark-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #7f8c8d;
            cursor: pointer;
        }

        .question-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: block;
        }

        .option {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option:hover { background: #f9f9f9; }
        .option.correct-choice { background: #d4edda !important; border-color: var(--success); color: #155724; }
        .option.wrong-choice { background: #f8d7da !important; border-color: var(--error); color: #721c24; }
        .option.disabled { pointer-events: none; }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e1f5fe;
            border-left: 5px solid var(--accent);
            display: none;
            font-style: italic;
        }

        /* Modales */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            text-align: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: 0.3s;
        }

        .btn-blue { background: var(--accent); color: white; }
        .btn-finish { background: var(--error); color: white; position: fixed; bottom: 20px; right: 20px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="start-modal" class="modal">
            <h2>Configuración del Quiz</h2>
            <p>¿Cómo deseas realizar las preguntas?</p>
            <button class="btn btn-blue" onclick="startQuiz(false)">Orden Preestablecido</button>
            <button class="btn btn-blue" onclick="startQuiz(true)">Mezclar Preguntas</button>
        </div>

        <div id="result-modal" class="modal hidden">
            <h2>Cuestionario Finalizado</h2>
            <div id="score-info"></div>
            <div style="margin-top: 20px; display: grid; gap: 10px;">
                <button class="btn btn-blue" onclick="restart('all')">Repetir Completo</button>
                <button class="btn btn-blue" style="background:#e67e22" onclick="restart('failed')">Repetir solo Falladas</button>
                <button class="btn btn-blue" style="background:var(--marked)" onclick="restart('marked')">Repetir solo Marcadas</button>
                <button class="btn btn-blue" style="background:var(--primary)" onclick="restart('both')">Repetir Falladas + Marcadas</button>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="index-title">Índice</div>
        <div id="index-grid" class="index-grid"></div>
    </div>

    <div id="content">
        <div id="quiz-container"></div>
        <button class="btn btn-finish" onclick="showResults()">Finalizar y Ver Opciones</button>
    </div>

    <script>
        const allQuestions = [
            { q: "37. Entre la musculatura de la pared anterior del abdomen, el Músculo Recto Anterior destaca sobre los músculos anchos por ser funcional y biomecánicamente un:", options: ["Potente extensor espinal puro y rotador contralateral del tórax.", "Músculo auxiliar parasimpático liso para la fase inicial del vaciamiento digestivo inferior.", "Músculo fundamentalmente compresor respiratorio y flexor puro de la columna espinal acercando el pubis y el esternón.", "Músculo estático cuya única función es mantener unidos los ligamentos de la base peritoneal subumbilical."], correct: 2, exp: "Es el antagonista directo del erector de la columna; al tensarse acorta la distancia costopúbica provocando la flexión espinal (encorvamiento)." },
            { q: "38. La arquitectura morfológica típica del Músculo Recto Anterior se caracteriza por poseer a lo largo de su vientre contractil 3 o 4 intersecciones aponeuróticas. Estas intersecciones:", options: ["Se fusionan y adhieren sólidamente a la lámina anterior de la vaina de los rectos, fraccionando el músculo.", "Son conductos huecos para permitir el ascenso venoso epigástrico superficial.", "Conectan el vientre derecho con el vientre izquierdo perforando diagonalmente la línea alba.", "Desaparecen al llegar a la edad adulta."], correct: 0, exp: "Estos vientres seccionales evitan el desgarro de un músculo tan largo y explican los 'cuadritos' visibles o six-pack." },
            { q: "39. En su descenso vertical, este flexor puro se va a insertar caudalmente conformando en parte el denominado 'tendón conjunto', fijándose anatómicamente en:", options: ["El margen inferior oblicuo de la duodécima costilla y su cartílago.", "La sínfisis, la espina, la cresta e incluso parte del pecten del hueso pubis.", "La cara lateral mayor del trocánter del fémur.", "El fondo del saco de Douglas."], correct: 1, exp: "El anclaje inferior duro es esencial para poder flexionar contra la inercia de las palancas de la parrilla costal alta." },
            { q: "40. Topográficamente, el músculo Recto Anterior del abdomen presenta una relación de peligro en su tercio inferior (por debajo de la línea arqueada), ya que en esa zona posterior:", options: ["Todas las aponeurosis pasan por delante de él, dejando la cara posterior del músculo desnuda.", "Está atravesado transversalmente por el intestino grueso.", "Contiene la masa del ganglio linfático de Virchow.", "El hueso ilíaco impide su descenso normal."], correct: 0, exp: "Esta zona sin refuerzo aponeurótico posterior lo hace susceptible a ceder, además es el tramo por donde los vasos epigástricos inferiores ascienden." },
            { q: "41. Las venas lumbares ascendentes conforman una vía venosa longitudinal retroperitoneal clave. ¿Qué conexión funcional fundamental establecen?", options: ["Comunican la circulación venosa portal profunda gástrica con el tracto esplénico.", "Reúnen la sangre ilíaca externa y la envían transversalmente a la mesentérica inferior.", "Constituyen una vía paralela a la cava que comunica las venas lumbares desde el abdomen hasta la raíz torácica del sistema ácigos.", "Vierten exclusivamente todo su caudal al conducto torácico."], correct: 2, exp: "Actúan como un sistema 'bypass' que recoge a las venas horizontales lumbares, preparándose para saltar al tórax y ser el origen de ácigos y hemiácigos." },
            { q: "42. Topográficamente, estas venas lumbares ascendentes se localizan simétricamente situándose a los lados de la columna:", options: ["Por delante del músculo psoas mayor.", "Ocultas profundas detrás o dentro del fascículo pélvico del músculo psoas mayor, por delante de la base de las apófisis transversas.", "Intramusculares cruzando la matriz media de los cuerpos lumbares.", "Colgando intracavitariamente apoyadas sobre las raíces de las flexuras."], correct: 1, exp: "Discurren hundidas, bien pegadas al esqueleto axial a lo largo de las concavidades vertebrales laterales." },
            { q: "43. Para poder transformarse en vena Ácigos (derecha) y Hemiácigos (izquierda), estas venas lumbares ascendentes perforan habitualmente:", options: ["El centro aponeurótico frénico medial.", "El grueso de las hojas gástricas del ligamento frenoesplénico.", "Por debajo o cruzando las fibras correspondientes al pilar diafragmático o el ligamento arqueado medial.", "Perforando la aorta torácica."], correct: 2, exp: "Emplean el resquicio de los arcos del psoas o los pilares tendinosos profundos cerca del nivel de L1." },
            { q: "44. Si un paciente presenta una trombosis masiva de la Vena Cava Inferior, las venas lumbares ascendentes:", options: ["Colapsarán irreversiblemente induciendo un fallo cardíaco total.", "Actuarán como un canal de derivación salvavidas invirtiendo o engrosando su flujo ascendente para desviar la sangre por la ácigos hasta la Cava Superior.", "Generarán de forma inmediata varices en el plexo submucoso rectal.", "Desecarán el parénquima del tejido esplénico."], correct: 1, exp: "Forman junto con el sistema cavo-cava vertebral (plexo de Batson avalvular) la red colateral vicariante imprescindible." },
            { q: "45. Las arterias lumbares nacen a pares de:", options: ["La cara anterior visceral de la bifurcación torácica.", "Las ramas de los troncos colaterales ilíacos comunes.", "La cara dorsal y posterolateral libre de la porción recta inferior y media de la propia Aorta abdominal.", "La bifurcación troncal mesentérica superior."], correct: 2, exp: "Nacen directamente de la aorta y discurren horizontalmente buscando los músculos anchos." },
            { q: "46. La denominada arteria 'iliolumbar' es una colateral originada directamente desde:", options: ["El ramo pudendo externo superficial.", "La rama de división del tronco arterial posterior perteneciente a la Arteria Ilíaca Interna o Hipogástrica.", "La terminación sacra mediana.", "La raíz pura obturatriz."], correct: 1, exp: "La ilíaca interna provee esta rama ascendente que actúa como 'la quinta arteria lumbar'." },
            { q: "47. En su recorrido transversal, las arterias lumbares discurren habitualmente:", options: ["Perforan el estuche anterior del saco recto.", "Discurren retrofascialmente pasando profundas y posteriores a través de los fascículos del Músculo Psoas Mayor.", "Acompañan por el mesenterio la red venosa periumbilical.", "Atraviesan siempre libremente el omento mayor."], correct: 1, exp: "Su curso es extremadamente profundo ancladas al hueso y los canalones músculo fasciales lumbares." },
            { q: "48. A nivel del foramen intervertebral, todas las arterias lumbares emiten una rama crítica recurrente que vasculariza:", options: ["Los fascículos del pedículo testicular.", "Las raíces de los troncos vagales del esófago.", "El conducto vertebral dural medular raquídeo aportando las arterias radiculares vitales.", "La cúpula subhepática y base subesplénica."], correct: 2, exp: "Esta rama espinal es crucial; por ejemplo, la arteria de Adamkiewicz nace de una lumbar y salva a la médula distal." },
            { q: "49. La Vena Cava Inferior asciende por el abdomen posterior alto:", options: ["Sube a la izquierda y entra por el hiato aórtico.", "Asciende desplazada hacia la derecha de la columna perforando el centro frénico tendinoso en T8.", "Queda encajonada en el mediastino anterior de Morgagni.", "Gira transversalmente hacia el hilio esplénico."], correct: 1, exp: "Situación derecha y perforación diafragmática en T8, vital para el retorno venoso." },
            { q: "50. La Vena Ácigos derecha asciende entre:", options: ["El margen libre antero lateral gástrico del riñón derecho.", "El pilar muscular diafragmático medial derecho, quedando postero-lateral a la aorta en el mediastino posterior.", "Inmersa superficial intra-peritoneal.", "Dentro de la vaina del recto fascial."], correct: 1, exp: "La vena ácigos tiene un trayecto escondido muy dorsal en el 'rincón' prevertebral." },
            { q: "51. La Vena Ácigos desemboca finalmente en:", options: ["El seno venoso coronario de Thebesio.", "La vena porta en la triada portal.", "El cayado de la Vena Cava Superior cabalgando el bronquio principal derecho.", "La vena subclavia del plexo braquiocefálico."], correct: 2, exp: "El clásico 'cayado de la ácigos' drena sobre la Cava Superior en el tórax superior." },
            { q: "52. La pared posterior palpable del Hiato de Winslow corresponde a:", options: ["La aorta descendente.", "Vena cava inferior.", "Bazo e hilio capsular.", "Vena renal transversal."], correct: 1, exp: "La gruesa y palpable pared POSTERIOR es la Vena Cava Inferior y el pilar derecho parietal." },
            { q: "53. El hiato esofágico del diafragma (T10) da paso a:", options: ["Conductos torácicos mediales.", "El esófago y los troncos de los nervios vagos izquierdo y derecho.", "Vasos pélvicos lumbares.", "Exclusivamente al tubo digestivo."], correct: 1, exp: "Los nervios Neumogástricos (X par) cruzan pegados a las paredes del esófago." },
            { q: "54. El Nervio Vago IZQUIERDO se sitúa en la cara ANTERIOR del estómago debido a:", options: ["Al giro embriológico del estómago sobre su eje longitudinal que orienta su lado izquierdo en sentido ventral.", "A la compresión lateral tumoral cardíaca.", "Al cruce obligado quiasmático.", "A la ausencia del ramal gástrico."], correct: 0, exp: "Al rotar el estómago, el borde izquierdo se hace anterior, arrastrando al nervio vago izquierdo." },
            { q: "55. El tronco vagal posterior (Vago Derecho) termina inervando principalmente:", options: ["Plexo pudendo.", "Nervio femoral.", "Plexo Celíaco (Solar) para inervar vísceras abdominales.", "Nervio suboccipital."], correct: 2, exp: "El Vago derecho se prolonga hacia los ganglios celíacos para la inervación parasimpática de las vísceras." },
            { q: "56. Por el hiato esofágico asciende hacia el tórax:", options: ["Ramas esofágicas de la arteria coronaria gástrica izquierda.", "Arteria umbilical obliterada.", "Tronco braquiocefálico.", "Vasos intercostales dorsales."], correct: 0, exp: "Estas ramas suben al tórax inferior y forman parte del plexo de escape varicoso esofágico." },
            { q: "57. El Ligamento gastrofrénico (suspensorio del estómago) se inserta en:", options: ["Vena mesentérica.", "Fascia y cúpula izquierda del músculo diafragma.", "Espesor hiliar portal.", "Cartílago costal."], correct: 1, exp: "Es un medio de fijación que liga el estómago al techo diafragmático." },
            { q: "58. El músculo suspensorio del estómago está compuesto por:", options: ["Fascia pélvica.", "Un pequeño haz liso contractil derivado de la túnica muscular gástrica.", "Pilar central voluntario.", "Ramales ganglionares."], correct: 1, exp: "Suele haber fibras musculares lisas que estabilizan la posición del saco gástrico." },
            { q: "59. El techo o límite cefálico de la transcavidad de los epiplones es:", options: ["Ligamento gastrocólico.", "Ligamento suspensorio gastrofrénico.", "Borde yugular.", "Espacio recto parietal."], correct: 1, exp: "Este ligamento cierra por arriba el fondo de saco ciego epiploico." },
            { q: "60. El 'área desnuda gástrica' está en contacto íntimo con:", options: ["Pilares lumbares derechos.", "El pilar diafragmático izquierdo y la glándula suprarrenal izquierda.", "Útero y trompas.", "Pleura torácica."], correct: 1, exp: "Ese contacto directo sin peritoneo facilita la transmisión de inflamación entre riñón/suprarrenal y estómago." },
            { q: "1 (Páncreas). Detrás del cuello del páncreas se produce:", options: ["Bifurcación de la aorta.", "Confluencia de la vena mesentérica superior y esplénica para formar la vena Porta.", "División del tronco celíaco.", "Desembocadura de la vena renal izquierda."], correct: 1, exp: "Relación clave en cirugía pancreática." },
            { q: "2 (Páncreas). NO es una relación posterior directa del páncreas izquierdo:", options: ["Riñón izquierdo.", "Glándula suprarrenal izquierda.", "Pedículo renal izquierdo.", "Colon descendente."], correct: 3, exp: "El colon descendente queda inferior y lateral, no posterior directo." },
            { q: "3 (Páncreas). Vaso en el surco posterior del cuerpo del páncreas:", options: ["Vena esplénica.", "Arteria mesentérica superior.", "Arteria gastroduodenal.", "Vena hemiácigos."], correct: 0, exp: "La vena esplénica labra un lecho longitudinal en la cara dorsal pancreática." },
            { q: "4 (Páncreas). Estructura venosa pegada a la cara posterior de la cabeza pancreática:", options: ["Mesentérica inferior.", "Vena cava inferior.", "Ilíaca común.", "Lumbar ascendente."], correct: 1, exp: "La VCI pasa justo por detrás de la cabeza del páncreas." },
            { q: "5 (Colédoco). El colédoco distal es:", options: ["Envuelto en epiplón menor.", "Cabalgando el cuello.", "Labra un surco profundo o se introduce en la cabeza pancreática.", "Bajo el proceso unciforme."], correct: 2, exp: "Esto explica por qué tumores de cabeza de páncreas causan ictericia precoz." },
            { q: "6 (Colédoco). El colédoco distal se une habitualmente con:", options: ["Santorini.", "Conducto de Wirsung.", "Pancreatoduodenal superior.", "Ampolla cística."], correct: 1, exp: "Forman la ampolla de Vater." },
            { q: "7 (Colédoco). El esfínter que regula la ampolla de Vater es:", options: ["Pilórico.", "Válvula de Kerckring.", "Esfínter de Oddi.", "Pilar del diafragma."], correct: 2, exp: "Anillo de músculo liso que controla el vaciado al duodeno." },
            { q: "8 (Colédoco). La irrigación del colédoco distal depende de:", options: ["Hepáticas.", "Arterias pancreatoduodenales superiores e inferiores.", "Mesentérica inferior.", "Esplénica."], correct: 1, exp: "Recibe ramas de la red pericefálica pancreática." },
            { q: "9 (Riñón). Los túbulos colectores se localizan en:", options: ["Cápsula adiposa.", "Pirámides renales (médula) y rayos medulares (corteza).", "Cálices.", "Corpúsculo renal."], correct: 1, exp: "Forman el volumen estriado de las pirámides medulares." },
            { q: "10 (Riñón). Los conductos de Bellini vierten la orina en:", options: ["Corteza renal.", "Hilio vascular.", "Área cribosa de la papila renal.", "Base de las pirámides."], correct: 2, exp: "La papila es el punto de goteo hacia el cáliz menor." },
            { q: "11 (Riñón). Los túbulos colectores y cálices derivan de:", options: ["Seno urogenital.", "Yema ureteral (divertículo de Wolff).", "Crestas neurales.", "Notocorda."], correct: 1, exp: "La yema ureteral forma toda la vía excretora intrínseca." },
            { q: "12 (Riñón). El túbulo colector es sensible a:", options: ["Hormona antidiurética (ADH).", "Insulina.", "Presión de oxígeno.", "Tensión de la cápsula."], correct: 0, exp: "La ADH permite la reabsorción de agua concentrando la orina." },
            { q: "13 (Cuadrado). Inserciones del Cuadrado Lumbar:", options: ["10ª costilla y sacro.", "12ª costilla, apófisis transversas lumbares y cresta ilíaca.", "Espinosas y isquion.", "Reborde costal y pubis."], correct: 1, exp: "Posee tres fascículos: costoilíacos, costotransversos y transversoilíacos." },
            { q: "14 (Cuadrado). El engrosamiento fascial que cruza el cuadrado lumbar es:", options: ["Arco del psoas.", "Ligamento arqueado lateral.", "Longitudinal anterior.", "Fascia de Treitz."], correct: 1, exp: "Salta de L1 a la 12ª costilla sobre el cuadrado lumbar." },
            { q: "15 (Cuadrado). La contracción unilateral del cuadrado lumbar produce:", options: ["Rotación.", "Flexión anterior.", "Inclinación lateral ipsilateral.", "Circunducción."], correct: 2, exp: "Pliega lateralmente la columna lumbar hacia el mismo lado." },
            { q: "16 (Cuadrado). Órgano que descansa sobre el cuadrado lumbar:", options: ["Vejiga.", "Riñón.", "Estómago.", "Hígado."], correct: 1, exp: "Forma el lecho posterior del riñón junto con el psoas." },
            { q: "17 (Trígono). El trígono esternocostal permite el paso de:", options: ["Epigástricos inferiores.", "Torácicos laterales.", "Epigástricos superiores.", "Intercostales posteriores."], correct: 2, exp: "Los vasos torácicos internos continúan como epigástricos superiores aquí." },
            { q: "18 (Trígono). Linfa que drena por el trígono esternocostal:", options: ["Pelvis.", "Cara diafragmática del Hígado.", "Riñones.", "Bazo."], correct: 1, exp: "Drena hacia los ganglios paraesternales." },
            { q: "19 (Trígono). Hernia asociada al trígono esternocostal:", options: ["Bochdalek.", "Crural.", "Hernia de Morgagni.", "Línea alba."], correct: 2, exp: "Es el sitio clásico de las hernias diafragmáticas anteriores." },
            { q: "20 (Trígono). Límites del trígono esternocostal:", options: ["Pilares lumbares.", "Apófisis xifoides y 7º cartílago costal.", "11ª y 12ª costilla.", "Centro tendinoso."], correct: 1, exp: "Hueco entre porción esternal y costal del diafragma." },
            { q: "21 (Pliegue). El pliegue umbilical medio contiene:", options: ["Epigástrica inferior.", "Vena umbilical.", "Uraco obliterado.", "Conducto deferente."], correct: 2, exp: "Conecta el vértice de la vejiga con el ombligo." },
            { q: "22 (Pliegue). El uraco deriva de:", options: ["Alantoides.", "Conducto vitelino.", "Notocorda.", "Conducto de Müller."], correct: 0, exp: "Remanente fibroso del alantoides fetal." },
            { q: "23 (Pliegue). Falla de cierre del uraco causa:", options: ["Heces por ombligo.", "Fuga de orina por el ombligo.", "Agenesia renal.", "Hernia inguinal."], correct: 1, exp: "Fístula uracal." },
            { q: "24 (Pliegue). Los pliegues umbilicales MEDIALES contienen:", options: ["Arterias umbilicales obliteradas.", "Uréteres.", "Vasos epigástricos inferiores.", "Ligamentos redondos."], correct: 0, exp: "Situados lateralmente al pliegue medio (uraco)." },
            { q: "25 (Pleura). Relación ANTERIOR de la cúpula pleural:", options: ["Manubrio y timo.", "Clavícula, 1ª costilla y vasos subclavios.", "ECM y yugular.", "Cricoides."], correct: 1, exp: "Los vasos subclavios pasan apoyados en la 1ª costilla." },
            { q: "26 (Pleura). Relación MEDIAL de la cúpula derecha:", options: ["Tráquea, esófago, tronco braquiocefálico, vago y frénico.", "Simpático y aorta.", "Cava inferior y ácigos.", "Escalenos."], correct: 0, exp: "Abraza el eje aerodigestivo y grandes vasos del cuello." },

            { q: "4 (Riolano). Punto de Sudeck está en:", options: ["Treitz.", "Transición rectosigmoidea.", "Calot.", "Winslow."], correct: 1, exp: "Anastomosis débil inferior." },
            { q: "5 (Cecales). Origen de arterias cecales:", options: ["Mesentérica inferior.", "Arteria ileocólica.", "Cólica derecha.", "Pudenda."], correct: 1, exp: "Abrazan el ciego." },
            { q: "6 (Cecales). Arteria apendicular nace de:", options: ["Umbilical.", "Vesical.", "Cecal posterior o Ileocólica.", "Ovárica."], correct: 2, exp: "Crucial para apendicectomías." },
            { q: "7 (Cecales). Cecales rodean:", options: ["Unión ileocecal.", "Ligamento inguinal.", "Uréter.", "Ángulo esplénico."], correct: 0, exp: "Hacen pinza en la entrada del íleon." },
            { q: "8 (Cecales). El ciego es susceptible a:", options: ["Bilis.", "Isquemia.", "Cálculos.", "Várices."], correct: 1, exp: "Depende de ramas terminales ileocólicas." },
            { q: "9 (Língula). Língula descansa en:", options: ["Suprarrenal.", "Bazo.", "Ventrículo izquierdo y pericardio.", "Ácigos."], correct: 2, exp: "Envuelve la punta del corazón." },
            { q: "10 (Língula). Bajo la:", options: ["Cava.", "Escotadura cardíaca.", "Cisura horizontal.", "Hilio."], correct: 1, exp: "Marca el borde anterior izquierdo." },
            { q: "11 (Língula). Está en el:", options: ["Lóbulo superior.", "Lóbulo medio.", "Lóbulo inferior.", "Apical."], correct: 0, exp: "Análogo al lóbulo medio derecho." },
            { q: "12 (Língula). Ocupa el receso:", options: ["Bochdalek.", "Costodiafragmático.", "Costomediastínico anterior izquierdo.", "Winslow."], correct: 2, exp: "Espacio pleural frente al corazón." },
            { q: "13 (Ligamento P). El ligamento pulmonar:", options: ["Bombea.", "Estabiliza pulmón y expansión de venas.", "Frénico.", "Sella."], correct: 1, exp: "Otorga holgura al pedículo." },
            { q: "14 (Ligamento P). Conformado por:", options: ["Músculo.", "Cartílago.", "Unión de pleura visceral y parietal.", "Vago."], correct: 2, exp: "Pliege seroso que cuelga del hilio." },
            { q: "15 (Ligamento P). Detrás del ligamento DERECHO está la:", options: ["Cava superior.", "Aorta.", "Vena Ácigos mayor.", "Hemiácigos."], correct: 2, exp: "Labra un canal vertical profundo." },
            { q: "16 (Ligamento P). Corte necesario para:", options: ["Lóbulo inferior.", "Tiroides.", "Timo.", "Lóbulo superior."], correct: 0, exp: "Libera la base del pulmón." },
            { q: "17 (Pericardio). Anclan el pericardio delante:", options: ["Ligamentos esternopericárdicos.", "Vertebropericárdicos.", "Sibson.", "Longitudinal."], correct: 0, exp: "Evitan que el corazón caiga." },
            { q: "18 (Pericardio). Suelo fusionado con:", options: ["Pilar derecho.", "Centro frénico tendinoso.", "Hiato.", "Cruz."], correct: 1, exp: "Ligamento pericardiofrénico." },
            { q: "19 (Pericardio). Hoja visceral es el:", options: ["Endocardio.", "Miocardio.", "Epicardio.", "Fascia."], correct: 2, exp: "Serosa íntima del corazón." },
            { q: "20 (Pericardio). Seno entre aorta/pulmonar y aurículas:", options: ["Coronario.", "Seno transverso de Theile.", "Oblicuo de Haller.", "Douglas."], correct: 1, exp: "Pasillo para pinzamiento quirúrgico." },
            { q: "21 (Escalenos). CORRECTA sobre escalenos:", options: ["Troncos plexo.", "Frénico.", "Ramos directos C3-C8.", "Vago."], correct: 2, exp: "Nervios espinales directos." },
            { q: "22 (Escalenos). Anterior y Medio se fijan en:", options: ["Esternón.", "1ª costilla.", "2ª costilla.", "Clavícula."], correct: 1, exp: "Abrazan la subclavia." },
            { q: "23 (Escalenos). Posterior se fija en:", options: ["1ª costilla.", "Acromion.", "2ª costilla.", "Xifoides."], correct: 2, exp: "Salta la primera costilla." },
            { q: "24 (Escalenos). Bilateral causa:", options: ["Extensión.", "Flexión ventral.", "Rotación.", "Inclinación."], correct: 1, exp: "Pliegan el cuello hacia delante." },
            { q: "25 (Cuadrado B). Inserciones de cuadrado lumbar:", options: ["Sacro/Fémur.", "12ª costilla, transversas lumbares y cresta ilíaca.", "Escápula.", "Ombligo."], correct: 1, exp: "Cierra pared abdominal posterior." },
            { q: "26 (Cuadrado B). Unilateral causa:", options: ["Flexión lateral ipsilateral.", "Rotación.", "Flexión ventral.", "Extensión."], correct: 0, exp: "Pliega tronco al mismo lado." },
            { q: "27 (Cuadrado B). Bilateral ayuda a:", options: ["Empujar vísceras.", "Elevar cresta.", "Extensión y fijar 12ª costilla.", "Lordosis."], correct: 2, exp: "Anclaje para el diafragma." },
            { q: "28 (Cuadrado B). Fascia cruzada por:", options: ["Arco medial.", "Treitz.", "Esofágico.", "Ligamento arqueado lateral."], correct: 3, exp: "Paso del diafragma sobre el cuadrado." }
        ];

        let currentSet = [];
        let state = {}; 

        function startQuiz(shuffle) {
            currentSet = [...allQuestions];
            if (shuffle) currentSet.sort(() => Math.random() - 0.5);
            
            // Mezclar opciones
            currentSet.forEach(q => {
                let optionsData = q.options.map((text, index) => ({ text, isOriginalCorrect: index === q.correct }));
                optionsData.sort(() => Math.random() - 0.5);
                q.shuffledOptions = optionsData;
            });

            document.getElementById('overlay').classList.add('hidden');
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            const grid = document.getElementById('index-grid');
            container.innerHTML = '';
            grid.innerHTML = '';

            currentSet.forEach((q, i) => {
                // Crear botón de índice
                const btn = document.createElement('div');
                btn.className = 'index-btn' + (state[i]?.marked ? ' marked' : '');
                btn.id = 'idx-' + i;
                btn.innerText = i + 1;
                btn.onclick = () => document.getElementById('q-' + i).scrollIntoView({ behavior: 'smooth' });
                grid.appendChild(btn);

                // Crear tarjeta de pregunta
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + i;
                
                card.innerHTML = `
                    <div class="mark-container" onclick="toggleMark(${i})">
                        <input type="checkbox" ${state[i]?.marked ? 'checked' : ''}> Marcar
                    </div>
                    <span class="question-text">${q.q}</span>
                    <div id="options-${i}">
                        ${q.shuffledOptions.map((opt, optIdx) => `
                            <div class="option" id="q-${i}-opt-${optIdx}" onclick="checkAnswer(${i}, ${optIdx})">
                                ${opt.text}
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="exp-${i}">
                        <strong>Explicación:</strong> ${q.exp}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function checkAnswer(qIdx, optIdx) {
            if (state[qIdx]?.answered) return;

            const question = currentSet[qIdx];
            const isCorrect = question.shuffledOptions[optIdx].isOriginalCorrect;
            
            if (!state[qIdx]) state[qIdx] = {};
            state[qIdx].answered = true;
            state[qIdx].wasCorrect = isCorrect;

            const expDiv = document.getElementById('exp-' + qIdx);
            expDiv.style.display = 'block';

            const idxBtn = document.getElementById('idx-' + qIdx);
            
            question.shuffledOptions.forEach((opt, index) => {
                const el = document.getElementById(`q-${qIdx}-opt-${index}`);
                el.classList.add('disabled');
                if (opt.isOriginalCorrect) el.classList.add('correct-choice');
                if (index === optIdx && !isCorrect) el.classList.add('wrong-choice');
            });

            idxBtn.classList.add(isCorrect ? 'correct' : 'wrong');
        }

        function toggleMark(i) {
            if (!state[i]) state[i] = {};
            state[i].marked = !state[i].marked;
            document.getElementById('idx-' + i).classList.toggle('marked', state[i].marked);
        }

        function showResults() {
            let correct = 0;
            let total = currentSet.length;
            Object.values(state).forEach(s => { if (s.wasCorrect) correct++; });

            document.getElementById('score-info').innerHTML = `
                <p>Has acertado <strong>${correct}</strong> de <strong>${total}</strong> preguntas.</p>
                <p>Porcentaje: ${((correct/total)*100).toFixed(1)}%</p>
            `;
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('start-modal').classList.add('hidden');
            document.getElementById('result-modal').classList.remove('hidden');
        }

        function restart(type) {
            let filtered = [];
            if (type === 'all') {
                filtered = allQuestions;
            } else if (type === 'failed') {
                currentSet.forEach((q, i) => { if (state[i] && !state[i].wasCorrect) filtered.push(q); });
            } else if (type === 'marked') {
                currentSet.forEach((q, i) => { if (state[i]?.marked) filtered.push(q); });
            } else if (type === 'both') {
                currentSet.forEach((q, i) => { if (state[i] && (!state[i].wasCorrect || state[i].marked)) filtered.push(q); });
            }

            if (filtered.length === 0) {
                alert("No hay preguntas en esta categoría.");
                return;
            }

            // Reiniciar estado y cargar nuevo set
            state = {};
            currentSet = filtered;
            currentSet.forEach(q => {
                let optionsData = q.options.map((text, index) => ({ text, isOriginalCorrect: index === q.correct }));
                optionsData.sort(() => Math.random() - 0.5);
                q.shuffledOptions = optionsData;
            });

            document.getElementById('overlay').classList.add('hidden');
            renderQuiz();
            window.scrollTo(0,0);
        }
    </script>
</body>

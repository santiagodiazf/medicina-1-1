<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Anatomía y Embriología: Digestivo y Renal</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --success: #27ae60;
            --error: #c0392b;
            --warning: #f1c40f;
            --bg: #f8f9fa;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantallas de Control */
        #setup-screen, #result-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin: 8px;
            transition: transform 0.1s, background 0.2s;
        }

        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-finish { background: var(--error); position: fixed; bottom: 20px; right: 20px; z-index: 100; }

        /* Layout Principal */
        #main-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Numérico */
        #sidebar {
            width: 70px;
            background: var(--primary);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 8px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .nav-dot {
            width: 40px;
            height: 40px;
            background: #34495e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-dot.answered { background: var(--success); }
        .nav-dot.marked { border: 3px solid var(--warning); box-sizing: border-box; }
        .nav-dot:hover { background: var(--secondary); }

        /* Área de Preguntas */
        #quiz-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px 10%;
            scroll-behavior: smooth;
        }

        .question-card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            border-left: 5px solid #ddd;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .mark-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option:hover { background: #f1f7ff; border-color: var(--secondary); }
        .option.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .option.wrong { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }
        .option.disabled { pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e1f5fe;
            border-radius: 6px;
            border-left: 4px solid var(--secondary);
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>Anatomía y Embriología Humana</h1>
        <h3>Cuestionario de Aparato Digestivo y Renal</h3>
        <p>Seleccione el modo de visualización:</p>
        <div>
            <input type="radio" id="order-fixed" name="order" value="fixed" checked>
            <label for="order-fixed">Orden Preestablecido</label>
            <span style="margin: 0 15px;"></span>
            <input type="radio" id="order-random" name="order" value="random">
            <label for="order-random">Orden Aleatorio</label>
        </div>
        <br>
        <button class="btn" onclick="startQuiz()">Comenzar Cuestionario</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Cuestionario Finalizado</h2>
        <p id="score-text" style="font-size: 1.2rem; margin-bottom: 30px;"></p>
        <div id="retry-options">
            <button class="btn" onclick="retry('all')">Repetir todo completo</button>
            <button class="btn" onclick="retry('failed')">Repetir solo falladas</button>
            <button class="btn" onclick="retry('marked')">Repetir solo marcadas</button>
            <button class="btn" onclick="retry('failed-marked')">Repetir falladas + marcadas</button>
        </div>
    </div>

    <button id="finish-btn" class="btn btn-finish hidden" onclick="finishQuiz()">Finalizar Cuestionario</button>

    <div id="main-container">
        <div id="sidebar"></div>
        <div id="quiz-area"></div>
    </div>

    <script>
        const rawData = [
            { q: "Embriológicamente, ¿de qué estructura deriva la capa de musculatura lisa del tubo digestivo?", a: "Del ectodermo superficial.", b: "Del endodermo exclusivamente.", c: "De la hoja esplácnica del mesodermo (esplacnopleura).", d: "De la hoja somática del mesodermo.", correct: "c", exp: "Según los esquemas del desarrollo del peritoneo, la hoja esplácnica del mesodermo envuelve al intestino y da lugar tanto al peritoneo visceral como a su musculatura lisa." },
            { q: "Durante la rotación embrionaria del estómago, los nervios vagos cambian de posición. ¿Cómo quedan situados anatómicamente en el estómago definitivo?", a: "El vago derecho en la cara anterior y el vago izquierdo en la cara posterior.", b: "El vago izquierdo en la cara anterior y el vago derecho en la cara posterior.", c: "Ambos nervios descienden únicamente por la curvatura mayor.", d: "Quedan aislados en el retroperitoneo sin contactar con el estómago.", correct: "b", exp: "El estómago rota sobre su eje longitudinal, arrastrando al vago izquierdo (que venía por la izquierda) hacia la cara anterior, y al derecho hacia la cara posterior." },
            { q: "¿Qué cavidad o receso peritoneal importante se forma por detrás del estómago como consecuencia del desplazamiento del mesogastrio dorsal durante la rotación gástrica?", a: "El receso subfrénico.", b: "El espacio parietocólico derecho.", c: "La transcavidad de los epiplones (bolsa omental).", d: "El fondo de saco vesicouterino.", correct: "c", exp: "La transcavidad de los epiplones se genera tras el estómago al rotar este y tirar del mesogastrio dorsal." },
            { q: "¿Qué estructura anatómica se forma a partir del mesogastrio dorsal, cuelga de la curvatura mayor del estómago y desciende cubriendo las asas intestinales?", a: "Epiplón u omento menor.", b: "Ligamento falciforme.", c: "Epiplón u omento mayor.", d: "Mesocolon transverso.", correct: "c", exp: "El epiplón mayor deriva del mesogastrio dorsal y cae en forma de \"delantal\" desde la curvatura mayor." },
            { q: "El hígado posee en su cara posterior y superior una amplia zona que carece de peritoneo visceral y contacta directamente con el diafragma. Esta zona se denomina:", a: "Lóbulo caudado.", b: "Fosa de la vesícula biliar.", c: "Área desnuda (Pars affixa).", d: "Receso hepatorrenal.", correct: "c", exp: "El profesor insiste en la clase que el área desnuda está delimitada por las hojas superior e inferior del ligamento coronario, donde la cápsula de Glisson se pega a la fascia diafragmática." },
            { q: "Tras el nacimiento, la vena umbilical se oblitera. ¿En qué estructura se convierte este vaso, alojado en el borde libre del ligamento falciforme?", a: "Conducto venoso de Arancio.", b: "Ligamento redondo del hígado.", c: "Uraco.", d: "Ligamento venoso.", correct: "b", exp: "Como indica el profesor, la arteria/vena umbilical pierde su función y se transforma en el cordón fibroso llamado ligamento redondo." },
            { q: "El profesor destaca un espacio entre la cara visceral del hígado y el riñón derecho donde se acumula líquido en los pacientes tumbados (decúbito). Este espacio es el:", a: "Receso subfrénico.", b: "Fondo de saco de Douglas.", c: "Receso hepatorrenal o de Morison.", d: "Transcavidad de los epiplones.", correct: "c", exp: "En la transcripción, lo llama \"receso hepatorrenal o receso de Morris (Morison)\", señalando que es medible por ecografía y clave para acúmulos líquidos." },
            { q: "En la segmentación del hígado, la cara visceral presenta el hilio hepático y varias fisuras que delimitan lóbulos. El lóbulo situado por detrás del hilio hepático, entre la vena cava inferior y el ligamento venoso, es el:", a: "Lóbulo cuadrado.", b: "Lóbulo derecho.", c: "Lóbulo caudado (de Spiegel).", d: "Lóbulo izquierdo.", correct: "c", exp: "El lóbulo caudado es posterior y craneal al hilio hepático. El lóbulo cuadrado es anterior (junto a la vesícula)." },
            { q: "La irrigación del estómago está a cargo de un anillo arterial. ¿De qué arteria principal procede directamente la arteria gástrica izquierda?", a: "Arteria mesentérica superior.", b: "Arteria hepática propia.", c: "Tronco celíaco.", d: "Arteria esplénica.", correct: "c", exp: "La gástrica izquierda es una rama directa del tronco celíaco, junto con la esplénica y la hepática común." },
            { q: "Siguiendo con la irrigación del estómago, la arteria gastroepiploica derecha discurre por la curvatura mayor. ¿De qué vaso nace?", a: "Arteria gastroduodenal.", b: "Arteria esplénica.", c: "Tronco celíaco.", d: "Arteria mesentérica inferior.", correct: "a", exp: "La gastroduodenal (rama de la hepática común) da lugar a la gastroepiploica derecha." },
            { q: "Drenaje venoso: El material hace una advertencia explícita (\"¡No retorna a la cava!\"). ¿Hacia dónde drena toda la sangre procedente de las venas gástricas, esplénica y mesentéricas?", a: "Al sistema ácigos.", b: "A las venas hepáticas (suprahepáticas).", c: "Directamente a las venas renales.", d: "Al sistema de la vena Porta hepática.", correct: "d", exp: "Toda la sangre digestiva infradiafragmática converge en la vena Porta para ser filtrada por el hígado antes de ir a la cava." },
            { q: "En la sexta semana del desarrollo embrionario, el intestino primitivo medio sufre un evento anatómico debido a su rápido alargamiento. ¿Cuál es?", a: "Herniación fisiológica hacia el interior del cordón umbilical.", b: "Atresia completa temporal.", c: "Ascenso hacia la cavidad torácica.", d: "Fusión con el estómago.", correct: "a", exp: "Crece tanto que no cabe en el abdomen y se hernia en forma de horquilla dentro del pedículo vitelino antes de regresar en la novena semana." },
            { q: "Si el conducto onfalomesentérico (vitelino) no involuciona completamente, deja un remanente congénito en el íleon conocido como:", a: "Apéndice vermiforme.", b: "Divertículo de Meckel.", c: "Ciego ectópico.", d: "Fístula gastrocólica.", correct: "b", exp: "Es una anomalía congénita derivada de la persistencia del conducto vitelino." },
            { q: "El páncreas y la mayor parte del duodeno se adhieren al retroperitoneo parietal perdiendo su meso original. ¿Cómo se denomina a los órganos que sufren este proceso?", a: "Primariamente retroperitoneales.", b: "Secundariamente retroperitoneales.", c: "Intraperitoneales móviles.", d: "Extraperitoneales pélvicos.", correct: "b", exp: "Al iniciar su desarrollo como intraperitoneales y luego fijarse mediante fascias de coalescencia, se les denomina secundariamente retroperitoneales." },
            { q: "¿Cómo se llama la fascia de coalescencia que adhiere el colon ascendente y el colon descendente a la pared posterior del abdomen?", a: "Fascia retroduodenal de Treitz.", b: "Fascia de Gerota.", c: "Fascia de Toldt.", d: "Ligamento frenocólico.", correct: "c", exp: "Las fascias de Toldt derecha e izquierda fijan el colon ascendente y descendente, respectivamente." },
            { q: "El límite entre la 4ª porción del duodeno y el yeyuno es el ángulo duodenoyeyunal. ¿Qué estructura lo suspende anclándolo al diafragma?", a: "La válvula de Houston.", b: "El ligamento falciforme.", c: "El músculo suspensorio del duodeno (Ligamento de Treitz).", d: "El mesocolon transverso.", correct: "c", exp: "El ligamento o músculo de Treitz marca el final del duodeno y el inicio del yeyuno móvil." },
            { q: "Las secreciones biliares y pancreáticas desembocan en la segunda porción del duodeno (descendente). ¿Cómo se denomina el esfínter muscular que regula la apertura de la ampolla de Vater?", a: "Esfínter de Oddi (esfínter hepatopancreático).", b: "Esfínter pilórico.", c: "Válvula ileocecal.", d: "Músculo puborrectal.", correct: "a", exp: "El músculo esfínter de Oddi rodea la confluencia del colédoco y el conducto de Wirsung en la papila duodenal mayor." },
            { q: "En la histología macroscópica, ¿qué estructuras destacan profusamente en la mucosa del yeyuno para aumentar la superficie de absorción, diferenciándolo del íleon?", a: "Placas de Peyer.", b: "Tenias intestinales.", c: "Microvellosidades y pliegues circulares (válvulas conniventes).", d: "Apéndices epiploicos.", correct: "c", exp: "El yeyuno posee abundantes y marcados pliegues circulares, mientras que el íleon destaca por el tejido linfoide (Placas de Peyer)." },
            { q: "El Intestino Grueso (Colon) presenta características externas únicas. ¿Cuáles de las siguientes NO es una característica propia del colon?", a: "Tenias colónicas.", b: "Haustras.", c: "Válvulas conniventes gigantes.", d: "Apéndices omentales o epiploicos.", correct: "c", exp: "Las válvulas conniventes son exclusivas del intestino delgado. Las tenias, haustras y apéndices epiploicos son la marca morfológica del colon." },
            { q: "La válvula ileocecal, que comunica el íleon con el ciego, presenta una morfología interna característica. Según las disecciones, se observa como:", a: "Un anillo esfinteriano cilíndrico.", b: "Una apertura con dos labios unidos por frenillos.", c: "Tres valvas en forma de nido de golondrina.", d: "Un pliegue espiral en forma de tirabuzón.", correct: "b", exp: "La diapositiva indica expresamente \"Válvula ileocecal: apertura y frenillos de los labios\"." },
            { q: "Irrigación del intestino: ¿Qué arteria principal se encarga de vascularizar todos los derivados del intestino medio (yeyuno, íleon, ciego, colon ascendente y 2/3 derechos del colon transverso)?", a: "Tronco celíaco.", b: "Arteria mesentérica inferior.", c: "Arteria mesentérica superior.", d: "Arteria ilíaca interna.", correct: "c", exp: "La AMS es el eje arterial sobre el que se desarrolla y vasculariza todo el intestino primitivo medio." },
            { q: "En el interior del recto, encontramos unos pliegues transversales formados por la mucosa y submucosa cuya función es soportar el peso de las heces. ¿Cuál es su nombre?", a: "Columnas de Morgagni.", b: "Válvulas rectales de Houston.", c: "Línea pectínea.", d: "Válvulas conniventes.", correct: "b", exp: "Las válvulas de Houston son las \"repisas\" transversales del interior del recto." },
            { q: "La continencia fecal voluntaria depende críticamente de un músculo que forma una cincha alrededor de la unión anorrectal y tira de ella hacia adelante. ¿De qué músculo se trata?", a: "Músculo esfínter interno del ano.", b: "Músculo obturador interno.", c: "Músculo puborrectal (del elevador del ano).", d: "Músculo ilíaco.", correct: "c", exp: "El puborrectal, fascículo del elevador del ano, mantiene la angulación anorrectal, lo cual es vital para la continencia." },
            { q: "Inervación de las vísceras pélvicas: El Nervio Vago no desciende hasta la pelvis. ¿De dónde procede el componente parasimpático que inerva el recto y órganos pélvicos?", a: "De los nervios esplácnicos torácicos menores.", b: "De la cadena simpática lumbar.", c: "De los nervios esplácnicos pélvicos ascendentes (segmentos S2 a S4).", d: "Del nervio pudendo.", correct: "c", exp: "El esquema de inervación pélvica muestra claramente a los \"Pelvic parasympathetics ascending\" derivando de los nervios esplácnicos pélvicos S2-S4." },
            { q: "A los lados del canal anal, por debajo del músculo elevador del ano, se encuentran unos espacios ocupados por grasa que permiten la distensión del canal durante la defecación. Son las:", a: "Fosas isquioanales (isquiorrectales).", b: "Recesos subhepáticos.", c: "Fosas ilíacas.", d: "Transcavidades.", correct: "a", exp: "Estas fosas permiten la dilatación del canal anal y recto inferior." },
            { q: "Topografía de los riñones: Debido a la masa del hígado, la posición de los riñones no es simétrica. ¿Cuál es su proyección costal clásica en una visión posterior?", a: "Ambos riñones se sitúan a nivel de la costilla X.", b: "El riñón izquierdo está a nivel de la costilla XI y el derecho a nivel de la XII.", c: "El riñón derecho es más craneal que el izquierdo.", d: "Ambos se sitúan en la pelvis verdadera (L5).", correct: "b", exp: "El riñón derecho es empujado hacia abajo por el hígado, proyectándose en la costilla 12, mientras el izquierdo es más alto (costilla 11)." },
            { q: "Los riñones están envueltos por fascias y grasa. ¿Cómo se denomina la condensación fibrosa que engloba al riñón y a la glándula suprarrenal (compuesta por una lámina prerrenal y otra retrorrenal)?", a: "Cápsula fibrosa íntima.", b: "Fascia de Toldt.", c: "Fascia renal (Fascia de Gerota).", d: "Fascia de Treitz.", correct: "c", exp: "La fascia renal o de Gerota (hoja anterior) envuelve el conjunto renosuprarrenal." },
            { q: "La Arteria Renal derecha tiene un trayecto anatómico característico para llegar al hilio debido a la posición de la aorta. ¿Cuál es su relación con la Vena Cava Inferior (VCI)?", a: "Pasa por delante de la VCI.", b: "Pasa por detrás (posterior) a la VCI.", c: "Atraviesa el interior de la VCI.", d: "Discurre superior a las venas suprahepáticas.", correct: "b", exp: "Como la aorta está a la izquierda, la arteria renal derecha debe cruzar todo el lado derecho, pasando por detrás de la cava inferior." },
            { q: "Por el contrario, la Vena Renal Izquierda debe cruzar desde el riñón izquierdo hacia la cava (situada a la derecha). ¿Por debajo de qué importante arteria transcurre, formando una pinza vascular?", a: "Del tronco celíaco.", b: "De la arteria mesentérica inferior.", c: "De la arteria mesentérica superior.", d: "De la arteria ilíaca común.", correct: "c", exp: "La vena renal izquierda pasa por debajo de la Arteria Mesentérica Superior y por encima de la aorta (\"pinza aortomesentérica\")." },
            { q: "Las venas gonadales (testicular/ovárica) presentan un drenaje asimétrico. ¿Dónde drena la vena gonadal IZQUIERDA?", a: "Directamente en la Vena Cava Inferior.", b: "En la Vena Renal Izquierda.", c: "En la Vena Mesentérica Superior.", d: "En la Vena Porta hepática.", correct: "b", exp: "Mientras la derecha va directa a la cava, la izquierda desemboca en la vena renal izquierda en ángulo recto." },
            { q: "La glándula suprarrenal tiene un doble origen embrionario que determina su estructura. ¿De qué capa germinal deriva la MÉDULA suprarrenal (encargada de secretar adrenalina)?", a: "Del mesodermo somático.", b: "Del endodermo.", c: "Del ectodermo (crestas neurales).", d: "De la esplacnopleura.", correct: "c", exp: "La diapositiva especifica: Corteza (deriva del mesodermo) y Médula (deriva del ectodermo)." },
            { q: "La vascularización arterial de las glándulas suprarrenales es muy rica y proviene de tres fuentes. ¿De dónde nace la Arteria Suprarrenal SUPERIOR?", a: "De la arteria renal.", b: "De la arteria frénica inferior.", c: "Directamente de la aorta abdominal.", d: "Del tronco celíaco.", correct: "b", exp: "Las superiores nacen de la frénica inferior, las medias de la aorta y las inferiores de la arteria renal." },
            { q: "En la anatomía interna del riñón, las pirámides de Malpighi (médula) desembocan en una estructura en forma de copa. ¿Cuál es el orden correcto del flujo de orina desde la papila?", a: "Papila renal -> Cáliz mayor -> Cáliz menor -> Pelvis renal.", b: "Papila renal -> Cáliz menor -> Cáliz mayor -> Pelvis renal.", c: "Pelvis renal -> Cáliz menor -> Papila renal.", d: "Cáliz mayor -> Uréter -> Cáliz menor.", correct: "b", exp: "Las papilas vierten en los cálices menores, que confluyen en mayores y luego a la pelvis renal." },
            { q: "Inervación renal y suprarrenal: El esquema y texto muestran que su inervación es casi exclusiva del:", a: "Sistema Parasimpático sacro.", b: "Nervio Vago derecho puramente.", c: "Sistema Simpático (Nervios Esplácnicos torácicos T6-T11 y T12).", d: "Sistema Nervioso Somático voluntario.", correct: "c", exp: "Está inervado predominantemente por el sistema simpático a través del plexo renal y celíaco." },
            { q: "Las arterias segmentarias del riñón son arterias terminales. Esto significa clínicamente que:", a: "Se anastomosan libremente entre sí.", b: "Su oclusión no tiene consecuencias por la red colateral.", c: "Si una rama se ocluye, se producirá un infarto isquémico del segmento renal específico que irriga.", d: "Derivan directamente de la vena renal.", correct: "c", exp: "La presentación muestra cómo la oclusión de una rama segmentaria causa infarto en un segmento de color específico." },
            { q: "En el hilio renal, la disposición de las estructuras (de anterior a posterior) generalmente es:", a: "Pelvis renal - Arteria renal - Vena renal.", b: "Vena renal - Arteria renal - Pelvis renal.", c: "Arteria renal - Pelvis renal - Vena renal.", d: "Uréter - Vena renal - Arteria renal.", correct: "b", exp: "La diapositiva indica claramente: \"Vena renal es anterior, Arteria renal es central, Pelvis renal es posterior\" (V-A-P)." },
            { q: "El bazo presenta varias facetas. ¿Qué órgano se relaciona y moldea la faceta inferior del bazo (faceta cólica)?", a: "El ciego.", b: "El colon sigmoide.", c: "La flexura cólica izquierda (ángulo esplénico del colon).", d: "El ángulo hepático del colon.", correct: "c", exp: "El bazo descansa sobre la flexura cólica izquierda o ángulo esplénico." },
            { q: "La papila duodenal mayor (donde desemboca el colédoco y conducto de Wirsung) se localiza en la:", a: "Primera porción del duodeno (bulbo).", b: "Segunda porción del duodeno (descendente).", c: "Tercera porción del duodeno (horizontal).", d: "Cuarta porción del duodeno (ascendente).", correct: "b", exp: "Las papilas mayor y menor (ampolla de Vater y Santorini) se hallan en la porción descendente del duodeno." },
            { q: "¿Cuál de las siguientes venas NO es tributaria del sistema de la Vena Porta hepática?", a: "Vena mesentérica superior.", b: "Vena esplénica.", c: "Vena mesentérica inferior.", d: "Venas hepáticas (suprahepáticas).", correct: "d", exp: "Las venas hepáticas (suprahepáticas) salen del hígado y drenan en la Cava Inferior, no forman la Porta." },
            { q: "El lóbulo renal, unidad anatómica del riñón, está formado por:", a: "Únicamente la papila renal.", b: "Una pirámide renal (médula) más las porciones corticales adyacentes correspondientes.", c: "La cápsula adiposa y la corteza.", d: "La nefrona y el túbulo colector puramente.", correct: "b", exp: "\"Cada pirámide renal + Porciones corticales adyacentes = Lóbulo Renal\"." }
        ];

        let currentQuestions = [];
        let answersState = {}; // Guarda { answered: bool, correct: bool, selected: str, marked: bool }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            const isRandom = document.getElementById('order-random').checked;
            currentQuestions = JSON.parse(JSON.stringify(rawData));
            if (isRandom) shuffle(currentQuestions);
            
            answersState = {};
            initUI();
        }

        function initUI() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('main-container').style.display = 'flex';
            document.getElementById('finish-btn').classList.remove('hidden');

            const sidebar = document.getElementById('sidebar');
            const quizArea = document.getElementById('quiz-area');
            sidebar.innerHTML = '';
            quizArea.innerHTML = '';

            currentQuestions.forEach((q, i) => {
                // Punto de navegación
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.id = `dot-${i}`;
                dot.innerText = i + 1;
                dot.onclick = () => document.getElementById(`q-${i}`).scrollIntoView();
                sidebar.appendChild(dot);

                // Carta de pregunta
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-${i}`;

                // Aleatorizar opciones para esta carga
                const options = [
                    { k: 'a', t: q.a },
                    { k: 'b', t: q.b },
                    { k: 'c', t: q.c },
                    { k: 'd', t: q.d }
                ];
                shuffle(options);

                card.innerHTML = `
                    <div class="question-header">
                        <strong>Pregunta ${i + 1}</strong>
                        <label class="mark-label">
                            <input type="checkbox" onchange="toggleMark(${i}, this.checked)"> Marcar duda
                        </label>
                    </div>
                    <p style="font-size: 1.1rem; margin-bottom: 20px;">${q.q}</p>
                    <div class="options-list">
                        ${options.map(opt => `
                            <div class="option" data-key="${opt.k}" onclick="handleSelection(${i}, '${opt.k}', this)">
                                ${opt.t}
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="exp-${i}">
                        <strong>Respuesta correcta: ${q.correct.toUpperCase()}</strong><br><br>
                        ${q.exp}
                    </div>
                `;
                quizArea.appendChild(card);
            });
        }

        function handleSelection(qIdx, key, element) {
            if (answersState[qIdx]?.answered) return;

            const correctKey = currentQuestions[qIdx].correct;
            const isCorrect = key === correctKey;

            if (!answersState[qIdx]) answersState[qIdx] = {};
            answersState[qIdx].answered = true;
            answersState[qIdx].correct = isCorrect;
            answersState[qIdx].selected = key;

            // Feedback visual
            const options = element.parentElement.querySelectorAll('.option');
            options.forEach(opt => {
                opt.classList.add('disabled');
                if (opt.dataset.key === correctKey) opt.classList.add('correct');
                if (opt.dataset.key === key && !isCorrect) opt.classList.add('wrong');
            });

            document.getElementById(`exp-${qIdx}`).style.display = 'block';
            document.getElementById(`dot-${qIdx}`).classList.add('answered');
        }

        function toggleMark(qIdx, checked) {
            if (!answersState[qIdx]) answersState[qIdx] = {};
            answersState[qIdx].marked = checked;
            document.getElementById(`dot-${qIdx}`).classList.toggle('marked', checked);
        }

        function finishQuiz() {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('finish-btn').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const total = currentQuestions.length;
            const correctas = Object.values(answersState).filter(s => s.correct).length;
            document.getElementById('score-text').innerText = `Resultado: ${correctas} aciertos de ${total} preguntas.`;
        }

        function retry(mode) {
            let filtered = [];
            
            if (mode === 'all') {
                filtered = rawData;
            } else {
                filtered = currentQuestions.filter((q, i) => {
                    const state = answersState[i] || {};
                    const isFailed = state.answered && !state.correct;
                    const isMarked = state.marked;

                    if (mode === 'failed') return isFailed;
                    if (mode === 'marked') return isMarked;
                    if (mode === 'failed-marked') return isFailed || isMarked;
                });
            }

            if (filtered.length === 0) {
                alert("No hay preguntas que cumplan ese criterio.");
                return;
            }

            currentQuestions = JSON.parse(JSON.stringify(filtered));
            const isRandom = document.getElementById('order-random').checked;
            if (isRandom) shuffle(currentQuestions);
            
            answersState = {};
            initUI();
        }
    </script>
</body>
</html>
